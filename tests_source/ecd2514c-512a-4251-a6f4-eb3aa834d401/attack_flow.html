<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
        }

        /* F0RT1KA Header - Hidden when embedded in browser */
        .framework-header {
            display: none; /* Redundant - browser header shows F0RT1KA branding */
        }

        .framework-title {
            font-size: 1.2em;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ff6b6b, #ff8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .framework-subtitle {
            position: absolute;
            right: 30px;
            font-size: 0.85em;
            color: #6b7280;
            font-style: italic;
        }

        .dashboard-container {
            display: flex;
            height: 100vh; /* Full height since header is hidden */
            position: relative;
        }

        /* Left Panel - Attack Flow View */
        .attack-flow-panel {
            flex: 1;
            min-width: 60%;
            padding: 20px;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Test title header - Hidden when embedded in browser */
        .header {
            display: none; /* Redundant - browser header shows test name */
        }

        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #ff4458, #ff8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #9ca3af;
            font-size: 1em;
        }

        /* View Toggle Buttons */
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .view-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .view-btn.active {
            background: rgba(255, 107, 107, 0.1);
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .view-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        /* SVG Attack Flow Container */
        .attack-flow-svg-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 10px;
            position: relative;
            flex: 1;
            min-height: 0; /* Allow flex shrinking */
            overflow: hidden;
        }

        .attack-flow-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Timeline View (Hidden by default) */
        .timeline-view {
            display: none;
            padding: 20px;
        }

        .timeline-view.active {
            display: block;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .timeline-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }

        .timeline-item.active {
            background: rgba(255, 107, 107, 0.05);
            border-left-color: #ff6b6b;
        }

        .timeline-number {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            border: 2px solid;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-size: 1.1em;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .timeline-meta {
            font-size: 0.85em;
            color: #9ca3af;
        }

        /* Right Panel - Details (OPAQUE BACKGROUND) */
        .details-panel {
            width: 450px;
            background: #0f1419; /* Solid opaque background */
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            overflow-y: auto;
            position: relative;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.8); /* Add shadow for depth */
        }

        .details-panel.active {
            transform: translateX(0);
        }

        .details-header {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .details-phase-number {
            display: inline-block;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            text-align: center;
            line-height: 36px;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
            border: 2px solid;
        }

        .details-title {
            font-size: 1.5em;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .details-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
        }

        .meta-label {
            color: #6b7280;
        }

        .meta-value {
            color: #d1d5db;
            font-family: 'SF Mono', monospace;
        }

        /* MITRE Links Styling */
        .mitre-link {
            color: #4fc3f7;
            text-decoration: none;
            border-bottom: 1px dotted #4fc3f7;
            transition: all 0.2s ease;
        }

        .mitre-link:hover {
            color: #29b6f6;
            border-bottom-style: solid;
        }

        .severity-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            border: 1px solid;
        }

        .severity-badge.critical {
            color: #ff4444;
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }

        .severity-badge.high {
            color: #ff9f43;
            border-color: #ff9f43;
            background: rgba(255, 159, 67, 0.1);
        }

        .severity-badge.medium {
            color: #ffc107;
            border-color: #ffc107;
            background: rgba(255, 193, 7, 0.1);
        }

        .severity-badge.info {
            color: #4fc3f7;
            border-color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
        }

        .details-section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.1em;
            color: #ff6b6b;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-list {
            list-style: none;
        }

        .action-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .action-title {
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .action-details {
            list-style: none;
            padding-left: 0;
        }

        .action-details li {
            color: #9ca3af;
            font-size: 0.85em;
            padding: 3px 0;
            padding-left: 15px;
            position: relative;
        }

        .action-details li::before {
            content: '>';
            position: absolute;
            left: 0;
            color: #6b7280;
        }

        /* Code Preview */
        .code-preview {
            background: #0a0e27;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 0.85em;
            overflow-x: auto;
        }

        .code-line {
            color: #66bb6a;
            line-height: 1.5;
        }

        .code-comment {
            color: #6b7280;
        }

        .code-highlight {
            color: #ff9f43;
        }

        /* Close button for details panel */
        .close-details {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #6b7280;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
            display: none;
        }

        .close-details:hover {
            color: #ff6b6b;
        }

        /* Mobile responsive */
        @media (max-width: 1200px) {
            .details-panel {
                position: absolute;
                right: 0;
                top: 0;
                height: 100%;
                z-index: 100;
            }

            .close-details {
                display: block;
            }

            .framework-subtitle {
                display: none;
            }
        }

        /* Loading animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Interactive component styling */
        .component {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .component:hover .component-box {
            filter: drop-shadow(0 0 15px rgba(255, 107, 107, 0.4));
            stroke-width: 2;
        }

        .component.active .component-box {
            filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.6));
            stroke: #ff6b6b;
            stroke-width: 2;
        }

        /* Pulse animation for active elements */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        /* Navigation hints - Hidden when embedded */
        .nav-hint {
            display: none; /* Redundant - diagram title says "Click components for details" */
        }

        .nav-hint-icon {
            color: #ff6b6b;
        }

        /* Sidebar toggle button */
        .sidebar-toggle {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 80px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-right: none;
            border-radius: 8px 0 0 8px;
            color: #ff6b6b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 200;
            transition: all 0.3s ease;
        }

        .sidebar-toggle:hover {
            background: rgba(255, 107, 107, 0.2);
            width: 32px;
        }

        .sidebar-toggle .toggle-icon {
            transition: transform 0.3s ease;
        }

        .sidebar-toggle.collapsed .toggle-icon {
            transform: rotate(180deg);
        }

        .sidebar-toggle.expanded {
            right: 450px;
        }

        .details-panel.collapsed {
            transform: translateX(100%) !important;
        }

        /* Stats overlay */
        .stats-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .stat-mini {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .stat-mini-value {
            color: #ff6b6b;
            font-weight: bold;
        }

        .stat-mini-label {
            color: #6b7280;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <!-- F0RT1KA Framework Header -->
    <div class="framework-header">
        <div class="framework-title">F0RT1KA Security Testing Framework</div>
        <div class="framework-subtitle">Version 3.0</div>
    </div>

    <div class="dashboard-container">
        <!-- Left Panel - Attack Flow View -->
        <div class="attack-flow-panel">
            <div class="header">
                <h1>CyberEye RAT - Windows Defender Disabling - Attack/Test Flow</h1>
                <p>Click any component to explore detailed attack flow</p>
            </div>

            <div class="view-toggle">
                <button class="view-btn active" onclick="switchView('architecture')">Attack Flow</button>
                <button class="view-btn" onclick="switchView('timeline')">Timeline View</button>
            </div>

            <!-- Attack Flow View -->
            <div class="attack-flow-svg-container" id="attackFlowView">
                <svg class="attack-flow-svg" viewBox="0 0 1200 550" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Gradient Definitions -->
                        <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff4458;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ff8787;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff9f43;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ffb347;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffc107;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ffcd38;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#9c27b0;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ba68c8;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#4caf50;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#81c784;stop-opacity:0.8" />
                        </linearGradient>

                        <!-- Arrow Marker -->
                        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                            <polygon points="0 0, 10 3, 0 6" fill="#ff6b6b" />
                        </marker>

                        <!-- Grid Pattern -->
                        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
                        </pattern>
                    </defs>

                    <!-- Background -->
                    <rect width="1200" height="550" fill="url(#grid)" />

                    <!-- Phase 1: Script Deployment -->
                    <g class="component" data-phase="1" onclick="showPhaseDetails(1)">
                        <rect class="component-box" x="50" y="200" width="160" height="100" rx="8"
                              fill="url(#yellowGradient)" stroke="#ffc107" stroke-width="1" opacity="0.2"/>
                        <text x="130" y="235" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Script Drop</text>
                        <text x="130" y="255" text-anchor="middle" fill="#9ca3af" font-size="11">CyberEye-TTPs.ps1</text>
                        <text x="130" y="275" text-anchor="middle" fill="#9ca3af" font-size="11">to c:\F0</text>
                    </g>

                    <!-- Phase 2: Execution Policy Bypass -->
                    <g class="component" data-phase="2" onclick="showPhaseDetails(2)">
                        <rect class="component-box" x="270" y="200" width="160" height="100" rx="8"
                              fill="url(#orangeGradient)" stroke="#ff9f43" stroke-width="1" opacity="0.2"/>
                        <text x="350" y="235" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Policy Bypass</text>
                        <text x="350" y="255" text-anchor="middle" fill="#9ca3af" font-size="11">-ExecutionPolicy</text>
                        <text x="350" y="275" text-anchor="middle" fill="#9ca3af" font-size="11">Bypass</text>
                    </g>

                    <!-- Phase 3: Disable Tamper Protection -->
                    <g class="component" data-phase="3" onclick="showPhaseDetails(3)">
                        <rect class="component-box" x="490" y="120" width="180" height="100" rx="8"
                              fill="url(#redGradient)" stroke="#ff6b6b" stroke-width="1" opacity="0.2"/>
                        <text x="580" y="155" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Tamper Protection</text>
                        <text x="580" y="175" text-anchor="middle" fill="#9ca3af" font-size="11">TamperProtection = 0</text>

                    </g>

                    <!-- Phase 4: Disable Anti-Spyware -->
                    <g class="component" data-phase="4" onclick="showPhaseDetails(4)">
                        <rect class="component-box" x="490" y="280" width="180" height="100" rx="8"
                              fill="url(#redGradient)" stroke="#ff6b6b" stroke-width="1" opacity="0.2"/>
                        <text x="580" y="315" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Anti-Spyware</text>
                        <text x="580" y="335" text-anchor="middle" fill="#9ca3af" font-size="11">DisableAntiSpyware = 1</text>
                        <text x="580" y="355" text-anchor="middle" fill="#9ca3af" font-size="11">Policy Registry</text>
                    </g>

                    <!-- Phase 5: Real-Time Protection -->
                    <g class="component" data-phase="5" onclick="showPhaseDetails(5)">
                        <rect class="component-box" x="730" y="200" width="180" height="100" rx="8"
                              fill="url(#purpleGradient)" stroke="#9c27b0" stroke-width="1" opacity="0.2"/>
                        <text x="820" y="230" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Real-Time Disable</text>
                        <text x="820" y="250" text-anchor="middle" fill="#9ca3af" font-size="11">Behavior Monitoring</text>
                        <text x="820" y="270" text-anchor="middle" fill="#9ca3af" font-size="11">On-Access Protection</text>
                    </g>

                    <!-- Phase 6: Verification -->
                    <g class="component" data-phase="6" onclick="showPhaseDetails(6)">
                        <rect class="component-box" x="970" y="200" width="160" height="100" rx="8"
                              fill="url(#greenGradient)" stroke="#4caf50" stroke-width="1" opacity="0.2"/>
                        <text x="1050" y="235" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Verification</text>
                        <text x="1050" y="255" text-anchor="middle" fill="#9ca3af" font-size="11">Query Settings</text>
                        <text x="1050" y="275" text-anchor="middle" fill="#9ca3af" font-size="11">Confirm Disabled</text>
                    </g>

                    <!-- Flow Arrows -->
                    <!-- Phase 1 to Phase 2 -->
                    <path d="M 210 250 L 270 250" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.5"/>

                    <!-- Phase 2 splits to Phase 3 and Phase 4 -->
                    <path d="M 430 230 Q 460 170, 490 170" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.5"/>
                    <path d="M 430 270 Q 460 330, 490 330" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.5"/>

                    <!-- Phase 3 and Phase 4 converge to Phase 5 -->
                    <path d="M 670 170 Q 700 200, 730 230" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.5"/>
                    <path d="M 670 330 Q 700 290, 730 270" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.5"/>

                    <!-- Phase 5 to Phase 6 -->
                    <path d="M 910 250 L 970 250" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.5"/>

                    <!-- Central Title -->
                    <rect x="400" y="20" width="400" height="50" rx="8" fill="rgba(0,0,0,0.5)" stroke="rgba(255,107,107,0.3)"/>
                    <text x="600" y="40" text-anchor="middle" fill="#ff6b6b" font-size="16" font-weight="bold">T1562.001 - Impair Defenses: Disable or Modify Tools</text>
                    <text x="600" y="58" text-anchor="middle" fill="#9ca3af" font-size="11">Click components for details</text>

                    <!-- Detection Points Labels -->
                    <rect x="50" y="420" width="280" height="70" rx="6" fill="rgba(79, 195, 247, 0.1)" stroke="rgba(79, 195, 247, 0.3)"/>
                    <text x="190" y="445" text-anchor="middle" fill="#4fc3f7" font-size="12" font-weight="bold">Detection Points</text>
                    <text x="190" y="465" text-anchor="middle" fill="#9ca3af" font-size="10">PowerShell execution with -ExecutionPolicy Bypass</text>
                    <text x="190" y="480" text-anchor="middle" fill="#9ca3af" font-size="10">Registry modifications in Windows Defender paths</text>

                    <!-- Registry Paths Label -->
                    <rect x="400" y="420" width="350" height="70" rx="6" fill="rgba(255, 107, 107, 0.1)" stroke="rgba(255, 107, 107, 0.3)"/>
                    <text x="575" y="445" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">Target Registry Paths</text>
                    <text x="575" y="465" text-anchor="middle" fill="#9ca3af" font-size="10">HKLM:\SOFTWARE\Microsoft\Windows Defender\Features</text>
                    <text x="575" y="480" text-anchor="middle" fill="#9ca3af" font-size="10">HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender\*</text>

                    <!-- Result Codes Label -->
                    <rect x="820" y="420" width="320" height="70" rx="6" fill="rgba(76, 175, 80, 0.1)" stroke="rgba(76, 175, 80, 0.3)"/>
                    <text x="980" y="445" text-anchor="middle" fill="#4caf50" font-size="12" font-weight="bold">Expected Results</text>
                    <text x="980" y="465" text-anchor="middle" fill="#9ca3af" font-size="10">101: Registry modified (Unprotected)</text>
                    <text x="980" y="480" text-anchor="middle" fill="#9ca3af" font-size="10">105: Script quarantined | 126: Access blocked</text>

                    <!-- Progress Bar -->
                    <rect x="50" y="510" width="1100" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
                    <rect x="50" y="510" width="0" height="4" rx="2" fill="#ff6b6b" id="progressBar"/>
                </svg>

                <div class="stats-overlay">
                    <div class="stat-mini">
                        <span class="stat-mini-value">6</span>
                        <span class="stat-mini-label">Phases</span>
                    </div>
                    <div class="stat-mini">
                        <span class="stat-mini-value">T1562.001</span>
                        <span class="stat-mini-label">Technique</span>
                    </div>
                    <div class="stat-mini">
                        <span class="stat-mini-value">7.4</span>
                        <span class="stat-mini-label">Score</span>
                    </div>
                </div>

                <div class="nav-hint">
                    <span class="nav-hint-icon">*</span>
                    <span>Click any component to view detailed attack flow information</span>
                </div>
            </div>

            <!-- Timeline View (Hidden by default) -->
            <div class="timeline-view" id="timelineView">
                <!-- Timeline items will be generated by JavaScript -->
            </div>
        </div>

        <!-- Right Panel - Details (OPAQUE) -->
        <div class="details-panel" id="detailsPanel">
            <button class="close-details" onclick="closeDetails()">x</button>
            <div id="detailsContent">
                <!-- Details will be populated dynamically -->
            </div>
        </div>

        <!-- Sidebar Toggle Button -->
        <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Toggle details panel">
            <span class="toggle-icon">&lt;</span>
        </button>
    </div>

    <script>
        // Phase data with MITRE links
        var phaseData = {
            1: {
                number: 1,
                title: "PowerShell Script Deployment",
                severity: "medium",
                mitre: [
                    { id: "T1562.001", name: "Impair Defenses: Disable or Modify Tools" }
                ],
                status: "actual",
                time: "T+0s",
                description: "Drops the CyberEye RAT PowerShell script to the c:\\F0 directory for execution",
                actions: [
                    {
                        title: "Script Extraction",
                        details: [
                            "Extract CyberEye-TTPs.ps1 to c:\\F0",
                            "Script embedded in Go binary via //go:embed",
                            "Script is 141 lines of PowerShell code",
                            "Cleanup script also deployed"
                        ]
                    },
                    {
                        title: "Quarantine Check",
                        details: [
                            "Check if script was quarantined during extraction",
                            "Verify script exists at target path",
                            "Exit 105 if file was quarantined",
                            "Proceed if file is present"
                        ]
                    }
                ],
                code: "scriptPath := filepath.Join(targetDir, \"CyberEye-TTPs.ps1\")\nos.WriteFile(scriptPath, maliciousScript, 0755)"
            },
            2: {
                number: 2,
                title: "Execution Policy Bypass",
                severity: "high",
                mitre: [
                    { id: "T1059.001", name: "Command and Scripting Interpreter: PowerShell" },
                    { id: "T1562.001", name: "Impair Defenses: Disable or Modify Tools" }
                ],
                status: "actual",
                time: "T+2s",
                description: "Launches PowerShell with -ExecutionPolicy Bypass to circumvent script execution restrictions",
                actions: [
                    {
                        title: "PowerShell Launch",
                        details: [
                            "Execute powershell.exe with bypass flag",
                            "Command: powershell.exe -ExecutionPolicy Bypass -File <script>",
                            "Working directory set to c:\\F0",
                            "Capture combined stdout/stderr output"
                        ]
                    },
                    {
                        title: "Script Self-Check",
                        details: [
                            "Script checks current execution policy",
                            "Detects Restricted or AllSigned policies",
                            "Relaunches itself with bypass if needed",
                            "Logs policy bypass attempts"
                        ]
                    }
                ],
                code: "cmd := exec.Command(\"powershell.exe\", \"-ExecutionPolicy\", \"Bypass\", \"-File\", scriptPath)\ncmd.Dir = targetDir\noutput, err := cmd.CombinedOutput()"
            },
            3: {
                number: 3,
                title: "Disable Tamper Protection",
                severity: "critical",
                mitre: [
                    { id: "T1562.001", name: "Impair Defenses: Disable or Modify Tools" },
                    { id: "T1112", name: "Modify Registry" }
                ],
                status: "actual",
                time: "T+3s",
                description: "Attempts to disable Windows Defender Tamper Protection via registry modification",
                actions: [
                    {
                        title: "Registry Modification",
                        details: [
                            "Target: HKLM:\\SOFTWARE\\Microsoft\\Windows Defender\\Features",
                            "Set TamperProtection = 0 (DWORD)",
                            "Requires administrative privileges",
                            "May be blocked by existing Tamper Protection"
                        ]
                    },
                    {
                        title: "Error Handling",
                        details: [
                            "Catch 'Requested registry access is not allowed'",
                            "Log failure if Tamper Protection is active",
                            "Note: May need manual disable via Security UI first",
                            "Continue to next modification on failure"
                        ]
                    }
                ],
                code: "$defenderFeaturesPath = \"HKLM:\\SOFTWARE\\Microsoft\\Windows Defender\\Features\"\nSet-ItemProperty -Path $defenderFeaturesPath -Name \"TamperProtection\" -Value 0 -Type DWord"
            },
            4: {
                number: 4,
                title: "Disable Anti-Spyware",
                severity: "critical",
                mitre: [
                    { id: "T1562.001", name: "Impair Defenses: Disable or Modify Tools" },
                    { id: "T1112", name: "Modify Registry" }
                ],
                status: "actual",
                time: "T+4s",
                description: "Disables Windows Defender Anti-Spyware component via Group Policy registry key",
                actions: [
                    {
                        title: "Policy Registry Creation",
                        details: [
                            "Create path if not exists: HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows Defender",
                            "Set DisableAntiSpyware = 1 (DWORD)",
                            "Effectively disables Windows Defender",
                            "Used by CyberEye RAT for AV evasion"
                        ]
                    },
                    {
                        title: "Impact Assessment",
                        details: [
                            "Disables real-time scanning",
                            "Prevents automatic threat detection",
                            "Allows malware execution without interference",
                            "Persists across reboots"
                        ]
                    }
                ],
                code: "$defenderPolicyPath = \"HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows Defender\"\nNew-Item -Path $defenderPolicyPath -Force | Out-Null\nSet-ItemProperty -Path $defenderPolicyPath -Name \"DisableAntiSpyware\" -Value 1 -Type DWord"
            },
            5: {
                number: 5,
                title: "Disable Real-Time Protection Components",
                severity: "critical",
                mitre: [
                    { id: "T1562.001", name: "Impair Defenses: Disable or Modify Tools" },
                    { id: "T1112", name: "Modify Registry" }
                ],
                status: "actual",
                time: "T+5s",
                description: "Systematically disables multiple Real-Time Protection features via registry modifications",
                actions: [
                    {
                        title: "Behavior Monitoring",
                        details: [
                            "Path: ...\\Real-Time Protection\\DisableBehaviorMonitoring",
                            "Set value to 1 (DWORD)",
                            "Disables behavior-based threat detection",
                            "Allows suspicious process activities"
                        ]
                    },
                    {
                        title: "On-Access Protection",
                        details: [
                            "Path: ...\\Real-Time Protection\\DisableOnAccessProtection",
                            "Set value to 1 (DWORD)",
                            "Disables file access scanning",
                            "Files no longer scanned when opened"
                        ]
                    },
                    {
                        title: "Realtime Scanning",
                        details: [
                            "Path: ...\\Real-Time Protection\\DisableScanOnRealtimeEnable",
                            "Set value to 1 (DWORD)",
                            "Prevents automatic scanning on file changes",
                            "Completes defense evasion chain"
                        ]
                    }
                ],
                code: "$realtimeProtectionPath = \"HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows Defender\\Real-Time Protection\"\nSet-ItemProperty -Path $realtimeProtectionPath -Name \"DisableBehaviorMonitoring\" -Value 1 -Type DWord\nSet-ItemProperty -Path $realtimeProtectionPath -Name \"DisableOnAccessProtection\" -Value 1 -Type DWord\nSet-ItemProperty -Path $realtimeProtectionPath -Name \"DisableScanOnRealtimeEnable\" -Value 1 -Type DWord"
            },
            6: {
                number: 6,
                title: "Verification & Result Evaluation",
                severity: "info",
                mitre: [
                    { id: "T1082", name: "System Information Discovery" }
                ],
                status: "actual",
                time: "T+10s",
                description: "Queries Windows Defender settings to verify modifications and determines test outcome",
                actions: [
                    {
                        title: "Settings Verification",
                        details: [
                            "Call Get-MpPreference to check Defender status",
                            "Log current protection settings",
                            "Query WinDefend service status via 'sc query'",
                            "Compare expected vs actual state"
                        ]
                    },
                    {
                        title: "Result Determination",
                        details: [
                            "Count successful registry modifications",
                            "Check for protection indicators in output",
                            "Exit 101 if 3+ modifications succeeded (Unprotected)",
                            "Exit 126 if access denied (Protected)",
                            "Exit 105 if script was quarantined"
                        ]
                    }
                ],
                code: "$defenderSettings = Get-MpPreference -ErrorAction Stop\nWrite-Log \"Current Defender Settings:\"\nWrite-Log ($defenderSettings | Format-List | Out-String)"
            }
        };

        // Current active phase
        var currentPhase = null;

        // Sidebar toggle state
        var sidebarCollapsed = false;
        function toggleSidebar() {
            var detailsPanel = document.getElementById('detailsPanel');
            var toggleBtn = document.getElementById('sidebarToggle');

            sidebarCollapsed = !sidebarCollapsed;

            if (sidebarCollapsed) {
                detailsPanel.classList.add('collapsed');
                toggleBtn.classList.remove('expanded');
                toggleBtn.classList.add('collapsed');
            } else {
                detailsPanel.classList.remove('collapsed');
                if (detailsPanel.classList.contains('active')) {
                    toggleBtn.classList.add('expanded');
                }
                toggleBtn.classList.remove('collapsed');
            }
        }

        // Function to create MITRE links
        function createMitreLinks(mitreArray) {
            return mitreArray.map(function(technique) {
                var baseUrl = "https://attack.mitre.org/techniques/";
                var techId = technique.id.replace('.', '/'); // Handle sub-techniques like T1059.001
                return '<a href="' + baseUrl + techId + '" target="_blank" class="mitre-link" title="' + technique.name + '">' + technique.id + '</a>';
            }).join(', ');
        }

        // Initialize timeline view
        function initializeTimeline() {
            var timelineView = document.getElementById('timelineView');
            var html = '';

            for (var i = 1; i <= 6; i++) {
                var phase = phaseData[i];
                var severityColor = getSeverityColor(phase.severity);
                var mitreText = phase.mitre.map(function(t) { return t.id; }).join(', ');

                html += '<div class="timeline-item" onclick="showPhaseDetails(' + i + ')">' +
                    '<div class="timeline-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' +
                        i +
                    '</div>' +
                    '<div class="timeline-content">' +
                        '<div class="timeline-title">' + phase.title + '</div>' +
                        '<div class="timeline-meta">' +
                            phase.time + ' - ' + mitreText + ' - ' + (phase.status === 'actual' ? 'Actual' : 'Simulated') +
                        '</div>' +
                    '</div>' +
                '</div>';
            }

            timelineView.innerHTML = html;
        }

        // Show phase details
        function showPhaseDetails(phaseNum) {
            currentPhase = phaseNum;
            var phase = phaseData[phaseNum];
            var detailsPanel = document.getElementById('detailsPanel');
            var detailsContent = document.getElementById('detailsContent');

            // Update active states
            var components = document.querySelectorAll('.component');
            for (var i = 0; i < components.length; i++) {
                components[i].classList.remove('active');
            }
            var timelineItems = document.querySelectorAll('.timeline-item');
            for (var i = 0; i < timelineItems.length; i++) {
                timelineItems[i].classList.remove('active');
            }

            // Add active state to clicked component
            var activeComponent = document.querySelector('.component[data-phase="' + phaseNum + '"]');
            if (activeComponent) {
                activeComponent.classList.add('active');
            }

            // Add active state to timeline item
            if (timelineItems[phaseNum - 1]) {
                timelineItems[phaseNum - 1].classList.add('active');
            }

            // Generate details HTML
            var severityColor = getSeverityColor(phase.severity);
            var actionsHtml = '';

            for (var a = 0; a < phase.actions.length; a++) {
                var action = phase.actions[a];
                var detailsListHtml = '';
                for (var d = 0; d < action.details.length; d++) {
                    detailsListHtml += '<li>' + action.details[d] + '</li>';
                }
                actionsHtml += '<div class="action-item">' +
                    '<div class="action-title">' + action.title + '</div>' +
                    '<ul class="action-details">' + detailsListHtml + '</ul>' +
                '</div>';
            }

            var mitreLinks = createMitreLinks(phase.mitre);

            // Build code preview HTML
            var codePreviewHtml = '';
            if (phase.code) {
                var codeLines = phase.code.split('\n');
                var codeLinesHtml = '';
                for (var c = 0; c < codeLines.length; c++) {
                    var line = codeLines[c];
                    if (line.indexOf('#') === 0 || line.indexOf('//') === 0) {
                        codeLinesHtml += '<div class="code-line code-comment">' + escapeHtml(line) + '</div>';
                    } else {
                        codeLinesHtml += '<div class="code-line">' + escapeHtml(line) + '</div>';
                    }
                }
                codePreviewHtml = '<div class="details-section">' +
                    '<h3 class="section-title">' +
                        '<span>[&gt;]</span>' +
                        '<span>Code Preview</span>' +
                    '</h3>' +
                    '<div class="code-preview">' + codeLinesHtml + '</div>' +
                '</div>';
            }

            detailsContent.innerHTML = '<div class="details-header">' +
                '<div class="details-phase-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' +
                    phase.number +
                '</div>' +
                '<h2 class="details-title">' + phase.title + '</h2>' +
                '<div class="severity-badge ' + phase.severity + '">' + phase.severity.toUpperCase() + '</div>' +
                '<div class="details-meta">' +
                    '<div class="meta-item">' +
                        '<span class="meta-label">MITRE:</span>' +
                        '<span class="meta-value">' + mitreLinks + '</span>' +
                    '</div>' +
                    '<div class="meta-item">' +
                        '<span class="meta-label">Time:</span>' +
                        '<span class="meta-value">' + phase.time + '</span>' +
                    '</div>' +
                    '<div class="meta-item">' +
                        '<span class="meta-label">Status:</span>' +
                        '<span class="meta-value">' + (phase.status === 'actual' ? 'Actual execution' : 'Simulated only') + '</span>' +
                    '</div>' +
                '</div>' +
            '</div>' +

            '<div class="details-section">' +
                '<p style="color: #9ca3af; margin-bottom: 20px;">' + phase.description + '</p>' +
            '</div>' +

            '<div class="details-section">' +
                '<h3 class="section-title">' +
                    '<span>[*]</span>' +
                    '<span>Actions Performed</span>' +
                '</h3>' +
                '<div class="action-list">' + actionsHtml + '</div>' +
            '</div>' +

            codePreviewHtml;

            // Show details panel
            detailsPanel.classList.add('active');

            // Update progress bar
            updateProgressBar(phaseNum);

            // Position toggle button with sidebar
            var toggleBtn = document.getElementById('sidebarToggle');
            if (!sidebarCollapsed) {
                toggleBtn.classList.add('expanded');
            }
        }

        // Escape HTML helper
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // Close details panel
        function closeDetails() {
            document.getElementById('detailsPanel').classList.remove('active');
            var components = document.querySelectorAll('.component');
            for (var i = 0; i < components.length; i++) {
                components[i].classList.remove('active');
            }
            var timelineItems = document.querySelectorAll('.timeline-item');
            for (var i = 0; i < timelineItems.length; i++) {
                timelineItems[i].classList.remove('active');
            }

            // Reset toggle button position
            var toggleBtn = document.getElementById('sidebarToggle');
            toggleBtn.classList.remove('expanded');
        }

        // Switch view
        function switchView(view) {
            // Update button states
            var buttons = document.querySelectorAll('.view-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            event.target.classList.add('active');

            // Hide all views
            document.getElementById('attackFlowView').style.display = 'none';
            document.getElementById('timelineView').classList.remove('active');

            // Show selected view
            if (view === 'architecture') {
                document.getElementById('attackFlowView').style.display = 'block';
            } else if (view === 'timeline') {
                document.getElementById('timelineView').classList.add('active');
            }
        }

        // Get severity color
        function getSeverityColor(severity) {
            switch(severity) {
                case 'critical': return '#ff4444';
                case 'high': return '#ff9f43';
                case 'medium': return '#ffc107';
                case 'info': return '#4fc3f7';
                default: return '#9ca3af';
            }
        }

        // Update progress bar
        function updateProgressBar(phaseNum) {
            var progressBar = document.getElementById('progressBar');
            var width = (phaseNum / 6) * 1100;
            progressBar.style.width = width + 'px';
            progressBar.style.transition = 'width 0.5s ease';
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            initializeTimeline();

            // Sidebar starts expanded - show phase 1 details
            sidebarCollapsed = false;
            setTimeout(function() {
                showPhaseDetails(1);
            }, 500);
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (currentPhase) {
                if (e.key === 'ArrowRight' && currentPhase < 6) {
                    showPhaseDetails(currentPhase + 1);
                } else if (e.key === 'ArrowLeft' && currentPhase > 1) {
                    showPhaseDetails(currentPhase - 1);
                } else if (e.key === 'Escape') {
                    closeDetails();
                }
            }
        });
    </script>
</body>
</html>
