<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailscale Remote Access Test - Attack Flow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
        }

        /* F0RT1KA Header */
        .framework-header {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.6));
            border-bottom: 1px solid rgba(255, 107, 107, 0.2);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .framework-title {
            font-size: 1.2em;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ff6b6b, #ff8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .framework-subtitle {
            position: absolute;
            right: 30px;
            font-size: 0.85em;
            color: #6b7280;
            font-style: italic;
        }

        .dashboard-container {
            display: flex;
            height: calc(100vh - 60px);
            position: relative;
        }

        /* Left Panel - Attack Flow View */
        .attack-flow-panel {
            flex: 1;
            min-width: 60%;
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #9ca3af;
            font-size: 1em;
        }

        /* View Toggle Buttons */
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .view-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .view-btn.active {
            background: rgba(79, 195, 247, 0.1);
            border-color: #4fc3f7;
            color: #4fc3f7;
        }

        .view-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        /* SVG Attack Flow Container */
        .attack-flow-svg-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            min-height: 600px;
        }

        .attack-flow-svg {
            width: 100%;
            height: auto;
            min-height: 550px;
        }

        /* Timeline View (Hidden by default) */
        .timeline-view {
            display: none;
            padding: 20px;
        }

        .timeline-view.active {
            display: block;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .timeline-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }

        .timeline-item.active {
            background: rgba(79, 195, 247, 0.05);
            border-left-color: #4fc3f7;
        }

        .timeline-number {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            border: 2px solid;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-size: 1.1em;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .timeline-meta {
            font-size: 0.85em;
            color: #9ca3af;
        }

        /* Right Panel - Details (OPAQUE BACKGROUND) */
        .details-panel {
            width: 450px;
            background: #0f1419; /* Solid opaque background */
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            overflow-y: auto;
            position: relative;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.8);
        }

        .details-panel.active {
            transform: translateX(0);
        }

        .details-header {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .details-phase-number {
            display: inline-block;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            text-align: center;
            line-height: 36px;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
            border: 2px solid;
        }

        .details-title {
            font-size: 1.5em;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .details-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
        }

        .meta-label {
            color: #6b7280;
        }

        .meta-value {
            color: #d1d5db;
            font-family: 'SF Mono', monospace;
        }

        /* MITRE Links Styling */
        .mitre-link {
            color: #4fc3f7;
            text-decoration: none;
            border-bottom: 1px dotted #4fc3f7;
            transition: all 0.2s ease;
        }

        .mitre-link:hover {
            color: #29b6f6;
            border-bottom-style: solid;
        }

        .severity-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            border: 1px solid;
        }

        .severity-badge.critical {
            color: #ff4444;
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }

        .severity-badge.high {
            color: #ff9f43;
            border-color: #ff9f43;
            background: rgba(255, 159, 67, 0.1);
        }

        .severity-badge.medium {
            color: #ffc107;
            border-color: #ffc107;
            background: rgba(255, 193, 7, 0.1);
        }

        .severity-badge.info {
            color: #4fc3f7;
            border-color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
        }

        .details-section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.1em;
            color: #4fc3f7;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-list {
            list-style: none;
        }

        .action-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .action-title {
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .action-details {
            list-style: none;
            padding-left: 0;
        }

        .action-details li {
            color: #9ca3af;
            font-size: 0.85em;
            padding: 3px 0;
            padding-left: 15px;
            position: relative;
        }

        .action-details li::before {
            content: '›';
            position: absolute;
            left: 0;
            color: #6b7280;
        }

        /* Code Preview */
        .code-preview {
            background: #0a0e27;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 0.85em;
            overflow-x: auto;
        }

        .code-line {
            color: #66bb6a;
            line-height: 1.5;
        }

        .code-comment {
            color: #6b7280;
        }

        .code-highlight {
            color: #ff9f43;
        }

        /* Close button for details panel */
        .close-details {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #6b7280;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
            display: none;
        }

        .close-details:hover {
            color: #4fc3f7;
        }

        /* Mobile responsive */
        @media (max-width: 1200px) {
            .details-panel {
                position: absolute;
                right: 0;
                top: 0;
                height: 100%;
                z-index: 100;
            }

            .close-details {
                display: block;
            }

            .framework-subtitle {
                display: none;
            }
        }

        /* Loading animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Interactive component styling */
        .component {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .component:hover .component-box {
            filter: drop-shadow(0 0 15px rgba(79, 195, 247, 0.4));
            stroke-width: 2;
        }

        .component.active .component-box {
            filter: drop-shadow(0 0 20px rgba(79, 195, 247, 0.6));
            stroke: #4fc3f7;
            stroke-width: 2;
        }

        /* Pulse animation for active elements */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        /* Navigation hints */
        .nav-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85em;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 1s ease-out 2s both;
        }

        .nav-hint-icon {
            color: #4fc3f7;
        }

        /* Stats overlay */
        .stats-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .stat-mini {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .stat-mini-value {
            color: #4fc3f7;
            font-weight: bold;
        }

        .stat-mini-label {
            color: #6b7280;
            margin-left: 5px;
        }

        /* Outcome cards */
        .outcome-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid;
        }

        .outcome-card.protected {
            border-color: #66bb6a;
        }

        .outcome-card.vulnerable {
            border-color: #ff4444;
        }

        .outcome-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .outcome-list {
            list-style: none;
            font-size: 0.85em;
        }

        .outcome-list li {
            padding: 3px 0;
            padding-left: 20px;
            position: relative;
        }

        .outcome-list li::before {
            position: absolute;
            left: 0;
        }

        .outcome-card.protected .outcome-list li::before {
            content: '✓';
            color: #66bb6a;
        }

        .outcome-card.vulnerable .outcome-list li::before {
            content: '✗';
            color: #ff4444;
        }
    </style>
</head>
<body>
    <!-- F0RT1KA Framework Header -->
    <div class="framework-header">
        <div class="framework-title">F0RT1KA Security Testing Framework</div>
        <div class="framework-subtitle">Version 3.0</div>
    </div>

    <div class="dashboard-container">
        <!-- Left Panel - Attack Flow View -->
        <div class="attack-flow-panel">
            <div class="header">
                <h1>Tailscale Remote Access - Attack Flow</h1>
                <p>Multi-Stage Remote Access Killchain Simulation</p>
            </div>

            <div class="view-toggle">
                <button class="view-btn active" onclick="switchView('architecture')">Attack Flow</button>
                <button class="view-btn" onclick="switchView('timeline')">Timeline View</button>
            </div>

            <!-- Attack Flow View -->
            <div class="attack-flow-svg-container" id="attackFlowView">
                <svg class="attack-flow-svg" viewBox="0 0 1200 650" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Gradient Definitions -->
                        <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff4458;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ff8787;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#4caf50;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff9f43;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ffb347;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ab47bc;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:0.8" />
                        </linearGradient>

                        <!-- Arrow Marker -->
                        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                            <polygon points="0 0, 10 3, 0 6" fill="#4fc3f7" />
                        </marker>

                        <!-- Grid Pattern -->
                        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
                        </pattern>
                    </defs>

                    <!-- Background -->
                    <rect width="1200" height="650" fill="url(#grid)" />

                    <!-- Stage 1: Tool Transfer -->
                    <g class="component" data-phase="1" onclick="showPhaseDetails(1)">
                        <rect class="component-box" x="50" y="250" width="180" height="100" rx="8"
                              fill="url(#greenGradient)" stroke="#66bb6a" stroke-width="1" opacity="0.2"/>
                        <text x="140" y="285" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Stage 1: Tool Transfer</text>
                        <text x="140" y="305" text-anchor="middle" fill="#9ca3af" font-size="11">T1105 - Ingress Transfer</text>
                        <text x="140" y="320" text-anchor="middle" fill="#9ca3af" font-size="11">Tailscale Binary</text>
                        <text x="140" y="335" text-anchor="middle" fill="#9ca3af" font-size="11">30MB Download</text>
                    </g>

                    <!-- Stage 2: Service Installation -->
                    <g class="component" data-phase="2" onclick="showPhaseDetails(2)">
                        <rect class="component-box" x="290" y="250" width="180" height="100" rx="8"
                              fill="url(#orangeGradient)" stroke="#ff9f43" stroke-width="1" opacity="0.2"/>
                        <text x="380" y="285" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Stage 2: SSH Service</text>
                        <text x="380" y="305" text-anchor="middle" fill="#9ca3af" font-size="11">T1543.003 - Windows Service</text>
                        <text x="380" y="320" text-anchor="middle" fill="#9ca3af" font-size="11">OpenSSH Server</text>
                        <text x="380" y="335" text-anchor="middle" fill="#9ca3af" font-size="11">Port 22</text>
                    </g>

                    <!-- Stage 3: Tailscale Connection -->
                    <g class="component" data-phase="3" onclick="showPhaseDetails(3)">
                        <rect class="component-box" x="530" y="250" width="180" height="100" rx="8"
                              fill="url(#blueGradient)" stroke="#4fc3f7" stroke-width="1" opacity="0.2"/>
                        <text x="620" y="285" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Stage 3: Remote Access</text>
                        <text x="620" y="305" text-anchor="middle" fill="#9ca3af" font-size="11">T1219 - Remote Software</text>
                        <text x="620" y="320" text-anchor="middle" fill="#9ca3af" font-size="11">Tailnet Connection</text>
                        <text x="620" y="335" text-anchor="middle" fill="#9ca3af" font-size="11">WireGuard VPN</text>
                    </g>

                    <!-- Stage 4: SSH Tunnel -->
                    <g class="component" data-phase="4" onclick="showPhaseDetails(4)">
                        <rect class="component-box" x="770" y="250" width="180" height="100" rx="8"
                              fill="url(#purpleGradient)" stroke="#ab47bc" stroke-width="1" opacity="0.2"/>
                        <text x="860" y="285" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Stage 4: SSH Tunnel</text>
                        <text x="860" y="305" text-anchor="middle" fill="#9ca3af" font-size="11">T1021.004 - SSH</text>
                        <text x="860" y="320" text-anchor="middle" fill="#9ca3af" font-size="11">Remote Shell Access</text>
                        <text x="860" y="335" text-anchor="middle" fill="#9ca3af" font-size="11">Encrypted Channel</text>
                    </g>

                    <!-- Stage 5: Data Exfiltration -->
                    <g class="component" data-phase="5" onclick="showPhaseDetails(5)">
                        <rect class="component-box" x="1010" y="250" width="180" height="100" rx="8"
                              fill="url(#redGradient)" stroke="#ff6b6b" stroke-width="1" opacity="0.2"/>
                        <text x="1100" y="285" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Stage 5: Exfiltration</text>
                        <text x="1100" y="305" text-anchor="middle" fill="#9ca3af" font-size="11">T1041 - C2 Channel</text>
                        <text x="1100" y="320" text-anchor="middle" fill="#9ca3af" font-size="11">Data Compression</text>
                        <text x="1100" y="335" text-anchor="middle" fill="#9ca3af" font-size="11">Simulated Transfer</text>
                    </g>

                    <!-- Flow Arrows -->
                    <path d="M 230 300 L 290 300" stroke="#4fc3f7" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.6"/>
                    <path d="M 470 300 L 530 300" stroke="#4fc3f7" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.6"/>
                    <path d="M 710 300 L 770 300" stroke="#4fc3f7" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.6"/>
                    <path d="M 950 300 L 1010 300" stroke="#4fc3f7" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.6"/>

                    <!-- Detection Points -->
                    <g class="detection-point">
                        <circle cx="140" cy="380" r="8" fill="#ff4444" opacity="0.6"/>
                        <text x="140" y="400" text-anchor="middle" fill="#ff4444" font-size="10">Detection Point</text>
                    </g>

                    <g class="detection-point">
                        <circle cx="380" cy="380" r="8" fill="#ff4444" opacity="0.6"/>
                        <text x="380" y="400" text-anchor="middle" fill="#ff4444" font-size="10">Detection Point</text>
                    </g>

                    <g class="detection-point">
                        <circle cx="620" cy="380" r="8" fill="#ff4444" opacity="0.6"/>
                        <text x="620" y="400" text-anchor="middle" fill="#ff4444" font-size="10">Detection Point</text>
                    </g>

                    <g class="detection-point">
                        <circle cx="860" cy="380" r="8" fill="#ff4444" opacity="0.6"/>
                        <text x="860" y="400" text-anchor="middle" fill="#ff4444" font-size="10">Detection Point</text>
                    </g>

                    <g class="detection-point">
                        <circle cx="1100" cy="380" r="8" fill="#ff4444" opacity="0.6"/>
                        <text x="1100" y="400" text-anchor="middle" fill="#ff4444" font-size="10">Detection Point</text>
                    </g>

                    <!-- Central Title -->
                    <rect x="450" y="50" width="300" height="50" rx="8" fill="rgba(0,0,0,0.5)" stroke="rgba(79,195,247,0.3)"/>
                    <text x="600" y="70" text-anchor="middle" fill="#4fc3f7" font-size="16" font-weight="bold">Multi-Stage Killchain</text>
                    <text x="600" y="88" text-anchor="middle" fill="#9ca3af" font-size="11">5 Stages - Remote Access Establishment</text>

                    <!-- Outcomes -->
                    <rect x="100" y="450" width="500" height="120" rx="8" fill="rgba(102,187,106,0.05)" stroke="#66bb6a" stroke-width="1"/>
                    <text x="120" y="480" fill="#66bb6a" font-size="14" font-weight="bold">Protected Outcome (Exit 126)</text>
                    <text x="120" y="500" fill="#9ca3af" font-size="11">• Any stage binary quarantined before execution</text>
                    <text x="120" y="520" fill="#9ca3af" font-size="11">• Tailscale download blocked or binary quarantined</text>
                    <text x="120" y="540" fill="#9ca3af" font-size="11">• SSH service installation prevented</text>
                    <text x="120" y="560" fill="#9ca3af" font-size="11">• Network connection to Tailnet blocked</text>

                    <rect x="620" y="450" width="480" height="120" rx="8" fill="rgba(255,68,68,0.05)" stroke="#ff4444" stroke-width="1"/>
                    <text x="640" y="480" fill="#ff4444" font-size="14" font-weight="bold">Vulnerable Outcome (Exit 101)</text>
                    <text x="640" y="500" fill="#9ca3af" font-size="11">• All 5 stages execute successfully</text>
                    <text x="640" y="520" fill="#9ca3af" font-size="11">• Remote access established through Tailscale</text>
                    <text x="640" y="540" fill="#9ca3af" font-size="11">• SSH tunnel operational</text>
                    <text x="640" y="560" fill="#9ca3af" font-size="11">• Data exfiltration simulation completes</text>

                    <!-- Execution Timeline -->
                    <text x="140" y="430" fill="#9ca3af" font-size="10">T+0s</text>
                    <text x="380" y="430" fill="#9ca3af" font-size="10">T+15s</text>
                    <text x="620" y="430" fill="#9ca3af" font-size="10">T+30s</text>
                    <text x="860" y="430" fill="#9ca3af" font-size="10">T+45s</text>
                    <text x="1100" y="430" fill="#9ca3af" font-size="10">T+60s</text>
                </svg>

                <div class="stats-overlay">
                    <div class="stat-mini">

    <script>
        // Phase data with MITRE links
        const phaseData = {
            1: {

            3: {

                actions: [
                    {

                    {

                ],
                code: `// Stage 3: T1219 - Remote Access Software

    LogPhaseEnd(3, "blocked", "Tailscale connection blocked")
    Endpoint.Stop(Endpoint.ExecutionPrevented)

            },
            4: {
                number: 4,
                title: "SSH Remote Access",
                severity: "critical",
                mitre: [
                    { id: "T1021.004", name: "Remote Services: SSH" }
                ],
                status: "actual",
                time: "T+45s",
                description: "Stage 4 establishes SSH connection through the Tailscale tunnel for remote shell access",
                actions: [
                    {
                        title: "SSH Connection",
                        details: [
                            "Connect via Tailscale IP (100.x.x.x)",
                            "Authenticate with compromised credentials",

                    },
                    {

                        details: [
                            "SSH over WireGuard VPN",

                    {

                        details: [

                code: `// Stage 4: T1021.004 - SSH Remote Access

cmd := exec.Command("powershell", "-Command",
    "Test-NetConnection -ComputerName localhost -Port 22")

result, _ := cmd.Output()
if strings.Contains(string(result), "TcpTestSucceeded : True") {
    LogMessage("SUCCESS", "T1021.004", "SSH tunnel operational")
}`
            },
            5: {
                number: 5,
                title: "Data Exfiltration",
                severity: "critical",
                mitre: [
                    { id: "T1041", name: "Exfiltration Over C2 Channel" }
                ],
                status: "simulated",
                time: "T+60s",
                description: "Stage 5 simulates data compression and exfiltration through the established channel",
                actions: [
                    {
                        title: "Data Staging",
                        details: [
                            "Identify sensitive files for exfiltration",
                            "Create test data files (simulated)",
                            "Compress data using built-in tools",
                            "Stage in C:\\F0\\exfil directory"
                        ]
                    },
                    {
                        title: "Exfiltration Simulation",
                        details: [
                            "Create EXFIL_DATA_[timestamp].zip",
                            "Log simulated transfer initiation",
                            "No actual network transfer",
                            "Clean up staged files"
                        ]
                    },
                    {
                        title: "Detection Opportunities",
                        details: [
                            "Mass file compression activity",
                            "Archive creation in suspicious location",
                            "Unusual data staging patterns",
                            "Large file prepared for transfer"
                        ]
                    }
                ],
                code: `// Stage 5: T1041 - Data Exfiltration
// Create simulated sensitive data
testData := []byte("Simulated sensitive data for exfiltration test")
zipPath := filepath.Join("C:\\\\F0",
    fmt.Sprintf("EXFIL_DATA_%s.zip", timestamp))

// Log simulation only - no actual transfer
LogMessage("INFO", "T1041", "Data exfiltration simulated")
LogMessage("SUCCESS", "T1041", "Stage 5 complete")`
            }
        };

        // Current active phase
        let currentPhase = null;

        // Function to create MITRE links
        function createMitreLinks(mitreArray) {
            return mitreArray.map(technique => {
                const baseUrl = "https://attack.mitre.org/techniques/";
                const techId = technique.id.replace('.', '/');
                return `<a href="${baseUrl}${techId}" target="_blank" class="mitre-link" title="${technique.name}">${technique.id}</a>`;
            }).join(', ');
        }

        // Initialize timeline view
        function initializeTimeline() {
            const timelineView = document.getElementById('timelineView');
            let html = '';

            for (let i = 1; i <= 5; i++) {
                const phase = phaseData[i];
                const severityColor = getSeverityColor(phase.severity);
                const mitreText = phase.mitre.map(t => t.id).join(', ');

                html += `
                    <div class="timeline-item" onclick="showPhaseDetails(${i})">
                        <div class="timeline-number" style="border-color: ${severityColor}; color: ${severityColor};">
                            ${i}
                        </div>
                        <div class="timeline-content">
                            <div class="timeline-title">Stage ${i}: ${phase.title}</div>
                            <div class="timeline-meta">
                                ${phase.time} • ${mitreText} • ${phase.status === 'actual' ? '✓ Actual' : '⚠️ Simulated'}
                            </div>
                        </div>
                    </div>
                `;
            }

            timelineView.innerHTML = html;
        }

        // Show phase details
        function showPhaseDetails(phaseNum) {
            currentPhase = phaseNum;
            const phase = phaseData[phaseNum];
            const detailsPanel = document.getElementById('detailsPanel');
            const detailsContent = document.getElementById('detailsContent');

            // Update active states
            document.querySelectorAll('.component').forEach(comp => {
                comp.classList.remove('active');
            });
            document.querySelectorAll('.timeline-item').forEach(item => {
                item.classList.remove('active');
            });

            // Add active state to clicked component
            const activeComponent = document.querySelector(`.component[data-phase="${phaseNum}"]`);
            if (activeComponent) {
                activeComponent.classList.add('active');
            }

            // Add active state to timeline item
            const timelineItems = document.querySelectorAll('.timeline-item');
            if (timelineItems[phaseNum - 1]) {
                timelineItems[phaseNum - 1].classList.add('active');
            }

            // Generate details HTML
            const severityColor = getSeverityColor(phase.severity);
            let actionsHtml = '';

            phase.actions.forEach(action => {
                let detailsHtml = action.details.map(detail => `<li>${detail}</li>`).join('');
                actionsHtml += `
                    <div class="action-item">
                        <div class="action-title">${action.title}</div>
                        <ul class="action-details">
                            ${detailsHtml}
                        </ul>
                    </div>
                `;
            });

            const mitreLinks = createMitreLinks(phase.mitre);

            detailsContent.innerHTML = `
                <div class="details-header">
                    <div class="details-phase-number" style="border-color: ${severityColor}; color: ${severityColor};">
                        ${phase.number}
                    </div>
                    <h2 class="details-title">Stage ${phase.number}: ${phase.title}</h2>
                    <div class="severity-badge ${phase.severity}">${phase.severity.toUpperCase()}</div>
                    <div class="details-meta">
                        <div class="meta-item">
                            <span class="meta-label">MITRE:</span>
                            <span class="meta-value">${mitreLinks}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Time:</span>
                            <span class="meta-value">${phase.time}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Status:</span>
                            <span class="meta-value">${phase.status === 'actual' ? '✓ Actual execution' : '⚠️ Simulated only'}</span>
                        </div>
                    </div>
                </div>

                <div class="details-section">
                    <p style="color: #9ca3af; margin-bottom: 20px;">${phase.description}</p>
                </div>

                <div class="details-section">
                    <h3 class="section-title">
                        <span>🎯</span>
                        <span>Actions Performed</span>
                    </h3>
                    <div class="action-list">
                        ${actionsHtml}
                    </div>
                </div>

                ${phase.code ? `
                <div class="details-section">
                    <h3 class="section-title">
                        <span>💻</span>
                        <span>Code Implementation</span>
                    </h3>
                    <div class="code-preview">
                        ${phase.code.split('\n').map(line => {
                            if (line.startsWith('//')) {
                                return `<div class="code-line code-comment">${line}</div>`;
                            } else if (line.startsWith('#')) {
                                return `<div class="code-line code-comment">${line}</div>`;
                            } else if (line.includes(':=') || line.includes('=')) {
                                return `<div class="code-line">${line.replace(/("[^"]*"|\d+)/g, '<span class="code-highlight">$1</span>')}</div>`;
                            } else {
                                return `<div class="code-line">${line}</div>`;
                            }
                        }).join('')}
                    </div>
                </div>
                ` : ''}

                <div class="details-section">
                    <h3 class="section-title">
                        <span>🛡️</span>
                        <span>Expected Outcomes</span>
                    </h3>

                    <div class="outcome-card protected">
                        <div class="outcome-title">If Protected (Exit 126)</div>
                        <ul class="outcome-list">
                            <li>Stage binary quarantined before execution</li>
                            <li>Network connections blocked by firewall</li>
                            <li>Process execution prevented by EDR</li>
                            <li>Service installation denied</li>
                        </ul>
                    </div>

                    <div class="outcome-card vulnerable">
                        <div class="outcome-title">If Vulnerable (Exit 101)</div>
                        <ul class="outcome-list">
                            <li>Stage executes without prevention</li>
                            <li>Technique successfully implemented</li>
                            <li>Attack chain continues to next stage</li>
                            <li>No detection or blocking occurred</li>
                        </ul>
                    </div>
                </div>
            `;

            // Show details panel
            detailsPanel.classList.add('active');
        }

        // Close details panel
        function closeDetails() {
            document.getElementById('detailsPanel').classList.remove('active');
            document.querySelectorAll('.component').forEach(comp => {
                comp.classList.remove('active');
            });
            document.querySelectorAll('.timeline-item').forEach(item => {
                item.classList.remove('active');
            });
        }

        // Switch view
        function switchView(view) {
            // Update button states
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Hide all views
            document.getElementById('attackFlowView').style.display = 'none';
            document.getElementById('timelineView').classList.remove('active');

            // Show selected view
            if (view === 'architecture') {
                document.getElementById('attackFlowView').style.display = 'block';
            } else if (view === 'timeline') {
                document.getElementById('timelineView').classList.add('active');
            }
        }

        // Get severity color
        function getSeverityColor(severity) {
            switch(severity) {
                case 'critical': return '#ff4444';
                case 'high': return '#ff9f43';
                case 'medium': return '#ffc107';
                case 'info': return '#4fc3f7';
                default: return '#9ca3af';
            }
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            initializeTimeline();

            // Show stage 1 details by default after a short delay
            setTimeout(() => {
                showPhaseDetails(1);
            }, 1000);
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (currentPhase) {
                if (e.key === 'ArrowRight' && currentPhase < 5) {
                    showPhaseDetails(currentPhase + 1);
                } else if (e.key === 'ArrowLeft' && currentPhase > 1) {
                    showPhaseDetails(currentPhase - 1);
                } else if (e.key === 'Escape') {
                    closeDetails();
                }
            }
        });
    </script>
