# ============================================================
# F0RT1KA LimaCharlie D&R Rules
# Multi-Stage Ransomware Killchain Simulation
# Test ID: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea
# MITRE ATT&CK: T1204.002, T1134.001, T1083, T1486, T1491.001
# ============================================================
# Format: LimaCharlie file format (for limacharlie dr add or config push)
# Author: F0RT1KA Defense Guidance Builder
# ============================================================

rules:
  # ============================================================
  # Rule 1: F0RT1KA Ransomware Test Execution
  # MITRE ATT&CK: All Stages
  # Confidence: High
  # Description: Detects F0RT1KA ransomware simulation test execution
  # ============================================================
  f0rtika-ransomware-test-execution:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: contains
          path: event/FILE_PATH
          value: "\\F0\\"
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "5ed12ef2-5e29-49a2-8f26-269d8e9edcea"
            - op: contains
              path: event/FILE_PATH
              value: "T1204.002.exe"
            - op: contains
              path: event/FILE_PATH
              value: "T1134.001.exe"
            - op: contains
              path: event/FILE_PATH
              value: "T1083.exe"
            - op: contains
              path: event/FILE_PATH
              value: "T1486.exe"
            - op: contains
              path: event/FILE_PATH
              value: "T1491.001.exe"

    respond:
      - action: report
        name: F0RT1KA Ransomware Test Detected
        metadata:
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea
          mitre_attack: "T1204.002,T1134.001,T1083,T1486,T1491.001"
          severity: high
          threat_type: security_test

  # ============================================================
  # Rule 2: Token Manipulation - SYSTEM Process Access
  # MITRE ATT&CK: T1134.001 - Access Token Manipulation
  # Confidence: High
  # Description: Detects attempts to access SYSTEM processes
  # ============================================================
  f0rtika-token-manipulation-system-access:
    detect:
      target: edr
      event: SENSITIVE_PROCESS_ACCESS
      op: and
      rules:
        - op: or
          rules:
            - op: is
              path: event/TARGET/FILE_PATH
              value: "C:\\Windows\\System32\\winlogon.exe"
            - op: is
              path: event/TARGET/FILE_PATH
              value: "C:\\Windows\\System32\\lsass.exe"
            - op: is
              path: event/TARGET/FILE_PATH
              value: "C:\\Windows\\System32\\csrss.exe"
        - op: not
          rules:
            - op: or
              rules:
                - op: is
                  path: event/SOURCE/FILE_PATH
                  value: "C:\\Program Files\\Windows Defender\\MsMpEng.exe"
                - op: is
                  path: event/SOURCE/FILE_PATH
                  value: "C:\\Windows\\System32\\svchost.exe"

    respond:
      - action: report
        name: Token Manipulation - SYSTEM Process Access
        metadata:
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea
          mitre_attack: "T1134.001"
          severity: high
          threat_type: privilege_escalation

  # ============================================================
  # Rule 3: Ransomware File Extension Detection (.f0rtika)
  # MITRE ATT&CK: T1486 - Data Encrypted for Impact
  # Confidence: High
  # Description: Detects files with ransomware extension
  # ============================================================
  f0rtika-ransomware-file-extension:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: ".f0rtika"

    respond:
      - action: report
        name: Ransomware Encrypted File Detected
        metadata:
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea
          mitre_attack: "T1486"
          severity: critical
          threat_type: ransomware_encryption

  # ============================================================
  # Rule 4: Ransom Note Creation
  # MITRE ATT&CK: T1491.001 - Internal Defacement
  # Confidence: High
  # Description: Detects ransom note file creation
  # ============================================================
  f0rtika-ransom-note-creation:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "README_RANSOMWARE"
            - op: contains
              path: event/FILE_PATH
              value: "YOUR_FILES_ENCRYPTED"
            - op: contains
              path: event/FILE_PATH
              value: "PAYMENT_INSTRUCTIONS"
            - op: contains
              path: event/FILE_PATH
              value: "HOW_TO_DECRYPT"
            - op: contains
              path: event/FILE_PATH
              value: "DECRYPT_INSTRUCTIONS"

    respond:
      - action: report
        name: Ransom Note File Created
        metadata:
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea
          mitre_attack: "T1491.001"
          severity: critical
          threat_type: ransomware_defacement

  # ============================================================
  # Rule 5: Ransomware Component Files
  # MITRE ATT&CK: T1204.002 - User Execution: Malicious File
  # Confidence: High
  # Description: Detects ransomware component file drops
  # ============================================================
  f0rtika-ransomware-component-drop:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "crypto_engine.dat"
            - op: contains
              path: event/FILE_PATH
              value: "file_enum.dat"
            - op: contains
              path: event/FILE_PATH
              value: "ransom_core.dat"
            - op: contains
              path: event/FILE_PATH
              value: "targets.list"
            - op: contains
              path: event/FILE_PATH
              value: "MASTER_KEY.key"
            - op: contains
              path: event/FILE_PATH
              value: "ENCRYPTION_COMPLETE"

    respond:
      - action: report
        name: Ransomware Component File Detected
        metadata:
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea
          mitre_attack: "T1204.002"
          severity: high
          threat_type: ransomware_component

  # ============================================================
  # Rule 6: Desktop Wallpaper Registry Modification
  # MITRE ATT&CK: T1491.001 - Internal Defacement
  # Confidence: Medium
  # Description: Detects wallpaper modification via registry
  # ============================================================
  f0rtika-wallpaper-modification:
    detect:
      target: edr
      event: REGISTRY_VALUE_SET
      op: and
      rules:
        - op: contains
          path: event/REGISTRY_KEY
          value: "Control Panel\\Desktop"
        - op: or
          rules:
            - op: is
              path: event/VALUE_NAME
              value: "Wallpaper"
            - op: is
              path: event/VALUE_NAME
              value: "WallpaperStyle"
        - op: contains
          path: event/VALUE_DATA
          value: "ransomware"

    respond:
      - action: report
        name: Ransomware Wallpaper Modification
        metadata:
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea
          mitre_attack: "T1491.001"
          severity: medium
          threat_type: ransomware_defacement

  # ============================================================
  # Rule 7: Process Execution from F0 Directory
  # MITRE ATT&CK: T1204.002 - User Execution
  # Confidence: High
  # Description: Detects any process execution from F0 test directory
  # ============================================================
  f0rtika-f0-directory-execution:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: starts with
          path: event/FILE_PATH
          value: "C:\\F0\\"

    respond:
      - action: report
        name: F0 Directory Process Execution
        metadata:
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea
          mitre_attack: "T1204.002"
          severity: high
          threat_type: suspicious_execution

  # ============================================================
  # Rule 8: Mass File Deletion Pattern
  # MITRE ATT&CK: T1486 - Data Encrypted for Impact
  # Confidence: High
  # Description: Detects rapid file deletion (ransomware deleting originals)
  # ============================================================
  f0rtika-mass-file-deletion:
    detect:
      target: edr
      event: FILE_DELETE
      op: and
      rules:
        - op: contains
          path: event/FILE_PATH
          value: "\\test_documents\\"
        - op: not
          rules:
            - op: ends with
              path: event/FILE_PATH
              value: ".f0rtika"

    respond:
      - action: report
        name: Suspected Ransomware Original File Deletion
        metadata:
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea
          mitre_attack: "T1486"
          severity: high
          threat_type: ransomware_deletion

  # ============================================================
  # Rule 9: Notepad Spawning Ransom Note
  # MITRE ATT&CK: T1491.001 - Internal Defacement
  # Confidence: High
  # Description: Detects notepad.exe opening ransom note files
  # ============================================================
  f0rtika-notepad-ransom-note:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: "notepad.exe"
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: "README_RANSOMWARE"
            - op: contains
              path: event/COMMAND_LINE
              value: "YOUR_FILES_ENCRYPTED"
            - op: contains
              path: event/COMMAND_LINE
              value: "PAYMENT_INSTRUCTIONS"

    respond:
      - action: report
        name: Ransom Note Display Attempt
        metadata:
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea
          mitre_attack: "T1491.001"
          severity: high
          threat_type: ransomware_notification

  # ============================================================
  # Rule 10: Test Execution Log Creation
  # MITRE ATT&CK: All Stages
  # Confidence: High
  # Description: Detects F0RT1KA test log file creation
  # ============================================================
  f0rtika-test-log-creation:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        - op: contains
          path: event/FILE_PATH
          value: "\\F0\\"
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "test_execution_log.json"
            - op: contains
              path: event/FILE_PATH
              value: "test_execution_log.txt"

    respond:
      - action: report
        name: F0RT1KA Test Execution Log Created
        metadata:
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea
          mitre_attack: "T1204.002,T1134.001,T1083,T1486,T1491.001"
          severity: informational
          threat_type: security_test_log

  # ============================================================
  # Rule 11: Batch Script Execution from F0
  # MITRE ATT&CK: T1204.002 - User Execution
  # Confidence: High
  # Description: Detects batch script execution in test directory
  # ============================================================
  f0rtika-batch-script-execution:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: "cmd.exe"
        - op: contains
          path: event/COMMAND_LINE
          value: "\\F0\\"
        - op: contains
          path: event/COMMAND_LINE
          value: ".bat"

    respond:
      - action: report
        name: Batch Script Execution from F0 Directory
        metadata:
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea
          mitre_attack: "T1204.002"
          severity: medium
          threat_type: suspicious_execution

  # ============================================================
  # Rule 12: Privilege Escalation Marker File
  # MITRE ATT&CK: T1134.001 - Access Token Manipulation
  # Confidence: High
  # Description: Detects stage completion markers
  # ============================================================
  f0rtika-stage-completion-marker:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        - op: contains
          path: event/FILE_PATH
          value: "\\F0\\"
        - op: or
          rules:
            - op: ends with
              path: event/FILE_PATH
              value: ".marker"
            - op: contains
              path: event/FILE_PATH
              value: "stage1_complete"
            - op: contains
              path: event/FILE_PATH
              value: "stage2_complete"
            - op: contains
              path: event/FILE_PATH
              value: "stage3_complete"
            - op: contains
              path: event/FILE_PATH
              value: "stage4_complete"
            - op: contains
              path: event/FILE_PATH
              value: "stage5_complete"

    respond:
      - action: report
        name: F0RT1KA Stage Completion Marker
        metadata:
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea
          mitre_attack: "T1204.002,T1134.001,T1083,T1486,T1491.001"
          severity: informational
          threat_type: security_test_progress
