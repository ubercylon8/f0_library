<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Exfiltration and Encryption Simulation - Attack/Test Flow</title>
    <!--
    Source Test: 4b4bd24c-fff5-4de8-982e-6d0fa5e22284
    Test Name: Data Exfiltration and Encryption Simulation
    MITRE ATT&CK: T1020, T1041, T1486, T1055, T1083
    Test Score: 9.1/10
    -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
        }

        /* F0RT1KA Header - Hidden when embedded in browser */
        .framework-header {
            display: none; /* Redundant - browser header shows F0RT1KA branding */
        }

        .framework-title {
            font-size: 1.2em;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ff6b6b, #ff8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .framework-subtitle {
            position: absolute;
            right: 30px;
            font-size: 0.85em;
            color: #6b7280;
            font-style: italic;
        }

        .dashboard-container {
            display: flex;
            height: 100vh; /* Full height since header is hidden */
            position: relative;
        }

        /* Left Panel - Attack Flow View */
        .attack-flow-panel {
            flex: 1;
            min-width: 60%;
            padding: 20px;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Test title header - Hidden when embedded in browser */
        .header {
            display: none; /* Redundant - browser header shows test name */
        }

        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #ff4458, #ff8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #9ca3af;
            font-size: 1em;
        }

        /* View Toggle Buttons */
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .view-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .view-btn.active {
            background: rgba(255, 107, 107, 0.1);
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .view-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        /* SVG Attack Flow Container */
        .attack-flow-svg-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 10px;
            position: relative;
            flex: 1;
            min-height: 0; /* Allow flex shrinking */
            overflow: hidden;
        }

        .attack-flow-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Timeline View (Hidden by default) */
        .timeline-view {
            display: none;
            padding: 20px;
        }

        .timeline-view.active {
            display: block;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .timeline-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }

        .timeline-item.active {
            background: rgba(255, 107, 107, 0.05);
            border-left-color: #ff6b6b;
        }

        .timeline-number {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            border: 2px solid;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-size: 1.1em;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .timeline-meta {
            font-size: 0.85em;
            color: #9ca3af;
        }

        /* Right Panel - Details (OPAQUE BACKGROUND) */
        .details-panel {
            width: 450px;
            background: #0f1419; /* Solid opaque background */
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            overflow-y: auto;
            position: relative;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.8); /* Add shadow for depth */
        }

        .details-panel.active {
            transform: translateX(0);
        }

        .details-header {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .details-phase-number {
            display: inline-block;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            text-align: center;
            line-height: 36px;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
            border: 2px solid;
        }

        .details-title {
            font-size: 1.5em;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .details-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
        }

        .meta-label {
            color: #6b7280;
        }

        .meta-value {
            color: #d1d5db;
            font-family: 'SF Mono', monospace;
        }

        /* MITRE Links Styling */
        .mitre-link {
            color: #4fc3f7;
            text-decoration: none;
            border-bottom: 1px dotted #4fc3f7;
            transition: all 0.2s ease;
        }

        .mitre-link:hover {
            color: #29b6f6;
            border-bottom-style: solid;
        }

        .severity-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            border: 1px solid;
        }

        .severity-badge.critical {
            color: #ff4444;
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }

        .severity-badge.high {
            color: #ff9f43;
            border-color: #ff9f43;
            background: rgba(255, 159, 67, 0.1);
        }

        .severity-badge.medium {
            color: #ffc107;
            border-color: #ffc107;
            background: rgba(255, 193, 7, 0.1);
        }

        .severity-badge.info {
            color: #4fc3f7;
            border-color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
        }

        .details-section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.1em;
            color: #ff6b6b;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-list {
            list-style: none;
        }

        .action-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .action-title {
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .action-details {
            list-style: none;
            padding-left: 0;
        }

        .action-details li {
            color: #9ca3af;
            font-size: 0.85em;
            padding: 3px 0;
            padding-left: 15px;
            position: relative;
        }

        .action-details li::before {
            content: '>';
            position: absolute;
            left: 0;
            color: #6b7280;
        }

        /* Code Preview */
        .code-preview {
            background: #0a0e27;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 0.85em;
            overflow-x: auto;
        }

        .code-line {
            color: #66bb6a;
            line-height: 1.5;
        }

        .code-comment {
            color: #6b7280;
        }

        .code-highlight {
            color: #ff9f43;
        }

        /* Close button for details panel */
        .close-details {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #6b7280;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
            display: none;
        }

        .close-details:hover {
            color: #ff6b6b;
        }

        /* Mobile responsive */
        @media (max-width: 1200px) {
            .details-panel {
                position: absolute;
                right: 0;
                top: 0;
                height: 100%;
                z-index: 100;
            }

            .close-details {
                display: block;
            }

            .framework-subtitle {
                display: none;
            }
        }

        /* Loading animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Interactive component styling */
        .component {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .component:hover .component-box {
            filter: drop-shadow(0 0 15px rgba(255, 107, 107, 0.4));
            stroke-width: 2;
        }

        .component.active .component-box {
            filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.6));
            stroke: #ff6b6b;
            stroke-width: 2;
        }

        /* Pulse animation for active elements */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        /* Navigation hints - Hidden when embedded */
        .nav-hint {
            display: none; /* Redundant - diagram title says "Click components for details" */
        }

        .nav-hint-icon {
            color: #ff6b6b;
        }

        /* Sidebar toggle button */
        .sidebar-toggle {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 80px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-right: none;
            border-radius: 8px 0 0 8px;
            color: #ff6b6b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 200;
            transition: all 0.3s ease;
        }

        .sidebar-toggle:hover {
            background: rgba(255, 107, 107, 0.2);
            width: 32px;
        }

        .sidebar-toggle .toggle-icon {
            transition: transform 0.3s ease;
        }

        .sidebar-toggle.collapsed .toggle-icon {
            transform: rotate(180deg);
        }

        .sidebar-toggle.expanded {
            right: 450px;
        }

        .details-panel.collapsed {
            transform: translateX(100%) !important;
        }

        /* Stats overlay */
        .stats-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .stat-mini {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .stat-mini-value {
            color: #ff6b6b;
            font-weight: bold;
        }

        .stat-mini-label {
            color: #6b7280;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <!-- F0RT1KA Framework Header -->
    <div class="framework-header">
        <div class="framework-title">F0RT1KA Security Testing Framework</div>
        <div class="framework-subtitle">Version 3.0</div>
    </div>

    <div class="dashboard-container">
        <!-- Left Panel - Attack Flow View -->
        <div class="attack-flow-panel">

            <!-- Attack Flow View -->
            <div class="attack-flow-svg-container" id="attackFlowView">

                    <defs>
                        <!-- Gradient Definitions -->
                        <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff4458;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ff8787;stop-opacity:0.8" />
                        </linearGradient>

                            <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:0.8" />

                        <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">

                        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">

                        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">

                    </defs>

                    <!-- Background -->
                    <rect width="1200" height="700" fill="url(#grid)" />

                    <!-- Phase 1 to Phase 3 -->

                    <text x="810" y="562" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">Impact</text>

                    <!-- Central Title -->
                    <rect x="450" y="30" width="300" height="50" rx="8" fill="rgba(0,0,0,0.5)" stroke="rgba(255,107,107,0.3)"/>
                    <text x="600" y="50" text-anchor="middle" fill="#ff6b6b" font-size="16" font-weight="bold">Attack Flow Diagram</text>

                    <!-- Execution Timeline -->
                    <text x="125" y="610" fill="#9ca3af" font-size="10">T+0s</text>

                    <text x="575" y="610" fill="#9ca3af" font-size="10">T+15s</text>
                    <text x="810" y="610" fill="#9ca3af" font-size="10">T+30s</text>
                    <text x="1050" y="610" fill="#9ca3af" font-size="10">T+60s</text>

                    <!-- Progress Bar -->
                    <rect x="50" y="630" width="1080" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>

                </svg>

                <div class="stats-overlay">
                    <div class="stat-mini">
                        <span class="stat-mini-value">6</span>

            <!-- Timeline View (Hidden by default) -->
            <div class="timeline-view" id="timelineView">
                <!-- Timeline items will be generated by JavaScript -->
            </div>
        </div>

        <!-- Right Panel - Details (OPAQUE) -->
        <div class="details-panel" id="detailsPanel">
            <button class="close-details" onclick="closeDetails()">x</button>
            <div id="detailsContent">
                <!-- Details will be populated dynamically -->
            </div>
        </div>

        <!-- Sidebar Toggle Button -->
        <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Toggle details panel">
            <span class="toggle-icon">&lt;</span>
        </button>
    </div>

    <script>
        // Phase data with MITRE links
        var phaseData = {
            1: {
                number: 1,

                mitre: [
                    { id: "T1055", name: "Process Injection" },

                description: "Discovers Azure Storage Explorer configurations, Azure CLI credentials, registry entries, and browser-cached portal tokens",
                actions: [
                    {

                        details: [
                            "Search %APPDATA%\\StorageExplorer",
                            "Search %LOCALAPPDATA%\\Microsoft\\Azure Storage Explorer",
                            "Search %USERPROFILE%\\.azure directory",
                            "Enumerate .json, .config, .xml, .dat files"
                        ]
                    },
                    {
                        title: "Azure CLI Credentials",
                        details: [
                            "Look for accessTokens.json",

                            "Look for service_principal_entries.json"

                    },
                    {

                        details: [
                            "Check HKCU:\\Software\\Microsoft\\Azure Storage Explorer",

                            "Scan Azure environment variables",
                            "AZURE_STORAGE_CONNECTION_STRING, AZURE_CLIENT_SECRET"
                        ]
                    }
                ],
                code: "azureReconCmd := exec.Command(\"powershell.exe\",\n    \"-ExecutionPolicy\", \"Bypass\",\n    \"-File\", azureReconPath)\nazureReconCmd.SysProcAttr = &syscall.SysProcAttr{HideWindow: true}"
            },
            3: {
                number: 3,
                title: "Data Staging and Exfiltration",
                severity: "critical",
                mitre: [
                    { id: "T1020", name: "Automated Exfiltration" },
                    { id: "T1041", name: "Exfiltration Over C2 Channel" }
                ],
                status: "actual",
                time: "T+8s",
                description: "Identifies high-value files, stages them to C:\\F0\\staging, compresses with Compress-Archive, and simulates cloud upload",
                actions: [
                    {
                        title: "High-Value File Discovery",
                        details: [
                            "Target .pdf, .docx, .xlsx, .pptx documents",
                            "Target .sql, .db, .mdb, .accdb databases",
                            "Target .p12, .pfx, .key, .pem certificates",
                            "Limit to files under 50MB"
                        ]
                    },
                    {
                        title: "Data Staging",
                        details: [
                            "Create C:\\F0\\staging directory",
                            "Copy discovered files to staging area",
                            "Track staged file count for reporting"
                        ]
                    },
                    {
                        title: "Compression & Upload Simulation",
                        details: [
                            "PowerShell Compress-Archive to staged_data.zip",
                            "Simulate upload progress (25%, 50%, 75%, 100%)",
                            "Random cloud service selection (Azure Blob, S3, etc.)",
                            "NO actual network transmission"
                        ]
                    }
                ],
                code: "$compressParams = @{\n    Path = \"$stagingDir\\*\"\n    DestinationPath = $compressedFile\n    CompressionLevel = \"Optimal\"\n    Force = $true\n}\nCompress-Archive @compressParams"
            },
            4: {
                number: 4,
                title: "Process Masquerading",
                severity: "critical",
                mitre: [
                    { id: "T1055", name: "Process Injection (Masquerading)" }
                ],
                status: "actual",
                time: "T+15s",
                description: "Executes encryption binary masquerading as conhost.exe (Windows Console Host) from unusual location C:\\F0",
                actions: [
                    {
                        title: "Masqueraded Execution",
                        details: [
                            "Execute C:\\F0\\conhost.exe",
                            "Pass -simulate -target c:\\F0\\staging",
                            "Hide console window via FreeConsole()"
                        ]
                    },
                    {
                        title: "Location-Based Detection",
                        details: [
                            "conhost.exe should run from System32",
                            "Execution from C:\\F0 is anomalous",
                            "Tests EDR path-based behavioral analysis"
                        ]
                    },
                    {
                        title: "Process Validation",
                        details: [
                            "EDR should verify process authenticity",
                            "Digital signature validation expected",
                            "Parent-child relationship analysis"
                        ]
                    }
                ],
                code: "conhostCmd := exec.Command(conhostPath,\n    \"-simulate\", \"-target\", \"c:\\\\F0\\\\staging\")\nconhostCmd.SysProcAttr = &syscall.SysProcAttr{HideWindow: true}"
            },
            5: {
                number: 5,
                title: "Encryption Simulation",
                severity: "critical",
                mitre: [
                    { id: "T1486", name: "Data Encrypted for Impact" }
                ],
                status: "actual",
                time: "T+20s",
                description: "Simulates file encryption behavior with CPU-intensive operations and ransom note creation",
                actions: [
                    {
                        title: "File Operations",
                        details: [
                            "Create test files (test1.txt, test2.txt, test3.txt)",
                            "Read file content into memory",
                            "Apply byte reversal transformation",
                            "Write to .encrypted extension"
                        ]
                    },
                    {
                        title: "CPU-Intensive Processing",
                        details: [
                            "1,000,000 iteration computational loop",
                            "Simulates encryption workload pattern",
                            "10ms pauses every 100,000 iterations",
                            "Triggers behavioral encryption detection"
                        ]
                    },
                    {
                        title: "Ransom Note Deployment",
                        details: [
                            "Create DECRYPT_INSTRUCTIONS.txt",
                            "Clearly marked [SIMULATION ONLY]",
                            "Contains test UUID reference",
                            "Tests ransom note detection rules"
                        ]
                    }
                ],
                code: "ransomNote := \"[SIMULATION ONLY - NOT REAL RANSOMWARE]\\n\\n\" +\n    \"Your files have been encrypted (simulation).\\n\" +\n    \"This is a security test simulation.\\n\\n\" +\n    \"Test ID: 4b4bd24c-fff5-4de8-982e-6d0fa5e22284\""
            },
            6: {
                number: 6,
                title: "Result Assessment & Cleanup",
                severity: "info",
                mitre: [
                    { id: "T1070.004", name: "File Deletion" }
                ],
                status: "actual",
                time: "T+45s",
                description: "Evaluates defensive response across all phases and cleans up simulation artifacts",
                actions: [
                    {
                        title: "Status Evaluation",
                        details: [
                            "Check exfiltration_status.txt for BLOCKED/DETECTED",
                            "Evaluate ENCRYPTION_SIMULATION_COMPLETE status",
                            "Determine appropriate exit code"
                        ]
                    },
                    {
                        title: "Exit Code Logic",
                        details: [
                            "Exit 105: File quarantined on extraction",
                            "Exit 126: Execution prevented by EDR",
                            "Exit 101: Simulation completed undetected"
                        ]
                    },
                    {
                        title: "Artifact Cleanup",
                        details: [
                            "Remove azure_reconnaissance.ps1",
                            "Remove data_exfiltration.ps1",
                            "Remove conhost.exe",
                            "Remove staged_data.zip and status files"
                        ]
                    }
                ],
                code: "files := []string{\n    \"azure_reconnaissance.ps1\",\n    \"data_exfiltration.ps1\",\n    \"conhost.exe\",\n    \"exfiltration_status.txt\",\n    \"staged_data.zip\",\n}\nfor _, file := range files {\n    os.Remove(filepath.Join(targetDir, file))\n}"
            }
        };

        // Current active phase
        var currentPhase = null;

        // Sidebar toggle state
        var sidebarCollapsed = false;
        function toggleSidebar() {
            var detailsPanel = document.getElementById('detailsPanel');
            var toggleBtn = document.getElementById('sidebarToggle');

            sidebarCollapsed = !sidebarCollapsed;

            if (sidebarCollapsed) {
                detailsPanel.classList.add('collapsed');
                toggleBtn.classList.remove('expanded');
                toggleBtn.classList.add('collapsed');
            } else {
                detailsPanel.classList.remove('collapsed');
                if (detailsPanel.classList.contains('active')) {
                    toggleBtn.classList.add('expanded');
                }
                toggleBtn.classList.remove('collapsed');
            }
        }

        // Function to create MITRE links
        function createMitreLinks(mitreArray) {
            return mitreArray.map(function(technique) {
                var baseUrl = "https://attack.mitre.org/techniques/";
                var techId = technique.id.replace('.', '/'); // Handle sub-techniques like T1059.001
                return '<a href="' + baseUrl + techId + '" target="_blank" class="mitre-link" title="' + technique.name + '">' + technique.id + '</a>';
            }).join(', ');
        }

        // Initialize timeline view
        function initializeTimeline() {
            var timelineView = document.getElementById('timelineView');
            var html = '';

            for (var i = 1; i <= 6; i++) {
                var phase = phaseData[i];
                var severityColor = getSeverityColor(phase.severity);
                var mitreText = phase.mitre.map(function(t) { return t.id; }).join(', ');

                html += '<div class="timeline-item" onclick="showPhaseDetails(' + i + ')">' +
                    '<div class="timeline-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' +
                    i +
                    '</div>' +
                    '<div class="timeline-content">' +
                    '<div class="timeline-title">' + phase.title + '</div>' +
                    '<div class="timeline-meta">' +
                    phase.time + ' | ' + mitreText + ' | ' + (phase.status === 'actual' ? 'Actual' : 'Simulated') +
                    '</div>' +
                    '</div>' +
                    '</div>';
            }

            timelineView.innerHTML = html;
        }

        // Show phase details
        function showPhaseDetails(phaseNum) {
            currentPhase = phaseNum;
            var phase = phaseData[phaseNum];
            var detailsPanel = document.getElementById('detailsPanel');
            var detailsContent = document.getElementById('detailsContent');

            // Update active states
            var components = document.querySelectorAll('.component');
            for (var i = 0; i < components.length; i++) {
                components[i].classList.remove('active');
            }
            var timelineItems = document.querySelectorAll('.timeline-item');
            for (var i = 0; i < timelineItems.length; i++) {
                timelineItems[i].classList.remove('active');
            }

            // Add active state to clicked component
            var activeComponents = document.querySelectorAll('.component[data-phase="' + phaseNum + '"]');
            for (var i = 0; i < activeComponents.length; i++) {
                activeComponents[i].classList.add('active');
            }

            // Add active state to timeline item
            if (timelineItems[phaseNum - 1]) {
                timelineItems[phaseNum - 1].classList.add('active');
            }

            // Generate details HTML
            var severityColor = getSeverityColor(phase.severity);
            var actionsHtml = '';

            for (var i = 0; i < phase.actions.length; i++) {
                var action = phase.actions[i];
                var detailsHtml = '';
                for (var j = 0; j < action.details.length; j++) {
                    detailsHtml += '<li>' + action.details[j] + '</li>';
                }
                actionsHtml += '<div class="action-item">' +
                    '<div class="action-title">' + action.title + '</div>' +
                    '<ul class="action-details">' + detailsHtml + '</ul>' +
                    '</div>';
            }

            var mitreLinks = createMitreLinks(phase.mitre);

            var codeHtml = '';
            if (phase.code) {
                var lines = phase.code.split('\n');
                for (var i = 0; i < lines.length; i++) {
                    var line = lines[i];
                    if (line.indexOf('#') === 0 || line.indexOf('//') === 0) {
                        codeHtml += '<div class="code-line code-comment">' + escapeHtml(line) + '</div>';
                    } else {
                        codeHtml += '<div class="code-line">' + escapeHtml(line) + '</div>';
                    }
                }
            }

            detailsContent.innerHTML = '<div class="details-header">' +
                '<div class="details-phase-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' +
                phase.number +
                '</div>' +
                '<h2 class="details-title">' + phase.title + '</h2>' +
                '<div class="severity-badge ' + phase.severity + '">' + phase.severity.toUpperCase() + '</div>' +
                '<div class="details-meta">' +
                '<div class="meta-item">' +
                '<span class="meta-label">MITRE:</span>' +
                '<span class="meta-value">' + mitreLinks + '</span>' +
                '</div>' +
                '<div class="meta-item">' +
                '<span class="meta-label">Time:</span>' +
                '<span class="meta-value">' + phase.time + '</span>' +
                '</div>' +
                '<div class="meta-item">' +
                '<span class="meta-label">Status:</span>' +
                '<span class="meta-value">' + (phase.status === 'actual' ? 'Actual execution' : 'Simulated only') + '</span>' +
                '</div>' +
                '</div>' +
                '</div>' +
                '<div class="details-section">' +
                '<p style="color: #9ca3af; margin-bottom: 20px;">' + phase.description + '</p>' +
                '</div>' +
                '<div class="details-section">' +
                '<h3 class="section-title">' +
                '<span>[*]</span>' +
                '<span>Actions Performed</span>' +
                '</h3>' +
                '<div class="action-list">' + actionsHtml + '</div>' +
                '</div>' +
                (phase.code ? '<div class="details-section">' +
                '<h3 class="section-title">' +
                '<span>[>]</span>' +
                '<span>Code Preview</span>' +
                '</h3>' +
                '<div class="code-preview">' + codeHtml + '</div>' +
                '</div>' : '');

            // Show details panel
            detailsPanel.classList.add('active');

            // Update progress bar
            updateProgressBar(phaseNum);

            // Position toggle button with sidebar
            var toggleBtn = document.getElementById('sidebarToggle');
            if (!sidebarCollapsed) {
                toggleBtn.classList.add('expanded');
            }
        }

        // Escape HTML special characters
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // Close details panel
        function closeDetails() {
            document.getElementById('detailsPanel').classList.remove('active');
            var components = document.querySelectorAll('.component');
            for (var i = 0; i < components.length; i++) {
                components[i].classList.remove('active');
            }
            var timelineItems = document.querySelectorAll('.timeline-item');
            for (var i = 0; i < timelineItems.length; i++) {
                timelineItems[i].classList.remove('active');
            }

            // Reset toggle button position
            var toggleBtn = document.getElementById('sidebarToggle');
            toggleBtn.classList.remove('expanded');
        }

        // Switch view
        function switchView(view) {
            // Update button states
            var buttons = document.querySelectorAll('.view-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            event.target.classList.add('active');

            // Hide all views
            document.getElementById('attackFlowView').style.display = 'none';
            document.getElementById('timelineView').classList.remove('active');

            // Show selected view
            if (view === 'architecture') {
                document.getElementById('attackFlowView').style.display = 'block';
            } else if (view === 'timeline') {
                document.getElementById('timelineView').classList.add('active');
            }
        }

        // Get severity color
        function getSeverityColor(severity) {
            switch(severity) {
                case 'critical': return '#ff4444';
                case 'high': return '#ff9f43';
                case 'medium': return '#ffc107';
                case 'info': return '#4fc3f7';
                default: return '#9ca3af';
            }
        }

        // Update progress bar
        function updateProgressBar(phaseNum) {
            var progressBar = document.getElementById('progressBar');
            var width = (phaseNum / 6) * 1080;
            progressBar.style.width = width + 'px';
            progressBar.style.transition = 'width 0.5s ease';
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            initializeTimeline();

            // Sidebar starts expanded - show phase 1 details
            sidebarCollapsed = false;
            setTimeout(function() {
                showPhaseDetails(1);
            }, 500);
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (currentPhase) {
                if (e.key === 'ArrowRight' && currentPhase < 6) {
                    showPhaseDetails(currentPhase + 1);
                } else if (e.key === 'ArrowLeft' && currentPhase > 1) {
                    showPhaseDetails(currentPhase - 1);
                } else if (e.key === 'Escape') {
                    closeDetails();
                }
            }
        });
    </script>
</body>
</html>
