<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDRSilencer Detection - Attack/Test Flow</title>
    <!--
        Source Test: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
        Test Name: EDRSilencer Detection
        MITRE ATT&CK: T1562.001 (Impair Defenses: Disable or Modify Tools)
        Tactic: Defense Evasion
        Score: 7.8/10
    -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
        }

        /* F0RT1KA Header - Hidden when embedded in browser */
        .framework-header {
            display: none;
        }

        .framework-title {
            font-size: 1.2em;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ff6b6b, #ff8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .framework-subtitle {
            position: absolute;
            right: 30px;
            font-size: 0.85em;
            color: #6b7280;
            font-style: italic;
        }

        .dashboard-container {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* Left Panel - Attack Flow View */
        .attack-flow-panel {
            flex: 1;
            min-width: 60%;
            padding: 20px;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Test title header - Hidden when embedded in browser */
        .header {
            display: none;
        }

        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #ff4458, #ff8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #9ca3af;
            font-size: 1em;
        }

        /* View Toggle Buttons */
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .view-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .view-btn.active {
            background: rgba(255, 107, 107, 0.1);
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .view-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        /* SVG Attack Flow Container */
        .attack-flow-svg-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 10px;
            position: relative;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .attack-flow-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Timeline View (Hidden by default) */
        .timeline-view {
            display: none;
            padding: 20px;
        }

        .timeline-view.active {
            display: block;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .timeline-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }

        .timeline-item.active {
            background: rgba(255, 107, 107, 0.05);
            border-left-color: #ff6b6b;
        }

        .timeline-number {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            border: 2px solid;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-size: 1.1em;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .timeline-meta {
            font-size: 0.85em;
            color: #9ca3af;
        }

        /* Right Panel - Details (OPAQUE BACKGROUND) */
        .details-panel {
            width: 450px;
            background: #0f1419;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            overflow-y: auto;
            position: relative;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.8);
        }

        .details-panel.active {
            transform: translateX(0);
        }

        .details-header {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .details-phase-number {
            display: inline-block;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            text-align: center;
            line-height: 36px;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
            border: 2px solid;
        }

        .details-title {
            font-size: 1.5em;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .details-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
        }

        .meta-label {
            color: #6b7280;
        }

        .meta-value {
            color: #d1d5db;
            font-family: 'SF Mono', monospace;
        }

        /* MITRE Links Styling */
        .mitre-link {
            color: #4fc3f7;
            text-decoration: none;
            border-bottom: 1px dotted #4fc3f7;
            transition: all 0.2s ease;
        }

        .mitre-link:hover {
            color: #29b6f6;
            border-bottom-style: solid;
        }

        .severity-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            border: 1px solid;
        }

        .severity-badge.critical {
            color: #ff4444;
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }

        .severity-badge.high {
            color: #ff9f43;
            border-color: #ff9f43;
            background: rgba(255, 159, 67, 0.1);
        }

        .severity-badge.medium {
            color: #ffc107;
            border-color: #ffc107;
            background: rgba(255, 193, 7, 0.1);
        }

        .severity-badge.info {
            color: #4fc3f7;
            border-color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
        }

        .severity-badge.success {
            color: #66bb6a;
            border-color: #66bb6a;
            background: rgba(102, 187, 106, 0.1);
        }

        .details-section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.1em;
            color: #ff6b6b;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-list {
            list-style: none;
        }

        .action-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .action-title {
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .action-details {
            list-style: none;
            padding-left: 0;
        }

        .action-details li {
            color: #9ca3af;
            font-size: 0.85em;
            padding: 3px 0;
            padding-left: 15px;
            position: relative;
        }

        .action-details li::before {
            content: '>';
            position: absolute;
            left: 0;
            color: #6b7280;
        }

        /* Code Preview */
        .code-preview {
            background: #0a0e27;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 0.85em;
            overflow-x: auto;
        }

        .code-line {
            color: #66bb6a;
            line-height: 1.5;
        }

        .code-comment {
            color: #6b7280;
        }

        .code-highlight {
            color: #ff9f43;
        }

        /* Close button for details panel */
        .close-details {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #6b7280;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
            display: none;
        }

        .close-details:hover {
            color: #ff6b6b;
        }

        /* Mobile responsive */
        @media (max-width: 1200px) {
            .details-panel {
                position: absolute;
                right: 0;
                top: 0;
                height: 100%;
                z-index: 100;
            }

            .close-details {
                display: block;
            }

            .framework-subtitle {
                display: none;
            }
        }

        /* Loading animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Interactive component styling */
        .component {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .component:hover .component-box {
            filter: drop-shadow(0 0 15px rgba(255, 107, 107, 0.4));
            stroke-width: 2;
        }

        .component.active .component-box {
            filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.6));
            stroke: #ff6b6b;
            stroke-width: 2;
        }

        /* Pulse animation for active elements */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        /* Navigation hints - Hidden when embedded */
        .nav-hint {
            display: none;
        }

        .nav-hint-icon {
            color: #ff6b6b;
        }

        /* Sidebar toggle button */
        .sidebar-toggle {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 80px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-right: none;
            border-radius: 8px 0 0 8px;
            color: #ff6b6b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 200;
            transition: all 0.3s ease;
        }

        .sidebar-toggle:hover {
            background: rgba(255, 107, 107, 0.2);
            width: 32px;
        }

        .sidebar-toggle .toggle-icon {
            transition: transform 0.3s ease;
        }

        .sidebar-toggle.collapsed .toggle-icon {
            transform: rotate(180deg);
        }

        .sidebar-toggle.expanded {
            right: 450px;
        }

        .details-panel.collapsed {
            transform: translateX(100%) !important;
        }

        /* Stats overlay */
        .stats-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .stat-mini {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .stat-mini-value {
            color: #ff6b6b;
            font-weight: bold;
        }

        .stat-mini-label {
            color: #6b7280;
            margin-left: 5px;
        }

        /* Decision diamond styling */
        .decision-diamond {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .decision-diamond:hover polygon {
            filter: drop-shadow(0 0 15px rgba(255, 193, 7, 0.5));
        }

        .decision-diamond.active polygon {
            filter: drop-shadow(0 0 20px rgba(255, 193, 7, 0.7));
            stroke: #ffc107;
            stroke-width: 2;
        }
    </style>
</head>
<body>
    <!-- F0RT1KA Framework Header -->
    <div class="framework-header">
        <div class="framework-title">F0RT1KA Security Testing Framework</div>
        <div class="framework-subtitle">Version 3.0</div>
    </div>

    <div class="dashboard-container">
        <!-- Left Panel - Attack Flow View -->
        <div class="attack-flow-panel">
            <div class="header">
                <h1>EDRSilencer Detection - Attack/Test Flow</h1>
                <p>Click any component to explore detailed attack flow</p>
            </div>

            <div class="view-toggle">
                <button class="view-btn active" onclick="switchView('architecture')">Attack Flow</button>
                <button class="view-btn" onclick="switchView('timeline')">Timeline View</button>
            </div>

            <!-- Attack Flow View -->
            <div class="attack-flow-svg-container" id="attackFlowView">
                <svg class="attack-flow-svg" viewBox="0 0 1200 550" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Gradient Definitions -->
                        <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff4458;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ff8787;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff9f43;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ffb347;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffc107;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ffcd38;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#81c784;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ab47bc;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:0.8" />
                        </linearGradient>

                        <!-- Arrow Marker -->
                        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                            <polygon points="0 0, 10 3, 0 6" fill="#ff6b6b" />
                        </marker>

                        <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                            <polygon points="0 0, 10 3, 0 6" fill="#66bb6a" />
                        </marker>

                        <marker id="arrowhead-yellow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                            <polygon points="0 0, 10 3, 0 6" fill="#ffc107" />
                        </marker>

                        <!-- Grid Pattern -->
                        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
                        </pattern>
                    </defs>

                    <!-- Background -->
                    <rect width="1200" height="550" fill="url(#grid)" />

                    <!-- Phase 1: Extract Binary -->
                    <g class="component" data-phase="1" onclick="showPhaseDetails(1)">
                        <rect class="component-box" x="50" y="200" width="160" height="100" rx="8"
                              fill="url(#orangeGradient)" stroke="#ff9f43" stroke-width="1" opacity="0.2"/>
                        <text x="130" y="235" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Extract Binary</text>
                        <text x="130" y="255" text-anchor="middle" fill="#9ca3af" font-size="11">EDRSilencer.exe</text>
                        <text x="130" y="275" text-anchor="middle" fill="#9ca3af" font-size="11">to C:\F0</text>
                    </g>

                    <!-- Phase 2: Wait for Defense -->
                    <g class="component" data-phase="2" onclick="showPhaseDetails(2)">
                        <rect class="component-box" x="270" y="200" width="140" height="100" rx="8"
                              fill="url(#blueGradient)" stroke="#4fc3f7" stroke-width="1" opacity="0.2"/>
                        <text x="340" y="235" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Wait Period</text>
                        <text x="340" y="255" text-anchor="middle" fill="#9ca3af" font-size="11">3 Seconds</text>
                        <text x="340" y="275" text-anchor="middle" fill="#9ca3af" font-size="11">Defense Check</text>
                    </g>

                    <!-- Phase 3: Quarantine Check (Decision Diamond) -->
                    <g class="component decision-diamond" data-phase="3" onclick="showPhaseDetails(3)">
                        <polygon class="component-box" points="520,250 580,200 640,250 580,300"
                              fill="url(#yellowGradient)" stroke="#ffc107" stroke-width="1" opacity="0.2"/>
                        <text x="580" y="245" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Quarantine</text>
                        <text x="580" y="260" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Check</text>
                    </g>

                    <!-- Exit 105 - Quarantined -->
                    <g class="component" data-phase="3a" onclick="showPhaseDetails('3a')">
                        <rect class="component-box" x="530" y="360" width="100" height="60" rx="8"
                              fill="url(#greenGradient)" stroke="#66bb6a" stroke-width="1" opacity="0.2"/>
                        <text x="580" y="385" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Exit 105</text>
                        <text x="580" y="402" text-anchor="middle" fill="#66bb6a" font-size="10">PROTECTED</text>
                    </g>

                    <!-- Phase 4: Execute blockedr -->
                    <g class="component" data-phase="4" onclick="showPhaseDetails(4)">
                        <rect class="component-box" x="720" y="200" width="160" height="100" rx="8"
                              fill="url(#redGradient)" stroke="#ff6b6b" stroke-width="1" opacity="0.2"/>
                        <text x="800" y="230" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Execute</text>
                        <text x="800" y="250" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">EDRSilencer</text>
                        <text x="800" y="275" text-anchor="middle" fill="#9ca3af" font-size="11">blockedr param</text>
                    </g>

                    <!-- Phase 5: Cleanup -->
                    <g class="component" data-phase="5" onclick="showPhaseDetails(5)">
                        <rect class="component-box" x="940" y="200" width="160" height="100" rx="8"
                              fill="url(#purpleGradient)" stroke="#ab47bc" stroke-width="1" opacity="0.2"/>
                        <text x="1020" y="235" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Cleanup</text>
                        <text x="1020" y="255" text-anchor="middle" fill="#9ca3af" font-size="11">unblockall param</text>
                        <text x="1020" y="275" text-anchor="middle" fill="#9ca3af" font-size="11">Remove WFP Filters</text>
                    </g>

                    <!-- Phase 6: Assessment -->
                    <g class="component" data-phase="6" onclick="showPhaseDetails(6)">
                        <polygon class="component-box" points="1020,380 1080,340 1140,380 1080,420"
                              fill="url(#yellowGradient)" stroke="#ffc107" stroke-width="1" opacity="0.2"/>
                        <text x="1080" y="375" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Assess</text>
                        <text x="1080" y="390" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Result</text>
                    </g>

                    <!-- Exit 126 - Execution Prevented -->
                    <g class="component" data-phase="6a" onclick="showPhaseDetails('6a')">
                        <rect class="component-box" x="920" y="450" width="100" height="60" rx="8"
                              fill="url(#greenGradient)" stroke="#66bb6a" stroke-width="1" opacity="0.2"/>
                        <text x="970" y="475" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Exit 126</text>
                        <text x="970" y="492" text-anchor="middle" fill="#66bb6a" font-size="10">PROTECTED</text>
                    </g>

                    <!-- Exit 101 - Unprotected -->
                    <g class="component" data-phase="6b" onclick="showPhaseDetails('6b')">
                        <rect class="component-box" x="1060" y="450" width="100" height="60" rx="8"
                              fill="url(#redGradient)" stroke="#ff4444" stroke-width="1" opacity="0.2"/>
                        <text x="1110" y="475" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Exit 101</text>
                        <text x="1110" y="492" text-anchor="middle" fill="#ff4444" font-size="10">UNPROTECTED</text>
                    </g>

                    <!-- Flow Arrows - Main Path -->
                    <path d="M 210 250 L 270 250" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.6"/>
                    <path d="M 410 250 L 520 250" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.6"/>
                    <path d="M 640 250 L 720 250" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.6"/>
                    <path d="M 880 250 L 940 250" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.6"/>
                    <path d="M 1020 300 L 1020 340" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.6"/>

                    <!-- Quarantine Yes Path (down to Exit 105) -->
                    <path d="M 580 300 L 580 360" stroke="#66bb6a" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead-green)" opacity="0.6"/>
                    <text x="595" y="330" fill="#66bb6a" font-size="10">YES</text>

                    <!-- Quarantine No Path (right to Execute) -->
                    <text x="660" y="240" fill="#ffc107" font-size="10">NO</text>

                    <!-- Assessment Exit Paths -->
                    <path d="M 1050 400 L 970 450" stroke="#66bb6a" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead-green)" opacity="0.6"/>
                    <text x="990" y="430" fill="#66bb6a" font-size="10">BLOCKED</text>

                    <path d="M 1110 420 L 1110 450" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.6"/>
                    <text x="1125" y="438" fill="#ff6b6b" font-size="10">SUCCESS</text>

                    <!-- Central Title -->
                    <rect x="400" y="30" width="400" height="55" rx="8" fill="rgba(0,0,0,0.5)" stroke="rgba(255,107,107,0.3)"/>

        <!-- Right Panel - Details (OPAQUE) -->

    </div>

    <script>

            "6a": {
                number: "6a",

        // Current active phase
        let currentPhase = null;

        // Sidebar toggle state
        var sidebarCollapsed = false;
        function toggleSidebar() {
            var detailsPanel = document.getElementById('detailsPanel');
            var toggleBtn = document.getElementById('sidebarToggle');

            sidebarCollapsed = !sidebarCollapsed;

            if (sidebarCollapsed) {
                detailsPanel.classList.add('collapsed');
                toggleBtn.classList.remove('expanded');
                toggleBtn.classList.add('collapsed');
            } else {
                detailsPanel.classList.remove('collapsed');
                if (detailsPanel.classList.contains('active')) {
                    toggleBtn.classList.add('expanded');
                }
                toggleBtn.classList.remove('collapsed');
            }
        }

        // Function to create MITRE links
        function createMitreLinks(mitreArray) {
            return mitreArray.map(function(technique) {
                var baseUrl = "https://attack.mitre.org/techniques/";
                var techId = technique.id.replace('.', '/');
                return '<a href="' + baseUrl + techId + '" target="_blank" class="mitre-link" title="' + technique.name + '">' + technique.id + '</a>';
            }).join(', ');
        }

        // Initialize timeline view
        function initializeTimeline() {
            var timelineView = document.getElementById('timelineView');
            var html = '';
            var phases = [1, 2, 3, 4, 5, 6];

            phases.forEach(function(i) {
                var phase = phaseData[i];
                var severityColor = getSeverityColor(phase.severity);
                var mitreText = phase.mitre.map(function(t) { return t.id; }).join(', ');

                html += '<div class="timeline-item" onclick="showPhaseDetails(' + i + ')">' +
                    '<div class="timeline-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' +
                        i +
                    '</div>' +
                    '<div class="timeline-content">' +
                        '<div class="timeline-title">' + phase.title + '</div>' +
                        '<div class="timeline-meta">' +
                            phase.time + ' - ' + mitreText + ' - ' + (phase.status === 'actual' ? 'Actual' : (phase.status === 'outcome' ? 'Outcome' : 'Simulated')) +
                        '</div>' +
                    '</div>' +
                '</div>';
            });

            timelineView.innerHTML = html;
        }

        // Show phase details
        function showPhaseDetails(phaseNum) {
            currentPhase = phaseNum;
            var phase = phaseData[phaseNum];
            var detailsPanel = document.getElementById('detailsPanel');
            var detailsContent = document.getElementById('detailsContent');

            // Update active states
            document.querySelectorAll('.component').forEach(function(comp) {
                comp.classList.remove('active');
            });
            document.querySelectorAll('.timeline-item').forEach(function(item) {
                item.classList.remove('active');
            });

            // Add active state to clicked component
            var activeComponent = document.querySelector('.component[data-phase="' + phaseNum + '"]');
            if (activeComponent) {
                activeComponent.classList.add('active');
            }

            // Add active state to timeline item (only for main phases)
            if (typeof phaseNum === 'number') {
                var timelineItems = document.querySelectorAll('.timeline-item');
                if (timelineItems[phaseNum - 1]) {
                    timelineItems[phaseNum - 1].classList.add('active');
                }
            }

            // Generate details HTML
            var severityColor = getSeverityColor(phase.severity);
            var actionsHtml = '';

            phase.actions.forEach(function(action) {
                var detailsHtml = action.details.map(function(detail) { return '<li>' + detail + '</li>'; }).join('');
                actionsHtml += '<div class="action-item">' +
                    '<div class="action-title">' + action.title + '</div>' +
                    '<ul class="action-details">' +
                        detailsHtml +
                    '</ul>' +
                '</div>';
            });

            var mitreLinks = createMitreLinks(phase.mitre);
            var statusText = phase.status === 'actual' ? 'Actual execution' : (phase.status === 'outcome' ? 'Test outcome' : 'Simulated only');
            var statusIcon = phase.status === 'actual' ? '[*]' : (phase.status === 'outcome' ? '[!]' : '[~]');

            var codeHtml = '';
            if (phase.code) {
                var codeLines = phase.code.split('\\n').map(function(line) {
                    if (line.startsWith('//') || line.startsWith('#')) {
                        return '<div class="code-line code-comment">' + line + '</div>';
                    } else if (line.includes('=') || line.includes(':=')) {
                        return '<div class="code-line">' + line.replace(/(\$\w+|"\w+"|'\w+'|\d+)/g, '<span class="code-highlight">$1</span>') + '</div>';
                    } else {
                        return '<div class="code-line">' + line + '</div>';
                    }
                }).join('');

                codeHtml = '<div class="details-section">' +
                    '<h3 class="section-title">' +
                        '<span>[&gt;]</span>' +
                        '<span>Code Preview</span>' +
                    '</h3>' +
                    '<div class="code-preview">' +
                        codeLines +
                    '</div>' +
                '</div>';
            }

            detailsContent.innerHTML = '<div class="details-header">' +
                '<div class="details-phase-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' +
                    phase.number +
                '</div>' +
                '<h2 class="details-title">' + phase.title + '</h2>' +
                '<div class="severity-badge ' + phase.severity + '">' + phase.severity.toUpperCase() + '</div>' +
                '<div class="details-meta">' +
                    '<div class="meta-item">' +
                        '<span class="meta-label">MITRE:</span>' +
                        '<span class="meta-value">' + mitreLinks + '</span>' +
                    '</div>' +
                    '<div class="meta-item">' +
                        '<span class="meta-label">Time:</span>' +
                        '<span class="meta-value">' + phase.time + '</span>' +
                    '</div>' +
                    '<div class="meta-item">' +
                        '<span class="meta-label">Status:</span>' +
                        '<span class="meta-value">' + statusIcon + ' ' + statusText + '</span>' +
                    '</div>' +
                '</div>' +
            '</div>' +

            '<div class="details-section">' +
                '<p style="color: #9ca3af; margin-bottom: 20px;">' + phase.description + '</p>' +
            '</div>' +

            '<div class="details-section">' +
                '<h3 class="section-title">' +
                    '<span>[#]</span>' +
                    '<span>Actions Performed</span>' +
                '</h3>' +
                '<div class="action-list">' +
                    actionsHtml +
                '</div>' +
            '</div>' +

            codeHtml;

            // Show details panel
            detailsPanel.classList.add('active');

            // Update progress bar
            if (typeof phaseNum === 'number') {
                updateProgressBar(phaseNum);
            }

            // Position toggle button with sidebar
            var toggleBtn = document.getElementById('sidebarToggle');
            if (!sidebarCollapsed) {
                toggleBtn.classList.add('expanded');
            }
        }

        // Close details panel
        function closeDetails() {
            document.getElementById('detailsPanel').classList.remove('active');
            document.querySelectorAll('.component').forEach(function(comp) {
                comp.classList.remove('active');
            });
            document.querySelectorAll('.timeline-item').forEach(function(item) {
                item.classList.remove('active');
            });

            // Reset toggle button position
            var toggleBtn = document.getElementById('sidebarToggle');
            toggleBtn.classList.remove('expanded');
        }

        // Switch view
        function switchView(view) {
            // Update button states
            document.querySelectorAll('.view-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Hide all views
            document.getElementById('attackFlowView').style.display = 'none';
            document.getElementById('timelineView').classList.remove('active');

            // Show selected view
            if (view === 'architecture') {
                document.getElementById('attackFlowView').style.display = 'block';
            } else if (view === 'timeline') {
                document.getElementById('timelineView').classList.add('active');
            }
        }

        // Get severity color
        function getSeverityColor(severity) {
            switch(severity) {
                case 'critical': return '#ff4444';
                case 'high': return '#ff9f43';
                case 'medium': return '#ffc107';
                case 'info': return '#4fc3f7';
                case 'success': return '#66bb6a';
                default: return '#9ca3af';
            }
        }

        // Update progress bar
        function updateProgressBar(phaseNum) {
            var progressBar = document.getElementById('progressBar');
            var width = (phaseNum / 6) * 1080;
            progressBar.style.width = width + 'px';
            progressBar.style.transition = 'width 0.5s ease';
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            initializeTimeline();

            // Sidebar starts expanded - show phase 1 details
            sidebarCollapsed = false;
            setTimeout(function() {
                showPhaseDetails(1);
            }, 500);
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (currentPhase && typeof currentPhase === 'number') {
                if (e.key === 'ArrowRight' && currentPhase < 6) {
                    showPhaseDetails(currentPhase + 1);
                } else if (e.key === 'ArrowLeft' && currentPhase > 1) {
                    showPhaseDetails(currentPhase - 1);
                } else if (e.key === 'Escape') {
                    closeDetails();
                }
            }
        });
    </script>
</body>
</html>
