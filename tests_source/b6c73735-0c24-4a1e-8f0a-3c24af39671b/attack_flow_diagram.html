<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDE Authentication Bypass - Attack Flow Diagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
        }

        /* F0RT1KA Header */
        .framework-header {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.6));
            border-bottom: 1px solid rgba(255, 107, 107, 0.2);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .framework-title {
            font-size: 1.2em;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ff6b6b, #ff8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .framework-subtitle {
            position: absolute;
            right: 30px;
            font-size: 0.85em;
            color: #6b7280;
            font-style: italic;
        }

        .dashboard-container {
            display: flex;
            height: calc(100vh - 60px);
            position: relative;
        }

        /* Left Panel - Attack Flow View */
        .attack-flow-panel {
            flex: 1;
            min-width: 60%;
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #ff4458, #ff8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #9ca3af;
            font-size: 1em;
        }

        /* View Toggle Buttons */
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .view-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .view-btn.active {
            background: rgba(255, 107, 107, 0.1);
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .view-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        /* SVG Attack Flow Container */
        .attack-flow-svg-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            min-height: 700px;
        }

        .attack-flow-svg {
            width: 100%;
            height: auto;
            min-height: 650px;
        }

        /* Timeline View (Hidden by default) */
        .timeline-view {
            display: none;
            padding: 20px;
        }

        .timeline-view.active {
            display: block;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .timeline-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }

        .timeline-item.active {
            background: rgba(255, 107, 107, 0.05);
            border-left-color: #ff6b6b;
        }

        .timeline-number {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            border: 2px solid;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-size: 1.1em;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .timeline-meta {
            font-size: 0.85em;
            color: #9ca3af;
        }

        /* Right Panel - Details (OPAQUE BACKGROUND) */
        .details-panel {
            width: 450px;
            background: #0f1419;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            overflow-y: auto;
            position: relative;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.8);
        }

        .details-panel.active {
            transform: translateX(0);
        }

        .details-header {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .details-phase-number {
            display: inline-block;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            text-align: center;
            line-height: 36px;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
            border: 2px solid;
        }

        .details-title {
            font-size: 1.5em;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .details-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
        }

        .meta-label {
            color: #6b7280;
        }

        .meta-value {
            color: #d1d5db;
            font-family: 'SF Mono', monospace;
        }

        /* MITRE Links Styling */
        .mitre-link {
            color: #4fc3f7;
            text-decoration: none;
            border-bottom: 1px dotted #4fc3f7;
            transition: all 0.2s ease;
        }

        .mitre-link:hover {
            color: #29b6f6;
            border-bottom-style: solid;
        }

        .severity-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            border: 1px solid;
        }

        .severity-badge.critical {
            color: #ff4444;
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }

        .severity-badge.high {
            color: #ff9f43;
            border-color: #ff9f43;
            background: rgba(255, 159, 67, 0.1);
        }

        .severity-badge.medium {
            color: #ffc107;
            border-color: #ffc107;
            background: rgba(255, 193, 7, 0.1);
        }

        .severity-badge.info {
            color: #4fc3f7;
            border-color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
        }

        .details-section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.1em;
            color: #ff6b6b;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-list {
            list-style: none;
        }

        .action-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .action-title {
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .action-details {
            list-style: none;
            padding-left: 0;
        }

        .action-details li {
            color: #9ca3af;
            font-size: 0.85em;
            padding: 3px 0;
            padding-left: 15px;
            position: relative;
        }

        .action-details li::before {
            content: '›';
            position: absolute;
            left: 0;
            color: #6b7280;
        }

        /* Code Preview */
        .code-preview {
            background: #0a0e27;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 0.85em;
            overflow-x: auto;
        }

        .code-line {
            color: #66bb6a;
            line-height: 1.5;
        }

        .code-comment {
            color: #6b7280;
        }

        .code-highlight {
            color: #ff9f43;
        }

        /* Close button for details panel */
        .close-details {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #6b7280;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
            display: none;
        }

        .close-details:hover {
            color: #ff6b6b;
        }

        /* Mobile responsive */
        @media (max-width: 1200px) {
            .details-panel {
                position: absolute;
                right: 0;
                top: 0;
                height: 100%;
                z-index: 100;
            }

            .close-details {
                display: block;
            }

            .framework-subtitle {
                display: none;
            }
        }

        /* Loading animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Interactive component styling */
        .component {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .component:hover .component-box {
            filter: drop-shadow(0 0 15px rgba(255, 107, 107, 0.4));
            stroke-width: 2;
        }

        .component.active .component-box {
            filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.6));
            stroke: #ff6b6b;
            stroke-width: 2;
        }

        /* Pulse animation for active elements */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        /* Navigation hints */
        .nav-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85em;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 1s ease-out 2s both;
        }

        .nav-hint-icon {
            color: #ff6b6b;
        }

        /* Stats overlay */
        .stats-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .stat-mini {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .stat-mini-value {
            color: #ff6b6b;
            font-weight: bold;
        }

        .stat-mini-label {
            color: #6b7280;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <!-- F0RT1KA Framework Header -->
    <div class="framework-header">
        <div class="framework-title">F0RT1KA Security Testing Framework</div>
        <div class="framework-subtitle">Test Score: 9.3/10</div>
    </div>

    <div class="dashboard-container">
        <!-- Left Panel - Attack Flow View -->
        <div class="attack-flow-panel">
            <div class="header">
                <h1>MDE Authentication Bypass - Attack Flow</h1>
                <p>Advanced 9-phase attack simulation testing MDE authentication vulnerability</p>
            </div>

            <div class="view-toggle">
                <button class="view-btn active" onclick="switchView('architecture')">Attack Flow</button>
                <button class="view-btn" onclick="switchView('timeline')">Timeline View</button>
            </div>

            <!-- Attack Flow View -->
            <div class="attack-flow-svg-container" id="attackFlowView">
                <svg class="attack-flow-svg" viewBox="0 0 1400 750" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Gradient Definitions -->
                        <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff4458;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ff8787;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff9f43;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ffb347;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffc107;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ffcd38;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#81c784;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ab47bc;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ba68c8;stop-opacity:0.8" />
                        </linearGradient>

                        <!-- Arrow Marker -->
                        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                            <polygon points="0 0, 10 3, 0 6" fill="#ff6b6b" />
                        </marker>

                        <!-- Grid Pattern -->
                        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
                        </pattern>
                    </defs>

                    <!-- Background -->
                    <rect width="1400" height="750" fill="url(#grid)" />

                    <!-- Phase 1: Initialization -->
                    <g class="component" data-phase="1" onclick="showPhaseDetails(1)">
                        <rect class="component-box" x="50" y="320" width="120" height="80" rx="8"
                              fill="url(#yellowGradient)" stroke="#ffc107" stroke-width="1" opacity="0.2"/>

                        <text x="110" y="365" text-anchor="middle" fill="#9ca3af" font-size="10">Setup</text>
                        <text x="110" y="380" text-anchor="middle" fill="#9ca3af" font-size="10">C:\F0</text>
                    </g>

                    <!-- Phase 2: MDE Identifier Extraction -->
                    <g class="component" data-phase="2" onclick="showPhaseDetails(2)">
                        <rect class="component-box" x="210" y="320" width="120" height="80" rx="8"
                              fill="url(#greenGradient)" stroke="#66bb6a" stroke-width="1" opacity="0.2"/>
                        <text x="270" y="345" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">ID Extract</text>
                        <text x="270" y="365" text-anchor="middle" fill="#9ca3af" font-size="10">Registry</text>
                        <text x="270" y="380" text-anchor="middle" fill="#9ca3af" font-size="10">WMI</text>
                    </g>

                    <!-- Phase 3: Certificate Pinning Bypass -->
                    <g class="component" data-phase="3" onclick="showPhaseDetails(3)">
                        <rect class="component-box" x="370" y="220" width="140" height="80" rx="8"
                              fill="url(#redGradient)" stroke="#ff6b6b" stroke-width="1" opacity="0.2"/>
                        <text x="440" y="245" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Cert Bypass</text>
                        <text x="440" y="265" text-anchor="middle" fill="#9ca3af" font-size="10">CRYPT32</text>

                    </g>

                    <!-- Phase 4: Network Authentication Testing -->
                    <g class="component" data-phase="4" onclick="showPhaseDetails(4)">

                    <!-- Phase 5: File Drop Operations -->
                    <g class="component" data-phase="5" onclick="showPhaseDetails(5)">
                        <rect class="component-box" x="550" y="320" width="130" height="80" rx="8"
                              fill="url(#orangeGradient)" stroke="#ff9f43" stroke-width="1" opacity="0.2"/>
                        <text x="615" y="345" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">File Drops</text>
                        <text x="615" y="365" text-anchor="middle" fill="#9ca3af" font-size="10">Scripts</text>
                        <text x="615" y="380" text-anchor="middle" fill="#9ca3af" font-size="10">Binaries</text>
                    </g>

                    <!-- Phase 6: Command Interception -->
                    <g class="component" data-phase="6" onclick="showPhaseDetails(6)">
                        <rect class="component-box" x="720" y="220" width="130" height="80" rx="8"
                              fill="url(#purpleGradient)" stroke="#ab47bc" stroke-width="1" opacity="0.2"/>
                        <text x="785" y="245" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Intercept</text>
                        <text x="785" y="265" text-anchor="middle" fill="#9ca3af" font-size="10">Commands</text>
                        <text x="785" y="280" text-anchor="middle" fill="#9ca3af" font-size="10">PowerShell</text>
                    </g>

                    <!-- Phase 7: Isolation Status Spoofing -->
                    <g class="component" data-phase="7" onclick="showPhaseDetails(7)">
                        <rect class="component-box" x="720" y="420" width="130" height="80" rx="8"
                              fill="url(#redGradient)" stroke="#ff6b6b" stroke-width="1" opacity="0.2"/>

                        <text x="955" y="380" text-anchor="middle" fill="#9ca3af" font-size="10">No Auth</text>

                    <path d="M 680 360 L 720 460" stroke="#ff6b6b" stroke-width="2" fill="none"

                    <!-- Key Features Labels -->
