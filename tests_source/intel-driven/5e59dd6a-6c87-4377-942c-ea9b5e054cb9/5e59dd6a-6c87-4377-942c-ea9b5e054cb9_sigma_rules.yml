---
title: Suspicious Cloud Files Sync-Root Registration by Non-Standard Provider
id: a3f1c9d2-7e4b-4a8f-b6c1-2d9e5f0a3b7c
status: experimental
description: >
  Detects CfRegisterSyncRoot activity from a process image that is not a known
  legitimate cloud-sync provider (OneDrive, Google Drive, Dropbox, Box, iCloud).
  The real BlueHammer PoC and RedSun both register a custom sync-root to install
  a fetch-placeholder callback that intercepts Defender's scan I/O path.
  Any non-vendor binary loading cldapi.dll and registering a sync-root is a
  high-confidence pre-exploitation indicator for the T1211 scanner-freeze chain.
references:
  - https://attack.mitre.org/techniques/T1211/
  - https://github.com/Nightmare-Eclipse/BlueHammer
author: F0RT1KA Detection Rules Generator
date: 2026-04-24
tags:
  - attack.defense_evasion
  - attack.t1211
logsource:
  category: image_load
  product: windows
detection:
  selection:
    ImageLoaded|endswith: '\cldapi.dll'
  filter_legit_providers:
    Image|startswith:
      - 'C:\Program Files\Microsoft OneDrive\'
      - 'C:\Program Files (x86)\Microsoft OneDrive\'
      - 'C:\Program Files\Google\Drive File Stream\'
      - 'C:\Program Files (x86)\Google\Drive File Stream\'
      - 'C:\Program Files\Dropbox\'
      - 'C:\Program Files (x86)\Dropbox\'
      - 'C:\Program Files\Box\'
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
  condition: selection and not filter_legit_providers
falsepositives:
  - New enterprise cloud-sync ISV product installed to Program Files
  - Developer testing a custom Cloud Files provider from a non-standard path
  - Pre-release OneDrive or Google Drive builds installed outside default paths
level: high

---
title: Batch Oplock Request via DeviceIoControl from User-Mode Process
id: b7e2d4a1-3f8c-4b9e-a2d7-6c1f4e8b0a5d
status: experimental
description: >
  Detects DeviceIoControl calls with FSCTL_REQUEST_BATCH_OPLOCK (IOCTL 0x00090018)
  issued from a user-mode process that is not a known file-server component.
  Batch oplocks are used legitimately by SMB server drivers (srv2.sys) and some
  database file-manager threads — not by end-user applications. BlueHammer uses
  this IOCTL to stall Defender's scan-read of a target file, implementing the
  T1562.001 scanner-impairment primitive. The IOCTL code is distinctive and
  its presence in a user-space process context is highly anomalous.
references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://learn.microsoft.com/en-us/windows/win32/fileio/opportunistic-locks
author: F0RT1KA Detection Rules Generator
date: 2026-04-24
tags:
  - attack.defense_evasion
  - attack.t1562.001
logsource:
  # Sysmon Event ID 19/20 (WMI) or MDE DeviceEvents with IoControl
  # In practice this fires from EDR kernel-sensor hooks on DeviceIoControl
  category: process_access
  product: windows
detection:
  selection:
    # Sysmon does not natively log DeviceIoControl; this targets EDR telemetry
    # that surfaces as ProcessAccess or a custom event with the IOCTL in details.
    # For Sysmon+custom driver: TargetObject or CallTrace may contain the IOCTL.
    CallTrace|contains: '00090018'
  filter_system:
    Image|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
      - 'C:\Program Files\Microsoft SQL Server\'
  condition: selection and not filter_system
falsepositives:
  - SQL Server database files using oplocks for concurrency control
  - Network-attached storage client software using SMB-level oplocks
  - Developer debugging of file-system filter drivers
level: high

---
title: NT Object Directory Enumeration Targeting HarddiskVolumeShadowCopy Entries
id: c4d8e6f3-9a2b-4c7d-b5e8-1f3a7d9c2b6e
status: experimental
description: >
  Detects processes that open the \Device NT object namespace directory via
  NtOpenDirectoryObject and enumerate entries matching HarddiskVolumeShadowCopy*.
  This is the direct-syscall approach to VSS enumeration used by BlueHammer
  (phase 3) and other TOCTOU-race tools that want to avoid the VSS COM API
  (which creates noisier telemetry). Legitimate applications use VSSAPI.DLL
  for VSS enumeration; raw NT object-directory access from user-mode is unusual.
  Combined with KTM (ktmw32.dll) loading in the same process, this is a
  high-confidence pre-TOCTOU indicator.
references:
  - https://attack.mitre.org/techniques/T1211/
  - https://learn.microsoft.com/en-us/windows/win32/devnotes/ntopendirectoryobject
author: F0RT1KA Detection Rules Generator
date: 2026-04-24
tags:
  - attack.defense_evasion
  - attack.t1211
logsource:
  category: image_load
  product: windows
detection:
  selection_ktm:
    ImageLoaded|endswith: '\ktmw32.dll'
  filter_legit_ktm:
    Image|endswith:
      - '\msiexec.exe'
      - '\dism.exe'
      - '\TiWorker.exe'
      - '\TrustedInstaller.exe'
      - '\wusa.exe'
      - '\expand.exe'
      - '\sfc.exe'
  condition: selection_ktm and not filter_legit_ktm
falsepositives:
  - Legacy enterprise application installers using Transactional NTFS explicitly
  - Custom database backup tools that implement TxF for atomic writes
level: high

