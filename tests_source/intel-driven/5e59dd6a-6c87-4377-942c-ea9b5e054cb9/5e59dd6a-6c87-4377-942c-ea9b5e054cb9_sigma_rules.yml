title: CreateFileTransactedW Used by Non-Installer Process (KTM TOCTOU Precursor)
id: d9f1b3e5-2c7a-4d8f-a6b9-3e5c8d1f4a7b
status: experimental
description: >
  Detects processes loading ktmw32.dll that are not Windows Installer, DISM,
  CBS, or other known KTM-using system components. CreateFileTransactedW in
  combination with RollbackTransaction (rather than CommitTransaction) is the
  functional signature of a TOCTOU race: open file transactionally, read it,
  roll back. The full BlueHammer chain uses this to open mpasbase.vdm inside
  a VSS snapshot while Defender is frozen by the batch-oplock stage.
  Detecting the ktmw32.dll import from unexpected processes catches the
  technique regardless of the target file chosen by the attacker.
references:
  - https://attack.mitre.org/techniques/T1211/
  - https://learn.microsoft.com/en-us/windows/win32/fileio/transactional-ntfs-portal
author: F0RT1KA Detection Rules Generator
date: 2026-04-24
tags:
  - attack.defense_evasion
  - attack.t1211
logsource:
  category: process_creation
  product: windows
detection:
  selection_cmdline:
    # Catch processes that explicitly reference transacted API patterns in
    # PowerShell or script wrappers (less common but possible)
    CommandLine|contains:
      - 'CreateFileTransacted'
      - 'CreateTransaction'
      - 'RollbackTransaction'
  filter_system_scripts:
    Image|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
  condition: selection_cmdline and not filter_system_scripts
falsepositives:
  - Security research scripts invoking KTM APIs for legitimate testing
  - PowerShell-based custom installers using TxF
level: medium

