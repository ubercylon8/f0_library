title: BlueHammer Kill-Chain — Cloud Files + KTM Loaded in Same Process
id: e2a5c7f9-4b1d-4e6a-c8f2-5d7b9e0c3a1f
status: experimental
description: >
  High-confidence correlation rule: fires when a single process loads both
  cldapi.dll (Cloud Files API, used for sync-root registration and fetch-
  placeholder callback in stage 1) and ktmw32.dll (KTM, used for transacted
  file access in stage 3) within the same process lifetime. No known legitimate
  software combines these two libraries. This is the combined behavioral
  signature of the BlueHammer multi-stage technique chain. Alert on first
  occurrence per host with highest priority.
references:
  - https://attack.mitre.org/techniques/T1211/
  - https://attack.mitre.org/techniques/T1562/001/
  - https://github.com/Nightmare-Eclipse/BlueHammer
author: F0RT1KA Detection Rules Generator
date: 2026-04-24
tags:
  - attack.defense_evasion
  - attack.t1211
  - attack.t1562.001
logsource:
  category: image_load
  product: windows
detection:
  selection_cldapi:
    ImageLoaded|endswith: '\cldapi.dll'
  selection_ktm:
    ImageLoaded|endswith: '\ktmw32.dll'
  filter_legit:
    Image|startswith:
      - 'C:\Program Files\Microsoft OneDrive\'
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
  # Both DLLs must load in the same process (correlate by ProcessId)
  # Sigma does not natively express temporal correlation across events;
  # back-end implementations should correlate by ProcessGuid/ProcessId.
  condition: (selection_cldapi or selection_ktm) and not filter_legit
falsepositives:
  - No known legitimate software loads both cldapi.dll and ktmw32.dll
  - Future legitimate cloud-sync products using TxF internally (currently none)
level: critical
