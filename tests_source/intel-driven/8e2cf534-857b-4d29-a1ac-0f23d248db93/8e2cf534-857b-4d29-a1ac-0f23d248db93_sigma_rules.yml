title: LNK File with Double Extension Masquerading
id: 8e2cf534-sigma-004
status: stable
description: |
  Detects creation of Windows Shell Link (.lnk) files with double extensions
  that masquerade as documents (e.g., onedrive-form.pdf.lnk). TA453 delivers
  NICECURL via LNK files disguised as PDF forms from OneDrive. The double
  extension exploits Windows default behavior of hiding known extensions.
references:
  - https://attack.mitre.org/techniques/T1204/002/
  - https://attack.mitre.org/techniques/T1036/004/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-24
tags:
  - attack.execution
  - attack.t1204.002
  - attack.defense-evasion
  - attack.t1036.004
  - ta453
  - nicecurl
logsource:
  category: file_event
  product: windows
detection:
  selection:
    TargetFilename|endswith: '.lnk'
    TargetFilename|contains:
      - '.pdf.'
      - '.doc.'
      - '.docx.'
      - '.xls.'
      - '.xlsx.'
  condition: selection
falsepositives:
  - Very rare - double extensions on LNK files are almost always malicious
  - Some legitimate file sync tools creating backup links
level: high

---
title: Victim Identifier File Creation in Local AppData
id: 8e2cf534-sigma-005
status: stable
description: |
  Detects creation of config.txt files in %LOCALAPPDATA% which may indicate
  a NICECURL-style persistent victim identifier. NICECURL creates this file
  to maintain a unique victim ID across sessions for C2 tracking. While
  config.txt in AppData is not inherently suspicious, creation by script
  interpreters or unknown binaries warrants investigation.
references:
  - https://attack.mitre.org/techniques/T1059/005/
  - https://hawk-eye.io/wp-content/advisories/apt42-threat-advisory.html
author: F0RT1KA Defense Guidance Builder
date: 2026-03-24
tags:
  - attack.execution
  - attack.t1059.005
  - ta453
  - nicecurl
logsource:
  category: file_event
  product: windows
detection:
  selection:
    TargetFilename|endswith: '\config.txt'
    TargetFilename|contains: '\AppData\Local\'
  filter_known_apps:
    Image|endswith:
      - '\explorer.exe'
      - '\msiexec.exe'
      - '\setup.exe'
  condition: selection and not filter_known_apps
falsepositives:
  - Application configuration files legitimately created in AppData
  - Some installer packages
level: medium
