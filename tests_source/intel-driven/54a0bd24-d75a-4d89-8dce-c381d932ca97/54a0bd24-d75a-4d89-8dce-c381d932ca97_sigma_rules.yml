# ============================================================
# Rule 14: Bulk PAM Authentication Errors (T1003.008)
# ============================================================
title: Bulk PAM Authentication Errors - Potential PAM Module Tampering
id: 54a0bd24-sigma-014
status: experimental
description: |
    Detects a high volume of PAM authentication errors indicating
    potential PAM module corruption or tampering. A hooked or malicious
    PAM module may cause authentication anomalies as it intercepts and
    relays credentials, especially during error conditions.
references:
    - https://attack.mitre.org/techniques/T1003/008/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.credential_access
    - attack.t1003.008
logsource:
    product: linux
    service: auth
detection:
    selection:
        - 'pam_authenticate'
        - 'pam_unix'
        - 'unknown module'
        - 'module is unknown'
        - 'cannot open'
    keywords_error:
        - 'error'
        - 'failed'
        - 'corrupted'
    condition: selection and keywords_error
    # Note: threshold of 20+ events in 1 hour should be applied at SIEM level
falsepositives:
    - LDAP/SSSD connectivity issues causing PAM failures
    - Misconfigured PAM stack after updates
    - Brute-force SSH attacks
level: medium

