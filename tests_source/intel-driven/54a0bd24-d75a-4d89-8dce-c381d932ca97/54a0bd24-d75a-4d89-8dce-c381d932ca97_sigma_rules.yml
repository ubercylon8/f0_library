# ============================================================
# Rule 6: /etc/shadow Access by Non-Standard Process (T1003.008)
# ============================================================
title: Suspicious /etc/shadow File Access - Credential Dumping
id: 54a0bd24-sigma-006
status: experimental
description: |
    Detects access to /etc/shadow by processes that do not normally interact
    with the shadow password file. Perfctl and other Linux malware read
    /etc/shadow to harvest password hashes for offline cracking using
    tools like John the Ripper or hashcat.
references:
    - https://attack.mitre.org/techniques/T1003/008/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.credential_access
    - attack.t1003.008
logsource:
    category: file_access
    product: linux
detection:
    selection:
        TargetFilename: '/etc/shadow'
    filter_legitimate:
        Image|endswith:
            - '/passwd'
            - '/chpasswd'
            - '/useradd'
            - '/usermod'
            - '/userdel'
            - '/login'
            - '/sshd'
            - '/cron'
            - '/crond'
            - '/sudo'
            - '/su'
            - '/groupadd'
            - '/groupmod'
            - '/nscd'
            - '/sssd'
            - '/newusers'
    condition: selection and not filter_legitimate
falsepositives:
    - Security auditing tools (Lynis, OpenSCAP) checking shadow file permissions
    - Backup scripts copying /etc/shadow
level: high

---

# ============================================================
# Rule 7: SUID Binary Enumeration via find (T1548.001)
# ============================================================
title: SUID Binary Enumeration via find Command - Privilege Escalation Recon
id: 54a0bd24-sigma-007
status: experimental
description: |
    Detects execution of find commands searching for SUID or SGID binaries.
    This is a standard privilege escalation reconnaissance step used by
    Perfctl and other attackers to discover exploitable SUID binaries
    listed in GTFOBins for root shell escalation.
references:
    - https://attack.mitre.org/techniques/T1548/001/
    - https://gtfobins.github.io/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.privilege_escalation
    - attack.t1548.001
logsource:
    category: process_creation
    product: linux
detection:
    selection_binary:
        Image|endswith: '/find'
    selection_args:
        CommandLine|contains:
            - '-perm -u=s'
            - '-perm /4000'
            - '-perm -4000'
            - '-perm +4000'
            - '-perm -04000'
            - '-perm /6000'
            - '-perm -6000'
    condition: selection_binary and selection_args
falsepositives:
    - Security auditing tools (Lynis, OpenSCAP)
    - System administrators performing security assessments
level: high

---

# ============================================================
# Rule 8: SUID Bit Set on System Interpreter (T1548.001)
# ============================================================
title: SUID Bit Set on System Interpreter - Critical Privilege Escalation
id: 54a0bd24-sigma-008
status: experimental
description: |
    Detects chmod commands setting the SUID bit on interpreters (bash, sh,
    python, perl, vim, find, nmap, etc.). Setting SUID on an interpreter
    creates a persistent root shell accessible by any user. Perfctl uses
    this technique (chmod u+s /bin/bash) after gaining initial root access
    to maintain persistent privilege escalation.
references:
    - https://attack.mitre.org/techniques/T1548/001/
    - https://gtfobins.github.io/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.privilege_escalation
    - attack.persistence
    - attack.t1548.001
logsource:
    category: process_creation
    product: linux
detection:
    selection_chmod:
        Image|endswith: '/chmod'
    selection_suid:
        CommandLine|contains:
            - 'u+s'
            - '4755'
            - '4711'
            - '4777'
            - '4775'
    selection_interpreters:
        CommandLine|contains:
            - '/bin/bash'
            - '/bin/sh'
            - '/usr/bin/bash'
            - '/usr/bin/sh'
            - '/usr/bin/python'
            - '/usr/bin/python3'
            - '/usr/bin/perl'
            - '/usr/bin/vim'
            - '/usr/bin/find'
            - '/usr/bin/nmap'
            - '/usr/bin/env'
            - '/usr/bin/awk'
            - '/usr/bin/less'
            - '/usr/bin/ruby'
    condition: selection_chmod and selection_suid and selection_interpreters
falsepositives:
    - Extremely rare - setting SUID on interpreters is almost never legitimate
level: critical

---

# ============================================================
# Rule 9: GTFOBins SUID Exploitation Patterns (T1548.001)
# ============================================================
title: GTFOBins SUID Exploitation Command Pattern Detected
id: 54a0bd24-sigma-009
status: experimental
description: |
    Detects known GTFOBins SUID exploitation command patterns including
    find -exec shell, vim -c shell escape, bash -p privileged mode,
    nmap --interactive, and python os.setuid. These patterns indicate
    active privilege escalation via misconfigured SUID binaries.
references:
    - https://attack.mitre.org/techniques/T1548/001/
    - https://gtfobins.github.io/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.privilege_escalation
    - attack.execution
    - attack.t1548.001
logsource:
    category: process_creation
    product: linux
detection:
    selection_find_exec:
        CommandLine|contains|all:
            - 'find'
            - '-exec'
        CommandLine|contains:
            - '/bin/sh'
            - '/bin/bash'
    selection_vim_escape:
        CommandLine|contains|all:
            - 'vim'
            - '-c'
        CommandLine|contains:
            - '!/bin/sh'
            - ':shell'
    selection_bash_priv:
        CommandLine|contains: 'bash -p'
    selection_nmap_interactive:
        CommandLine|contains: 'nmap --interactive'
    selection_python_setuid:
        CommandLine|contains|all:
            - 'python'
            - 'os.setuid'
    selection_perl_exec:
        CommandLine|contains|all:
            - 'perl'
            - 'exec'
            - '/bin/sh'
    condition: 1 of selection_*
falsepositives:
    - Some find -exec patterns are used in legitimate file management
    - Penetration testers during authorized engagements
level: high

---

# ============================================================
# Rule 10: Crontab Binary Modification (T1059.004)
# ============================================================
title: Crontab Binary Modified or Replaced - Trojanized Crontab
id: 54a0bd24-sigma-010
status: experimental
description: |
    Detects modification or replacement of the system crontab binary.
    Perfctl replaces the crontab binary with a trojanized version that
    filters malicious cron entries from 'crontab -l' output while the
    entries remain active in the raw spool files (/var/spool/cron/).
references:
    - https://attack.mitre.org/techniques/T1059/004/
    - https://www.aquasec.com/blog/perfctl-malware/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.execution
    - attack.defense_evasion
    - attack.t1059.004
logsource:
    category: file_change
    product: linux
detection:
    selection:
        TargetFilename|endswith:
            - '/usr/bin/crontab'
            - '/usr/sbin/crontab'
            - '/bin/crontab'
            - '/sbin/crontab'
    filter_package_managers:
        Image|endswith:
            - '/dpkg'
            - '/rpm'
            - '/apt'
            - '/apt-get'
            - '/yum'
            - '/dnf'
    condition: selection and not filter_package_managers
falsepositives:
    - Package manager updates replacing crontab
level: critical

