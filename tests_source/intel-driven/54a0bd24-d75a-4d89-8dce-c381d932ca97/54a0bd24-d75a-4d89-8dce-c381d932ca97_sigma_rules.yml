# ============================================================
# Perfctl/Symbiote LD_PRELOAD Hijacking - Sigma Detection Rules
# Test ID: 54a0bd24-d75a-4d89-8dce-c381d932ca97
# MITRE ATT&CK: T1574.006, T1003.008, T1548.001, T1014, T1059.004
# Threat Actor: Perfctl / Symbiote / Auto-Color / WolfsBane (Gelsemium)
# Generated: 2026-03-13
# Sigma Specification: 2.0
# ============================================================
# FOCUS: Technique behaviors only - no test framework artifacts
# These rules detect real-world LD_PRELOAD hijacking, PAM credential
# hooking, userland rootkit, SUID abuse, and XOR-encrypted C2 config
# techniques used by Perfctl, Symbiote, Auto-Color, and WolfsBane.
# ============================================================

# ============================================================
# Rule 1: LD_PRELOAD Persistence File Write (T1574.006)
# ============================================================
title: LD_PRELOAD Persistence File Modification - /etc/ld.preload or /etc/ld.so.preload
id: 54a0bd24-sigma-001
status: experimental
description: |
    Detects write operations to /etc/ld.preload or /etc/ld.so.preload, the
    primary persistence mechanism for LD_PRELOAD-based rootkits. Auto-Color
    writes a malicious library path to /etc/ld.preload, while WolfsBane
    (Gelsemium APT) uses /etc/ld.so.preload with a modified BEURK rootkit.
    Perfctl uses both mechanisms as fallback persistence. These files are
    almost never legitimately modified on production systems.
references:
    - https://attack.mitre.org/techniques/T1574/006/
    - https://unit42.paloaltonetworks.com/
    - https://www.welivesecurity.com/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.persistence
    - attack.defense_evasion
    - attack.t1574.006
logsource:
    category: file_create
    product: linux
detection:
    selection:
        TargetFilename|endswith:
            - '/etc/ld.preload'
            - '/etc/ld.so.preload'
    condition: selection
falsepositives:
    - Extremely rare - these files are almost never used in legitimate configurations
    - Some custom application deployment tooling may write to ld.so.preload temporarily
level: critical

---

# ============================================================
# Rule 2: Suspicious Shared Library Creation in System Dirs (T1574.006)
# ============================================================
title: Suspicious Shared Library Drop in System Library Directory
id: 54a0bd24-sigma-002
status: experimental
description: |
    Detects creation of shared library (.so) files in system library
    directories (/lib/, /usr/lib/, /dev/shm/, /tmp/, etc.) by non-package
    manager processes. Perfctl drops libgcwrap.so into /lib/x86_64-linux-gnu/,
    Symbiote deploys its rootkit .so to system paths, and Auto-Color installs
    malicious libraries referenced by /etc/ld.preload.
references:
    - https://attack.mitre.org/techniques/T1574/006/
    - https://www.aquasec.com/blog/perfctl-malware/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.persistence
    - attack.defense_evasion
    - attack.t1574.006
logsource:
    category: file_create
    product: linux
detection:
    selection:
        TargetFilename|endswith: '.so'
        TargetFilename|contains:
            - '/lib/'
            - '/usr/lib/'
            - '/lib64/'
            - '/usr/lib64/'
            - '/usr/local/lib/'
            - '/dev/shm/'
            - '/var/tmp/'
            - '/tmp/'
    filter_package_managers:
        Image|endswith:
            - '/dpkg'
            - '/rpm'
            - '/apt'
            - '/apt-get'
            - '/yum'
            - '/dnf'
            - '/zypper'
            - '/pacman'
            - '/ldconfig'
            - '/make'
            - '/install'
    condition: selection and not filter_package_managers
falsepositives:
    - Software compilations and custom library installations
    - pip/pip3 installing native Python extensions
level: high

---

# ============================================================
# Rule 3: Systemd Service Creation with LD_PRELOAD (T1574.006)
# ============================================================
title: Systemd Service Created with LD_PRELOAD Environment Variable
id: 54a0bd24-sigma-003
status: experimental
description: |
    Detects creation of new systemd service unit files outside of package
    management. Perfctl creates systemd services with LD_PRELOAD environment
    variables set to load its malicious shared library on service start.
    Legitimate systemd services virtually never use LD_PRELOAD directives.
references:
    - https://attack.mitre.org/techniques/T1574/006/
    - https://www.aquasec.com/blog/perfctl-malware/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.persistence
    - attack.t1574.006
logsource:
    category: file_create
    product: linux
detection:
    selection:
        TargetFilename|contains:
            - '/etc/systemd/system/'
            - '/lib/systemd/system/'
            - '/usr/lib/systemd/system/'
            - '/run/systemd/system/'
            - '/etc/systemd/user/'
        TargetFilename|endswith: '.service'
    filter_package_managers:
        Image|endswith:
            - '/dpkg'
            - '/rpm'
            - '/apt'
            - '/apt-get'
            - '/yum'
            - '/dnf'
    condition: selection and not filter_package_managers
falsepositives:
    - Legitimate software installation creating custom services
    - Configuration management tools (Ansible, Puppet, Chef) deploying services
level: high

---

# ============================================================
# Rule 4: Shell Profile Modification for Persistence (T1574.006)
# ============================================================
title: Shell Profile File Modified - Potential LD_PRELOAD Persistence
id: 54a0bd24-sigma-004
status: experimental
description: |
    Detects modifications to user shell profile files (.profile, .bashrc,
    .bash_profile, .zshrc) or system-wide profile directories. Perfctl
    injects 'export LD_PRELOAD=/path/to/malicious.so' into ~/.profile
    as a persistence fallback, ensuring the rootkit loads on every user login.
references:
    - https://attack.mitre.org/techniques/T1574/006/
    - https://www.aquasec.com/blog/perfctl-malware/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.persistence
    - attack.t1574.006
logsource:
    category: file_change
    product: linux
detection:
    selection_user_profiles:
        TargetFilename|endswith:
            - '/.profile'
            - '/.bashrc'
            - '/.bash_profile'
            - '/.bash_login'
            - '/.zshrc'
            - '/.zprofile'
    selection_system_profiles:
        TargetFilename|contains:
            - '/etc/profile.d/'
            - '/etc/profile'
    filter_package_managers:
        Image|endswith:
            - '/dpkg'
            - '/rpm'
            - '/apt'
            - '/yum'
            - '/dnf'
    condition: (selection_user_profiles or selection_system_profiles) and not filter_package_managers
falsepositives:
    - User customization of shell environment
    - Dotfile management tools (GNU Stow, chezmoi)
    - System administrators deploying environment configurations
level: medium

