# ============================================================
# Rule 13: LD_PRELOAD Environment Variable in Process (T1574.006)
# ============================================================
title: Process Started with LD_PRELOAD Environment Variable
id: 54a0bd24-sigma-013
status: experimental
description: |
    Detects process creation events where the LD_PRELOAD environment
    variable is set in the command line or environment. While developers
    may occasionally use LD_PRELOAD for debugging, its presence in
    production workloads is a strong indicator of library injection.
    Perfctl sets LD_PRELOAD in systemd services and shell profiles.
references:
    - https://attack.mitre.org/techniques/T1574/006/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.persistence
    - attack.defense_evasion
    - attack.t1574.006
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        CommandLine|contains: 'LD_PRELOAD='
    filter_legitimate:
        Image|endswith:
            - '/ldconfig'
            - '/ldd'
    condition: selection and not filter_legitimate
falsepositives:
    - Developers using LD_PRELOAD for debugging or interposition
    - Some containerized applications setting library overrides
level: high

