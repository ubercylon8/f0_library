# ============================================================
# Rule 11: Multiple Network Enumeration Tools (T1014)
# ============================================================
title: Multiple Network Enumeration Tools Executed - Rootkit Verification
id: 54a0bd24-sigma-011
status: experimental
description: |
    Detects execution of multiple network enumeration tools (ss, netstat,
    lsof, conntrack) in rapid succession. Attackers and incident responders
    use this technique to detect userland rootkits by comparing outputs
    from different tools - if results differ, a rootkit is hiding connections.
    Auto-Color and Symbiote hide C2 connections from netstat/ss by hooking
    the underlying libc calls.
references:
    - https://attack.mitre.org/techniques/T1014/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.defense_evasion
    - attack.t1014
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        CommandLine|contains:
            - 'conntrack -L'
            - 'conntrack --dump'
            - 'ss -tunapl'
            - 'ss -tlnp'
            - 'ss -anp'
            - 'netstat -tunapl'
            - 'netstat -tlnp'
            - 'netstat -anp'
            - 'cat /proc/net/tcp'
            - 'cat /proc/net/tcp6'
            - 'lsof -i'
            - 'lsof -nP'
    condition: selection
    # Note: threshold-based correlation (3+ tools in 10min) should be applied at SIEM level
falsepositives:
    - Security auditors performing rootkit verification
    - Network troubleshooting by administrators
    - Incident responders during active investigations
level: medium

---

# ============================================================
# Rule 12: Cryptomining Pool Network Connection (T1059.004)
# ============================================================
title: Cryptomining Pool Connection - Perfctl Pattern
id: 54a0bd24-sigma-012
status: experimental
description: |
    Detects network connections or DNS queries to known cryptocurrency
    mining pool domains. Perfctl deploys XMRig for Monero mining,
    connecting to supportxmr.com, xmrpool.eu, and other pools.
    Mining pool connections from servers indicate cryptojacking.
references:
    - https://attack.mitre.org/techniques/T1059/004/
    - https://www.aquasec.com/blog/perfctl-malware/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.execution
    - attack.t1059.004
logsource:
    category: dns_query
    product: linux
detection:
    selection:
        QueryName|contains:
            - 'supportxmr.com'
            - 'xmrpool.eu'
            - 'pool.minexmr.com'
            - 'pool.hashvault.pro'
            - 'mine.c3pool.com'
            - 'rx.unmineable.com'
            - 'nanopool.org'
            - 'f2pool.com'
            - '2miners.com'
    condition: selection
falsepositives:
    - Legitimate cryptocurrency mining operations (should not exist on servers)
level: high

