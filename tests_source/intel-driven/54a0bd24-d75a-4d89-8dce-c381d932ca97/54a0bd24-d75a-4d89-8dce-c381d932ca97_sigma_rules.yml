# ============================================================
# Rule 16: Correlated LD_PRELOAD Attack Chain (T1574.006 + T1003.008 + T1548.001)
# ============================================================
title: LD_PRELOAD Attack Chain - SO Drop + Shadow Access + SUID Enumeration
id: 54a0bd24-sigma-016
status: experimental
description: |
    Correlation rule for detecting the complete LD_PRELOAD attack chain:
    suspicious shared library creation combined with /etc/shadow access
    and SUID binary enumeration on the same host. This combination is
    a very high-confidence indicator of a Perfctl, Symbiote, Auto-Color,
    or WolfsBane-style compromise in progress.
references:
    - https://attack.mitre.org/techniques/T1574/006/
    - https://attack.mitre.org/techniques/T1003/008/
    - https://attack.mitre.org/techniques/T1548/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.persistence
    - attack.credential_access
    - attack.privilege_escalation
    - attack.t1574.006
    - attack.t1003.008
    - attack.t1548.001
# NOTE: This is a correlation rule. Implementation depends on SIEM capabilities.
# In Splunk: use subsearch/join. In Elastic: use event correlation rules.
# In Sigma: this serves as documentation of the correlation logic.
logsource:
    category: process_creation
    product: linux
detection:
    # Indicator 1: SUID enumeration
    selection_suid:
        Image|endswith: '/find'
        CommandLine|contains:
            - '-perm -u=s'
            - '-perm /4000'
            - '-perm -4000'
    condition: selection_suid
    # NOTE: Correlate with file_create events for .so files in /lib/
    # and file_access events for /etc/shadow within 1-hour window
falsepositives:
    - Extremely unlikely when all three indicators occur on the same host
level: critical
