# ============================================================
title: PAM Module or Configuration Modified Outside Package Management
id: 54a0bd24-sigma-005
status: experimental
description: |
    Detects creation or modification of PAM configuration files or shared
    libraries in PAM module directories. Perfctl hooks pam_authenticate
    via a malicious PAM module to intercept all authentication credentials
    from sshd, sudo, and login services.
references:
    - https://attack.mitre.org/techniques/T1003/008/
    - https://www.aquasec.com/blog/perfctl-malware/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.credential_access
    - attack.t1003.008
logsource:
    category: file_create
    product: linux
detection:
    selection:
        TargetFilename|contains:
            - '/etc/pam.d/'
            - '/lib/security/'
            - '/lib/x86_64-linux-gnu/security/'
            - '/lib64/security/'
            - '/usr/lib/security/'
    filter_package_managers:
        Image|endswith:
            - '/dpkg'
            - '/rpm'
            - '/apt'
            - '/apt-get'
            - '/yum'
            - '/dnf'
            - '/pam-auth-update'
    condition: selection and not filter_package_managers
falsepositives:
    - PAM configuration during security hardening
    - LDAP/SSSD integration configuration
level: high

