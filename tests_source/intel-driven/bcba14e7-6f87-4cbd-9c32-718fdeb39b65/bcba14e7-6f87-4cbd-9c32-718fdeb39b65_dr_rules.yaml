# ============================================================
# EDRSilencer Detection - LimaCharlie D&R Rules
# Test ID: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
# MITRE ATT&CK: T1562.001 - Impair Defenses: Disable or Modify Tools
# Generated: 2024-12-07
# ============================================================
#
# FILE FORMAT: For use with `limacharlie dr add` or `config push`
#
# Deployment:
#   limacharlie dr add bcba14e7-6f87-4cbd-9c32-718fdeb39b65_dr_rules.yaml
#
# Or deploy individual rules:
#   limacharlie dr add --name edrsilencer-binary-execution --detect-file detect.yaml --respond-file respond.yaml
#
# ============================================================

rules:

  # ============================================================
  # Rule 1: EDRSilencer Binary Execution
  # ============================================================
  # Confidence: High
  # Description: Detects execution of EDRSilencer.exe by process name
  # False Positives: None expected
  # ============================================================
  edrsilencer-binary-execution:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: EDRSilencer.exe
          case sensitive: false

    respond:
      - action: report
        name: EDRSilencer Binary Execution Detected
        metadata:
          severity: critical
          mitre_attack: T1562.001
          test_id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
          description: EDRSilencer tool executed - defense evasion attempt


  # ============================================================
  # Rule 2: EDRSilencer BlockEDR Command
  # ============================================================
  # Confidence: High
  # Description: Detects EDRSilencer executed with blockedr parameter
  # False Positives: None expected
  # ============================================================
  edrsilencer-blockedr-command:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: contains
          path: event/COMMAND_LINE
          value: blockedr
          case sensitive: false

    respond:
      - action: report
        name: EDRSilencer BlockEDR Command Detected
        metadata:
          severity: critical
          mitre_attack: T1562.001
          test_id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
          description: EDRSilencer blockedr command executed - attempting to block EDR communications


  # ============================================================
  # Rule 3: EDRSilencer UnblockAll Command
  # ============================================================
  # Confidence: High
  # Description: Detects EDRSilencer cleanup command (indicates prior attack)
  # False Positives: None expected
  # ============================================================
  edrsilencer-unblockall-command:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: contains
          path: event/COMMAND_LINE
          value: unblockall
          case sensitive: false
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: edrsilencer
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: edrsilencer
              case sensitive: false

    respond:
      - action: report
        name: EDRSilencer Cleanup Command Detected
        metadata:
          severity: high
          mitre_attack: T1562.001
          test_id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
          description: EDRSilencer unblockall command - indicates prior EDR blocking


  # ============================================================
  # Rule 4: Known EDR Silencing Tools
  # ============================================================
  # Confidence: High
  # Description: Detects execution of known EDR silencing/disabling tools
  # False Positives: None expected
  # ============================================================
  known-edr-silencing-tools:
    detect:
      target: edr
      event: NEW_PROCESS
      op: or
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: EDRSilencer.exe
          case sensitive: false
        - op: ends with
          path: event/FILE_PATH
          value: FireBlock.exe
          case sensitive: false
        - op: ends with
          path: event/FILE_PATH
          value: EDR-Freeze.exe
          case sensitive: false
        - op: ends with
          path: event/FILE_PATH
          value: Backstab.exe
          case sensitive: false
        - op: ends with
          path: event/FILE_PATH
          value: EDRSandBlast.exe
          case sensitive: false

    respond:
      - action: report
        name: Known EDR Silencing Tool Detected
        metadata:
          severity: critical
          mitre_attack: T1562.001
          test_id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
          description: Known EDR tampering tool execution detected


  # ============================================================
  # Rule 5: EDR-Targeting Tool Staging in User-Writable Directory
  # ============================================================
  # Confidence: Medium
  # Description: Detects EDR-targeting executable creation in user-writable directories
  # False Positives: Legitimate portable security tools
  # ============================================================
  edr-tool-staging-user-writable:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        # File created in user-writable directory
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "\\Temp\\"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "\\AppData\\Local\\Temp"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "\\Users\\Public"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "\\Downloads\\"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "\\ProgramData\\"
              case sensitive: false
        # Is an executable
        - op: or
          rules:
            - op: ends with
              path: event/FILE_PATH
              value: .exe
              case sensitive: false
            - op: ends with
              path: event/FILE_PATH
              value: .dll
              case sensitive: false
        # Has EDR-targeting naming pattern
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: silencer
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: edrblock
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: fireblock
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: edr-freeze
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: backstab
              case sensitive: false

    respond:
      - action: report
        name: EDR-Targeting Tool Staged in User-Writable Directory
        metadata:
          severity: high
          mitre_attack: T1562.001
          test_id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
          description: Executable with EDR-targeting naming pattern created in user-writable directory


  # ============================================================
  # Rule 6: EDR-Targeting Tool Execution from User-Writable Directory
  # ============================================================
  # Confidence: Medium
  # Description: Detects EDR-targeting tool execution from user-writable directories
  # False Positives: Legitimate portable security tools
  # ============================================================
  edr-tool-execution-user-writable:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        # Process from user-writable directory
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "\\Temp\\"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "\\AppData\\Local\\Temp"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "\\Users\\Public"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "\\Downloads\\"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "\\ProgramData\\"
              case sensitive: false
        # Has EDR-targeting naming or command pattern
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: silencer
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: edrblock
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: blockedr
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: FwpmFilterAdd
              case sensitive: false

    respond:
      - action: report
        name: EDR-Targeting Tool Executed from User-Writable Directory
        metadata:
          severity: high
          mitre_attack: T1562.001
          test_id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
          description: Process with EDR-targeting pattern executed from user-writable directory


  # ============================================================
  # Rule 7: WFP Library Load from Non-Standard Location
  # ============================================================
  # Confidence: Medium
  # Description: Detects fwpuclnt.dll loaded by process outside standard paths
  # False Positives: VPN clients, firewall management tools
  # ============================================================
  wfp-library-suspicious-load:
    detect:
      target: edr
      event: MODULE_LOAD
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: fwpuclnt.dll
          case sensitive: false
        - op: not
          rules:
            - op: or
              rules:
                - op: starts with
                  path: event/PROCESS_FILE_PATH
                  value: "C:\\Windows\\System32\\"
                  case sensitive: false
                - op: starts with
                  path: event/PROCESS_FILE_PATH
                  value: "C:\\Program Files\\"
                  case sensitive: false
                - op: starts with
                  path: event/PROCESS_FILE_PATH
                  value: "C:\\Program Files (x86)\\"
                  case sensitive: false

    respond:
      - action: report
        name: WFP Library Loaded from Suspicious Location
        metadata:
          severity: medium
          mitre_attack: T1562.001
          test_id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
          description: Windows Filtering Platform library loaded by process from non-standard location


  # ============================================================
  # Rule 8: Process Targeting EDR by Name
  # ============================================================
  # Confidence: High
  # Description: Detects command lines targeting known EDR process names
  # False Positives: EDR management/update processes
  # ============================================================
  process-targeting-edr-names:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        # Command line contains EDR process names
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: MsMpEng
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: MpDefenderCoreService
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: MsSense
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: SenseCE
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: CSFalconService
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: CylanceSvc
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: SentinelAgent
              case sensitive: false
        # And contains action keywords
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: block
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: kill
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: stop
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: disable
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: terminate
              case sensitive: false

    respond:
      - action: report
        name: Process Targeting EDR Services
        metadata:
          severity: critical
          mitre_attack: T1562.001
          test_id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
          description: Process command line indicates attempt to target/disable EDR services


  # ============================================================
  # Rule 9: Netsh WFP Filter Commands
  # ============================================================
  # Confidence: Medium
  # Description: Detects netsh commands examining or modifying WFP filters
  # False Positives: Network administrators, troubleshooting
  # ============================================================
  netsh-wfp-filter-commands:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: netsh.exe
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: wfp
          case sensitive: false
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: filter
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: delete
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: add
              case sensitive: false

    respond:
      - action: report
        name: Netsh WFP Filter Manipulation
        metadata:
          severity: medium
          mitre_attack: T1562.001
          test_id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
          description: Netsh command used to examine or modify WFP filters


  # ============================================================
  # Rule 10: EDR Process Network Connection Denied
  # ============================================================
  # Confidence: High
  # Description: Detects when EDR process network connection is denied/failed
  # False Positives: Network issues, firewall misconfigurations
  # Note: Requires WFP audit events to be enabled
  # ============================================================
  edr-process-connection-denied:
    detect:
      target: edr
      event: NETWORK_CONNECTIONS
      op: and
      rules:
        - op: or
          rules:
            - op: is
              path: event/STATE
              value: denied
            - op: is
              path: event/STATE
              value: blocked
            - op: is
              path: event/STATE
              value: dropped
        - op: or
          rules:
            - op: contains
              path: event/PROCESS_FILE_PATH
              value: MsMpEng
              case sensitive: false
            - op: contains
              path: event/PROCESS_FILE_PATH
              value: MsSense
              case sensitive: false
            - op: contains
              path: event/PROCESS_FILE_PATH
              value: MpDefenderCoreService
              case sensitive: false
            - op: contains
              path: event/PROCESS_FILE_PATH
              value: CSFalconService
              case sensitive: false
            - op: contains
              path: event/PROCESS_FILE_PATH
              value: SentinelAgent
              case sensitive: false

    respond:
      - action: report
        name: EDR Process Network Connection Blocked
        metadata:
          severity: high
          mitre_attack: T1562.001
          test_id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
          description: Security process network connection was denied - potential EDR silencing


  # ============================================================
  # Rule 11: Suspicious DLL Load for WFP Manipulation
  # ============================================================
  # Confidence: Medium
  # Description: Detects processes loading WFP-related DLLs that shouldn't need them
  # False Positives: Legitimate network management tools
  # ============================================================
  suspicious-wfp-dll-load:
    detect:
      target: edr
      event: MODULE_LOAD
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: fwpuclnt.dll
          case sensitive: false
        # Process from user-writable directories (common staging locations)
        - op: or
          rules:
            - op: contains
              path: event/PROCESS_FILE_PATH
              value: "\\Temp\\"
              case sensitive: false
            - op: contains
              path: event/PROCESS_FILE_PATH
              value: "\\AppData\\Local\\Temp\\"
              case sensitive: false
            - op: contains
              path: event/PROCESS_FILE_PATH
              value: "\\Downloads\\"
              case sensitive: false
            - op: contains
              path: event/PROCESS_FILE_PATH
              value: "\\Users\\Public\\"
              case sensitive: false
            - op: contains
              path: event/PROCESS_FILE_PATH
              value: "\\ProgramData\\"
              case sensitive: false

    respond:
      - action: report
        name: WFP Library Loaded from High-Risk Location
        metadata:
          severity: high
          mitre_attack: T1562.001
          test_id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
          description: Process from user-writable directory loaded WFP manipulation library


  # ============================================================
  # Rule 12: EDRSilencer Pattern - Multiple Indicators
  # ============================================================
  # Confidence: Critical
  # Description: Stateful rule correlating EDRSilencer attack pattern
  # Note: Uses stateful detection for correlation
  # ============================================================
  edrsilencer-attack-chain:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        # Any indicator of EDRSilencer activity
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: edrsilencer
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: blockedr
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: unblockall
              case sensitive: false
        # From user-writable directory (common attacker staging locations)
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "\\Temp\\"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "\\AppData\\Local\\Temp\\"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "\\Downloads\\"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "\\Users\\Public\\"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "\\ProgramData\\"
              case sensitive: false

    respond:
      - action: report
        name: EDRSilencer Attack Chain Detected
        metadata:
          severity: critical
          mitre_attack: T1562.001
          test_id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
          description: EDRSilencer attack pattern detected - file staging and execution from user-writable directory
