# --- Rule 8: Security Process Outbound Connection Blocked ---

title: Security Process Outbound Connection Blocked by WFP
id: bcba14e7-sig-0008-4cbd-9c32-718fdeb39b65
related:
    - id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
      type: derived
status: stable
description: |
    Detects WFP packet drop events (Event ID 5152) or blocked connection
    events (Event ID 5157) targeting known EDR and security product processes.
    When WFP filters are used to block EDR communications, these events
    will appear in the Windows Security log if filtering platform auditing
    is enabled.
references:
    - https://attack.mitre.org/techniques/T1562/001/
    - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-5152
    - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-5157
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.defense_evasion
    - attack.t1562.001
logsource:
    product: windows
    service: security
detection:
    selection_events:
        EventID:
            - 5152
            - 5157
    selection_direction:
        Direction: '%%14593'  # Outbound
    selection_edr_process:
        Application|endswith:
            - '\MsMpEng.exe'
            - '\MsSense.exe'
            - '\SenseCE.exe'
            - '\SenseIR.exe'
            - '\SenseNdr.exe'
            - '\MpDefenderCoreService.exe'
            - '\NisSrv.exe'
            - '\CSFalconService.exe'
            - '\SentinelAgent.exe'
            - '\SentinelServiceHost.exe'
            - '\CylanceSvc.exe'
            - '\cb.exe'
            - '\CarbonBlack.exe'
            - '\elastic-agent.exe'
            - '\elastic-endpoint.exe'
            - '\TmListen.exe'
            - '\TmCCSF.exe'
            - '\mfetp.exe'
            - '\FortiEDR.exe'
    condition: selection_events and selection_direction and selection_edr_process
falsepositives:
    - Firewall policy changes blocking EDR traffic temporarily during maintenance
    - Network segmentation changes affecting EDR cloud endpoints
level: critical

---

# --- Rule 9: Process Attempting to Stop or Disable EDR Services ---

title: Process Attempting to Stop or Disable EDR Services
id: bcba14e7-sig-0009-4cbd-9c32-718fdeb39b65
related:
    - id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
      type: derived
status: stable
description: |
    Detects processes using sc.exe, net.exe, or taskkill.exe to stop,
    disable, or terminate known EDR services and processes. This is a
    complementary technique to WFP-based EDR silencing, where adversaries
    directly attempt to terminate security processes.
references:
    - https://attack.mitre.org/techniques/T1562/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.defense_evasion
    - attack.t1562.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_tools:
        Image|endswith:
            - '\sc.exe'
            - '\net.exe'
            - '\net1.exe'
            - '\taskkill.exe'
    selection_actions_sc:
        CommandLine|contains:
            - 'stop'
            - 'disable'
            - 'delete'
    selection_actions_taskkill:
        CommandLine|contains:
            - '/f'
            - '/im'
    selection_edr_targets:
        CommandLine|contains:
            - 'WinDefend'
            - 'Sense'
            - 'MsSense'
            - 'MpDefenderCoreService'
            - 'CSFalconService'
            - 'SentinelAgent'
            - 'CylanceSvc'
            - 'CarbonBlack'
            - 'cbdefense'
            - 'TmListen'
            - 'mfetp'
            - 'FortiEDR'
    filter_legitimate:
        ParentImage|endswith:
            - '\services.exe'
            - '\TrustedInstaller.exe'
            - '\msiexec.exe'
    condition: selection_tools and (selection_actions_sc or selection_actions_taskkill) and selection_edr_targets and not filter_legitimate
falsepositives:
    - EDR software updates that restart their own services
    - IT administrators performing authorized maintenance
level: high

