# --- Rule 6: Netsh WFP Filter Manipulation ---

title: Netsh WFP Filter Manipulation Commands
id: bcba14e7-sig-0006-4cbd-9c32-718fdeb39b65
related:
    - id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
      type: derived
status: stable
description: |
    Detects use of netsh.exe to examine, add, or delete Windows Filtering
    Platform filters. While netsh WFP commands are used for legitimate
    troubleshooting, they can also be used to manipulate filters that block
    EDR communications or to inspect existing WFP state during reconnaissance.
references:
    - https://attack.mitre.org/techniques/T1562/001/
    - https://docs.microsoft.com/en-us/windows/win32/fwp/windows-filtering-platform-start-page
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.defense_evasion
    - attack.t1562.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_netsh:
        Image|endswith: '\netsh.exe'
        CommandLine|contains: 'wfp'
    selection_action:
        CommandLine|contains:
            - 'show filters'
            - 'show state'
            - 'delete'
            - 'set options'
    condition: selection_netsh and selection_action
falsepositives:
    - Network administrators troubleshooting WFP filter issues
    - Automated network diagnostics scripts
level: medium

---

# --- Rule 7: EDR-Targeting Executable Staged in User-Writable Directory ---

title: EDR-Targeting Executable Created in User-Writable Directory
id: bcba14e7-sig-0007-4cbd-9c32-718fdeb39b65
related:
    - id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
      type: derived
status: stable
description: |
    Detects creation of executable files with names matching known EDR
    silencing or tampering tools in user-writable directories. Adversaries
    stage attack tools in Temp, Downloads, or Public directories before
    execution.
references:
    - https://attack.mitre.org/techniques/T1562/001/
    - https://github.com/netero1010/EDRSilencer
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.defense_evasion
    - attack.t1562.001
logsource:
    category: file_event
    product: windows
detection:
    selection_path:
        TargetFilename|contains:
            - '\AppData\Local\Temp\'
            - '\Users\Public\'
            - '\Downloads\'
            - '\ProgramData\'
            - '\Windows\Temp\'
    selection_name:
        TargetFilename|contains:
            - 'silencer'
            - 'edrblock'
            - 'fireblock'
            - 'edr-freeze'
            - 'backstab'
            - 'edrsandblast'
            - 'edrkill'
    selection_extension:
        TargetFilename|endswith:
            - '.exe'
            - '.dll'
    condition: selection_path and selection_name and selection_extension
falsepositives:
    - Security researchers downloading tools for analysis in sandboxed environments
level: high

