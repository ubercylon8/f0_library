# --- Rule 10: Suspicious Process Accessing EDR Process Handles ---

title: Suspicious Process Accessing EDR Process Memory or Handles
id: bcba14e7-sig-0010-4cbd-9c32-718fdeb39b65
related:
    - id: bcba14e7-6f87-4cbd-9c32-718fdeb39b65
      type: derived
status: stable
description: |
    Detects a process from a user-writable directory attempting to access
    EDR process handles. EDRSilencer's custom FwpmGetAppIdFromFileName0
    implementation was specifically designed to avoid CreateFileW calls on
    EDR processes, but other variants may still attempt direct handle access
    for process enumeration or manipulation.
references:
    - https://attack.mitre.org/techniques/T1562/001/
    - https://github.com/netero1010/EDRSilencer
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.defense_evasion
    - attack.t1562.001
logsource:
    category: process_access
    product: windows
detection:
    selection_source_path:
        SourceImage|contains:
            - '\AppData\Local\Temp\'
            - '\Users\Public\'
            - '\Downloads\'
            - '\ProgramData\'
            - '\Windows\Temp\'
    selection_target:
        TargetImage|endswith:
            - '\MsMpEng.exe'
            - '\MsSense.exe'
            - '\SenseCE.exe'
            - '\MpDefenderCoreService.exe'
            - '\CSFalconService.exe'
            - '\SentinelAgent.exe'
            - '\CylanceSvc.exe'
            - '\CarbonBlack.exe'
    condition: selection_source_path and selection_target
falsepositives:
    - Security assessment tools running from temporary directories
    - Process monitoring utilities
level: high
