# ============================================================================
# DEFENSE GUIDANCE: LimaCharlie D&R Rules
# ============================================================================
# Test ID: c1f0fe6f-6907-4f95-820d-47e0a39abe54
# Test Name: TrollDisappearKey AMSI Bypass Detection
# MITRE ATT&CK: T1562.001 - Impair Defenses: Disable or Modify Tools
# Created: 2025-12-07
# Author: F0RT1KA Defense Guidance Builder
# ============================================================================
#
# USAGE:
#   Deploy via LimaCharlie CLI:
#     limacharlie dr add --rule-name <name> --detect <detect-block> --respond <respond-block>
#
#   Or via config push:
#     limacharlie config push c1f0fe6f-6907-4f95-820d-47e0a39abe54_dr_rules.yaml
#
# ============================================================================

rules:

  # ==========================================================================
  # Rule 1: TrollDisappearKey Binary Execution Detection
  # Purpose: Detect execution of TrollDisappearKey AMSI bypass tool
  # Confidence: HIGH
  # ==========================================================================
  f0rtika-amsi-bypass-trolldisappearkey-execution:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: troll_disappear_key
            - op: contains
              path: event/FILE_PATH
              value: trolldisappear
            - op: matches
              path: event/FILE_PATH
              re: (?i)troll.*disappear.*\.exe$
            - op: matches
              path: event/COMMAND_LINE
              re: (?i)troll.*disappear

    respond:
      - action: report
        name: F0RT1KA - AMSI Bypass Tool TrollDisappearKey Detected
        metadata:
          test_id: c1f0fe6f-6907-4f95-820d-47e0a39abe54
          mitre_attack: T1562.001
          confidence: high
          severity: critical
          description: TrollDisappearKey AMSI bypass tool execution detected


  # ==========================================================================
  # Rule 2: AMSI Provider Registry Manipulation
  # Purpose: Detect suspicious access to AMSI provider registry keys
  # Confidence: HIGH
  # ==========================================================================
  f0rtika-amsi-registry-manipulation:
    detect:
      target: edr
      event: REGISTRY_VALUE_SET
      op: and
      rules:
        - op: contains
          path: event/REGISTRY_KEY
          value: AMSI\\Providers
        - op: is not
          path: event/PROCESS_NAME
          value: MsMpEng.exe
        - op: is not
          path: event/PROCESS_NAME
          value: svchost.exe
        - op: is not
          path: event/PROCESS_NAME
          value: TrustedInstaller.exe

    respond:
      - action: report
        name: F0RT1KA - AMSI Provider Registry Manipulation
        metadata:
          test_id: c1f0fe6f-6907-4f95-820d-47e0a39abe54
          mitre_attack: T1562.001
          confidence: high
          severity: high
          description: Non-system process modifying AMSI provider registry keys


  # ==========================================================================
  # Rule 3: Remote .NET Assembly Download (SharpCollection/GhostPack)
  # Purpose: Detect download of known offensive .NET assemblies
  # Confidence: HIGH
  # ==========================================================================
  f0rtika-remote-assembly-download-sharpcollection:
    detect:
      target: edr
      event: NEW_TCP4_CONNECTION
      op: and
      rules:
        - op: or
          rules:
            - op: contains
              path: event/DOMAIN
              value: github.com
            - op: contains
              path: event/DOMAIN
              value: githubusercontent.com
            - op: contains
              path: event/DOMAIN
              value: raw.github
        - op: or
          rules:
            - op: matches
              path: routing/hostname
              re: .*
        - op: is not
          path: event/PROCESS_NAME
          value: chrome.exe
        - op: is not
          path: event/PROCESS_NAME
          value: firefox.exe
        - op: is not
          path: event/PROCESS_NAME
          value: msedge.exe

    respond:
      - action: report
        name: F0RT1KA - Suspicious GitHub Connection from Non-Browser
        metadata:
          test_id: c1f0fe6f-6907-4f95-820d-47e0a39abe54
          mitre_attack: T1105
          confidence: medium
          severity: medium
          description: Non-browser process connecting to GitHub (potential assembly download)


  # ==========================================================================
  # Rule 4: Seatbelt Security Enumeration Tool Execution
  # Purpose: Detect execution of Seatbelt security enumeration tool
  # Confidence: HIGH
  # ==========================================================================
  f0rtika-seatbelt-execution:
    detect:
      target: edr
      event: NEW_PROCESS
      op: or
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: Seatbelt.exe
        - op: contains
          path: event/COMMAND_LINE
          value: Seatbelt
        - op: matches
          path: event/COMMAND_LINE
          re: (?i)(AMSIProviders|AntiVirus|AppLocker|AuditPolicyRegistry|AutoRuns|CredEnum)

    respond:
      - action: report
        name: F0RT1KA - Seatbelt Security Enumeration Tool Detected
        metadata:
          test_id: c1f0fe6f-6907-4f95-820d-47e0a39abe54
          mitre_attack: T1518.001
          confidence: high
          severity: critical
          description: Seatbelt security enumeration tool execution detected


  # ==========================================================================
  # Rule 5: File Creation in F0RT1KA Test Directory (AMSI Tools)
  # Purpose: Detect AMSI bypass tool drops in F0RT1KA test directory
  # Confidence: HIGH
  # ==========================================================================
  f0rtika-amsi-tool-file-drop:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        - op: starts with
          path: event/FILE_PATH
          value: c:\\F0\\
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: troll
            - op: contains
              path: event/FILE_PATH
              value: amsi
            - op: contains
              path: event/FILE_PATH
              value: seatbelt

    respond:
      - action: report
        name: F0RT1KA - AMSI Bypass Tool File Drop
        metadata:
          test_id: c1f0fe6f-6907-4f95-820d-47e0a39abe54
          mitre_attack: T1562.001
          confidence: high
          severity: high
          description: AMSI bypass related file created in F0RT1KA test directory


  # ==========================================================================
  # Rule 6: WebClient Assembly Download Pattern
  # Purpose: Detect PowerShell/CLR WebClient downloading executables
  # Confidence: MEDIUM-HIGH
  # ==========================================================================
  f0rtika-webclient-assembly-download:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: WebClient
            - op: contains
              path: event/COMMAND_LINE
              value: DownloadData
            - op: contains
              path: event/COMMAND_LINE
              value: DownloadString
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: .exe
            - op: contains
              path: event/COMMAND_LINE
              value: Assembly
            - op: matches
              path: event/COMMAND_LINE
              re: https?://

    respond:
      - action: report
        name: F0RT1KA - WebClient Assembly Download Pattern
        metadata:
          test_id: c1f0fe6f-6907-4f95-820d-47e0a39abe54
          mitre_attack: T1105
          confidence: medium
          severity: high
          description: WebClient downloading executable content detected


  # ==========================================================================
  # Rule 7: AMSI Bypass Tool Process Pattern (Generic)
  # Purpose: Detect generic AMSI bypass tool execution patterns
  # Confidence: MEDIUM
  # ==========================================================================
  f0rtika-generic-amsi-bypass-pattern:
    detect:
      target: edr
      event: NEW_PROCESS
      op: or
      rules:
        - op: matches
          path: event/FILE_PATH
          re: (?i)amsi.*bypass
        - op: matches
          path: event/FILE_PATH
          re: (?i)bypass.*amsi
        - op: matches
          path: event/FILE_PATH
          re: (?i)disable.*amsi
        - op: matches
          path: event/FILE_PATH
          re: (?i)amsi.*patch
        - op: matches
          path: event/COMMAND_LINE
          re: (?i)AmsiScanBuffer
        - op: matches
          path: event/COMMAND_LINE
          re: (?i)AmsiInitialize

    respond:
      - action: report
        name: F0RT1KA - Generic AMSI Bypass Pattern Detected
        metadata:
          test_id: c1f0fe6f-6907-4f95-820d-47e0a39abe54
          mitre_attack: T1562.001
          confidence: medium
          severity: high
          description: Generic AMSI bypass tool pattern detected


  # ==========================================================================
  # Rule 8: .NET Reflection Assembly Loading
  # Purpose: Detect reflective .NET assembly loading patterns
  # Confidence: MEDIUM
  # ==========================================================================
  f0rtika-reflective-assembly-load:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: Assembly.Load
            - op: contains
              path: event/COMMAND_LINE
              value: Reflection.Assembly
            - op: contains
              path: event/COMMAND_LINE
              value: AppDomain.Load
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: byte[]
            - op: matches
              path: event/COMMAND_LINE
              re: https?://
            - op: contains
              path: event/COMMAND_LINE
              value: MemoryStream

    respond:
      - action: report
        name: F0RT1KA - Reflective .NET Assembly Loading
        metadata:
          test_id: c1f0fe6f-6907-4f95-820d-47e0a39abe54
          mitre_attack: T1620
          confidence: medium
          severity: high
          description: Reflective .NET assembly loading from memory or network detected


  # ==========================================================================
  # Rule 9: AMSI Provider Key Deletion
  # Purpose: Detect deletion of AMSI provider registry keys
  # Confidence: HIGH
  # ==========================================================================
  f0rtika-amsi-provider-key-deletion:
    detect:
      target: edr
      event: REGISTRY_DELETE
      op: and
      rules:
        - op: or
          rules:
            - op: contains
              path: event/REGISTRY_KEY
              value: AMSI\\Providers
            - op: contains
              path: event/REGISTRY_KEY
              value: Microsoft\\AMSI

    respond:
      - action: report
        name: F0RT1KA - AMSI Provider Registry Key Deletion
        metadata:
          test_id: c1f0fe6f-6907-4f95-820d-47e0a39abe54
          mitre_attack: T1562.001
          confidence: high
          severity: critical
          description: AMSI provider registry key deletion detected - AMSI bypass attempt


  # ==========================================================================
  # Rule 10: VirtualProtect on System DLLs (Hook Installation)
  # Purpose: Detect memory protection changes on system DLLs
  # Confidence: MEDIUM
  # Note: Requires additional context for false positive reduction
  # ==========================================================================
  f0rtika-virtualprotect-system-dll:
    detect:
      target: edr
      event: CODE_IDENTITY
      op: and
      rules:
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: KERNELBASE.dll
            - op: contains
              path: event/FILE_PATH
              value: ntdll.dll
            - op: contains
              path: event/FILE_PATH
              value: kernel32.dll
        - op: is not
          path: event/PROCESS_NAME
          value: MsMpEng.exe
        - op: is not
          path: event/PROCESS_NAME
          value: svchost.exe
        - op: is not
          path: event/PROCESS_NAME
          value: lsass.exe

    respond:
      - action: report
        name: F0RT1KA - System DLL Memory Manipulation
        metadata:
          test_id: c1f0fe6f-6907-4f95-820d-47e0a39abe54
          mitre_attack: T1055
          confidence: medium
          severity: high
          description: Memory manipulation of system DLL detected - potential API hook installation
