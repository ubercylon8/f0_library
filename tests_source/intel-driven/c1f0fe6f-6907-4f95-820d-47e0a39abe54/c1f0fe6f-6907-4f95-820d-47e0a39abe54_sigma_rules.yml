title: Suspicious Process Loading CLR from Non-Standard Path
id: c1f0fe6f-sigma-005
status: stable
description: |
    Detects processes loading the .NET Common Language Runtime (CLR) DLLs
    from non-standard executable locations. After AMSI bypass, attackers use
    Assembly.Load() to execute downloaded .NET assemblies in memory. The CLR
    being loaded by an unsigned or untrusted process from a user-writable
    directory is suspicious, as it suggests reflective code loading.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
    - https://attack.mitre.org/techniques/T1620/
    - https://attack.mitre.org/techniques/T1059/
tags:
    - attack.defense-evasion
    - attack.t1620
    - attack.execution
    - attack.t1059
logsource:
    product: windows
    category: image_load
detection:
    selection_clr:
        ImageLoaded|endswith:
            - '\clrjit.dll'
            - '\clr.dll'
            - '\coreclr.dll'
            - '\mscorlib.dll'
    selection_suspicious_path:
        Image|contains:
            - '\Users\'
            - '\Temp\'
            - '\AppData\'
            - '\Downloads\'
            - '\ProgramData\'
            - '\Public\'
    filter_trusted:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\dotnet.exe'
            - '\devenv.exe'
            - '\MSBuild.exe'
            - '\w3wp.exe'
            - '\code.exe'
            - '\csc.exe'
    condition: selection_clr and selection_suspicious_path and not filter_trusted
falsepositives:
    - Legitimate .NET applications installed in user directories
    - Self-extracting .NET installers
level: high

