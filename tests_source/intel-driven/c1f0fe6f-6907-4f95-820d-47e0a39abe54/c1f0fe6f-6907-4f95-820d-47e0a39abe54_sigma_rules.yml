title: Process Command Line Contains WebClient Download with Assembly Load
id: c1f0fe6f-sigma-008
status: stable
description: |
    Detects command lines or script block logs containing both WebClient
    download methods and Assembly.Load patterns. This combination indicates
    download-and-execute of .NET assemblies in memory, which is the payload
    delivery mechanism used after AMSI bypass. TrollDisappearKey passes a
    URL to WebClient.DownloadData() and the result to Assembly.Load().
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
    - https://attack.mitre.org/techniques/T1105/
    - https://attack.mitre.org/techniques/T1620/
tags:
    - attack.execution
    - attack.t1059
    - attack.defense-evasion
    - attack.t1620
    - attack.command-and-control
    - attack.t1105
logsource:
    product: windows
    category: process_creation
detection:
    selection_download:
        CommandLine|contains:
            - 'WebClient'
            - 'DownloadData'
            - 'DownloadString'
            - 'DownloadFile'
            - 'Invoke-WebRequest'
            - 'Net.WebClient'
    selection_assembly:
        CommandLine|contains:
            - 'Assembly.Load'
            - 'Reflection.Assembly'
            - 'Assembly::Load'
            - '[Reflection.Assembly]'
            - 'AppDomain'
    condition: selection_download and selection_assembly
falsepositives:
    - Legitimate .NET development or deployment scripts
    - PowerShell-based software deployment tools
level: critical

---

title: Process with AMSI Provider Registry Path in Command Line Arguments
id: c1f0fe6f-sigma-009
status: stable
description: |
    Detects processes whose command line contains explicit references to the
    AMSI provider registry path. TrollDisappearKey accepts the registry key
    path as a command-line argument. Any tool referencing AMSI\Providers in
    its arguments is potentially performing AMSI reconnaissance or manipulation.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
    - https://attack.mitre.org/techniques/T1562/001/
    - https://attack.mitre.org/techniques/T1518/001/
tags:
    - attack.defense-evasion
    - attack.t1562.001
    - attack.discovery
    - attack.t1518.001
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        CommandLine|contains:
            - 'AMSI\Providers'
            - 'AMSI\\Providers'
            - 'Microsoft\AMSI'
            - 'Microsoft\\AMSI'
    filter_defender:
        Image|endswith:
            - '\MsMpEng.exe'
            - '\MpCmdRun.exe'
    condition: selection and not filter_defender
falsepositives:
    - Security administrators querying AMSI provider status
    - Security audit scripts checking AMSI configuration
level: high

