title: Seatbelt Security Enumeration Tool Execution
id: c1f0fe6f-sigma-007
status: stable
description: |
    Detects execution of the GhostPack Seatbelt security enumeration tool.
    Seatbelt performs host reconnaissance by checking security configurations
    including AMSI providers, antivirus, AppLocker, credentials, and more.
    It is commonly used by attackers after gaining initial access or after
    bypassing AMSI protections to survey the target host.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
    - https://github.com/GhostPack/Seatbelt
    - https://attack.mitre.org/techniques/T1518/001/
tags:
    - attack.discovery
    - attack.t1518.001
logsource:
    product: windows
    category: process_creation
detection:
    selection_name:
        Image|endswith: '\Seatbelt.exe'
    selection_args:
        CommandLine|contains:
            - 'AMSIProviders'
            - 'AuditPolicyRegistry'
            - 'CredEnum'
            - 'InterestingProcesses'
            - 'TokenPrivileges'
            - 'WindowsDefender'
            - 'WindowsFirewall'
            - '-group=all'
            - '-group=system'
            - '-group=user'
    selection_module_combo:
        CommandLine|contains|all:
            - 'AntiVirus'
            - 'AppLocker'
    condition: selection_name or selection_args or selection_module_combo
falsepositives:
    - Authorized red team or penetration testing activities
    - Some Seatbelt module names may overlap with legitimate tool arguments (rare)
level: critical

