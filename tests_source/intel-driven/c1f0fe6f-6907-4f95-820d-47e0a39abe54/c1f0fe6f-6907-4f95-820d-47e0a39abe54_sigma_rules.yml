title: Non-Browser Process Connecting to GitHub for Executable Download
id: c1f0fe6f-sigma-006
status: stable
description: |
    Detects non-browser processes establishing network connections to GitHub
    or GitHub raw content domains. TrollDisappearKey downloads Seatbelt.exe
    from the SharpCollection repository on GitHub using WebClient.DownloadData().
    Legitimate software downloads from GitHub are typically done via browsers
    or package managers.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
    - https://attack.mitre.org/techniques/T1105/
    - https://github.com/Flangvik/SharpCollection
tags:
    - attack.command-and-control
    - attack.t1105
    - attack.defense-evasion
    - attack.t1620
logsource:
    product: windows
    category: network_connection
detection:
    selection_domains:
        DestinationHostname|endswith:
            - 'github.com'
            - 'githubusercontent.com'
            - 'github.io'
            - 'githubassets.com'
    selection_port:
        DestinationPort:
            - 443
            - 80
    filter_browsers:
        Image|endswith:
            - '\chrome.exe'
            - '\firefox.exe'
            - '\msedge.exe'
            - '\iexplore.exe'
            - '\brave.exe'
            - '\opera.exe'
            - '\vivaldi.exe'
    filter_dev_tools:
        Image|endswith:
            - '\git.exe'
            - '\gh.exe'
            - '\git-remote-https.exe'
            - '\nuget.exe'
            - '\dotnet.exe'
            - '\Code.exe'
            - '\devenv.exe'
            - '\GitHubDesktop.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
    condition: selection_domains and selection_port and not filter_browsers and not filter_dev_tools
falsepositives:
    - CI/CD build agents downloading dependencies from GitHub
    - Custom automation tools that pull from GitHub repositories
    - Winget or Chocolatey package managers
level: high

