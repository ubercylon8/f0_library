title: AMSI Provider Registry Key Tampering
id: c1f0fe6f-sigma-001
status: stable
description: |
    Detects modification, creation, or deletion of AMSI provider registry keys
    by non-system processes. TrollDisappearKey hooks RegOpenKeyExW to redirect
    queries for Software\Microsoft\AMSI\Providers to a path with a trailing
    space, causing AMSI provider DLLs to fail to load. This rule detects any
    process tampering with AMSI provider registry keys regardless of tooling.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
    - https://attack.mitre.org/techniques/T1562/001/
    - https://github.com/cybersectroll/TrollDisappearKey
    - https://docs.microsoft.com/en-us/windows/win32/amsi/antimalware-scan-interface-portal
tags:
    - attack.defense-evasion
    - attack.t1562.001
    - attack.t1112
logsource:
    product: windows
    category: registry_set
detection:
    selection_target:
        TargetObject|contains:
            - '\SOFTWARE\Microsoft\AMSI\Providers'
            - '\SOFTWARE\Microsoft\AMSI\Providers '
    filter_system_processes:
        Image|endswith:
            - '\svchost.exe'
            - '\services.exe'
            - '\TrustedInstaller.exe'
            - '\MsMpEng.exe'
            - '\MpCmdRun.exe'
            - '\msiexec.exe'
            - '\SetupHost.exe'
    condition: selection_target and not filter_system_processes
falsepositives:
    - Security software installation or updates modifying AMSI provider registration
    - Windows feature installation via DISM or servicing stack
level: critical

