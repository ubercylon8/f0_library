title: AMSI Event Log Cleared or Disabled
id: c1f0fe6f-sigma-012
status: stable
description: |
    Detects clearing or disabling of the Microsoft-Windows-AMSI/Operational
    event log. Attackers may clear AMSI logs after a successful bypass to
    remove evidence of their AMSI tampering. This is a defense evasion
    technique often used in conjunction with AMSI bypass attacks.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
    - https://attack.mitre.org/techniques/T1562/001/
    - https://attack.mitre.org/techniques/T1070/001/
tags:
    - attack.defense-evasion
    - attack.t1562.001
    - attack.t1070.001
logsource:
    product: windows
    service: system
detection:
    selection_clear:
        EventID: 104
        Channel: 'Microsoft-Windows-AMSI/Operational'
    selection_disable:
        EventID: 1100
    condition: selection_clear or selection_disable
falsepositives:
    - Routine log maintenance by system administrators
    - Log rotation policies
level: high
