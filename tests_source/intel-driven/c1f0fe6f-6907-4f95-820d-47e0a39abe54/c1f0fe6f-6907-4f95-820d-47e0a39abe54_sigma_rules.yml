title: AMSI Bypass via AmsiScanBuffer or AmsiInitialize Patching
id: c1f0fe6f-sigma-010
status: stable
description: |
    Detects processes whose command lines or loaded modules reference AMSI
    internal functions (AmsiScanBuffer, AmsiScanString, AmsiInitialize)
    combined with memory manipulation APIs. While TrollDisappearKey uses a
    registry redirection approach, many other AMSI bypass tools directly
    patch AmsiScanBuffer to return AMSI_RESULT_CLEAN. This rule covers
    the broader family of AMSI memory patching techniques.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
    - https://attack.mitre.org/techniques/T1562/001/
    - https://www.mdsec.co.uk/2018/06/exploring-powershell-amsi-and-logging-evasion/
tags:
    - attack.defense-evasion
    - attack.t1562.001
logsource:
    product: windows
    category: process_creation
detection:
    selection_amsi_functions:
        CommandLine|contains:
            - 'AmsiScanBuffer'
            - 'AmsiScanString'
            - 'AmsiInitialize'
            - 'amsiInitFailed'
            - 'AmsiUtils'
    selection_patching:
        CommandLine|contains:
            - 'VirtualProtect'
            - 'WriteProcessMemory'
            - 'NtProtectVirtualMemory'
            - 'Marshal.Copy'
            - '[Runtime.InteropServices.Marshal]'
    condition: selection_amsi_functions or (selection_amsi_functions and selection_patching)
falsepositives:
    - Security research tools analyzing AMSI internals
    - AMSI testing utilities from Microsoft
level: high

