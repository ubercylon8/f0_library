title: AMSI Provider Registry Key Deletion
id: c1f0fe6f-sigma-002
status: stable
description: |
    Detects deletion of AMSI provider registry keys or values. Deleting AMSI
    provider entries disables antimalware scanning for .NET Assembly.Load(),
    PowerShell scripts, and other AMSI-integrated applications. This is a
    direct defense evasion technique.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
    - https://attack.mitre.org/techniques/T1562/001/
    - https://docs.microsoft.com/en-us/windows/win32/amsi/antimalware-scan-interface-portal
tags:
    - attack.defense-evasion
    - attack.t1562.001
logsource:
    product: windows
    category: registry_delete
detection:
    selection:
        TargetObject|contains:
            - '\SOFTWARE\Microsoft\AMSI\Providers'
            - '\SOFTWARE\Microsoft\AMSI'
    condition: selection
falsepositives:
    - Security software uninstallation removing its own AMSI provider
level: critical

---

title: Registry Key with Trailing Space in AMSI Path
id: c1f0fe6f-sigma-003
status: stable
description: |
    Detects registry operations on AMSI-related paths containing a trailing
    space character. TrollDisappearKey specifically redirects AMSI provider
    lookups to 'Software\Microsoft\AMSI\Providers ' (note trailing space).
    This key does not exist, causing provider DLL loading to silently fail.
    A trailing space in this registry path has no legitimate purpose.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
    - https://github.com/cybersectroll/TrollDisappearKey
    - https://attack.mitre.org/techniques/T1562/001/
tags:
    - attack.defense-evasion
    - attack.t1562.001
logsource:
    product: windows
    category: registry_event
detection:
    selection:
        TargetObject|endswith:
            - 'AMSI\Providers '
            - 'AMSI\Providers  '
    condition: selection
falsepositives:
    - None expected - trailing spaces in AMSI registry paths are not legitimate
level: critical

