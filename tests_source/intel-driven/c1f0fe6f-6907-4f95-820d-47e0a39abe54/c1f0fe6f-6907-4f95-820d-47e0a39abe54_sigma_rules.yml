title: GetProcAddress and GetModuleHandle for Registry API Hooking
id: c1f0fe6f-sigma-011
status: stable
description: |
    Detects PowerShell or .NET processes resolving function pointers for
    RegOpenKeyExW from KERNELBASE.dll using GetProcAddress and GetModuleHandle.
    This is the initial step in TrollDisappearKey's API hooking chain. The
    tool uses P/Invoke (DllImport) to call GetModuleHandle("KERNELBASE.dll")
    and GetProcAddress(handle, "RegOpenKeyExW") to locate the target function
    before installing the inline hook.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
    - https://github.com/cybersectroll/TrollDisappearKey
    - https://attack.mitre.org/techniques/T1055/
tags:
    - attack.defense-evasion
    - attack.t1055
    - attack.t1562.001
logsource:
    product: windows
    category: process_creation
detection:
    selection_resolve:
        CommandLine|contains|all:
            - 'GetProcAddress'
            - 'RegOpenKeyExW'
    selection_module:
        CommandLine|contains|all:
            - 'GetModuleHandle'
            - 'KERNELBASE'
    condition: selection_resolve or selection_module
falsepositives:
    - Legitimate software development or debugging activities
    - Security research tools
level: high

