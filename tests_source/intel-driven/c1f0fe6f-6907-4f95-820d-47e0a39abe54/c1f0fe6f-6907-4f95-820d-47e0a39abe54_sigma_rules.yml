title: VirtualProtect on KERNELBASE.dll or System DLL - API Hook Installation
id: c1f0fe6f-sigma-004
status: stable
description: |
    Detects calls to VirtualProtect that change memory protections on system
    DLLs to PAGE_EXECUTE_READWRITE (0x40). This is a prerequisite for inline
    API hooking where the attacker overwrites the first bytes of a target
    function (e.g., RegOpenKeyExW in KERNELBASE.dll) with a trampoline jump.
    TrollDisappearKey uses this exact pattern: VirtualProtect(targetAddr, 12,
    0x40, out oldProtect) followed by Marshal.Copy of hook bytes.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
    - https://attack.mitre.org/techniques/T1055/
    - https://attack.mitre.org/techniques/T1562/001/
tags:
    - attack.defense-evasion
    - attack.t1055
    - attack.t1562.001
logsource:
    product: windows
    category: process_access
detection:
    selection_api:
        CallTrace|contains:
            - 'KERNELBASE.dll'
            - 'ntdll.dll'
    selection_protection:
        GrantedAccess|contains:
            - '0x40'
    filter_system:
        SourceImage|endswith:
            - '\MsMpEng.exe'
            - '\svchost.exe'
            - '\lsass.exe'
            - '\csrss.exe'
            - '\services.exe'
            - '\smss.exe'
    condition: selection_api and selection_protection and not filter_system
falsepositives:
    - Debugging tools (WinDbg, x64dbg)
    - Some security products that perform API hooking themselves
    - Application compatibility layers
level: high

