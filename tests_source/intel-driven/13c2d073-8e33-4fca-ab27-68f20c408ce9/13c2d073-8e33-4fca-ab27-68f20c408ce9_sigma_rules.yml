title: Renamed Binary with Microsoft SharePoint Name Execution
id: 13c2d073-sigma-002
status: stable
description: |
  Detects execution of binaries named as Microsoft SharePoint components from
  non-standard paths. APT33 Tickler renames the backdoor to
  Microsoft.SharePoint.NativeMessaging.exe or SharePoint.exe and executes
  from user-writable directories. Legitimate SharePoint components always
  run from Program Files.
references:
  - https://attack.mitre.org/techniques/T1036/
  - https://attack.mitre.org/groups/G0064/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.defense-evasion
  - attack.t1036
  - apt33
  - tickler
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\Microsoft.SharePoint.NativeMessaging.exe'
      - '\SharePoint.exe'
      - '\Microsoft.SharePoint.exe'
      - '\SharePointSync.exe'
  filter_legitimate:
    Image|startswith:
      - 'C:\Program Files\'
      - 'C:\Program Files (x86)\'
      - 'C:\Windows\'
  condition: selection and not filter_legitimate
falsepositives:
  - ClickOnce-deployed SharePoint add-ins
  - Legitimate SharePoint migration tools in non-standard paths
level: high

---
title: Registry Run Key Persistence Pointing to User Directory
id: 13c2d073-sigma-003
status: stable
description: |
  Detects creation or modification of registry Run key values that reference
  executables in user-writable directories (Users, AppData, Temp). APT33 Tickler
  creates a Run key named 'SharePoint' pointing to a binary in a user directory.
  This generic detection catches any attacker abusing Run keys with non-standard paths.
references:
  - https://attack.mitre.org/techniques/T1547/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.persistence
  - attack.t1547.001
  - apt33
  - tickler
logsource:
  category: registry_set
  product: windows
detection:
  selection:
    TargetObject|contains:
      - '\Software\Microsoft\Windows\CurrentVersion\Run\'
      - '\SOFTWARE\Microsoft\Windows\CurrentVersion\Run\'
      - '\Software\Microsoft\Windows\CurrentVersion\RunOnce\'
  selection_user_path:
    Details|contains:
      - '\Users\'
      - '\AppData\'
      - '\Temp\'
  filter_program_files:
    Details|contains:
      - 'Program Files'
      - 'Windows\System32'
  condition: selection and selection_user_path and not filter_program_files
falsepositives:
  - Legitimate user-installed applications adding Run keys
  - Portable application auto-start configuration
level: high

---
title: SharePoint-Themed Registry Run Key Persistence
id: 13c2d073-sigma-004
status: stable
description: |
  Detects registry Run key additions specifically using the 'SharePoint' value name
  or referencing SharePoint-named executables outside Program Files. This is a
  high-fidelity indicator of APT33 Tickler persistence. Legitimate SharePoint
  clients do not create Run key entries named 'SharePoint'.
references:
  - https://attack.mitre.org/techniques/T1547/001/
  - https://attack.mitre.org/groups/G0064/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.persistence
  - attack.t1547.001
  - attack.defense-evasion
  - attack.t1036
  - apt33
  - tickler
logsource:
  category: registry_set
  product: windows
detection:
  selection_name:
    TargetObject|endswith:
      - '\Run\SharePoint'
      - '\RunOnce\SharePoint'
  selection_data:
    Details|contains:
      - 'SharePoint.exe'
      - 'NativeMessaging'
      - 'Microsoft.SharePoint'
  filter_legitimate:
    Details|contains:
      - 'Program Files'
      - 'Program Files (x86)'
  condition: (selection_name or selection_data) and not filter_legitimate
falsepositives:
  - Very unlikely - legitimate SharePoint uses standard installation paths
level: critical

---
title: Scheduled Task Creation with SharePoint-Themed Name or Binary
id: 13c2d073-sigma-005
status: stable
description: |
  Detects schtasks.exe creating tasks that reference SharePoint-themed binary names
  or use SharePoint-related task names. APT33 Tickler creates 'MicrosoftSharePointSync'
  as redundant persistence alongside the registry Run key. The task uses ONLOGON
  trigger with elevated privileges.
references:
  - https://attack.mitre.org/techniques/T1053/005/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.persistence
  - attack.execution
  - attack.t1053.005
  - apt33
  - tickler
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains: '/Create'
  selection_sharepoint:
    CommandLine|contains:
      - 'SharePoint'
      - 'NativeMessaging'
      - 'MicrosoftSharePointSync'
  condition: selection and selection_sharepoint
falsepositives:
  - Legitimate SharePoint sync utilities creating scheduled tasks
level: high

---
title: Elevated Scheduled Task with Logon Trigger to Non-Standard Path
id: 13c2d073-sigma-006
status: stable
description: |
  Detects creation of scheduled tasks with ONLOGON triggers and elevated privileges
  (HIGHEST or SYSTEM) that reference executables outside standard directories. This
  broader detection catches persistence mechanisms regardless of naming.
references:
  - https://attack.mitre.org/techniques/T1053/005/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.persistence
  - attack.execution
  - attack.t1053.005
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains|all:
      - '/Create'
  selection_trigger:
    CommandLine|contains:
      - 'ONLOGON'
      - 'ONSTART'
  selection_elevated:
    CommandLine|contains:
      - 'HIGHEST'
      - '/RU SYSTEM'
  filter_standard:
    CommandLine|contains:
      - 'Program Files'
      - 'Windows\System32'
  condition: selection and selection_trigger and selection_elevated and not filter_standard
falsepositives:
  - System management tools creating elevated logon tasks
  - Software updaters with elevated scheduled tasks
level: medium

