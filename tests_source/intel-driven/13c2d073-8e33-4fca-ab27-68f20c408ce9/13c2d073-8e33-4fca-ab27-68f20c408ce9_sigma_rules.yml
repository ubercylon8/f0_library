title: Outbound Connection on APT33 Tickler C2 Ports 808 or 880
id: 13c2d073-sigma-007
status: stable
description: |
  Detects outbound network connections to TCP ports 808 and 880. These are the
  documented command-and-control ports used by APT33 Tickler backdoor to communicate
  with Azure-hosted C2 infrastructure via HTTP POST. Non-standard HTTP ports
  are uncommonly used for legitimate outbound connections.
references:
  - https://attack.mitre.org/techniques/T1071/001/
  - https://www.microsoft.com/en-us/security/blog/2024/08/28/peach-sandstorm-deploys-new-custom-tickler-malware-in-long-running-intelligence-gathering-operations/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.command-and-control
  - attack.t1071.001
  - apt33
  - tickler
logsource:
  category: network_connection
  product: windows
detection:
  selection:
    DestinationPort:
      - 808
      - 880
    Initiated: 'true'
  filter_system:
    Image|endswith:
      - '\svchost.exe'
      - '\services.exe'
  filter_loopback:
    DestinationIp:
      - '127.0.0.1'
      - '::1'
  condition: selection and not filter_system and not filter_loopback
falsepositives:
  - WCF services using port 808
  - Internal web applications on non-standard ports
level: high

---
title: Double Extension Archive File Creation - Spearphishing Delivery
id: 13c2d073-sigma-008
status: stable
description: |
  Detects creation of archive files (ZIP, RAR, 7z) with double extensions that
  masquerade as documents (.pdf.zip, .doc.zip, .xlsx.rar). APT33 delivers
  the Tickler backdoor as a ZIP file disguised as a PDF report. This social
  engineering technique is used by multiple threat actors.
references:
  - https://attack.mitre.org/techniques/T1566/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.initial-access
  - attack.t1566.001
  - apt33
  - tickler
logsource:
  category: file_event
  product: windows
detection:
  selection:
    TargetFilename|endswith:
      - '.pdf.zip'
      - '.doc.zip'
      - '.docx.zip'
      - '.xls.zip'
      - '.xlsx.zip'
      - '.ppt.zip'
      - '.pptx.zip'
      - '.pdf.rar'
      - '.doc.rar'
      - '.pdf.7z'
  condition: selection
falsepositives:
  - Document archival workflows
  - Backup scripts that compress files preserving original extensions
level: medium

