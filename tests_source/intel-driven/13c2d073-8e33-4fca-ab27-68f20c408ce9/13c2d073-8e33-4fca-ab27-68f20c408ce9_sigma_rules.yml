# ============================================================
# APT33 Tickler Backdoor DLL Sideloading - Sigma Rules
# Test ID: 13c2d073-8e33-4fca-ab27-68f20c408ce9
# MITRE ATT&CK: T1566.001, T1574.002, T1547.001, T1053.005, T1036, T1071.001
# Threat Actor: APT33 (Elfin / Peach Sandstorm / Refined Kitten)
# Generated: 2026-03-13
# ============================================================
# FOCUS: Technique-level attack behaviors only.
# Detections target the underlying attack patterns, NOT test framework artifacts.
# ============================================================
---
title: DLL Side-Loading - VC++ Runtime from Non-Standard Path
id: 13c2d073-sigma-001
status: stable
description: |
  Detects loading of Visual C++ runtime DLLs (msvcp140.dll, vcruntime140.dll)
  from directories outside Windows, Program Files, or ProgramData. APT33 Tickler
  uses DLL sideloading by placing malicious versions of these DLLs alongside a
  renamed Microsoft binary. This behavior is technique-inherent and detected
  regardless of the specific tool used.
references:
  - https://attack.mitre.org/techniques/T1574/002/
  - https://www.microsoft.com/en-us/security/blog/2024/08/28/peach-sandstorm-deploys-new-custom-tickler-malware-in-long-running-intelligence-gathering-operations/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.defense-evasion
  - attack.t1574.002
  - attack.persistence
  - apt33
  - tickler
logsource:
  category: image_load
  product: windows
detection:
  selection:
    ImageLoaded|endswith:
      - '\msvcp140.dll'
      - '\vcruntime140.dll'
      - '\msvcp140d.dll'
      - '\vcruntime140d.dll'
  filter_standard_paths:
    ImageLoaded|startswith:
      - 'C:\Windows\'
      - 'C:\Program Files\'
      - 'C:\Program Files (x86)\'
      - 'C:\ProgramData\Microsoft\'
  filter_standard_processes:
    Image|startswith:
      - 'C:\Program Files\'
      - 'C:\Program Files (x86)\'
      - 'C:\Windows\'
  condition: selection and not filter_standard_paths and not filter_standard_processes
falsepositives:
  - Portable applications bundling VC++ runtime DLLs
  - Development tools in user directories
  - Game launchers with bundled runtime libraries
level: high

