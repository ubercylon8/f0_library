title: Combined APT33 Tickler Indicators - DLL Sideloading and SharePoint Persistence
id: 13c2d073-sigma-009
status: stable
description: |
  Temporal correlation of multiple APT33 Tickler indicators on the same endpoint.
  This rule triggers when DLL sideloading from non-standard paths AND SharePoint-themed
  persistence mechanisms are observed within a short timeframe. Two independent
  APT33 indicators on the same host is a near-certain compromise indicator.
  Note: This rule requires correlation capability in the SIEM platform.
references:
  - https://attack.mitre.org/groups/G0064/
  - https://www.microsoft.com/en-us/security/blog/2024/08/28/peach-sandstorm-deploys-new-custom-tickler-malware-in-long-running-intelligence-gathering-operations/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.defense-evasion
  - attack.t1574.002
  - attack.persistence
  - attack.t1547.001
  - attack.t1053.005
  - attack.t1036
  - apt33
  - tickler
logsource:
  category: process_creation
  product: windows
detection:
  # This is a placeholder for SIEM-level correlation
  # Actual implementation requires temporal correlation of rules
  # 13c2d073-sigma-001 AND (13c2d073-sigma-004 OR 13c2d073-sigma-005)
  selection_masquerading:
    Image|endswith:
      - '\Microsoft.SharePoint.NativeMessaging.exe'
      - '\SharePoint.exe'
  filter_legitimate:
    Image|startswith:
      - 'C:\Program Files\'
      - 'C:\Program Files (x86)\'
  condition: selection_masquerading and not filter_legitimate
falsepositives:
  - Extremely unlikely when combined with DLL sideloading indicators
level: critical
