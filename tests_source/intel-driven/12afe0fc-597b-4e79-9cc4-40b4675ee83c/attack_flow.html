            var detailsPanel = document.getElementById('detailsPanel');

            if (sidebarCollapsed) {
                detailsPanel.classList.add('collapsed');
                toggleBtn.classList.remove('expanded');

                detailsPanel.classList.remove('collapsed');

                toggleBtn.classList.remove('collapsed');
            }

        // Function to create MITRE links
        function createMitreLinks(mitreArray) {
            return mitreArray.map(function(technique) {
                var baseUrl = "https://attack.mitre.org/techniques/";
                var techId = technique.id.replace('.', '/'); // Handle sub-techniques like T1497.001
                var link = document.createElement('a');
                link.href = baseUrl + techId;
                link.target = '_blank';
                link.className = 'mitre-link';
                link.title = technique.name;
                link.textContent = technique.id;
                return link.outerHTML;
            }).join(', ');
        }

        // Escape HTML to prevent XSS (static data but good practice)
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

            for (var i = 0; i <= 4; i++) {
                var phase = phaseData[i];
                var severityColor = getSeverityColor(phase.severity);
                var mitreText = phase.mitre.map(function(t) { return t.id; }).join(', ');

                var item = document.createElement('div');
                item.className = 'timeline-item';
                item.setAttribute('onclick', 'showPhaseDetails(' + i + ')');

                var number = document.createElement('div');
                number.className = 'timeline-number';
                number.style.borderColor = severityColor;
                number.style.color = severityColor;
                number.textContent = i;

                var content = document.createElement('div');
                content.className = 'timeline-content';

                var title = document.createElement('div');
                title.className = 'timeline-title';
                title.textContent = phase.title;

                var meta = document.createElement('div');
                meta.className = 'timeline-meta';
                meta.textContent = phase.time + ' - ' + mitreText + ' - ' + (phase.status === 'actual' ? 'Actual' : 'Simulated');

                content.appendChild(title);
                content.appendChild(meta);
                item.appendChild(number);
                item.appendChild(content);
                timelineView.appendChild(item);
            }

        // Show phase details using DOM methods
        function showPhaseDetails(phaseNum) {
            currentPhase = phaseNum;
            var phase = phaseData[phaseNum];
            var detailsPanel = document.getElementById('detailsPanel');
            var detailsContent = document.getElementById('detailsContent');

            // Update active states
            document.querySelectorAll('.component').forEach(function(comp) {
                comp.classList.remove('active');
            });
            document.querySelectorAll('.timeline-item').forEach(function(item) {
                item.classList.remove('active');
            });

            // Add active state to clicked component
            var activeComponent = document.querySelector('.component[data-phase="' + phaseNum + '"]');
            if (activeComponent) {
                activeComponent.classList.add('active');
            }

            // Add active state to timeline item
            var timelineItems = document.querySelectorAll('.timeline-item');
            if (timelineItems[phaseNum]) {

            if (phase.code) {

                codeSection.appendChild(codeTitle);

                var codePreview = document.createElement('div');
                codePreview.className = 'code-preview';

                phase.code.split('\n').forEach(function(line) {
                    var codeLine = document.createElement('div');
                    codeLine.className = 'code-line';

                    if (line.startsWith('//') || line.startsWith('#')) {
                        codeLine.classList.add('code-comment');
                        codeLine.textContent = line;
                    } else if (line.startsWith('[STAGE')) {
                        var highlight = document.createElement('span');
                        highlight.className = 'code-highlight';
                        highlight.textContent = line;
                        codeLine.appendChild(highlight);
                    } else if (line.startsWith('===')) {
                        codeLine.classList.add('code-comment');
                        codeLine.textContent = line;
                    } else {
                        codeLine.textContent = line;
                    }
                    codePreview.appendChild(codeLine);
                });

                codeSection.appendChild(codePreview);
                detailsContent.appendChild(codeSection);
            }

            // Show details panel
            detailsPanel.classList.add('active');

            // Update progress bar
            updateProgressBar(phaseNum);

            // Position toggle button with sidebar
            var toggleBtn = document.getElementById('sidebarToggle');
            if (!sidebarCollapsed) {
                toggleBtn.classList.add('expanded');
            }

            // Hide all views
            document.getElementById('attackFlowView').style.display = 'none';
            document.getElementById('timelineView').classList.remove('active');

            // Show selected view
            if (view === 'architecture') {
                document.getElementById('attackFlowView').style.display = 'block';
            } else if (view === 'timeline') {
                document.getElementById('timelineView').classList.add('active');
            }
        }

        // Get severity color
        function getSeverityColor(severity) {
            switch(severity) {
                case 'critical': return '#ff4444';
                case 'high': return '#ff9f43';
                case 'medium': return '#ffc107';
                case 'low': return '#66bb6a';
                case 'info': return '#4fc3f7';
                default: return 'var(--diagram-text-secondary)';
            }
        }

        // Update progress bar
        function updateProgressBar(phaseNum) {
            var progressBar = document.getElementById('progressBar');
            var width = ((phaseNum + 1) / 5) * 1120;
            progressBar.style.width = width + 'px';
            progressBar.style.transition = 'width 0.5s ease';
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            initializeTimeline();

            // Sidebar starts expanded - show phase 0 details
            sidebarCollapsed = false;
            setTimeout(function() {
                showPhaseDetails(0);
            }, 500);
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (currentPhase !== null) {
                if (e.key === 'ArrowRight' && currentPhase < 4) {
                    showPhaseDetails(currentPhase + 1);
                } else if (e.key === 'ArrowLeft' && currentPhase > 0) {
                    showPhaseDetails(currentPhase - 1);
                } else if (e.key === 'Escape') {
                    closeDetails();
                }
            }
        });

        // ═══════════════════════════════════════════════════════════════
        // THEME SYNC - Listen for postMessage from parent window
        // Supports integration with ProjectAchilles iframe embedding
        // ═══════════════════════════════════════════════════════════════
        window.addEventListener('message', function(event) {
            // Handle theme change messages from parent
            if (event.data && event.data.type === 'theme-change') {
                var theme = event.data.theme;
                if (theme === 'light' || theme === 'dark') {
                    document.documentElement.setAttribute('data-theme', theme);
                    // Also set class for compatibility
                    document.documentElement.classList.remove('light', 'dark');
                    document.documentElement.classList.add(theme);
                }
            }
        });

        // Notify parent that diagram is ready to receive theme
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'diagram-ready' }, '*');
        }
    </script>
</body>
</html>
