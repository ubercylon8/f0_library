            }
        };

        // Current active phase
        let currentPhase = null;

        // Sidebar toggle state
        var sidebarCollapsed = false;
        function toggleSidebar() {
            var detailsPanel = document.getElementById('detailsPanel');
            var toggleBtn = document.getElementById('sidebarToggle');

            sidebarCollapsed = !sidebarCollapsed;

            if (sidebarCollapsed) {
                detailsPanel.classList.add('collapsed');
                toggleBtn.classList.remove('expanded');
                toggleBtn.classList.add('collapsed');
            } else {
                detailsPanel.classList.remove('collapsed');
                if (detailsPanel.classList.contains('active')) {
                    toggleBtn.classList.add('expanded');
                }
                toggleBtn.classList.remove('collapsed');
            }
        }

        // Function to create MITRE links
        function createMitreLinks(mitreArray) {
            return mitreArray.map(function(technique) {
                var baseUrl = "https://attack.mitre.org/techniques/";
                var techId = technique.id.replace('.', '/'); // Handle sub-techniques like T1497.001
                return '<a href="' + baseUrl + techId + '" target="_blank" class="mitre-link" title="' + technique.name + '">' + technique.id + '</a>';
            }).join(', ');
        }

        // Initialize timeline view
        function initializeTimeline() {
            var timelineView = document.getElementById('timelineView');
            var html = '';

            for (var i = 0; i <= 4; i++) {
                var phase = phaseData[i];
                var severityColor = getSeverityColor(phase.severity);
                var mitreText = phase.mitre.map(function(t) { return t.id; }).join(', ');

                html += '<div class="timeline-item" onclick="showPhaseDetails(' + i + ')">' +
                    '<div class="timeline-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' +
                        i +
                    '</div>' +
                    '<div class="timeline-content">' +
                        '<div class="timeline-title">' + phase.title + '</div>' +
                        '<div class="timeline-meta">' +
                            phase.time + ' - ' + mitreText + ' - ' + (phase.status === 'actual' ? 'Actual' : 'Simulated') +
                        '</div>' +
                    '</div>' +
                '</div>';
            }

            timelineView.innerHTML = html;
        }

        // Show phase details
        function showPhaseDetails(phaseNum) {
            currentPhase = phaseNum;
            var phase = phaseData[phaseNum];
            var detailsPanel = document.getElementById('detailsPanel');
            var detailsContent = document.getElementById('detailsContent');

            // Update active states
            document.querySelectorAll('.component').forEach(function(comp) {
                comp.classList.remove('active');
            });
            document.querySelectorAll('.timeline-item').forEach(function(item) {
                item.classList.remove('active');
            });

            // Add active state to clicked component
            var activeComponent = document.querySelector('.component[data-phase="' + phaseNum + '"]');
            if (activeComponent) {
                activeComponent.classList.add('active');
            }

            // Add active state to timeline item
            var timelineItems = document.querySelectorAll('.timeline-item');
            if (timelineItems[phaseNum]) {
                timelineItems[phaseNum].classList.add('active');
            }

            // Generate details HTML
            var severityColor = getSeverityColor(phase.severity);
            var actionsHtml = '';

            phase.actions.forEach(function(action) {
                var detailsHtml = action.details.map(function(detail) {
                    return '<li>' + detail + '</li>';
                }).join('');
                actionsHtml += '<div class="action-item">' +
                    '<div class="action-title">' + action.title + '</div>' +
                    '<ul class="action-details">' +
                        detailsHtml +
                    '</ul>' +
                '</div>';
            });

            var mitreLinks = createMitreLinks(phase.mitre);

            var codeHtml = '';
            if (phase.code) {
                var codeLines = phase.code.split('\\n').map(function(line) {
                    if (line.startsWith('//') || line.startsWith('#')) {
                        return '<div class="code-line code-comment">' + line + '</div>';
                    } else if (line.startsWith('[STAGE')) {
                        return '<div class="code-line"><span class="code-highlight">' + line + '</span></div>';
                    } else if (line.startsWith('===')) {
                        return '<div class="code-line code-comment">' + line + '</div>';
                    } else {
                        return '<div class="code-line">' + line + '</div>';
                    }
                }).join('');

                codeHtml = '<div class="details-section">' +
                    '<h3 class="section-title">' +
                        '<span>&gt;</span>' +
                        '<span>Code / Output Preview</span>' +
                    '</h3>' +
                    '<div class="code-preview">' +
                        codeLines +
                    '</div>' +
                '</div>';
            }

            detailsContent.innerHTML = '<div class="details-header">' +
                '<div class="details-phase-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' +
                    phase.number +
                '</div>' +
                '<h2 class="details-title">' + phase.title + '</h2>' +
                '<span class="severity-badge ' + phase.severity + '">' + phase.severity.toUpperCase() + '</span>' +
                '<span class="utility-badge">UTILITY TEST</span>' +
                '<div class="details-meta">' +
                    '<div class="meta-item">' +
                        '<span class="meta-label">MITRE:</span>' +
                        '<span class="meta-value">' + mitreLinks + '</span>' +
                    '</div>' +
                    '<div class="meta-item">' +
                        '<span class="meta-label">Time:</span>' +
                        '<span class="meta-value">' + phase.time + '</span>' +
                    '</div>' +
                    '<div class="meta-item">' +
                        '<span class="meta-label">Status:</span>' +
                        '<span class="meta-value">' + (phase.status === 'actual' ? 'Actual execution' : 'Simulated only') + '</span>' +
                    '</div>' +
                '</div>' +
            '</div>' +

            '<div class="details-section">' +
                '<p style="color: #9ca3af; margin-bottom: 20px;">' + phase.description + '</p>' +
            '</div>' +

            '<div class="details-section">' +
                '<h3 class="section-title">' +
                    '<span>*</span>' +
                    '<span>Actions Performed</span>' +
                '</h3>' +
                '<div class="action-list">' +
                    actionsHtml +
                '</div>' +
            '</div>' +

            codeHtml;

            // Show details panel
            detailsPanel.classList.add('active');

            // Update progress bar
            updateProgressBar(phaseNum);

            // Position toggle button with sidebar
            var toggleBtn = document.getElementById('sidebarToggle');
            if (!sidebarCollapsed) {
                toggleBtn.classList.add('expanded');
            }
        }

        // Close details panel
        function closeDetails() {
            document.getElementById('detailsPanel').classList.remove('active');
            document.querySelectorAll('.component').forEach(function(comp) {
                comp.classList.remove('active');
            });
            document.querySelectorAll('.timeline-item').forEach(function(item) {
                item.classList.remove('active');
            });

            // Reset toggle button position
            var toggleBtn = document.getElementById('sidebarToggle');
            toggleBtn.classList.remove('expanded');
        }

        // Switch view
        function switchView(view) {
            // Update button states
            document.querySelectorAll('.view-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Hide all views
            document.getElementById('attackFlowView').style.display = 'none';
            document.getElementById('timelineView').classList.remove('active');

            // Show selected view
            if (view === 'architecture') {
                document.getElementById('attackFlowView').style.display = 'block';
            } else if (view === 'timeline') {
                document.getElementById('timelineView').classList.add('active');
            }
        }

        // Get severity color
        function getSeverityColor(severity) {
            switch(severity) {
                case 'critical': return '#ff4444';
                case 'high': return '#ff9f43';
                case 'medium': return '#ffc107';
                case 'low': return '#66bb6a';
                case 'info': return '#4fc3f7';
                default: return '#9ca3af';
            }
        }

        // Update progress bar
        function updateProgressBar(phaseNum) {
            var progressBar = document.getElementById('progressBar');
            var width = ((phaseNum + 1) / 5) * 1120;
            progressBar.style.width = width + 'px';
            progressBar.style.transition = 'width 0.5s ease';
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            initializeTimeline();

            // Sidebar starts expanded - show phase 0 details
            sidebarCollapsed = false;
            setTimeout(function() {
                showPhaseDetails(0);
            }, 500);
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (currentPhase !== null) {
                if (e.key === 'ArrowRight' && currentPhase < 4) {
                    showPhaseDetails(currentPhase + 1);
                } else if (e.key === 'ArrowLeft' && currentPhase > 0) {
                    showPhaseDetails(currentPhase - 1);
                } else if (e.key === 'Escape') {
                    closeDetails();
                }
            }
        });
    </script>
