# ============================================================================
# OUTPUTS CONFIGURATION
# ============================================================================
# Configure outputs for sending detections to external SIEM or storage

outputs:
  timeout-evasion-detections:
    module: syslog
    for: detections
    host: siem.example.com
    port: 514

  # Alternative: Send to S3 for analysis
  # timeout-evasion-s3:
