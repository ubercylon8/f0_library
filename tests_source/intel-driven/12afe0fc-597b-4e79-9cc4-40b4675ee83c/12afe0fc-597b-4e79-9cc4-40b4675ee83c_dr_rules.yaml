# ============================================================================
# DEFENSE GUIDANCE: LimaCharlie Detection & Response Rules
# ============================================================================
# Test ID: 12afe0fc-597b-4e79-9cc4-40b4675ee83c
# Test Name: LimaCharlie Timeout Validation Harness
# MITRE ATT&CK: T1497.001 - Virtualization/Sandbox Evasion: System Checks
# Created: 2025-12-07
# Author: F0RT1KA Defense Guidance Builder
# Format: LimaCharlie file format (for limacharlie dr add)
# ============================================================================
#
# DETECTION PRINCIPLE:
# These D&R rules detect long-running processes and timeout evasion patterns
# commonly used by malware for sandbox evasion. While this specific test is
# a utility, the detection patterns apply to real-world timing-based evasion.
#
# DEPLOYMENT:
#   limacharlie dr add -f 12afe0fc-597b-4e79-9cc4-40b4675ee83c_dr_rules.yaml
#
# ============================================================================

rules:

  # ==========================================================================
  # RULE 1: F0RT1KA Timeout Validation Harness Execution
  # Purpose: Detect execution of the specific timeout validation test
  # Confidence: HIGH
  # ==========================================================================
  timeout-validation-harness-execution:
    detect:
      target: edr
      event: NEW_PROCESS
      op: or
      rules:
        # Match test UUID in file path
        - op: contains
          path: event/FILE_PATH
          value: "12afe0fc"
        # Match stage binary names
        - op: matches
          path: event/FILE_PATH
          re: (?i)stage-T1497\.001-\d\.exe$
        # Match command line with test UUID
        - op: contains
          path: event/COMMAND_LINE
          value: "12afe0fc-597b-4e79-9cc4-40b4675ee83c"

    respond:
      - action: report
        name: F0RT1KA Timeout Validation Harness Detected
        metadata:
          severity: informational
          mitre_attack: T1497.001
          confidence: high
          test_id: 12afe0fc-597b-4e79-9cc4-40b4675ee83c
          description: LimaCharlie Timeout Validation Harness test is executing
          investigation: This is a utility test - verify it was scheduled


  # ==========================================================================
  # RULE 2: Suspicious Directory Executable File Activity
  # Purpose: Detect executable file creation in user-writable directories
  # Confidence: MEDIUM-HIGH
  # ==========================================================================
  suspicious-directory-file-activity:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        # Match user-writable directories commonly abused by attackers
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "\\Temp\\"
            - op: contains
              path: event/FILE_PATH
              value: "\\AppData\\Local\\Temp\\"
            - op: contains
              path: event/FILE_PATH
              value: "\\AppData\\Roaming\\"
            - op: contains
              path: event/FILE_PATH
              value: "\\Downloads\\"
            - op: contains
              path: event/FILE_PATH
              value: "\\ProgramData\\"
        # Focus on executable files
        - op: or
          rules:
            - op: ends with
              path: event/FILE_PATH
              value: ".exe"
            - op: ends with
              path: event/FILE_PATH
              value: ".dll"
            - op: ends with
              path: event/FILE_PATH
              value: ".ps1"
            - op: ends with
              path: event/FILE_PATH
              value: ".bat"

    respond:
      - action: report
        name: Suspicious Executable in User-Writable Directory
        metadata:
          severity: medium
          mitre_attack: T1497.001
          confidence: medium-high
          description: Executable file created in user-writable directory (%TEMP%, %APPDATA%, Downloads)
          investigation: Check if this is legitimate software installation or malicious activity


  # ==========================================================================
  # RULE 3: Stage Binary Execution Pattern
  # Purpose: Detect execution of binaries with stage/phase naming
  # Confidence: MEDIUM
  # ==========================================================================
  stage-binary-execution-pattern:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        # Match stage naming patterns
        - op: or
          rules:
            - op: matches
              path: event/FILE_PATH
              re: (?i)stage[-_]\d+
            - op: matches
              path: event/FILE_PATH
              re: (?i)phase[-_]\d+
            - op: matches
              path: event/FILE_PATH
              re: (?i)step[-_]\d+
            # MITRE technique patterns
            - op: matches
              path: event/FILE_PATH
              re: (?i)T\d{4}\.\d{3}
        # Exclude known legitimate locations
        - op: starts with
          path: event/FILE_PATH
          value: "C:\\Windows\\System32\\"
          not: true

    respond:
      - action: report
        name: Staged Binary Execution Detected
        metadata:
          severity: medium
          mitre_attack: T1497.001
          confidence: medium
          description: Binary with stage/phase naming pattern executed
          investigation: Check parent process and execution context


  # ==========================================================================
  # RULE 4: Sequential Child Process Spawning from Suspicious Location
  # Purpose: Detect parent processes spawning multiple children sequentially
  # Confidence: MEDIUM
  # Note: This is a simplified rule - full detection requires event correlation
  # ==========================================================================
  sequential-child-process-spawning:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        # Process from suspicious user-writable directory
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "\\Temp\\"
            - op: contains
              path: event/FILE_PATH
              value: "\\AppData\\"
            - op: contains
              path: event/FILE_PATH
              value: "\\Downloads\\"
        # Has parent process info
        - op: exists
          path: routing/parent

    respond:
      - action: report
        name: Child Process Spawned from Suspicious Location
        metadata:
          severity: low
          mitre_attack: T1497.001
          confidence: medium
          description: Child process spawned from user-writable directory
          investigation: Correlate with other child processes from same parent

      # Track for correlation
      - action: task
        command: history_dump
        investigation: Suspicious-Sequential-Child-Process


  # ==========================================================================
  # RULE 5: Long Running Process from Suspicious Location
  # Purpose: Detect processes running from temp/download locations
  # Confidence: MEDIUM
  # Note: Duration-based detection requires stateful correlation
  # ==========================================================================
  suspicious-location-process:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        # From suspicious user-writable locations
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "\\Temp\\"
            - op: contains
              path: event/FILE_PATH
              value: "\\Downloads\\"
            - op: contains
              path: event/FILE_PATH
              value: "\\AppData\\Local\\Temp\\"
            - op: contains
              path: event/FILE_PATH
              value: "\\AppData\\Roaming\\"
            - op: contains
              path: event/FILE_PATH
              value: "\\ProgramData\\"
        # Exclude known legitimate processes
        - op: is
          path: event/FILE_PATH
          value: "C:\\Windows\\Temp\\mpam-"
          not: true

    respond:
      - action: report
        name: Process from Suspicious Location
        metadata:
          severity: low
          mitre_attack: T1497.001
          confidence: medium
          description: Process executed from user-writable temp/download location
          investigation: Check process duration and behavior


  # ==========================================================================
  # RULE 6: Go Binary Execution from Non-Standard Path
  # Purpose: Detect Go-compiled binaries from suspicious locations
  # Confidence: LOW-MEDIUM
  # ==========================================================================
  go-binary-suspicious-path:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        # Go binary indicators in command line
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: "runtime."
            - op: contains
              path: event/COMMAND_LINE
              value: "time.Sleep"
            # Common Go binary characteristics
            - op: matches
              path: event/FILE_PATH
              re: (?i)\.exe$
        # From non-standard location
        - op: starts with
          path: event/FILE_PATH
          value: "C:\\Program Files"
          not: true
        - op: starts with
          path: event/FILE_PATH
          value: "C:\\Windows\\"
          not: true

    respond:
      - action: report
        name: Potential Go Binary from Non-Standard Location
        metadata:
          severity: low
          mitre_attack: T1497.001
          confidence: low
          description: Potential Go binary executed from non-standard path


  # ==========================================================================
  # RULE 7: Process Exit Code Monitoring from Suspicious Location
  # Purpose: Detect processes with specific exit codes from user-writable dirs
  # Confidence: MEDIUM
  # Note: Requires RECEIPT events with exit code telemetry
  # ==========================================================================
  suspicious-exit-code-detection:
    detect:
      target: edr
      event: RECEIPT
      op: and
      rules:
        # Specific exit codes that may indicate security tool behavior
        - op: or
          rules:
            - op: is
              path: event/ERROR
              value: 101  # Common test exit code
            - op: is
              path: event/ERROR
              value: 105  # Quarantine indicator
            - op: is
              path: event/ERROR
              value: 126  # Execution prevented
            - op: is
              path: event/ERROR
              value: 999  # Error indicator
        # From suspicious user-writable locations
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "\\Temp\\"
            - op: contains
              path: event/FILE_PATH
              value: "\\AppData\\"
            - op: contains
              path: event/FILE_PATH
              value: "\\Downloads\\"

    respond:
      - action: report
        name: Process Exit Code from Suspicious Location
        metadata:
          severity: informational
          mitre_attack: T1497.001
          confidence: medium
          description: Process completed with notable exit code from user-writable directory


  # ==========================================================================
  # RULE 8: Suspicious Log File Creation in User-Writable Directory
  # Purpose: Detect JSON log file creation in suspicious locations
  # Confidence: MEDIUM
  # ==========================================================================
  suspicious-log-file-creation:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        # JSON log filename patterns
        - op: or
          rules:
            - op: ends with
              path: event/FILE_PATH
              value: "_execution_log.json"
            - op: matches
              path: event/FILE_PATH
              re: (?i)_log\.json$
        # In suspicious user-writable directory
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "\\Temp\\"
            - op: contains
              path: event/FILE_PATH
              value: "\\AppData\\"
            - op: contains
              path: event/FILE_PATH
              value: "\\Downloads\\"

    respond:
      - action: report
        name: Suspicious Log File Created
        metadata:
          severity: informational
          mitre_attack: T1497.001
          confidence: medium
          description: Execution log file created in user-writable directory


  # ==========================================================================
  # RULE 9: Multi-Indicator Correlation
  # Purpose: High confidence detection combining multiple signals
  # Confidence: HIGH
  # Note: This serves as a template - implement via investigation tagging
  # ==========================================================================
  # Multi-indicator rules in LimaCharlie typically use:
  # 1. Investigation tagging across multiple rules
  # 2. External SIEM correlation via outputs
  # 3. Lookup tables for stateful tracking

  timeout-multi-indicator-alert:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        # Suspicious user-writable directory activity
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "\\Temp\\"
            - op: contains
              path: event/FILE_PATH
              value: "\\AppData\\"
            - op: contains
              path: event/FILE_PATH
              value: "\\Downloads\\"
        # Stage pattern in name
        - op: matches
          path: event/FILE_PATH
          re: (?i)stage.*\.exe$

    respond:
      - action: report
        name: Multi-Indicator Timeout Evasion Pattern
        metadata:
          severity: high
          mitre_attack: T1497.001
          confidence: high
          description: Multiple indicators of timeout/sandbox evasion detected from user-writable directory

      - action: task
        command: history_dump
        investigation: Timeout-Evasion-Multi-Indicator


  # ==========================================================================
  # RULE 10: Process Duration Anomaly (Placeholder)
  # Purpose: Detect abnormally long process execution times
  # Confidence: MEDIUM
  # Note: Requires external time-based correlation or lookup tables
  # ==========================================================================
  # Placeholder for duration-based detection
  # In LimaCharlie, implement using:
  # 1. Lookup tables to track process start times
  # 2. External SIEM correlation for duration analysis
  # 3. Custom response actions with time calculations

  # Example structure (requires customization for your environment):
