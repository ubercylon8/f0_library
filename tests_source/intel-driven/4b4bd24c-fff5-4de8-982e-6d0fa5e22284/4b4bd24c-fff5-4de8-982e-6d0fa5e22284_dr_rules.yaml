  # ============================================================
  # Detection Rule: Process Masquerading - conhost.exe
  # Test ID: 4b4bd24c-fff5-4de8-982e-6d0fa5e22284
  # MITRE ATT&CK: T1055, T1036.005
  # Confidence: Critical
  # Description: Detects conhost.exe executing from non-standard locations
  # ============================================================
  f0rtika-conhost-masquerade:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: conhost.exe
          case sensitive: false
        - op: not
          rule:
            op: starts with
            path: event/FILE_PATH
            value: C:\\Windows\\System32
            case sensitive: false

    respond:
      - action: report
        name: F0RT1KA-ConhostMasquerade
        metadata:
          test_id: 4b4bd24c-fff5-4de8-982e-6d0fa5e22284
          mitre_attack: T1055,T1036.005
          confidence: critical
          severity: critical
          description: conhost.exe executing from non-standard location indicates process masquerading

