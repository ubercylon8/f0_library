rules:
  # ============================================================
  # Detection Rule: Azure Storage Configuration Reconnaissance
  # Test ID: 4b4bd24c-fff5-4de8-982e-6d0fa5e22284
  # MITRE ATT&CK: T1083, T1018
  # Confidence: High
  # Description: Detects PowerShell accessing Azure Storage Explorer
  #              configuration directories for credential discovery
  # ============================================================
  f0rtika-azure-storage-recon:
    detect:
      target: edr
      event: FILE_GET_REP
      op: and
      rules:
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: StorageExplorer
            - op: contains
              path: event/FILE_PATH
              value: Azure Storage Explorer
            - op: contains
              path: event/FILE_PATH
              value: \\.azure\\
            - op: contains
              path: event/FILE_PATH
              value: AzureStorageExplorer
        - op: or
          rules:
            - op: is
              path: event/PROCESS/FILE_PATH
              value: powershell.exe
              case sensitive: false
            - op: is
              path: event/PROCESS/FILE_PATH
              value: pwsh.exe
              case sensitive: false

    respond:
      - action: report
        name: F0RT1KA-AzureStorageRecon
        metadata:
          test_id: 4b4bd24c-fff5-4de8-982e-6d0fa5e22284
          mitre_attack: T1083,T1018
          confidence: high
          severity: high
          description: PowerShell accessing Azure Storage configuration directories

  # ============================================================
  # Detection Rule: Azure CLI Credential Access
  # Test ID: 4b4bd24c-fff5-4de8-982e-6d0fa5e22284
  # MITRE ATT&CK: T1552.001
  # Confidence: High
  # Description: Detects access to Azure CLI credential files
  # ============================================================
  f0rtika-azure-cli-cred-access:
    detect:
      target: edr
      event: FILE_GET_REP
      op: and
      rules:
        - op: contains
          path: event/FILE_PATH
          value: \\.azure\\
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: accessTokens.json
            - op: contains
              path: event/FILE_PATH
              value: azureProfile.json
            - op: contains
              path: event/FILE_PATH
              value: service_principal_entries.json
            - op: contains
              path: event/FILE_PATH
              value: msal_token_cache

    respond:
      - action: report
        name: F0RT1KA-AzureCredentialAccess
        metadata:
          test_id: 4b4bd24c-fff5-4de8-982e-6d0fa5e22284
          mitre_attack: T1552.001
          confidence: high
          severity: critical
          description: Access to Azure CLI credential files detected

