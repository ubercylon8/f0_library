title: Process Masquerading - System Binary Executing from Non-Standard Path
id: d4a5f175-6b04-7c24-e6f8-1a5d2d347e90
status: experimental
description: >
  Detects Windows system binaries (conhost.exe, svchost.exe, lsass.exe,
  explorer.exe) executing from paths outside their expected system directories
  (C:\Windows\System32, C:\Windows\SysWOW64). This is a reliable indicator of
  process masquerading (T1036.005) where adversaries name their malicious
  binaries after legitimate Windows processes to evade detection. conhost.exe
  outside System32 is a particularly high-fidelity indicator as it is almost
  never legitimately relocated.
references:
  - https://attack.mitre.org/techniques/T1036/005/
  - https://attack.mitre.org/techniques/T1055/
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
  - attack.defense_evasion
  - attack.t1036.005
  - attack.t1055
logsource:
  category: process_creation
  product: windows
detection:
  selection_system_binaries:
    Image|endswith:
      - '\conhost.exe'
      - '\svchost.exe'
      - '\lsass.exe'
      - '\csrss.exe'
      - '\wininit.exe'
      - '\services.exe'
  filter_legitimate_paths:
    Image|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
      - 'C:\Windows\WinSxS\'
  condition: selection_system_binaries and not filter_legitimate_paths
falsepositives:
  - Very rare; may occur with certain virtualization or sandboxing environments
  - Some legacy software that bundles renamed system DLLs (investigate immediately)
level: critical

---
title: Ransom Note File Creation
id: e5b6a286-7c15-8d35-f7a9-2b6e3e458f01
status: experimental
description: >
  Detects creation of files whose names match common ransomware ransom note
  naming patterns (DECRYPT, RANSOM, HOW_TO, RESTORE, RECOVER, README, LOCKED,
  INSTRUCTIONS, _readme). Ransom note creation (T1486) is a reliable behavioral
  indicator of ransomware activity because it occurs regardless of the specific
  ransomware family or encryption algorithm used. The detection applies to
  common ransom note file formats: .txt, .html, and .hta.
references:
  - https://attack.mitre.org/techniques/T1486/
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
  - attack.impact
  - attack.t1486
logsource:
  category: file_event
  product: windows
detection:
  selection_ransom_name:
    TargetFilename|contains:
      - 'DECRYPT'
      - 'RANSOM'
      - 'HOW_TO'
      - 'HOW TO'
      - 'RESTORE_FILES'
      - 'RESTORE FILES'
      - 'RECOVER_FILES'
      - 'README_DECRYPT'
      - 'LOCKED'
      - '_readme'
      - 'INSTRUCTIONS'
  selection_ransom_ext:
    TargetFilename|endswith:
      - '.txt'
      - '.html'
      - '.hta'
  condition: selection_ransom_name and selection_ransom_ext
falsepositives:
  - Security research or penetration testing without sufficient labelling
  - Software documentation files that happen to include these keywords
  - IT knowledge base articles about ransomware response stored on endpoints
level: critical

---
title: Mass Encrypted File Extension Creation - Ransomware Behavioral Indicator
id: f6c7b397-8d26-9e46-a8b0-3c7f4f569a12
status: experimental
description: >
  Detects rapid creation of files with extensions commonly appended by
  ransomware during the encryption phase (.encrypted, .enc, .locked, .crypt,
  .crypted). This behavioral pattern (T1486) is a high-fidelity indicator of
  active ransomware encryption regardless of the specific threat actor or
  family. Detection should be tuned to alert when multiple such files appear
  within a short time window from the same process.
references:
  - https://attack.mitre.org/techniques/T1486/
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
  - attack.impact
  - attack.t1486
logsource:
  category: file_event
  product: windows
detection:
  selection_encrypted_ext:
    EventType: FileCreate
    TargetFilename|endswith:
      - '.encrypted'
      - '.enc'
      - '.locked'
      - '.crypt'
      - '.crypted'
      - '.ryk'
      - '.RYK'
      - '.conti'
  filter_legitimate:
    Image|startswith:
      - 'C:\Program Files\GNU\GnuPG'
      - 'C:\Program Files\7-Zip'
  condition: selection_encrypted_ext and not filter_legitimate
falsepositives:
  - GNU PnuPG or 7-Zip encrypting files with user-selected .enc output names
  - Backup software that creates encrypted archive segments
  - Development/testing of encryption utilities
level: high
