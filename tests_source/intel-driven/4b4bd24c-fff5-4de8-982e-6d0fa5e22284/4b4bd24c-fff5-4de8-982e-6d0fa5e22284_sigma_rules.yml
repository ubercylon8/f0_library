title: PowerShell Data Compression for Exfiltration Staging
id: c9d3e064-5a93-6b13-d5e7-0f4c1c236d89
status: experimental
description: >
  Detects PowerShell Compress-Archive cmdlet usage that targets high-value
  file extensions or staging directories. Attackers use PowerShell's built-in
  compression to reduce exfiltration footprint and package data before
  transmission to cloud storage (T1560.001, T1020). The detection focuses on
  archive creation in user-writable paths combined with sensitive extension
  patterns or explicit staging directory references.
references:
  - https://attack.mitre.org/techniques/T1560/001/
  - https://attack.mitre.org/techniques/T1020/
  - https://attack.mitre.org/techniques/T1074/001/
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
  - attack.collection
  - attack.exfiltration
  - attack.t1560.001
  - attack.t1020
  - attack.t1074.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_process:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_compress:
    CommandLine|contains:
      - 'Compress-Archive'
  selection_high_value:
    CommandLine|contains:
      - '.pdf'
      - '.docx'
      - '.xlsx'
      - '.p12'
      - '.pfx'
      - '.pem'
      - '.key'
      - '.sql'
      - '.json'
      - '.csv'
      - 'staging'
      - 'exfil'
  condition: selection_process and selection_compress and selection_high_value
falsepositives:
  - Legitimate backup scripts using PowerShell Compress-Archive
  - Developer workflows archiving build artifacts
  - IT operations compressing log files for storage
  - Software deployment packaging scripts
level: high

