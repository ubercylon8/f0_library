title: Recursive High-Value File Enumeration for Data Exfiltration
id: b7e2d953-4f81-5a02-c4d6-9e3f0b125c78
status: experimental
description: >
  Detects PowerShell executing recursive file enumeration across user-profile
  directories (Documents, Desktop, Downloads, AppData, ProgramData) targeting
  high-value file types. This is a characteristic behavior of automated data
  staging operations prior to exfiltration (T1083, T1074.001). The combination
  of recursive enumeration with sensitive extension filters (*.pdf, *.docx,
  *.pfx, *.pem, *.sql) across multiple user directories in a short window
  indicates pre-exfiltration reconnaissance.
references:
  - https://attack.mitre.org/techniques/T1083/
  - https://attack.mitre.org/techniques/T1074/001/
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
  - attack.discovery
  - attack.collection
  - attack.t1083
  - attack.t1074.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_process:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_gci:
    CommandLine|contains:
      - 'Get-ChildItem'
  selection_recurse:
    CommandLine|contains:
      - '-Recurse'
  selection_targets:
    CommandLine|contains:
      - 'Documents'
      - 'Desktop'
      - 'Downloads'
      - 'AppData'
      - 'ProgramData'
  selection_sensitive_ext:
    CommandLine|contains:
      - '.pdf'
      - '.docx'
      - '.xlsx'
      - '.p12'
      - '.pfx'
      - '.pem'
      - '.sql'
      - '.accdb'
  condition: selection_process and selection_gci and selection_recurse and (selection_targets or selection_sensitive_ext)
falsepositives:
  - Legitimate IT administration and backup scripts performing file inventory
  - Software installers scanning for existing documents
  - Antivirus or DLP agents performing scheduled file scans
  - Developer tooling performing project-wide searches
level: medium

