---
title: Azure Storage Explorer Configuration Reconnaissance via PowerShell
id: a3f1c820-7d42-4e91-b3c5-8f2d9e014b67
status: experimental
description: >
  Detects PowerShell accessing Azure Storage Explorer configuration directories,
  Azure CLI credential files, or Azure-related registry keys. This pattern is
  consistent with cloud credential reconnaissance performed before data
  exfiltration operations (T1083, T1552.001). Attackers target Azure CLI
  accessTokens.json, azureProfile.json, and StorageExplorer configuration to
  obtain cloud access credentials.
references:
  - https://attack.mitre.org/techniques/T1083/
  - https://attack.mitre.org/techniques/T1552/001/
  - https://attack.mitre.org/techniques/T1018/
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
  - attack.discovery
  - attack.credential_access
  - attack.t1083
  - attack.t1552.001
  - attack.t1018
logsource:
  category: file_event
  product: windows
detection:
  selection_process:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_paths:
    TargetFilename|contains:
      - 'StorageExplorer'
      - 'Azure Storage Explorer'
      - '\.azure\'
      - 'AzureStorageExplorer'
      - 'accessTokens.json'
      - 'azureProfile.json'
      - 'service_principal_entries.json'
      - 'msal_http_cache'
      - 'msal_token_cache.json'
  condition: selection_process and selection_paths
falsepositives:
  - Legitimate Azure CLI operations (az.exe, azurecli)
  - Azure Storage Explorer application reading its own configuration
  - DevOps CI/CD pipelines using Azure CLI credentials
  - IDE plugins (VS Code Azure extension) accessing credential files
level: high

