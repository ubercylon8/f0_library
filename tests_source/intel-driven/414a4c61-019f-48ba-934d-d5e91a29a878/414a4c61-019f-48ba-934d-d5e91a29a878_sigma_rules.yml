---
title: Hidden PowerShell Window with Web Download Cradle
id: 414a4c61-sigma-001
status: stable
description: |
  Detects PowerShell execution with hidden window style combined with web
  download cmdlets (Invoke-WebRequest, iwr, Net.WebClient). UNK_RobotDreams
  uses this pattern to stage the Rust backdoor binary via Azure Front Door.
  This behavior is technique-inherent and detected regardless of the specific
  tool used.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1105/
  - https://gbhackers.com/iran-war-bait/
author: F0RT1KA sectest-builder
date: 2026-03-24
tags:
  - attack.execution
  - attack.t1059.001
  - attack.command-and-control
  - attack.t1105
  - unk-robotdreams
logsource:
  category: process_creation
  product: windows
detection:
  selection_process:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_hidden:
    CommandLine|contains:
      - '-w hidden'
      - '-WindowStyle Hidden'
      - '-windowstyle h'
  selection_download:
    CommandLine|contains:
      - 'Invoke-WebRequest'
      - 'iwr '
      - 'Invoke-RestMethod'
      - 'Net.WebClient'
      - 'DownloadFile'
      - 'DownloadString'
      - 'Start-BitsTransfer'
  condition: selection_process and selection_hidden and selection_download
falsepositives:
  - Legitimate software updaters using hidden PowerShell with web requests
  - SCCM or Intune management scripts
  - Enterprise deployment scripts with silent download patterns
level: high

