# ============================================================
# F0RT1KA LimaCharlie Detection & Response Rules
# Test ID: fec68e9b-af59-40c1-abbd-98ec98428444
# Test Name: MDE Process Injection and API Authentication Bypass
# MITRE ATT&CK: T1055, T1055.001, T1562.001, T1014, T1557, T1071.001, T1140
# Generated: 2025-12-07
# Format: LimaCharlie IAC file format (for limacharlie dr add)
# ============================================================

rules:
  # ============================================================
  # RULE 1: MDE Process Handle Acquisition Attempt
  # Confidence: Critical
  # MITRE ATT&CK: T1055 (Process Injection)
  # Description: Detects attempts to open handles to MDE processes
  # ============================================================
  f0rtika-mde-handle-acquisition:
    detect:
      target: edr
      event: SENSITIVE_PROCESS_ACCESS
      op: and
      rules:
        - op: contains
          path: event/TARGET/FILE_PATH
          value: MsSense.exe
        - op: is not
          path: event/FILE_PATH
          value: MsSense.exe
        - op: is not
          path: event/FILE_PATH
          value: services.exe

    respond:
      - action: report
        name: f0rtika-mde-handle-acquisition
        metadata:
          test_id: fec68e9b-af59-40c1-abbd-98ec98428444
          mitre_attack: T1055
          severity: critical
          description: Process attempted to acquire handle to MDE agent

      - action: task
        command: >-
          log_event --category=f0rtika --data='{"type":"mde_handle_acquisition","severity":"critical"}'

  # ============================================================
  # RULE 2: File Drop to C:\F0 Directory
  # Confidence: High
  # MITRE ATT&CK: T1105 (Ingress Tool Transfer)
  # Description: Detects file creation in F0RT1KA test directory
  # ============================================================
  f0rtika-file-drop-f0:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        - op: starts with
          path: event/FILE_PATH
          value: 'c:\F0'
        - op: ends with
          path: event/FILE_PATH
          value: .exe

    respond:
      - action: report
        name: f0rtika-file-drop-f0
        metadata:
          test_id: fec68e9b-af59-40c1-abbd-98ec98428444
          mitre_attack: T1105
          severity: high
          description: Executable file dropped to F0RT1KA test directory

  # ============================================================
  # RULE 3: MDE Watchdog Process Creation
  # Confidence: High
  # MITRE ATT&CK: T1055 (Process Injection)
  # Description: Detects mde_process_watchdog.exe spawning
  # ============================================================
  f0rtika-mde-watchdog-spawn:
    detect:
      target: edr
      event: NEW_PROCESS
      op: or
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: mde_process_watchdog.exe
        - op: and
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: watchdog
            - op: contains
              path: event/COMMAND_LINE
              value: '--timeout'

    respond:
      - action: report
        name: f0rtika-mde-watchdog-spawn
        metadata:
          test_id: fec68e9b-af59-40c1-abbd-98ec98428444
          mitre_attack: T1055
          severity: high
          description: MDE watchdog/guardian process detected

      - action: task
        command: history_dump --is_include_all true

  # ============================================================
  # RULE 4: Network Connection to MDE Endpoints from Non-MDE Process
  # Confidence: High
  # MITRE ATT&CK: T1071.001, T1557 (Web Protocols, AITM)
  # Description: Detects unauthorized connections to MDE cloud endpoints
  # ============================================================
  f0rtika-unauthorized-mde-network:
    detect:
      target: edr
      event: NEW_TCP4_CONNECTION
      op: and
      rules:
        - op: contains
          path: event/DOMAIN
          value: winatp-gw
        - op: is not
          path: event/FILE_PATH
          value: MsSense.exe
        - op: is not
          path: event/FILE_PATH
          value: SenseIR.exe
        - op: is not
          path: event/FILE_PATH
          value: SenseCncProxy.exe

    respond:
      - action: report
        name: f0rtika-unauthorized-mde-network
        metadata:
          test_id: fec68e9b-af59-40c1-abbd-98ec98428444
          mitre_attack: T1071.001,T1557
          severity: high
          description: Non-MDE process connecting to MDE cloud endpoints

  # ============================================================
  # RULE 5: DNS Query for MDE Endpoints
  # Confidence: Medium
  # MITRE ATT&CK: T1071.001 (Web Protocols)
  # Description: Detects DNS lookups for MDE infrastructure
  # ============================================================
  f0rtika-mde-dns-lookup:
    detect:
      target: edr
      event: DNS_REQUEST
      op: and
      rules:
        - op: contains
          path: event/DOMAIN_NAME
          value: winatp-gw
        - op: is not
          path: event/FILE_PATH
          value: MsSense.exe
        - op: is not
          path: event/FILE_PATH
          value: SenseIR.exe

    respond:
      - action: report
        name: f0rtika-mde-dns-lookup
        metadata:
          test_id: fec68e9b-af59-40c1-abbd-98ec98428444
          mitre_attack: T1071.001
          severity: medium
          description: DNS lookup for MDE endpoints from non-MDE process

  # ============================================================
  # RULE 6: Proxy Configuration via netsh
  # Confidence: Medium
  # MITRE ATT&CK: T1557, T1090 (AITM, Proxy)
  # Description: Detects netsh winhttp proxy configuration changes
  # ============================================================
  f0rtika-proxy-configuration:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: contains
          path: event/COMMAND_LINE
          value: netsh
        - op: contains
          path: event/COMMAND_LINE
          value: winhttp
        - op: contains
          path: event/COMMAND_LINE
          value: proxy

    respond:
      - action: report
        name: f0rtika-proxy-configuration
        metadata:
          test_id: fec68e9b-af59-40c1-abbd-98ec98428444
          mitre_attack: T1557,T1090
          severity: medium
          description: Network proxy configuration change detected

  # ============================================================
  # RULE 7: Emergency Restore Script Execution
  # Confidence: High
  # MITRE ATT&CK: T1059.001 (PowerShell)
  # Description: Detects emergency_restore.ps1 execution
  # ============================================================
  f0rtika-emergency-restore:
    detect:
      target: edr
      event: NEW_PROCESS
      op: or
      rules:
        - op: contains
          path: event/COMMAND_LINE
          value: emergency_restore.ps1
        - op: and
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: powershell
            - op: contains
              path: event/COMMAND_LINE
              value: restore
            - op: contains
              path: event/COMMAND_LINE
              value: MsSense

    respond:
      - action: report
        name: f0rtika-emergency-restore
        metadata:
          test_id: fec68e9b-af59-40c1-abbd-98ec98428444
          mitre_attack: T1059.001
          severity: high
          description: MDE memory restoration script executed

  # ============================================================
  # RULE 8: Registry Access to MDE Configuration Keys
  # Confidence: Medium
  # MITRE ATT&CK: T1552.002, T1012 (Credentials in Registry)
  # Description: Detects access to Windows Advanced Threat Protection registry keys
  # ============================================================
  f0rtika-mde-registry-access:
    detect:
      target: edr
      event: REGISTRY_VALUE_SET
      op: or
      rules:
        - op: contains
          path: event/REGISTRY_KEY
          value: Windows Advanced Threat Protection
        - op: contains
          path: event/REGISTRY_KEY
          value: 'Microsoft\Sense'

    respond:
      - action: report
        name: f0rtika-mde-registry-access
        metadata:
          test_id: fec68e9b-af59-40c1-abbd-98ec98428444
          mitre_attack: T1552.002,T1012
          severity: medium
          description: Access to MDE registry configuration detected

  # ============================================================
  # RULE 9: Process Enumeration of Security Processes
  # Confidence: Medium
  # MITRE ATT&CK: T1057 (Process Discovery)
  # Description: Detects enumeration of MDE and security processes
  # ============================================================
  f0rtika-security-process-enumeration:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: MsSense
            - op: contains
              path: event/COMMAND_LINE
              value: SenseIR
            - op: contains
              path: event/COMMAND_LINE
              value: MsMpEng
        - op: is not
          path: event/FILE_PATH
          value: MsSense.exe
        - op: is not
          path: event/FILE_PATH
          value: taskmgr.exe

    respond:
      - action: report
        name: f0rtika-security-process-enumeration
        metadata:
          test_id: fec68e9b-af59-40c1-abbd-98ec98428444
          mitre_attack: T1057
          severity: medium
          description: Enumeration of security processes detected

  # ============================================================
  # RULE 10: F0RT1KA Test Binary Execution
  # Confidence: High
  # MITRE ATT&CK: T1055, T1562.001 (Process Injection, Impair Defenses)
  # Description: Detects execution of the main F0RT1KA test binary
  # ============================================================
  f0rtika-test-execution:
    detect:
      target: edr
      event: NEW_PROCESS
      op: or
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: fec68e9b-af59-40c1-abbd-98ec98428444.exe
        - op: and
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: fec68e9b-af59-40c1-abbd-98ec98428444

    respond:
      - action: report
        name: f0rtika-test-execution
        metadata:
          test_id: fec68e9b-af59-40c1-abbd-98ec98428444
          mitre_attack: T1055,T1562.001
          severity: high
          description: F0RT1KA MDE injection test binary executed

      - action: task
        command: history_dump --is_include_all true

  # ============================================================
  # RULE 11: Behavioral Chain - MDE Attack Pattern
  # Confidence: Critical
  # MITRE ATT&CK: Multiple (T1055, T1562.001, T1557)
  # Description: Correlates multiple indicators of MDE attack
  # ============================================================
  f0rtika-mde-attack-chain:
    detect:
      target: edr
      event: RECEIPT
      op: and
      rules:
        - op: contains
          path: event/FILE_PATH
          value: 'c:\F0'
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: .exe
            - op: contains
              path: event/FILE_PATH
              value: .json
            - op: contains
              path: event/FILE_PATH
              value: _log

    respond:
      - action: report
        name: f0rtika-mde-attack-chain
        metadata:
          test_id: fec68e9b-af59-40c1-abbd-98ec98428444
          mitre_attack: T1055,T1562.001,T1557
          severity: critical
          description: F0RT1KA test execution artifacts detected

  # ============================================================
  # RULE 12: Memory Injection Report File Creation
  # Confidence: High
  # MITRE ATT&CK: T1055 (Process Injection)
  # Description: Detects creation of injection/patch report files
  # ============================================================
  f0rtika-injection-report:
    detect:
      target: edr
      event: FILE_CREATE
      op: or
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: process_injection_report.json
        - op: ends with
          path: event/FILE_PATH
          value: memory_patch_report.json
        - op: ends with
          path: event/FILE_PATH
          value: api_interception_report.json

    respond:
      - action: report
        name: f0rtika-injection-report
        metadata:
          test_id: fec68e9b-af59-40c1-abbd-98ec98428444
          mitre_attack: T1055
          severity: high
          description: F0RT1KA injection/patch report file created
