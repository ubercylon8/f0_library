<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDE Process Injection & API Authentication Bypass - Attack Flow</title>
    <style>
        /* ═══════════════════════════════════════════════════════════════
           THEME VARIABLES - OKLch color palette matching ProjectAchilles
           Supports: data-theme="light|dark", prefers-color-scheme
           ═══════════════════════════════════════════════════════════════ */
        :root {
            /* Light theme (default) */
            --diagram-bg: oklch(1 0 0);
            --diagram-bg-gradient-start: oklch(0.985 0 0);
            --diagram-bg-gradient-end: oklch(0.922 0 0);
            --diagram-text-primary: oklch(0.145 0 0);
            --diagram-text-secondary: oklch(0.556 0 0);
            --diagram-text-muted: oklch(0.708 0 0);
            --diagram-panel-bg: oklch(1 0 0);
            --diagram-panel-bg-translucent: oklch(0.985 0 0 / 95%);
            --diagram-border: oklch(0.922 0 0);
            --diagram-accent: oklch(0.205 0 0);
            --diagram-card-bg: oklch(0.97 0 0);
            --diagram-card-bg-hover: oklch(0.95 0 0);
            --diagram-overlay-bg: oklch(0 0 0 / 5%);
            --diagram-code-bg: oklch(0.97 0 0);
            --diagram-grid-stroke: oklch(0 0 0 / 3%);
            --diagram-shadow: oklch(0 0 0 / 15%);

            /* Semantic colors (consistent across themes) */
            --severity-critical: #ff4444;
            --severity-critical-bg: rgba(255, 68, 68, 0.1);
            --severity-high: #ff9f43;
            --severity-high-bg: rgba(255, 159, 67, 0.1);
            --severity-medium: #ffc107;
            --severity-medium-bg: rgba(255, 193, 7, 0.1);
            --severity-info: #4fc3f7;
            --severity-info-bg: rgba(79, 195, 247, 0.1);

            /* Accent colors */
            --diagram-accent-red: #ff6b6b;
            --diagram-accent-red-light: #ff8787;
            --diagram-accent-blue: #4fc3f7;
            --diagram-accent-orange: #ff9f43;
            --diagram-accent-yellow: #ffc107;
            --diagram-accent-green: #66bb6a;
            --diagram-accent-purple: #9c27b0;
        }

        /* Dark theme */
        [data-theme="dark"],
        .dark {
            --diagram-bg: oklch(0.145 0 0);
            --diagram-bg-gradient-start: oklch(0.1 0.02 265);
            --diagram-bg-gradient-end: oklch(0.18 0.02 265);
            --diagram-text-primary: oklch(0.985 0 0);
            --diagram-text-secondary: oklch(0.708 0 0);
            --diagram-text-muted: oklch(0.556 0 0);
            --diagram-panel-bg: oklch(0.12 0.01 265);
            --diagram-panel-bg-translucent: oklch(0.12 0.01 265 / 95%);
            --diagram-border: oklch(1 0 0 / 10%);
            --diagram-accent: oklch(0.922 0 0);
            --diagram-card-bg: oklch(0.205 0 0);
            --diagram-card-bg-hover: oklch(0.25 0 0);
            --diagram-overlay-bg: oklch(0 0 0 / 30%);
            --diagram-code-bg: oklch(0.1 0.02 265);
            --diagram-grid-stroke: oklch(1 0 0 / 2%);
            --diagram-shadow: oklch(0 0 0 / 50%);
        }

        /* Fallback for prefers-color-scheme when no data-theme is set */
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme]) {
                --diagram-bg: oklch(0.145 0 0);
                --diagram-bg-gradient-start: oklch(0.1 0.02 265);
                --diagram-bg-gradient-end: oklch(0.18 0.02 265);
                --diagram-text-primary: oklch(0.985 0 0);
                --diagram-text-secondary: oklch(0.708 0 0);
                --diagram-text-muted: oklch(0.556 0 0);
                --diagram-panel-bg: oklch(0.12 0.01 265);
                --diagram-panel-bg-translucent: oklch(0.12 0.01 265 / 95%);
                --diagram-border: oklch(1 0 0 / 10%);
                --diagram-accent: oklch(0.922 0 0);
                --diagram-card-bg: oklch(0.205 0 0);
                --diagram-card-bg-hover: oklch(0.25 0 0);
                --diagram-overlay-bg: oklch(0 0 0 / 30%);
                --diagram-code-bg: oklch(0.1 0.02 265);
                --diagram-grid-stroke: oklch(1 0 0 / 2%);
                --diagram-shadow: oklch(0 0 0 / 50%);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--diagram-bg-gradient-start) 0%, var(--diagram-bg-gradient-end) 100%);
            color: var(--diagram-text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        /* F0RT1KA Header - Hidden when embedded in browser */
        .framework-header {
            display: none;
        }

        .framework-title {
            font-size: 1.2em;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--diagram-accent-red), var(--diagram-accent-red-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .framework-subtitle {
            position: absolute;
            right: 30px;
            font-size: 0.85em;
            color: var(--diagram-text-muted);
            font-style: italic;
        }

        .dashboard-container {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* Left Panel - Attack Flow View */
        .attack-flow-panel {
            flex: 1;
            min-width: 60%;
            padding: 20px;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Test title header - Hidden when embedded in browser */
        .header {
            display: none;
        }

        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, var(--severity-critical), var(--diagram-accent-red-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--diagram-text-secondary);
            font-size: 1em;
        }

        /* View Toggle Buttons */
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .view-btn {
            padding: 8px 20px;
            background: var(--diagram-overlay-bg);
            border: 1px solid var(--diagram-border);
            border-radius: 20px;
            color: var(--diagram-text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .view-btn.active {
            background: rgba(255, 107, 107, 0.1);
            border-color: var(--diagram-accent-red);
            color: var(--diagram-accent-red);
        }

        .view-btn:hover {
            background: var(--diagram-card-bg-hover);
            color: var(--diagram-text-primary);
        }

        /* SVG Attack Flow Container */
        .attack-flow-svg-container {
            background: var(--diagram-overlay-bg);
            border-radius: 12px;
            padding: 10px;
            position: relative;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .attack-flow-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Timeline View (Hidden by default) */
        .timeline-view {
            display: none;
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .timeline-view.active {
            display: block;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 15px;
            background: var(--diagram-overlay-bg);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .timeline-item:hover {
            background: var(--diagram-card-bg-hover);
            transform: translateX(5px);
        }

        .timeline-item.active {
            background: rgba(255, 107, 107, 0.05);
            border-left-color: var(--diagram-accent-red);
        }

        .timeline-number {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            border: 2px solid;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-size: 1.1em;
            color: var(--diagram-text-primary);
            margin-bottom: 5px;
        }

        .timeline-meta {
            font-size: 0.85em;
            color: var(--diagram-text-secondary);
        }

        /* Right Panel - Details (OPAQUE BACKGROUND) */
        .details-panel {
            width: 450px;
            background: var(--diagram-panel-bg);
            border-left: 1px solid var(--diagram-border);
            padding: 30px;
            overflow-y: auto;
            position: relative;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -5px 0 20px var(--diagram-shadow);
        }

        .details-panel.active {
            transform: translateX(0);
        }

        .details-header {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--diagram-border);
        }

        .details-phase-number {
            display: inline-block;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            text-align: center;
            line-height: 36px;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
            border: 2px solid;
        }

        .details-title {
            font-size: 1.5em;
            color: var(--diagram-text-primary);
            margin-bottom: 10px;
        }

        .details-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
        }

        .meta-label {
            color: var(--diagram-text-muted);
        }

        .meta-value {
            color: var(--diagram-text-secondary);
            font-family: 'SF Mono', monospace;
        }

        /* MITRE Links Styling */
        .mitre-link {
            color: var(--diagram-accent-blue);
            text-decoration: none;
            border-bottom: 1px dotted var(--diagram-accent-blue);
            transition: all 0.2s ease;
        }

        .mitre-link:hover {
            color: var(--severity-info);
            border-bottom-style: solid;
        }

        .severity-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            border: 1px solid;
        }

        .severity-badge.critical {
            color: var(--severity-critical);
            border-color: var(--severity-critical);
            background: var(--severity-critical-bg);
        }

        .severity-badge.high {
            color: var(--severity-high);
            border-color: var(--severity-high);
            background: var(--severity-high-bg);
        }

        .severity-badge.medium {
            color: var(--severity-medium);
            border-color: var(--severity-medium);
            background: var(--severity-medium-bg);
        }

        .severity-badge.info {
            color: var(--severity-info);
            border-color: var(--severity-info);
            background: var(--severity-info-bg);
        }

        .details-section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.1em;
            color: var(--diagram-accent-red);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-list {
            list-style: none;
        }

        .action-item {
            background: var(--diagram-card-bg);
            border: 1px solid var(--diagram-border);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .action-title {
            font-weight: 500;
            color: var(--diagram-text-primary);
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .action-details {
            list-style: none;
            padding-left: 0;
        }

        .action-details li {
            color: var(--diagram-text-secondary);
            font-size: 0.85em;
            padding: 3px 0;
            padding-left: 15px;
            position: relative;
        }

        .action-details li::before {
            content: '>';
            position: absolute;
            left: 0;
            color: var(--diagram-text-muted);
        }

        /* Code Preview */
        .code-preview {
            background: var(--diagram-code-bg);
            border: 1px solid var(--diagram-border);
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 0.85em;
            overflow-x: auto;
        }

        .code-line {
            color: var(--diagram-accent-green);
            line-height: 1.5;
        }

        .code-comment {
            color: var(--diagram-text-muted);
        }

        .code-highlight {
            color: var(--diagram-accent-orange);
        }

        /* Close button for details panel */
        .close-details {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--diagram-text-muted);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
            display: none;
        }

        .close-details:hover {
            color: var(--diagram-accent-red);
        }

        /* Mobile responsive */
        @media (max-width: 1200px) {
            .details-panel {
                position: absolute;
                right: 0;
                top: 0;
                height: 100%;
                z-index: 100;
            }

            .close-details {
                display: block;
            }

            .framework-subtitle {
                display: none;
            }
        }

        /* Loading animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Interactive component styling */
        .component {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .component:hover .component-box {
            filter: drop-shadow(0 0 15px rgba(255, 107, 107, 0.4));
            stroke-width: 2;
        }

        .component.active .component-box {
            filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.6));
            stroke: #ff6b6b;
            stroke-width: 2;
        }

        /* Pulse animation for active elements */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        /* Navigation hints - Hidden when embedded */
        .nav-hint {
            display: none;
        }

        .nav-hint-icon {
            color: var(--diagram-accent-red);
        }

        /* Sidebar toggle button */
        .sidebar-toggle {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 80px;
            background: var(--diagram-panel-bg-translucent);
            border: 1px solid var(--diagram-border);
            border-right: none;
            border-radius: 8px 0 0 8px;
            color: var(--diagram-accent-red);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 200;
            transition: all 0.3s ease;
        }

        .sidebar-toggle:hover {
            background: rgba(255, 107, 107, 0.2);
            width: 32px;
        }

        .sidebar-toggle .toggle-icon {
            transition: transform 0.3s ease;
        }

        .sidebar-toggle.collapsed .toggle-icon {
            transform: rotate(180deg);
        }

        .sidebar-toggle.expanded {
            right: 450px;
        }

        .details-panel.collapsed {
            transform: translateX(100%) !important;
        }

        /* Stats overlay */
        .stats-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .stat-mini {
            background: var(--diagram-panel-bg-translucent);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .stat-mini-value {
            color: var(--diagram-accent-red);
            font-weight: bold;
        }

        .stat-mini-label {
            color: var(--diagram-text-muted);
            margin-left: 5px;
        }

        /* SVG Text Color Overrides - CSS cascades over inline attributes */
        .attack-flow-svg text {
            fill: var(--diagram-text-primary);
        }

        .attack-flow-svg text.svg-text-secondary,
        .attack-flow-svg .component text:not(:first-of-type) {
            fill: var(--diagram-text-secondary);
        }

        .attack-flow-svg .svg-title-box text:first-of-type {
            fill: var(--diagram-accent-red);
        }

        .attack-flow-svg .svg-timeline text {
            fill: var(--diagram-text-secondary);
        }

        /* Progress bar background */
        .attack-flow-svg .progress-track {
            fill: var(--diagram-overlay-bg);
        }

        /* Central title box */
        .attack-flow-svg .title-box-bg {
            fill: var(--diagram-panel-bg-translucent);
            stroke: rgba(255, 107, 107, 0.3);
        }

        /* Legend box */
        .attack-flow-svg .legend-box {
            fill: var(--diagram-panel-bg-translucent);
            stroke: rgba(255, 107, 107, 0.3);
        }
    </style>
</head>
<body>
    <!-- F0RT1KA Framework Header -->
    <div class="framework-header">
        <div class="framework-title">F0RT1KA Security Testing Framework</div>
        <div class="framework-subtitle">Test Score: 9.7/10</div>
    </div>

    <div class="dashboard-container">
        <!-- Left Panel - Attack Flow View -->
        <div class="attack-flow-panel">
            <div class="header">
                <h1>MDE Process Injection & API Bypass - Attack Flow</h1>
                <p>Click any component to explore the 11-phase attack sequence</p>
            </div>

            <div class="view-toggle">
                <button class="view-btn active" onclick="switchView('architecture')">Attack Flow</button>
                <button class="view-btn" onclick="switchView('timeline')">Timeline View</button>
            </div>

            <!-- Attack Flow View -->
            <div class="attack-flow-svg-container" id="attackFlowView">
                <svg class="attack-flow-svg" viewBox="0 0 1400 750" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Gradient Definitions -->
                        <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff4458;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ff8787;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff9f43;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ffb347;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffc107;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ffcd38;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#9c27b0;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ba68c8;stop-opacity:0.8" />
                        </linearGradient>

                        <!-- Arrow Marker -->
                        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                            <polygon points="0 0, 10 3, 0 6" fill="#ff6b6b" />
                        </marker>

                        <!-- Grid Pattern -->
                        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
                        </pattern>
                    </defs>

                    <!-- Background -->
                    <rect width="1400" height="750" fill="url(#grid)" />

                    <!-- Central Title -->
                    <g class="svg-title-box">
                        <rect class="title-box-bg" x="550" y="20" width="300" height="50" rx="8"/>
                        <text x="700" y="42" text-anchor="middle" font-size="16" font-weight="bold">MDE Attack Flow</text>
                        <text class="svg-text-secondary" x="700" y="60" text-anchor="middle" font-size="11">11 Phases - Click for Details</text>
                    </g>

                    <!-- Detection Legend -->
                    <g transform="translate(40, 25)">
                        <rect class="legend-box" x="0" y="0" width="180" height="100" rx="6"/>
                        <text x="10" y="20" font-size="12" font-weight="bold">Detection Points:</text>
                        <circle cx="20" cy="40" r="5" fill="#ff4444"/>
                        <text class="svg-text-secondary" x="35" y="45" font-size="10">Critical Phase</text>
                        <circle cx="20" cy="60" r="5" fill="#ff9f43"/>
                        <text class="svg-text-secondary" x="35" y="65" font-size="10">High Priority</text>
                        <circle cx="20" cy="80" r="5" fill="#4fc3f7"/>
                        <text class="svg-text-secondary" x="35" y="85" font-size="10">Network/API</text>
                    </g>

                    <!-- ROW 1: Phases 1, 2, 3 (Y=130) -->
                    <!-- Phase 1: Prerequisites -->
                    <g class="component" data-phase="1" onclick="showPhaseDetails(1)">
                        <rect class="component-box" x="50" y="130" width="160" height="85" rx="8"
                              fill="url(#yellowGradient)" stroke="#ffc107" stroke-width="1" opacity="0.2"/>
                        <text x="130" y="160" text-anchor="middle" font-size="13" font-weight="bold">1. Prerequisites</text>
                        <text x="130" y="180" text-anchor="middle" font-size="10">Environment</text>
                        <text x="130" y="195" text-anchor="middle" font-size="10">Validation</text>
                    </g>

                    <!-- Phase 2: Process Discovery -->
                    <g class="component" data-phase="2" onclick="showPhaseDetails(2)">
                        <rect class="component-box" x="250" y="130" width="160" height="85" rx="8"
                              fill="url(#orangeGradient)" stroke="#ff9f43" stroke-width="1" opacity="0.2"/>
                        <text x="330" y="160" text-anchor="middle" font-size="13" font-weight="bold">2. Process Discovery</text>
                        <text x="330" y="180" text-anchor="middle" font-size="10">MsSense.exe</text>
                        <text x="330" y="195" text-anchor="middle" font-size="10">Enumeration</text>
                    </g>

                    <!-- Phase 3: Handle Acquisition -->
                    <g class="component" data-phase="3" onclick="showPhaseDetails(3)">

        // Current active phase
        let currentPhase = null;

        // Sidebar toggle state
        var sidebarCollapsed = false;
        function toggleSidebar() {
            var detailsPanel = document.getElementById('detailsPanel');
            var toggleBtn = document.getElementById('sidebarToggle');

            sidebarCollapsed = !sidebarCollapsed;

            if (sidebarCollapsed) {
                detailsPanel.classList.add('collapsed');
                toggleBtn.classList.remove('expanded');
                toggleBtn.classList.add('collapsed');
            } else {
                detailsPanel.classList.remove('collapsed');
                if (detailsPanel.classList.contains('active')) {
                    toggleBtn.classList.add('expanded');
                }
                toggleBtn.classList.remove('collapsed');
            }
        }

        // Function to create MITRE links
        function createMitreLinks(mitreArray) {
            return mitreArray.map(function(technique) {
                var baseUrl = "https://attack.mitre.org/techniques/";
                var techId = technique.id.replace('.', '/');
                return '<a href="' + baseUrl + techId + '" target="_blank" class="mitre-link" title="' + technique.name + '">' + technique.id + '</a>';
            }).join(', ');
        }

        // Escape HTML for safe display
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize timeline view
        function initializeTimeline() {
            var timelineView = document.getElementById('timelineView');
            var html = '';

            for (var i = 1; i <= 11; i++) {
                var phase = phaseData[i];
                var severityColor = getSeverityColor(phase.severity);
                var mitreText = phase.mitre.map(function(t) { return t.id; }).join(', ');

                html += '<div class="timeline-item" onclick="showPhaseDetails(' + i + ')">' +
                    '<div class="timeline-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' +
                    i +
                    '</div>' +
                    '<div class="timeline-content">' +
                    '<div class="timeline-title">' + escapeHtml(phase.title) + '</div>' +
                    '<div class="timeline-meta">' +
                    escapeHtml(phase.time) + ' | ' + escapeHtml(mitreText) + ' | ' + (phase.status === 'actual' ? 'Actual' : 'Simulated') +
                    '</div>' +
                    '</div>' +
                    '</div>';
            }

            timelineView.innerHTML = html;
        }

        // Show phase details
        function showPhaseDetails(phaseNum) {
            currentPhase = phaseNum;
            var phase = phaseData[phaseNum];
            var detailsPanel = document.getElementById('detailsPanel');
            var detailsContent = document.getElementById('detailsContent');

            // Update active states
            document.querySelectorAll('.component').forEach(function(comp) {
                comp.classList.remove('active');
            });
            document.querySelectorAll('.timeline-item').forEach(function(item) {
                item.classList.remove('active');
            });

            // Add active state to clicked component
            var activeComponent = document.querySelector('.component[data-phase="' + phaseNum + '"]');
            if (activeComponent) {
                activeComponent.classList.add('active');
            }

            // Add active state to timeline item
            var timelineItems = document.querySelectorAll('.timeline-item');
            if (timelineItems[phaseNum - 1]) {
                timelineItems[phaseNum - 1].classList.add('active');
            }

            // Generate details HTML
            var severityColor = getSeverityColor(phase.severity);
            var actionsHtml = '';

            phase.actions.forEach(function(action) {
                var detailsHtml = action.details.map(function(detail) {
                    return '<li>' + escapeHtml(detail) + '</li>';
                }).join('');
                actionsHtml += '<div class="action-item">' +
                    '<div class="action-title">' + escapeHtml(action.title) + '</div>' +
                    '<ul class="action-details">' + detailsHtml + '</ul>' +
                    '</div>';
            });

            var mitreLinks = createMitreLinks(phase.mitre);

            var codeHtml = '';
            if (phase.code) {
                var codeLines = phase.code.split('\n').map(function(line) {
                    if (line.indexOf('//') === 0) {
                        return '<div class="code-line code-comment">' + escapeHtml(line) + '</div>';
                    } else {
                        return '<div class="code-line">' + escapeHtml(line) + '</div>';
                    }
                }).join('');
                codeHtml = '<div class="details-section">' +
                    '<h3 class="section-title"><span>Code Preview</span></h3>' +
                    '<div class="code-preview">' + codeLines + '</div>' +
                    '</div>';
            }

            detailsContent.innerHTML = '<div class="details-header">' +
                '<div class="details-phase-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' +
                phase.number +
                '</div>' +
                '<h2 class="details-title">' + escapeHtml(phase.title) + '</h2>' +
                '<div class="severity-badge ' + phase.severity + '">' + phase.severity.toUpperCase() + '</div>' +
                '<div class="details-meta">' +
                '<div class="meta-item"><span class="meta-label">MITRE:</span><span class="meta-value">' + mitreLinks + '</span></div>' +
                '<div class="meta-item"><span class="meta-label">Time:</span><span class="meta-value">' + escapeHtml(phase.time) + '</span></div>' +
                '<div class="meta-item"><span class="meta-label">Status:</span><span class="meta-value">' + (phase.status === 'actual' ? 'Actual execution' : 'Simulated only') + '</span></div>' +
                '</div>' +
                '</div>' +
                '<div class="details-section"><p style="color: var(--diagram-text-secondary); margin-bottom: 20px;">' + escapeHtml(phase.description) + '</p></div>' +
                '<div class="details-section"><h3 class="section-title"><span>Actions Performed</span></h3><div class="action-list">' + actionsHtml + '</div></div>' +
                codeHtml;

            // Show details panel
            detailsPanel.classList.add('active');

            // Update progress bar
            updateProgressBar(phaseNum);

            // Position toggle button with sidebar
            var toggleBtn = document.getElementById('sidebarToggle');
            if (!sidebarCollapsed) {
                toggleBtn.classList.add('expanded');
            }
        }

        // Close details panel
        function closeDetails() {
            document.getElementById('detailsPanel').classList.remove('active');
            document.querySelectorAll('.component').forEach(function(comp) {
                comp.classList.remove('active');
            });
            document.querySelectorAll('.timeline-item').forEach(function(item) {
                item.classList.remove('active');
            });

            // Reset toggle button position
            var toggleBtn = document.getElementById('sidebarToggle');
            toggleBtn.classList.remove('expanded');
        }

        // Switch view
        function switchView(view) {
            // Update button states
            document.querySelectorAll('.view-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Hide all views
            document.getElementById('attackFlowView').style.display = 'none';
            document.getElementById('timelineView').classList.remove('active');

            // Show selected view
            if (view === 'architecture') {
                document.getElementById('attackFlowView').style.display = 'block';
            } else if (view === 'timeline') {
                document.getElementById('timelineView').classList.add('active');
            }
        }

        // Get severity color
        function getSeverityColor(severity) {
            switch(severity) {
                case 'critical': return '#ff4444';
                case 'high': return '#ff9f43';
                case 'medium': return '#ffc107';
                case 'info': return '#4fc3f7';
                default: return '#9ca3af';
            }
        }

        // Update progress bar
        function updateProgressBar(phaseNum) {
            var progressBar = document.getElementById('progressBar');
            var width = (phaseNum / 11) * 900;
            progressBar.style.width = width + 'px';
            progressBar.style.transition = 'width 0.5s ease';
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            initializeTimeline();

            // Sidebar starts expanded - show phase 1 details
            sidebarCollapsed = false;
            setTimeout(function() {
                showPhaseDetails(1);
            }, 500);
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (currentPhase) {
                if (e.key === 'ArrowRight' && currentPhase < 11) {
                    showPhaseDetails(currentPhase + 1);
                } else if (e.key === 'ArrowLeft' && currentPhase > 1) {
                    showPhaseDetails(currentPhase - 1);
                } else if (e.key === 'Escape') {
                    closeDetails();
                }
            }
        });

        // ═══════════════════════════════════════════════════════════════
        // THEME SYNC - Listen for postMessage from parent window
        // Supports integration with ProjectAchilles iframe embedding
        // ═══════════════════════════════════════════════════════════════
        window.addEventListener('message', function(event) {
            // Handle theme change messages from parent
            if (event.data && event.data.type === 'theme-change') {
                var theme = event.data.theme;
                if (theme === 'light' || theme === 'dark') {
                    document.documentElement.setAttribute('data-theme', theme);
                    // Also set class for compatibility
                    document.documentElement.classList.remove('light', 'dark');
                    document.documentElement.classList.add(theme);
                }
            }
        });

        // Notify parent that diagram is ready to receive theme
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'diagram-ready' }, '*');
        }
    </script>
