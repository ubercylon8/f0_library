# --------------------------------------------------------------------------
# RULE 12: Outbound Connection on Common C2 Ports from Temp Directory
# --------------------------------------------------------------------------
title: Outbound Network Connection on C2 Ports from Temporary Directory
id: 09efee46-sigma-012
status: stable
description: >
  Detects outbound network connections on ports commonly used by C2
  frameworks (8888/mTLS, 31337, 4444, 8443) initiated by processes
  executing from temporary or user-writable directories.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1219/
tags:
  - attack.command_and_control
  - attack.t1219
logsource:
  category: network_connection
  product: windows
detection:
  selection_path:
    Image|contains:
      - '\Temp\'
      - '\AppData\'
      - '\Downloads\'
      - '\Public\'
  selection_port:
    DestinationPort:
      - 8888
      - 31337
      - 4444
      - 5555
      - 9999
      - 8443
  selection_direction:
    Initiated: 'true'
  filter_loopback:
    DestinationIp|startswith:
      - '127.'
      - '::1'
  condition: selection_path and selection_port and selection_direction and not filter_loopback
falsepositives:
  - Development servers using non-standard ports
  - VPN or proxy tools
level: high

---

