# --------------------------------------------------------------------------
# RULE 7: Suspicious Binary Execution from Temp Directory
# --------------------------------------------------------------------------
title: Suspicious Binary Execution from Temporary Directory
id: 09efee46-sigma-007
status: stable
description: >
  Detects execution of binaries from system temporary directories that
  match patterns associated with C2 tools. Attackers commonly drop C2
  implants into temp directories for execution since these paths are
  writable without elevated privileges.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1219/
tags:
  - attack.command_and_control
  - attack.t1219
  - attack.defense_evasion
logsource:
  category: process_creation
  product: windows
detection:
  selection_path:
    Image|contains:
      - '\Temp\'
      - '\AppData\Local\Temp\'
      - '\Downloads\'
      - '\Public\'
  selection_name:
    Image|endswith:
      - 'client.exe'
      - 'agent.exe'
      - 'beacon.exe'
      - 'implant.exe'
      - 'payload.exe'
  filter_legitimate:
    Image|contains:
      - '\chrome_installer'
      - '\Teams'
      - '\OneDrive'
      - '\Dropbox'
  condition: selection_path and selection_name and not filter_legitimate
falsepositives:
  - Legitimate software installers using generic names
  - Developer build outputs in temp directories
level: high

---

# --------------------------------------------------------------------------
# RULE 8: DNS Tunneling - Long Subdomain Queries
# --------------------------------------------------------------------------
title: DNS Tunneling Indicators - Unusually Long Subdomain Labels
id: 09efee46-sigma-008
status: stable
description: >
  Detects DNS queries with unusually long subdomain labels (32+ characters
  of alphanumeric data), which is a hallmark of DNS tunneling. Sliver C2
  supports DNS tunneling via the --dns transport mode, encoding C2 traffic
  within DNS TXT, CNAME, or MX queries.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1219/
  - https://github.com/BishopFox/sliver
tags:
  - attack.command_and_control
  - attack.t1219
logsource:
  category: dns_query
  product: windows
detection:
  selection:
    QueryName|re: '^[a-zA-Z0-9]{32,}\.'
  filter_system:
    Image|endswith:
      - '\svchost.exe'
      - '\MsMpEng.exe'
  condition: selection and not filter_system
falsepositives:
  - CDN requests with hashed subdomains
  - DKIM/DMARC verification queries
  - Some SaaS platforms using long DNS labels
level: high

---

