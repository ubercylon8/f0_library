# --------------------------------------------------------------------------
# RULE 1: Sliver C2 Client Binary Execution
# --------------------------------------------------------------------------
title: Sliver C2 Client Binary Execution
id: 09efee46-sigma-001
status: stable
description: >
  Detects execution of Sliver C2 framework client or implant binaries
  based on known file naming patterns. Sliver is an open-source cross-platform
  adversary emulation framework that is increasingly adopted by threat actors
  as an alternative to Cobalt Strike.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1219/
  - https://github.com/BishopFox/sliver
tags:
  - attack.command_and_control
  - attack.t1219
logsource:
  category: process_creation
  product: windows
detection:
  selection_name:
    Image|endswith:
      - '\sliver_client.exe'
      - '\sliver.exe'
      - '\sliver-client.exe'
      - '\sliver_implant.exe'
      - '\sliver-implant.exe'
      - '\sliver_beacon.exe'
      - '\sliver-beacon.exe'
  selection_cmdline:
    CommandLine|contains:
      - '--mtls'
      - '--wg'
      - '--dns'
      - '--beacon'
      - '--named-pipe'
  condition: selection_name or selection_cmdline
falsepositives:
  - Authorized red team or penetration testing engagements using Sliver
level: critical

---

