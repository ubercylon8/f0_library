# --------------------------------------------------------------------------
# RULE 5: Sliver-Specific Transport Protocol Arguments
# --------------------------------------------------------------------------
title: Sliver C2 Transport Protocol Arguments
id: 09efee46-sigma-005
status: stable
description: >
  Detects processes launched with Sliver-specific transport protocol
  arguments combined with operator/implant configuration flags. These
  argument combinations are highly specific to Sliver and rarely appear
  in legitimate software.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1219/
  - https://github.com/BishopFox/sliver
tags:
  - attack.command_and_control
  - attack.t1219
logsource:
  category: process_creation
  product: windows
detection:
  selection_transport:
    CommandLine|contains:
      - '--mtls'
      - '--named-pipe'
  selection_generate:
    CommandLine|contains:
      - 'generate'
      - '--skip-symbols'
      - '--disable-sgn'
  selection_beacon_config:
    CommandLine|contains|all:
      - '--beacon'
      - '--jitter'
  selection_operator:
    CommandLine|contains|all:
      - '--operator'
      - '--lhost'
  condition: selection_transport or selection_generate or selection_beacon_config or selection_operator
falsepositives:
  - Very low -- these argument combinations are specific to Sliver
level: critical

---

