# --------------------------------------------------------------------------
# RULE 14: File Execution via memfd_create (Linux Anti-Forensics)
# --------------------------------------------------------------------------
title: File Execution via memfd_create - Fileless C2 Implant
id: 09efee46-sigma-014
status: stable
description: >
  Detects execution of binaries via memfd_create, which creates anonymous
  files in memory without touching disk. This technique is used by advanced
  C2 frameworks including Sliver to achieve fileless execution on Linux,
  evading file-based detection.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1219/
  - https://attack.mitre.org/techniques/T1620/
tags:
  - attack.command_and_control
  - attack.t1219
  - attack.defense_evasion
  - attack.t1620
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    Image|contains: '/memfd:'
  condition: selection
falsepositives:
  - Some container runtimes (runc)
  - JIT compilers
level: critical

---

# --------------------------------------------------------------------------
# RULE 15: Suspicious Cron Job or Systemd Service for Persistence
# --------------------------------------------------------------------------
title: Suspicious Cron or Systemd Persistence for C2 Implant
id: 09efee46-sigma-015
status: stable
description: >
  Detects creation of cron jobs or systemd service units that reference
  binaries in temporary or hidden directories, which may indicate C2
  implant persistence on Linux systems. Sliver supports automated
  persistence via cron and systemd.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1219/
  - https://attack.mitre.org/techniques/T1053.003/
tags:
  - attack.command_and_control
  - attack.t1219
  - attack.persistence
  - attack.t1053.003
logsource:
  category: file_event
  product: linux
detection:
  selection_cron:
    TargetFilename|startswith:
      - '/etc/cron.d/'
      - '/var/spool/cron/'
      - '/etc/cron.daily/'
      - '/etc/cron.hourly/'
  selection_systemd:
    TargetFilename|startswith:
      - '/etc/systemd/system/'
      - '/usr/lib/systemd/system/'
  selection_content_indicators:
    TargetFilename|endswith:
      - '.service'
      - '.timer'
  condition: selection_cron or (selection_systemd and selection_content_indicators)
falsepositives:
  - Legitimate system administration
  - Package manager post-install scripts
level: medium
