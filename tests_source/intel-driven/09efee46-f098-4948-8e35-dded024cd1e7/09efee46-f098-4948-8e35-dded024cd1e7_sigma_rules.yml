# --------------------------------------------------------------------------
# RULE 10: Process Injection API Calls from Non-System Binary
# --------------------------------------------------------------------------
title: Process Injection API Calls from Non-System Binary
id: 09efee46-sigma-010
status: stable
description: >
  Detects usage of Windows process injection API calls by binaries located
  outside standard system directories. Sliver implants use process injection
  for migration (MigrateProcess), execute-assembly, and DLL injection
  modules.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1219/
  - https://attack.mitre.org/techniques/T1055/
tags:
  - attack.command_and_control
  - attack.t1219
  - attack.defense_evasion
  - attack.t1055
logsource:
  category: process_access
  product: windows
detection:
  selection:
    CallTrace|contains:
      - 'VirtualAllocEx'
      - 'WriteProcessMemory'
      - 'CreateRemoteThread'
      - 'NtCreateThreadEx'
      - 'RtlCreateUserThread'
      - 'QueueUserAPC'
  filter_system:
    SourceImage|startswith:
      - 'C:\Windows\'
      - 'C:\Program Files\'
      - 'C:\Program Files (x86)\'
  filter_security:
    SourceImage|contains:
      - '\MsMpEng.exe'
      - '\SentinelAgent.exe'
      - '\CrowdStrike\'
  condition: selection and not filter_system and not filter_security
falsepositives:
  - Application compatibility layers
  - Game anti-cheat engines
  - Some legitimate applications using DLL injection
level: high

---

# --------------------------------------------------------------------------
# RULE 11: Go Binary with C2 Network Library Imports
# --------------------------------------------------------------------------
title: Go-Compiled Binary with C2 Characteristics in Image Path
id: 09efee46-sigma-011
status: stable
description: >
  Detects execution of Go-compiled binaries from non-standard locations
  that exhibit C2 tool characteristics. Sliver and many modern C2 frameworks
  are written in Go. This rule looks for Go binaries executing from
  suspicious paths with C2-related naming patterns.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1219/
tags:
  - attack.command_and_control
  - attack.t1219
logsource:
  category: process_creation
  product: windows
detection:
  selection_path:
    Image|contains:
      - '\Temp\'
      - '\AppData\'
      - '\Downloads\'
      - '\Public\'
      - '\ProgramData\'
  selection_cmdline_help:
    CommandLine|contains:
      - '--help'
      - '-h'
      - 'version'
  filter_signed:
    Signed: 'true'
  filter_legitimate:
    Image|contains:
      - '\Go\'
      - '\golang\'
      - '\terraform'
      - '\kubectl'
      - '\docker'
      - '\git'
  condition: selection_path and selection_cmdline_help and not filter_signed and not filter_legitimate
falsepositives:
  - Legitimate unsigned Go applications run from user directories
  - DevOps and infrastructure tools
level: medium

