# --------------------------------------------------------------------------
# RULE 3: C2 Framework Binary Dropped in User-Writable Directory (Windows)
# --------------------------------------------------------------------------
title: C2 Framework Binary Created in User-Writable Directory
id: 09efee46-sigma-003
status: stable
description: >
  Detects creation of executable files with C2 framework naming conventions
  in user-writable directories. Attackers commonly stage C2 implants in Temp,
  AppData, Downloads, Public, or ProgramData before execution.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1219/
tags:
  - attack.command_and_control
  - attack.t1219
logsource:
  category: file_event
  product: windows
detection:
  selection_path:
    TargetFilename|contains:
      - '\Temp\'
      - '\AppData\'
      - '\Downloads\'
      - '\Public\'
      - '\ProgramData\'
  selection_name:
    TargetFilename|contains:
      - 'sliver'
      - 'beacon'
      - 'implant'
      - 'payload'
      - 'cobalt'
      - 'covenant'
      - 'havoc'
      - 'mythic'
      - 'brute_ratel'
      - 'bruteratel'
  selection_ext:
    TargetFilename|endswith:
      - '.exe'
      - '.dll'
      - '.bin'
  condition: selection_path and selection_name and selection_ext
falsepositives:
  - Authorized security testing tools
  - Legitimate software with matching naming patterns
level: high

