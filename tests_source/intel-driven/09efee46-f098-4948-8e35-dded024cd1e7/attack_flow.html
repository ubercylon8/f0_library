<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliver C2 Client Detection - Attack/Test Flow</title>
    <!--
        Source Test: 09efee46-f098-4948-8e35-dded024cd1e7
        Test Name: Sliver C2 Client Detection
        MITRE ATT&CK: T1219 (Remote Access Software)
        Tactic: Command and Control
        Generated for F0RT1KA Security Testing Framework
    -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
        }

        /* F0RT1KA Header - Hidden when embedded in browser */
        .framework-header {
            display: none; /* Redundant - browser header shows F0RT1KA branding */
        }

        .framework-title {
            font-size: 1.2em;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ff6b6b, #ff8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .framework-subtitle {
            position: absolute;
            right: 30px;
            font-size: 0.85em;
            color: #6b7280;
            font-style: italic;
        }

        .dashboard-container {
            display: flex;
            height: 100vh; /* Full height since header is hidden */
            position: relative;
        }

        /* Left Panel - Attack Flow View */
        .attack-flow-panel {
            flex: 1;
            min-width: 60%;
            padding: 20px;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Test title header - Hidden when embedded in browser */
        .header {
            display: none; /* Redundant - browser header shows test name */
        }

        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #ff4458, #ff8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #9ca3af;
            font-size: 1em;
        }

        /* View Toggle Buttons */
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .view-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .view-btn.active {
            background: rgba(255, 107, 107, 0.1);
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .view-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        /* SVG Attack Flow Container */
        .attack-flow-svg-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 10px;
            position: relative;
            flex: 1;
            min-height: 0; /* Allow flex shrinking */
            overflow: hidden;
        }

        .attack-flow-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Timeline View (Hidden by default) */
        .timeline-view {
            display: none;
            padding: 20px;
        }

        .timeline-view.active {
            display: block;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .timeline-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }

        .timeline-item.active {
            background: rgba(255, 107, 107, 0.05);
            border-left-color: #ff6b6b;
        }

        .timeline-number {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            border: 2px solid;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-size: 1.1em;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .timeline-meta {
            font-size: 0.85em;
            color: #9ca3af;
        }

        /* Right Panel - Details (OPAQUE BACKGROUND) */
        .details-panel {
            width: 450px;
            background: #0f1419; /* Solid opaque background */
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            overflow-y: auto;
            position: relative;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.8); /* Add shadow for depth */
        }

        .details-panel.active {
            transform: translateX(0);
        }

        .details-header {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .details-phase-number {
            display: inline-block;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            text-align: center;
            line-height: 36px;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
            border: 2px solid;
        }

        .details-title {
            font-size: 1.5em;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .details-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
        }

        .meta-label {
            color: #6b7280;
        }

        .meta-value {
            color: #d1d5db;
            font-family: 'SF Mono', monospace;
        }

        /* MITRE Links Styling */
        .mitre-link {
            color: #4fc3f7;
            text-decoration: none;
            border-bottom: 1px dotted #4fc3f7;
            transition: all 0.2s ease;
        }

        .mitre-link:hover {
            color: #29b6f6;
            border-bottom-style: solid;
        }

        .severity-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            border: 1px solid;
        }

        .severity-badge.critical {
            color: #ff4444;
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }

        .severity-badge.high {
            color: #ff9f43;
            border-color: #ff9f43;
            background: rgba(255, 159, 67, 0.1);
        }

        .severity-badge.medium {
            color: #ffc107;
            border-color: #ffc107;
            background: rgba(255, 193, 7, 0.1);
        }

        .severity-badge.info {
            color: #4fc3f7;
            border-color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
        }

        .details-section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.1em;
            color: #ff6b6b;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-list {
            list-style: none;
        }

        .action-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .action-title {
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .action-details {
            list-style: none;
            padding-left: 0;
        }

        .action-details li {
            color: #9ca3af;
            font-size: 0.85em;
            padding: 3px 0;
            padding-left: 15px;
            position: relative;
        }

        .action-details li::before {
            content: '>';
            position: absolute;
            left: 0;
            color: #6b7280;
        }

        /* Code Preview */
        .code-preview {
            background: #0a0e27;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 0.85em;
            overflow-x: auto;
        }

        .code-line {
            color: #66bb6a;
            line-height: 1.5;
        }

        .code-comment {
            color: #6b7280;
        }

        .code-highlight {
            color: #ff9f43;
        }

        /* Close button for details panel */
        .close-details {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #6b7280;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
            display: none;
        }

        .close-details:hover {
            color: #ff6b6b;
        }

        /* Mobile responsive */
        @media (max-width: 1200px) {
            .details-panel {
                position: absolute;
                right: 0;
                top: 0;
                height: 100%;
                z-index: 100;
            }

            .close-details {
                display: block;
            }

            .framework-subtitle {
                display: none;
            }
        }

        /* Loading animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Interactive component styling */
        .component {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .component:hover .component-box {
            filter: drop-shadow(0 0 15px rgba(255, 107, 107, 0.4));
            stroke-width: 2;
        }

        .component.active .component-box {
            filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.6));
            stroke: #ff6b6b;
            stroke-width: 2;
        }

        /* Pulse animation for active elements */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        /* Navigation hints - Hidden when embedded */
        .nav-hint {
            display: none; /* Redundant - diagram title says "Click components for details" */
        }

        .nav-hint-icon {
            color: #ff6b6b;
        }

        /* Sidebar toggle button */
        .sidebar-toggle {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 80px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-right: none;
            border-radius: 8px 0 0 8px;
            color: #ff6b6b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 200;
            transition: all 0.3s ease;
        }

        .sidebar-toggle:hover {
            background: rgba(255, 107, 107, 0.2);
            width: 32px;
        }

        .sidebar-toggle .toggle-icon {
            transition: transform 0.3s ease;
        }

        .sidebar-toggle.collapsed .toggle-icon {
            transform: rotate(180deg);
        }

        .sidebar-toggle.expanded {
            right: 450px;
        }

        .details-panel.collapsed {
            transform: translateX(100%) !important;
        }

        /* Stats overlay */
        .stats-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .stat-mini {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .stat-mini-value {
            color: #ff6b6b;
            font-weight: bold;
        }

        .stat-mini-label {
            color: #6b7280;
            margin-left: 5px;
        }

        /* Decision node styling */
        .decision-diamond {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .decision-diamond:hover polygon {
            filter: drop-shadow(0 0 15px rgba(255, 107, 107, 0.4));
        }

        /* Outcome badges */
        .outcome-protected {
            fill: #66bb6a;
        }

        .outcome-unprotected {
            fill: #ff4444;
        }
    </style>
</head>
<body>
    <!-- F0RT1KA Framework Header -->
    <div class="framework-header">
        <div class="framework-title">F0RT1KA Security Testing Framework</div>
        <div class="framework-subtitle">Version 3.0</div>
    </div>

    <div class="dashboard-container">
        <!-- Left Panel - Attack Flow View -->
        <div class="attack-flow-panel">
            <div class="header">
                <h1>Sliver C2 Client Detection - Attack/Test Flow</h1>
                <p>Click any component to explore detailed attack flow</p>
            </div>

            <div class="view-toggle">
                <button class="view-btn active" onclick="switchView('architecture')">Attack Flow</button>
                <button class="view-btn" onclick="switchView('timeline')">Timeline View</button>
            </div>

            <!-- Attack Flow View -->
            <div class="attack-flow-svg-container" id="attackFlowView">
                <svg class="attack-flow-svg" viewBox="0 0 1200 550" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Gradient Definitions -->
                        <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff4458;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ff8787;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff9f43;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ffb347;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffc107;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ffcd38;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#81c784;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ab47bc;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:0.8" />
                        </linearGradient>

                        <!-- Arrow Marker -->
                        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                            <polygon points="0 0, 10 3, 0 6" fill="#ff6b6b" />
                        </marker>

                        <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                            <polygon points="0 0, 10 3, 0 6" fill="#66bb6a" />
                        </marker>

                        <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                            <polygon points="0 0, 10 3, 0 6" fill="#ff9f43" />
                        </marker>

                        <!-- Grid Pattern -->
                        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
                        </pattern>
                    </defs>

                    <!-- Background -->
                    <rect width="1200" height="550" fill="url(#grid)" />

                    <!-- Phase 1: Binary Extraction -->
                    <g class="component" data-phase="1" onclick="showPhaseDetails(1)">
                        <rect class="component-box" x="50" y="200" width="180" height="100" rx="8"
                              fill="url(#yellowGradient)" stroke="#ffc107" stroke-width="1" opacity="0.2"/>
                        <text x="140" y="235" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Binary Extraction</text>
                        <text x="140" y="255" text-anchor="middle" fill="#9ca3af" font-size="11">Drop sliver_client.exe</text>
                        <text x="140" y="275" text-anchor="middle" fill="#9ca3af" font-size="11">to C:\F0</text>
                    </g>

                    <!-- Phase 2: Defensive Reaction Wait -->
                    <g class="component" data-phase="2" onclick="showPhaseDetails(2)">
                        <rect class="component-box" x="290" y="200" width="180" height="100" rx="8"
                              fill="url(#orangeGradient)" stroke="#ff9f43" stroke-width="1" opacity="0.2"/>
                        <text x="380" y="235" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Wait Period</text>
                        <text x="380" y="255" text-anchor="middle" fill="#9ca3af" font-size="11">3 Second Delay</text>
                        <text x="380" y="275" text-anchor="middle" fill="#9ca3af" font-size="11">Defensive Reaction Window</text>
                    </g>

                    <!-- Phase 3: Quarantine Check (Decision) -->
                    <g class="component decision-diamond" data-phase="3" onclick="showPhaseDetails(3)">
                        <polygon class="component-box" points="600,200 680,250 600,300 520,250"
                                 fill="url(#blueGradient)" stroke="#4fc3f7" stroke-width="1" opacity="0.3"/>
                        <text x="600" y="245" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">File</text>
                        <text x="600" y="260" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Quarantined?</text>
                    </g>

                    <!-- Phase 3a: Quarantine Success (Exit 105) -->
                    <g class="component" data-phase="3a" onclick="showPhaseDetails('3a')">
                        <rect class="component-box" x="520" y="350" width="160" height="80" rx="8"
                              fill="url(#greenGradient)" stroke="#66bb6a" stroke-width="1" opacity="0.2"/>
                        <text x="600" y="380" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">PROTECTED</text>
                        <text x="600" y="400" text-anchor="middle" fill="#66bb6a" font-size="11">Exit Code: 105</text>
                        <text x="600" y="415" text-anchor="middle" fill="#9ca3af" font-size="10">File Quarantined</text>
                    </g>

                    <!-- Phase 4: Execution Attempt -->
                    <g class="component" data-phase="4" onclick="showPhaseDetails(4)">
                        <rect class="component-box" x="750" y="200" width="180" height="100" rx="8"
                              fill="url(#redGradient)" stroke="#ff6b6b" stroke-width="1" opacity="0.2"/>
                        <text x="840" y="230" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Execution Attempt</text>
                        <text x="840" y="250" text-anchor="middle" fill="#9ca3af" font-size="11">sliver_client.exe --help</text>
                        <text x="840" y="270" text-anchor="middle" fill="#9ca3af" font-size="11">T1219: Remote Access</text>
                    </g>

                    <!-- Phase 5: Execution Check (Decision) -->
                    <g class="component decision-diamond" data-phase="5" onclick="showPhaseDetails(5)">
                        <polygon class="component-box" points="1040,200 1120,250 1040,300 960,250"
                                 fill="url(#purpleGradient)" stroke="#ab47bc" stroke-width="1" opacity="0.3"/>
                        <text x="1040" y="245" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Execution</text>
                        <text x="1040" y="260" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Blocked?</text>
                    </g>

                    <!-- Phase 5a: Execution Prevented (Exit 126) -->
                    <g class="component" data-phase="5a" onclick="showPhaseDetails('5a')">
                        <rect class="component-box" x="960" y="350" width="160" height="80" rx="8"
                              fill="url(#greenGradient)" stroke="#66bb6a" stroke-width="1" opacity="0.2"/>
                        <text x="1040" y="380" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">PROTECTED</text>
                        <text x="1040" y="400" text-anchor="middle" fill="#66bb6a" font-size="11">Exit Code: 126</text>
                        <text x="1040" y="415" text-anchor="middle" fill="#9ca3af" font-size="10">Execution Prevented</text>
                    </g>

                    <!-- Phase 5b: Execution Succeeded (Exit 101) -->
                    <g class="component" data-phase="5b" onclick="showPhaseDetails('5b')">
                        <rect class="component-box" x="960" y="70" width="160" height="80" rx="8"
                              fill="url(#redGradient)" stroke="#ff4444" stroke-width="2" opacity="0.3"/>
                        <text x="1040" y="100" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">UNPROTECTED</text>
                        <text x="1040" y="120" text-anchor="middle" fill="#ff4444" font-size="11">Exit Code: 101</text>
                        <text x="1040" y="135" text-anchor="middle" fill="#9ca3af" font-size="10">C2 Client Executed</text>
                    </g>

                    <!-- Flow Arrows -->
                    <!-- Phase 1 to Phase 2 -->
                    <path d="M 230 250 L 290 250" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.6"/>

                    <!-- Phase 2 to Phase 3 -->
                    <path d="M 470 250 L 520 250" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.6"/>

                    <!-- Phase 3 to Phase 3a (Yes - Quarantined) -->
                    <path d="M 600 300 L 600 350" stroke="#66bb6a" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead-green)" opacity="0.6"/>
                    <text x="615" y="325" fill="#66bb6a" font-size="10" font-weight="bold">YES</text>

                    <!-- Phase 3 to Phase 4 (No - Not Quarantined) -->
                    <path d="M 680 250 L 750 250" stroke="#ff9f43" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead-orange)" opacity="0.6"/>
                    <text x="710" y="240" fill="#ff9f43" font-size="10" font-weight="bold">NO</text>

                    <!-- Phase 4 to Phase 5 -->
                    <path d="M 930 250 L 960 250" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.6"/>

                    <!-- Phase 5 to Phase 5a (Yes - Blocked) -->
                    <path d="M 1040 300 L 1040 350" stroke="#66bb6a" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead-green)" opacity="0.6"/>
                    <text x="1055" y="325" fill="#66bb6a" font-size="10" font-weight="bold">YES</text>

                    <!-- Phase 5 to Phase 5b (No - Executed) -->
                    <path d="M 1040 200 L 1040 150" stroke="#ff4444" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.6"/>
                    <text x="1055" y="175" fill="#ff4444" font-size="10" font-weight="bold">NO</text>

                    <!-- Central Title -->
                    <rect x="400" y="30" width="400" height="50" rx="8" fill="rgba(0,0,0,0.5)" stroke="rgba(255,107,107,0.3)"/>
                    <text x="600" y="50" text-anchor="middle" fill="#ff6b6b" font-size="16" font-weight="bold">Sliver C2 Client Detection - Attack Flow</text>

                    <!-- Execution Timeline -->
                    <text x="140" y="480" fill="#9ca3af" font-size="10">T+0s</text>
                    <text x="380" y="480" fill="#9ca3af" font-size="10">T+0s</text>
                    <text x="600" y="480" fill="#9ca3af" font-size="10">T+3s</text>

                    <!-- Progress Bar -->

                <div class="stats-overlay">

                <div class="nav-hint">

            </div>

            <!-- Timeline View (Hidden by default) -->
            <div class="timeline-view" id="timelineView">
                <!-- Timeline items will be generated by JavaScript -->
            </div>
        </div>

        <!-- Right Panel - Details (OPAQUE) -->
        <div class="details-panel" id="detailsPanel">
            <button class="close-details" onclick="closeDetails()">x</button>
            <div id="detailsContent">
                <!-- Details will be populated dynamically -->

        </div>

        <!-- Sidebar Toggle Button -->
        <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Toggle details panel">
            <span class="toggle-icon">&lt;</span>
        </button>
    </div>

    <script>
        // Phase data with MITRE links

                ],

                description: "Check if the security solution quarantined the Sliver client binary",

                actions: [
                    {

            4: {

                ],

                description: "Attempt to execute the Sliver C2 client with a help command to test runtime protection",
                actions: [
                    {

                    {

                ],
                code: "command := []string{\n    \".\\\\sliver_client.exe\", \"--help\",\n}\n\n_, err := Endpoint.Shell(command)"
            },
            5: {
                number: 5,
                title: "Execution Result Check",
                severity: "high",
                mitre: [
                    { id: "T1219", name: "Remote Access Software" }
                ],
                status: "actual",
                time: "T+3s+",
                description: "Evaluate whether the execution was blocked or allowed to proceed",
                actions: [
                    {
                        title: "Result Evaluation",
                        details: [

                            "Determine if process was blocked",

                    },
                    {

                        details: [
                            "If error: Exit 126 (ExecutionPrevented)",
                            "If success: Exit 101 (Unprotected)",
                            "Log execution status"
                        ]
                    }
                ],
                code: "err := execute()\nif err != nil {\n    Endpoint.Say(\"Got error when executing Sliver client\")\n    Endpoint.Stop(Endpoint.ExecutionPrevented)\n}\nEndpoint.Stop(Endpoint.Unprotected)"
            },
            "5a": {
                number: "5a",
                title: "Execution Prevented - PROTECTED",
                severity: "info",
                mitre: [
                    { id: "T1219", name: "Remote Access Software" }
                ],
                status: "outcome",
                time: "T+3s+",
                description: "The security solution successfully prevented execution of the Sliver C2 client",
                actions: [
                    {
                        title: "Test Outcome",
                        details: [
                            "Exit Code: 126 (ExecutionPrevented)",

                    },
                    {

                        details: [
                            "Process execution monitoring",
                            "Behavioral blocking active",
                            "Application control effective",
                            "EDR runtime protection working"
                        ]
                    }
                ],
                code: "Endpoint.Say(\"Got error when executing Sliver client\")\nEndpoint.Stop(Endpoint.ExecutionPrevented)\n// Exit code: 126"
            },
            "5b": {
                number: "5b",
                title: "Execution Succeeded - UNPROTECTED",
                severity: "critical",
                mitre: [
                    { id: "T1219", name: "Remote Access Software" }
                ],
                status: "outcome",
                time: "T+3s+",
                description: "The security solution failed to prevent execution of the Sliver C2 client",
                actions: [
                    {
                        title: "Test Outcome",
                        details: [
                            "Exit Code: 101 (Unprotected)",
                            "Endpoint is UNPROTECTED",
                            "C2 tool executed successfully",
                            "Security solution bypassed"
                        ]
                    },
                    {
                        title: "Remediation Required",
                        details: [
                            "Update security signatures",
                            "Enable behavioral detection",
                            "Implement application allowlisting",
                            "Configure EDR for C2 tool blocking"
                        ]
                    }
                ],
                code: "Endpoint.Say(\"Sliver client execution was not prevented\")\nEndpoint.Stop(Endpoint.Unprotected)\n// Exit code: 101"
            }
        };

        // Current active phase
        let currentPhase = null;

        // Sidebar toggle state
        var sidebarCollapsed = false;
        function toggleSidebar() {
            var detailsPanel = document.getElementById('detailsPanel');
            var toggleBtn = document.getElementById('sidebarToggle');

            sidebarCollapsed = !sidebarCollapsed;

            if (sidebarCollapsed) {
                detailsPanel.classList.add('collapsed');
                toggleBtn.classList.remove('expanded');
                toggleBtn.classList.add('collapsed');
            } else {
                detailsPanel.classList.remove('collapsed');
                if (detailsPanel.classList.contains('active')) {
                    toggleBtn.classList.add('expanded');
                }
                toggleBtn.classList.remove('collapsed');
            }
        }

        // Function to create MITRE links
        function createMitreLinks(mitreArray) {
            return mitreArray.map(function(technique) {
                var baseUrl = "https://attack.mitre.org/techniques/";
                var techId = technique.id.replace('.', '/'); // Handle sub-techniques like T1059.001
                return '<a href="' + baseUrl + techId + '" target="_blank" class="mitre-link" title="' + technique.name + '">' + technique.id + '</a>';
            }).join(', ');
        }

        // Initialize timeline view
        function initializeTimeline() {
            var timelineView = document.getElementById('timelineView');
            var html = '';

            var phases = [1, 2, 3, '3a', 4, 5, '5a', '5b'];

            for (var i = 0; i < phases.length; i++) {
                var phaseKey = phases[i];
                var phase = phaseData[phaseKey];
                var severityColor = getSeverityColor(phase.severity);
                var mitreText = phase.mitre.map(function(t) { return t.id; }).join(', ');
                var statusIcon = phase.status === 'actual' ? '> Actual' : (phase.status === 'outcome' ? '* Outcome' : '! Simulated');

                html += '<div class="timeline-item" onclick="showPhaseDetails(\'' + phaseKey + '\')">' +
                        '<div class="timeline-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' +
                        phase.number +
                        '</div>' +
                        '<div class="timeline-content">' +
                        '<div class="timeline-title">' + phase.title + '</div>' +
                        '<div class="timeline-meta">' +
                        phase.time + ' | ' + mitreText + ' | ' + statusIcon +
                        '</div>' +
                        '</div>' +
                        '</div>';
            }

            timelineView.innerHTML = html;
        }

        // Show phase details
        function showPhaseDetails(phaseNum) {
            currentPhase = phaseNum;
            var phase = phaseData[phaseNum];
            var detailsPanel = document.getElementById('detailsPanel');
            var detailsContent = document.getElementById('detailsContent');

            // Update active states
            document.querySelectorAll('.component').forEach(function(comp) {
                comp.classList.remove('active');
            });
            document.querySelectorAll('.timeline-item').forEach(function(item) {
                item.classList.remove('active');
            });

            // Add active state to clicked component
            var activeComponent = document.querySelector('.component[data-phase="' + phaseNum + '"]');
            if (activeComponent) {
                activeComponent.classList.add('active');
            }

            // Add active state to timeline item
            var timelineItems = document.querySelectorAll('.timeline-item');
            var phases = [1, 2, 3, '3a', 4, 5, '5a', '5b'];
            var phaseIndex = phases.indexOf(phaseNum);
            if (phaseIndex === -1) phaseIndex = phases.indexOf(parseInt(phaseNum));
            if (timelineItems[phaseIndex]) {
                timelineItems[phaseIndex].classList.add('active');
            }

            // Generate details HTML
            var severityColor = getSeverityColor(phase.severity);
            var actionsHtml = '';

            phase.actions.forEach(function(action) {
                var detailsHtml = action.details.map(function(detail) { return '<li>' + detail + '</li>'; }).join('');
                actionsHtml += '<div class="action-item">' +
                        '<div class="action-title">' + action.title + '</div>' +
                        '<ul class="action-details">' +
                        detailsHtml +
                        '</ul>' +
                        '</div>';
            });

            var mitreLinks = createMitreLinks(phase.mitre);
            var statusText = phase.status === 'actual' ? '> Actual execution' : (phase.status === 'outcome' ? '* Test outcome' : '! Simulated only');

            var codeHtml = '';
            if (phase.code) {
                var codeLines = phase.code.split('\n').map(function(line) {
                    if (line.startsWith('//') || line.startsWith('#')) {
                        return '<div class="code-line code-comment">' + escapeHtml(line) + '</div>';
                    } else {
                        return '<div class="code-line">' + escapeHtml(line) + '</div>';
                    }
                }).join('');

                codeHtml = '<div class="details-section">' +
                        '<h3 class="section-title">' +
                        '<span>[&gt;]</span>' +
                        '<span>Code Preview</span>' +
                        '</h3>' +
                        '<div class="code-preview">' + codeLines + '</div>' +
                        '</div>';
            }

            detailsContent.innerHTML = '<div class="details-header">' +
                    '<div class="details-phase-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' +
                    phase.number +
                    '</div>' +
                    '<h2 class="details-title">' + phase.title + '</h2>' +
                    '<div class="severity-badge ' + phase.severity + '">' + phase.severity.toUpperCase() + '</div>' +
                    '<div class="details-meta">' +
                    '<div class="meta-item">' +
                    '<span class="meta-label">MITRE:</span>' +
                    '<span class="meta-value">' + mitreLinks + '</span>' +
                    '</div>' +
                    '<div class="meta-item">' +
                    '<span class="meta-label">Time:</span>' +
                    '<span class="meta-value">' + phase.time + '</span>' +
                    '</div>' +
                    '<div class="meta-item">' +
                    '<span class="meta-label">Status:</span>' +
                    '<span class="meta-value">' + statusText + '</span>' +
                    '</div>' +
                    '</div>' +
                    '</div>' +
                    '<div class="details-section">' +
                    '<p style="color: #9ca3af; margin-bottom: 20px;">' + phase.description + '</p>' +
                    '</div>' +
                    '<div class="details-section">' +
                    '<h3 class="section-title">' +
                    '<span>[*]</span>' +
                    '<span>Actions Performed</span>' +
                    '</h3>' +
                    '<div class="action-list">' +
                    actionsHtml +
                    '</div>' +
                    '</div>' +
                    codeHtml;

            // Show details panel
            detailsPanel.classList.add('active');

            // Update progress bar
            updateProgressBar(phaseNum);

            // Position toggle button with sidebar
            var toggleBtn = document.getElementById('sidebarToggle');
            if (!sidebarCollapsed) {
                toggleBtn.classList.add('expanded');
            }
        }

        // Escape HTML entities
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // Close details panel
        function closeDetails() {
            document.getElementById('detailsPanel').classList.remove('active');
            document.querySelectorAll('.component').forEach(function(comp) {
                comp.classList.remove('active');
            });
            document.querySelectorAll('.timeline-item').forEach(function(item) {
                item.classList.remove('active');
            });

            // Reset toggle button position
            var toggleBtn = document.getElementById('sidebarToggle');
            toggleBtn.classList.remove('expanded');
        }

        // Switch view
        function switchView(view) {
            // Update button states
            document.querySelectorAll('.view-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Hide all views
            document.getElementById('attackFlowView').style.display = 'none';
            document.getElementById('timelineView').classList.remove('active');

            // Show selected view
            if (view === 'architecture') {
                document.getElementById('attackFlowView').style.display = 'block';
            } else if (view === 'timeline') {
                document.getElementById('timelineView').classList.add('active');
            }
        }

        // Get severity color
        function getSeverityColor(severity) {
            switch(severity) {
                case 'critical': return '#ff4444';
                case 'high': return '#ff9f43';
                case 'medium': return '#ffc107';
                case 'info': return '#4fc3f7';
                default: return '#9ca3af';
            }
        }

        // Update progress bar
        function updateProgressBar(phaseNum) {
            var progressBar = document.getElementById('progressBar');
            var phases = [1, 2, 3, '3a', 4, 5, '5a', '5b'];
            var phaseIndex = phases.indexOf(phaseNum);
            if (phaseIndex === -1) phaseIndex = phases.indexOf(parseInt(phaseNum));
            var width = ((phaseIndex + 1) / phases.length) * 1100;
            progressBar.style.width = width + 'px';
            progressBar.style.transition = 'width 0.5s ease';
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            initializeTimeline();

            // Sidebar starts expanded - show phase 1 details
            sidebarCollapsed = false;
            setTimeout(function() {
                showPhaseDetails(1);
            }, 500);
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            var phases = [1, 2, 3, '3a', 4, 5, '5a', '5b'];
            if (currentPhase) {
                var currentIndex = phases.indexOf(currentPhase);
                if (currentIndex === -1) currentIndex = phases.indexOf(parseInt(currentPhase));

                if (e.key === 'ArrowRight' && currentIndex < phases.length - 1) {
                    showPhaseDetails(phases[currentIndex + 1]);
                } else if (e.key === 'ArrowLeft' && currentIndex > 0) {
                    showPhaseDetails(phases[currentIndex - 1]);
                } else if (e.key === 'Escape') {
                    closeDetails();
                }
            }
        });
    </script>
</body>
