# --------------------------------------------------------------------------
# RULE 8: Gatekeeper Bypass via Quarantine Attribute Removal
# --------------------------------------------------------------------------
title: Gatekeeper Bypass via Quarantine Attribute Removal (xattr)
id: 244dfb88-sigma-008
status: stable
description: >
  Detects removal of the com.apple.quarantine extended attribute using
  xattr -d or xattr -c, which bypasses macOS Gatekeeper verification.
  RustBucket and other DPRK payloads delivered via curl use this to
  avoid Gatekeeper inspection.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1553/001/
tags:
  - attack.defense_evasion
  - attack.t1553.001
logsource:
  category: process_creation
  product: macos
detection:
  selection_process:
    Image|endswith: '/xattr'
  selection_quarantine:
    CommandLine|contains: 'com.apple.quarantine'
  selection_action:
    CommandLine|contains:
      - ' -d '
      - ' -c '
      - '--delete'
      - '--clear'
  condition: selection_process and selection_quarantine and selection_action
falsepositives:
  - Developers clearing quarantine on known-safe downloads
level: high

---

# --------------------------------------------------------------------------
# RULE 9: Outbound mTLS on Non-Standard Port 8888
# --------------------------------------------------------------------------
title: Outbound TLS Connection on Port 8888 (Sliver C2 Default)
id: 244dfb88-sigma-009
status: stable
description: >
  Detects outbound network connections to port 8888, which is the default
  Sliver C2 framework mTLS port used by BlueNoroff campaigns. Non-browser
  processes connecting outbound on this port warrant investigation.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1573/002/
tags:
  - attack.command_and_control
  - attack.t1573.002
logsource:
  category: network_connection
  product: macos
detection:
  selection:
    DestinationPort: 8888
    Initiated: 'true'
  filter_browsers:
    Image|endswith:
      - '/Google Chrome'
      - '/Safari'
      - '/Firefox'
      - '/Microsoft Edge'
      - '/java'
      - '/node'
  condition: selection and not filter_browsers
falsepositives:
  - Development web servers on port 8888
  - Some web applications using this port
level: medium

