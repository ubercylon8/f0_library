# --------------------------------------------------------------------------
# RULE 11: TCC Protection Reset via tccutil
# --------------------------------------------------------------------------
title: TCC Protection Reset via tccutil
id: 244dfb88-sigma-011
status: stable
description: >
  Detects use of tccutil reset to remove TCC (Transparency, Consent, and
  Control) protection decisions on macOS. Malware uses this to bypass
  access controls for AppleEvents, Full Disk Access, or Accessibility.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1553/001/
tags:
  - attack.defense_evasion
  - attack.t1553.001
logsource:
  category: process_creation
  product: macos
detection:
  selection:
    Image|endswith: '/tccutil'
    CommandLine|contains: 'reset'
  condition: selection
falsepositives:
  - IT admin scripts resetting TCC during MDM provisioning
level: high

---

# --------------------------------------------------------------------------
# RULE 12: Archive Creation with Credential Staging Content
# --------------------------------------------------------------------------
title: Suspicious Archive Creation in Staging Directory (Exfiltration)
id: 244dfb88-sigma-012
status: stable
description: >
  Detects creation of zip archives named out.zip or similar in staging/temp
  directories, matching AMOS stealer and macOS.NotLockBit exfiltration
  patterns. These archives typically contain harvested credentials and
  wallet data prepared for exfiltration.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1560/001/
  - https://attack.mitre.org/techniques/T1041/
tags:
  - attack.exfiltration
  - attack.collection
  - attack.t1560.001
  - attack.t1041
logsource:
  category: file_event
  product: macos
detection:
  selection_name:
    TargetFilename|endswith:
      - '/out.zip'
      - '/system_report.zip'
      - '/data.zip'
      - '/export.zip'
  selection_path:
    TargetFilename|contains:
      - '/staging/'
      - '/exfil/'
      - '/upload/'
      - '/temp/'
  condition: selection_name or selection_path
falsepositives:
  - Legitimate backup operations
  - Software build processes
level: high

