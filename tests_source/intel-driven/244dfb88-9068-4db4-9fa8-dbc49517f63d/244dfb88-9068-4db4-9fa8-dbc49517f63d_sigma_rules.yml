# --------------------------------------------------------------------------
# RULE 1: Suspicious LaunchAgent Plist Masquerading as Apple Service
# --------------------------------------------------------------------------
title: Suspicious LaunchAgent Plist Masquerading as Apple Service
id: 244dfb88-sigma-001
status: stable
description: >
  Detects creation of LaunchAgent or LaunchDaemon plist files with labels
  masquerading as Apple services (com.apple.*) by non-Apple processes.
  RustBucket and BeaverTail campaigns use com.apple.systemupdate and
  com.avatar.update.wake labels for persistence on macOS endpoints.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1543/004/
  - https://www.jamf.com/blog/bluenoroff-apt-targets-macos-rustbucket-malware/
tags:
  - attack.persistence
  - attack.t1543.004
logsource:
  category: file_event
  product: macos
detection:
  selection_path:
    TargetFilename|contains:
      - '/Library/LaunchAgents/'
      - '/Library/LaunchDaemons/'
  selection_ext:
    TargetFilename|endswith: '.plist'
  filter_legitimate:
    Image|contains:
      - '/usr/libexec/installd'
      - '/usr/sbin/softwareupdated'
      - '/Library/Application Support/JAMF/'
      - '/System/Library/'
  condition: selection_path and selection_ext and not filter_legitimate
falsepositives:
  - Legitimate MDM tools (Jamf, Mosyle)
  - macOS software updates
level: high

---

# --------------------------------------------------------------------------
# RULE 2: Known BlueNoroff LaunchAgent Labels
# --------------------------------------------------------------------------
title: Known BlueNoroff Campaign LaunchAgent Label Detection
id: 244dfb88-sigma-002
status: stable
description: >
  Detects creation of plist files matching specific labels used by documented
  DPRK BlueNoroff campaigns: com.apple.systemupdate (RustBucket),
  com.avatar.update.wake (BeaverTail/InvisibleFerret), and
  com.apple.security.updateagent (root LaunchDaemon persistence).
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://www.jamf.com/blog/bluenoroff-apt-targets-macos-rustbucket-malware/
  - https://unit42.paloaltonetworks.com/north-korean-threat-actors-luring-tech-job-seekers-as-fake-recruiters/
tags:
  - attack.persistence
  - attack.t1543.004
logsource:
  category: file_event
  product: macos
detection:
  selection:
    TargetFilename|endswith:
      - 'com.apple.systemupdate.plist'
      - 'com.avatar.update.wake.plist'
      - 'com.apple.security.updateagent.plist'
      - 'com.apple.Safari.helper.plist'
      - 'com.google.keystone.plist'
  condition: selection
falsepositives:
  - Extremely unlikely -- these are campaign-specific indicators
level: critical

---

# --------------------------------------------------------------------------
# RULE 3: Shell Configuration File Modification (.zshenv)
# --------------------------------------------------------------------------
title: Shell Configuration File Modification for Persistence (.zshenv)
id: 244dfb88-sigma-003
status: stable
description: >
  Detects modification of ~/.zshenv files by non-shell/non-editor processes.
  The BlueNoroff Hidden Risk campaign (November 2024, SentinelLabs) abuses
  .zshenv for persistence because it executes for every Zsh session and
  critically does NOT trigger macOS Ventura Login Items notification.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://www.sentinelone.com/labs/bluenoroff-hidden-risk/
  - https://attack.mitre.org/techniques/T1543/004/
tags:
  - attack.persistence
  - attack.t1543.004
logsource:
  category: file_event
  product: macos
detection:
  selection:
    TargetFilename|endswith: '/.zshenv'
  filter_editors:
    Image|endswith:
      - '/zsh'
      - '/bash'
      - '/vim'
      - '/nano'
      - '/code'
      - '/brew'
      - '/git'
  condition: selection and not filter_editors
falsepositives:
  - Developer tool installations (oh-my-zsh, homebrew)
  - Manual shell configuration changes
level: high

---

# --------------------------------------------------------------------------
# RULE 4: osascript Fake Password Dialog
# --------------------------------------------------------------------------
title: osascript Credential Phishing via Fake System Dialog
id: 244dfb88-sigma-004
status: stable
description: >
  Detects execution of osascript with display dialog and hidden answer
  parameters used to create fake macOS system password prompts. This
  technique is shared by AMOS Stealer, Banshee Stealer, and BlueNoroff
  macOS campaigns for credential phishing (T1056.002).
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1059/002/
  - https://attack.mitre.org/techniques/T1056/002/
tags:
  - attack.credential_access
  - attack.execution
  - attack.t1059.002
  - attack.t1056.002
logsource:
  category: process_creation
  product: macos
detection:
  selection_process:
    Image|endswith: '/osascript'
  selection_dialog:
    CommandLine|contains|all:
      - 'display dialog'
      - 'hidden answer'
  filter_system:
    ParentImage|contains:
      - '/System/Library/CoreServices/Finder.app'
      - '/System/Library/PreferencePanes/'
      - '/usr/libexec/SecurityAgent'
  condition: selection_process and selection_dialog and not filter_system
falsepositives:
  - Legitimate applications using osascript for authenticated operations
level: critical

---

# --------------------------------------------------------------------------
# RULE 5: macOS Keychain Credential Extraction
# --------------------------------------------------------------------------
title: macOS Keychain Credential Dumping via security CLI
id: 244dfb88-sigma-005
status: stable
description: >
  Detects use of the macOS security command-line tool with credential
  extraction flags (-g, -w, -d) targeting Keychain databases. This
  technique is used by AMOS, Banshee, and BlueNoroff campaigns to
  extract passwords and Chrome Safe Storage keys for browser decryption.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1555/001/
tags:
  - attack.credential_access
  - attack.t1555.001
logsource:
  category: process_creation
  product: macos
detection:
  selection_process:
    Image|endswith: '/security'
  selection_commands:
    CommandLine|contains:
      - 'dump-keychain'
      - 'find-generic-password'
      - 'find-internet-password'
      - 'list-keychains'
  selection_flags:
    CommandLine|contains:
      - ' -g'
      - ' -w'
      - ' -d'
      - ' -ga'
  condition: selection_process and selection_commands and selection_flags
falsepositives:
  - Administrative scripts for credential management
  - CI/CD pipelines accessing Keychain
level: high

---

# --------------------------------------------------------------------------
# RULE 6: dscl Credential Validation
# --------------------------------------------------------------------------
title: Local Credential Validation via dscl -authonly
id: 244dfb88-sigma-006
status: stable
description: >
  Detects use of dscl -authonly to validate captured credentials against
  the local directory service. AMOS, Banshee, and Cuckoo stealers validate
  phished passwords before proceeding with Keychain extraction.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1059/002/
tags:
  - attack.credential_access
  - attack.t1059.002
logsource:
  category: process_creation
  product: macos
detection:
  selection:
    Image|endswith: '/dscl'
    CommandLine|contains: '-authonly'
  filter_system:
    ParentImage|contains:
      - '/usr/libexec/opendirectoryd'
      - '/System/Library/PrivateFrameworks/'
  condition: selection and not filter_system
falsepositives:
  - Legitimate MDM authentication checks
level: high

