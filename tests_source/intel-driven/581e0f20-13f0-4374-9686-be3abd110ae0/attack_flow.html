                    { title: "Stage 3 Detection", details: ["diskpart.exe VHD operations", "manage-bde.exe -on with -Password", "vssadmin.exe delete shadows"] }
                ],
                code: "// KQL: Event Log Clearing\nDeviceProcessEvents\n| where ProcessCommandLine has \"wevtutil\" and \"cl\"\n\n// KQL: BitLocker Ransomware\nDeviceProcessEvents\n| where FileName =~ \"manage-bde.exe\"\n| where ProcessCommandLine has \"-Password\""
            }
        };

        var currentPhase = null;

        function getSeverityColor(severity) {
            switch(severity) {
                case 'critical': return '#ff4444';
                case 'high': return '#ff9f43';
                case 'medium': return '#ffc107';
                default: return '#4fc3f7';
            }
        }

        function createMitreLinks(mitreArray) {
            if (!mitreArray || mitreArray.length === 0) {
                return '<span style="color: #6b7280;">N/A</span>';
            }
            var links = [];
            for (var i = 0; i < mitreArray.length; i++) {
                var t = mitreArray[i];
                var techId = t.id.replace('.', '/');
                links.push('<a href="https://attack.mitre.org/techniques/' + techId + '" target="_blank" class="mitre-link" title="' + t.name + '">' + t.id + '</a>');
            }
            return links.join(', ');
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showPhaseDetails(phaseNum) {
            currentPhase = phaseNum;
            var phase = phaseData[phaseNum];
            if (!phase) {
                console.error('Phase not found:', phaseNum);
                return;
            }

            var detailsContent = document.getElementById('detailsContent');
            var severityColor = getSeverityColor(phase.severity);

            // Build actions HTML
            var actionsHtml = '';
            for (var i = 0; i < phase.actions.length; i++) {
                var action = phase.actions[i];
                var detailsListHtml = '';
                for (var j = 0; j < action.details.length; j++) {
                    detailsListHtml += '<li>' + escapeHtml(action.details[j]) + '</li>';
                }
                actionsHtml += '<div class="action-item"><div class="action-title">' + escapeHtml(action.title) + '</div><ul class="action-details">' + detailsListHtml + '</ul></div>';
            }

            // Build code preview HTML
            var codeHtml = '';
            if (phase.code) {
                var lines = phase.code.split('\n');
                for (var k = 0; k < lines.length; k++) {
                    var line = lines[k];
                    if (line.indexOf('//') === 0) {
                        codeHtml += '<div class="code-line code-comment">' + escapeHtml(line) + '</div>';
                    } else {
                        codeHtml += '<div class="code-line">' + escapeHtml(line) + '</div>';
                    }
                }
            }

            var mitreLinks = createMitreLinks(phase.mitre);

            // Build full HTML
            var html = '<div class="details-header">' +
                '<div class="details-phase-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' + phase.number + '</div>' +
                '<h2 class="details-title">' + escapeHtml(phase.title) + '</h2>' +
                '<div class="severity-badge ' + phase.severity + '">' + phase.severity.toUpperCase() + '</div>' +
                '<div class="details-meta">' +
                '<div><span class="meta-label">MITRE:</span> <span class="meta-value">' + mitreLinks + '</span></div>' +
                '<div><span class="meta-label">Time:</span> <span class="meta-value">' + phase.time + '</span></div>' +
                '</div></div>' +
                '<div class="details-section"><p style="color: #9ca3af; margin-bottom: 15px;">' + escapeHtml(phase.description) + '</p></div>' +
                '<div class="details-section"><h3 class="section-title"><span>[>]</span> Actions</h3>' + actionsHtml + '</div>';

            if (phase.code) {
                html += '<div class="details-section"><h3 class="section-title"><span>[#]</span> Code Preview</h3><div class="code-preview">' + codeHtml + '</div></div>';
            }

            detailsContent.innerHTML = html;

            // Update active states
            var components = document.querySelectorAll('.component');
            for (var c = 0; c < components.length; c++) {
                components[c].classList.remove('active');
            }
            var activeComp = document.querySelector('.component[data-phase="' + phaseNum + '"]');
            if (activeComp) {
                activeComp.classList.add('active');
            }

            // Update progress bar
            var progressBar = document.getElementById('progressBar');
            var phases = [0, 1, 2, 3, 4, 5, 6];
            var idx = phases.indexOf(phaseNum);
            var width = ((idx + 1) / phases.length) * 800;
            progressBar.style.width = width + 'px';
            progressBar.style.transition = 'width 0.5s ease';
        }

        // Initialize - show phase 1 immediately
        showPhaseDetails(1);

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            var phases = [0, 1, 2, 3, 4, 5, 6];
            if (currentPhase !== null) {
                var idx = phases.indexOf(currentPhase);
                if (e.key === 'ArrowRight' && idx < phases.length - 1) {
                    showPhaseDetails(phases[idx + 1]);
                } else if (e.key === 'ArrowLeft' && idx > 0) {
                    showPhaseDetails(phases[idx - 1]);
                }
            }
        });
    </script>
</body>
</html>
