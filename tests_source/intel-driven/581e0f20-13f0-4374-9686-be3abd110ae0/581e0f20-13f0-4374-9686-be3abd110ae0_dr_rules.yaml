# ============================================================
# F0RT1KA LimaCharlie D&R Rules - Ransomware Encryption via BitLocker
# Test ID: 581e0f20-13f0-4374-9686-be3abd110ae0
# MITRE ATT&CK: T1070.001, T1562.004, T1082, T1083, T1486, T1490
# Generated: 2024-12-07
# ============================================================
#
# FILE FORMAT: For use with `limacharlie dr add` or `limacharlie config push`
#
# Rule Index:
# 1. f0rt1ka-bitlocker-event-log-clearing - T1070.001
# 2. f0rt1ka-bitlocker-firewall-manipulation - T1562.004
# 3. f0rt1ka-bitlocker-encryption-detected - T1486
# 4. f0rt1ka-bitlocker-vss-shadow-deletion - T1490
# 5. f0rt1ka-bitlocker-vhd-operations - T1486
# 6. f0rt1ka-bitlocker-ransomware-chain - Multi-technique correlation
# ============================================================

rules:

  # ============================================================
  # Rule 1: Event Log Clearing Detection (T1070.001)
  # Confidence: High
  # Description: Detect wevtutil.exe clearing event logs
  # ============================================================
  f0rt1ka-bitlocker-event-log-clearing:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: wevtutil.exe
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: " cl "
          case sensitive: false

    respond:
      - action: report
        name: F0RT1KA-BitLocker-EventLogClearing
        metadata:
          test_id: 581e0f20-13f0-4374-9686-be3abd110ae0
          mitre_attack: T1070.001
          confidence: high
          severity: high
          description: Event log clearing detected via wevtutil - Defense Evasion indicator
          tactic: defense-evasion


  # ============================================================
  # Rule 2: Firewall Rule Manipulation (T1562.004)
  # Confidence: Medium
  # Description: Detect netsh firewall rule modifications
  # ============================================================
  f0rt1ka-bitlocker-firewall-manipulation:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: netsh.exe
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: advfirewall
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: firewall
          case sensitive: false
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: add rule
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: delete rule
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: set rule
              case sensitive: false

    respond:
      - action: report
        name: F0RT1KA-BitLocker-FirewallManipulation
        metadata:
          test_id: 581e0f20-13f0-4374-9686-be3abd110ae0
          mitre_attack: T1562.004
          confidence: medium
          severity: medium
          description: Firewall rule manipulation detected via netsh - Defense Evasion indicator
          tactic: defense-evasion


  # ============================================================
  # Rule 3: BitLocker Encryption Detection (T1486)
  # Confidence: Critical
  # Description: Detect BitLocker being enabled, especially with password
  # ============================================================
  f0rt1ka-bitlocker-encryption-detected:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: manage-bde.exe
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: "-on"
          case sensitive: false

    respond:
      - action: report
        name: F0RT1KA-BitLocker-EncryptionDetected
        metadata:
          test_id: 581e0f20-13f0-4374-9686-be3abd110ae0
          mitre_attack: T1486
          confidence: high
          severity: critical
          description: BitLocker encryption initiated - RANSOMWARE INDICATOR if password-based
          tactic: impact

      # Optional: Add a tag for correlation
      - action: add tag
        tag: ransomware-activity
        ttl: 3600


  # ============================================================
  # Rule 4: VSS Shadow Copy Deletion (T1490)
  # Confidence: Critical
  # Description: Detect vssadmin shadow copy deletion - strong ransomware indicator
  # ============================================================
  f0rt1ka-bitlocker-vss-shadow-deletion:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: vssadmin.exe
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: delete
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: shadows
          case sensitive: false

    respond:
      - action: report
        name: F0RT1KA-BitLocker-VSSShadowDeletion
        metadata:
          test_id: 581e0f20-13f0-4374-9686-be3abd110ae0
          mitre_attack: T1490
          confidence: critical
          severity: critical
          description: Volume Shadow Copy deletion detected - CRITICAL RANSOMWARE INDICATOR
          tactic: impact

      # High severity - add tag for correlation
      - action: add tag
        tag: ransomware-activity
        ttl: 3600


  # ============================================================
  # Rule 5: VHD Operations Detection (T1486)
  # Confidence: Medium
  # Description: Detect diskpart VHD operations (potential isolated encryption)
  # ============================================================
  f0rt1ka-bitlocker-vhd-operations:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: diskpart.exe
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: /s
          case sensitive: false

    respond:
      - action: report
        name: F0RT1KA-BitLocker-VHDOperations
        metadata:
          test_id: 581e0f20-13f0-4374-9686-be3abd110ae0
          mitre_attack: T1486
          confidence: medium
          severity: medium
          description: Diskpart script execution detected - potential VHD-based encryption
          tactic: impact


  # ============================================================
  # Rule 6: WMIC Shadow Copy Deletion (T1490)
  # Confidence: Critical
  # Description: Alternative method for shadow copy deletion via WMIC
  # ============================================================
  f0rt1ka-bitlocker-wmic-shadow-deletion:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: wmic.exe
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: shadowcopy
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: delete
          case sensitive: false

    respond:
      - action: report
        name: F0RT1KA-BitLocker-WMICShadowDeletion
        metadata:
          test_id: 581e0f20-13f0-4374-9686-be3abd110ae0
          mitre_attack: T1490
          confidence: critical
          severity: critical
          description: Shadow copy deletion via WMIC - CRITICAL RANSOMWARE INDICATOR
          tactic: impact

      - action: add tag
        tag: ransomware-activity
        ttl: 3600


  # ============================================================
  # Rule 7: System Enumeration via WMIC (T1082)
  # Confidence: Low
  # Description: Detect pre-attack reconnaissance using WMIC
  # ============================================================
  f0rt1ka-bitlocker-system-enumeration:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: wmic.exe
          case sensitive: false
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: computersystem
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: "os get"
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: logicaldisk
              case sensitive: false

    respond:
      - action: report
        name: F0RT1KA-BitLocker-SystemEnumeration
        metadata:
          test_id: 581e0f20-13f0-4374-9686-be3abd110ae0
          mitre_attack: T1082
          confidence: low
          severity: low
          description: System enumeration via WMIC - Discovery phase indicator
          tactic: discovery


  # ============================================================
  # Rule 8: Suspicious File Creation in Staging Directories
  # Confidence: Medium
  # Description: Detect suspicious file creation in common attacker paths
  # ============================================================
  f0rt1ka-bitlocker-staging-directory:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "\\Temp\\"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "\\AppData\\"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "\\Users\\Public\\"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "\\ProgramData\\"
              case sensitive: false
        - op: or
          rules:
            - op: ends with
              path: event/FILE_PATH
              value: ".vhd"
              case sensitive: false
            - op: ends with
              path: event/FILE_PATH
              value: ".vhdx"
              case sensitive: false

    respond:
      - action: report
        name: F0RT1KA-BitLocker-SuspiciousVHDStaging
        metadata:
          test_id: 581e0f20-13f0-4374-9686-be3abd110ae0
          mitre_attack: T1486
          confidence: medium
          severity: high
          description: VHD file created in staging directory - potential ransomware encryption container
          tactic: impact


  # ============================================================
  # Rule 9: Password-Based BitLocker (High-Confidence Ransomware)
  # Confidence: Critical
  # Description: Password-protected BitLocker is unusual and highly suspicious
  # ============================================================
  f0rt1ka-bitlocker-password-encryption:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: manage-bde.exe
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: "-on"
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: "-Password"
          case sensitive: false

    respond:
      - action: report
        name: F0RT1KA-BitLocker-PasswordEncryption
        metadata:
          test_id: 581e0f20-13f0-4374-9686-be3abd110ae0
          mitre_attack: T1486
          confidence: critical
          severity: critical
          description: PASSWORD-BASED BitLocker encryption detected - HIGH RANSOMWARE PROBABILITY
          tactic: impact

      - action: add tag
        tag: ransomware-critical
        ttl: 7200

      # Optional: Task to escalate for SOC review
      - action: task
        investigation: F0RT1KA BitLocker Ransomware Investigation
        instructions: |
          CRITICAL ALERT: Password-based BitLocker encryption detected.

          This is highly unusual behavior as legitimate BitLocker typically uses TPM.
          Password-protected BitLocker is a strong indicator of BitLocker-based ransomware.

          Immediate Actions:
          1. Isolate the affected endpoint
          2. Check for other ransomware indicators (VSS deletion, event log clearing)
          3. Verify if this is a sanctioned security test
          4. Preserve evidence before remediation

          Test Reference: 581e0f20-13f0-4374-9686-be3abd110ae0


# ============================================================
# END OF D&R RULES
