title: MDE Authentication Bypass Attack Chain Correlation
id: b6c73735-sigma-012
status: stable
description: |
  Correlation rule that identifies the complete MDE authentication bypass
  attack chain. Triggers when multiple indicators are observed from the
  same host within a short time window: MDE registry access + MDE endpoint
  network connections + PowerShell command interception. This is the
  highest-confidence detection for this attack pattern.
references:
  - https://www.infoguard.ch/en/blog/microsoft-defender-for-endpoint-authentication-bypass
  - https://attack.mitre.org/techniques/T1562/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.defense_evasion
  - attack.command_and_control
  - attack.t1562.001
  - attack.t1014
  - attack.t1090.003
  - attack.t1140
logsource:
  category: process_creation
  product: windows
detection:
  # Indicator 1: Process accessing MDE registry keys
  indicator_registry:
    CommandLine|contains:
      - 'Windows Advanced Threat Protection'
      - 'MachineId'
      - 'SenseId'
      - 'OrgId'
  # Indicator 2: Network communication to MDE endpoints
  indicator_network:
    CommandLine|contains:
      - 'winatp-gw'
      - '/edr/commands/cnc'
      - '/senseir/v1/'
  # Indicator 3: Command interception patterns
  indicator_interception:
    CommandLine|contains:
      - 'Intercept-MDECommand'
      - 'isolation_spoof'
      - 'CloudLR'
      - 'Generate-Unauthorized'
      - 'Get-MDEConfigWithoutAuth'
  condition: indicator_registry or indicator_network or indicator_interception
  # Note: In a SIEM with native correlation, combine these as
  # temporal correlation within 60 minutes on the same host.
  # This simplified version triggers on any single indicator
  # for maximum detection coverage. Tune thresholds in your SIEM.
falsepositives:
  - Authorized security assessments with documented approval
level: critical
