title: DNS Resolution of MDE Cloud Gateway by Non-MDE Process
id: b6c73735-sigma-005
status: stable
description: |
  Detects DNS queries resolving MDE cloud gateway hostnames
  (winatp-gw-*.microsoft.com) from processes other than the legitimate
  MDE sensor service. These endpoints handle EDR commands, Live Response
  sessions, and device isolation - unauthorized access indicates a potential
  authentication bypass attack.
references:
  - https://www.infoguard.ch/en/blog/microsoft-defender-for-endpoint-authentication-bypass
  - https://attack.mitre.org/techniques/T1071/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.command_and_control
  - attack.t1071.001
  - attack.t1090.003
logsource:
  category: dns_query
  product: windows
detection:
  selection:
    QueryName|contains:
      - 'winatp-gw-eus.microsoft.com'
      - 'winatp-gw-weu.microsoft.com'
      - 'winatp-gw-cus.microsoft.com'
      - 'winatp-gw-neu.microsoft.com'
  filter_mde_services:
    Image|endswith:
      - '\MsSense.exe'
      - '\SenseIR.exe'
      - '\MsMpEng.exe'
  condition: selection and not filter_mde_services
falsepositives:
  - MDE connectivity diagnostic tools
  - Network monitoring tools testing MDE cloud reachability
level: critical

---

title: PowerShell Script Targeting MDE Cloud Infrastructure
id: b6c73735-sigma-006
status: stable
description: |
  Detects PowerShell processes with command-line arguments referencing MDE
  cloud gateway hostnames, EDR command API paths, or Live Response endpoints.
  Legitimate MDE cloud communications are handled by native service binaries,
  not PowerShell scripts. This pattern indicates MDE command interception or
  authentication bypass activity.
references:
  - https://www.infoguard.ch/en/blog/microsoft-defender-for-endpoint-authentication-bypass
  - https://attack.mitre.org/techniques/T1059/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.execution
  - attack.defense_evasion
  - attack.t1059.001
  - attack.t1562.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_ps:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_mde_keywords:
    CommandLine|contains:
      - 'winatp-gw'
      - '/edr/commands/'
      - '/senseir/v1/'
      - 'Intercept-MDECommand'
      - 'CloudLR'
      - 'Generate-UnauthorizedCloudLRToken'
      - 'Get-MDEConfigWithoutAuth'
  condition: selection_ps and selection_mde_keywords
falsepositives:
  - Authorized MDE troubleshooting scripts used by Microsoft support
  - Documented security assessment tools with explicit authorization
level: critical

---

title: Network Connection to MDE Endpoint from Non-Sensor Process
id: b6c73735-sigma-007
status: stable
description: |
  Detects network connections to MDE cloud gateway endpoints from processes
  that are not the legitimate MDE sensor (MsSense.exe) or Live Response
  service (SenseIR.exe). Any non-MDE process communicating with these
  endpoints is a strong indicator of authentication bypass exploitation.
references:
  - https://www.infoguard.ch/en/blog/microsoft-defender-for-endpoint-authentication-bypass
  - https://attack.mitre.org/techniques/T1090/003/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.command_and_control
  - attack.t1090.003
  - attack.t1071.001
logsource:
  category: network_connection
  product: windows
detection:
  selection:
    DestinationHostname|contains:
      - 'winatp-gw-eus.microsoft.com'
      - 'winatp-gw-weu.microsoft.com'
      - 'winatp-gw-cus.microsoft.com'
      - 'winatp-gw-neu.microsoft.com'
    DestinationPort: 443
  filter_mde:
    Image|endswith:
      - '\MsSense.exe'
      - '\SenseIR.exe'
      - '\MsMpEng.exe'
  condition: selection and not filter_mde
falsepositives:
  - MDE connectivity checker tools
level: critical

