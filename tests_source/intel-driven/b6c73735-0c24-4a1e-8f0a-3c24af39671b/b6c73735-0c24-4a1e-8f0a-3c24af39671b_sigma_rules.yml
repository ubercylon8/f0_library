title: Isolation Status Spoofing Artifact Creation
id: b6c73735-sigma-008
status: stable
description: |
  Detects creation of JSON files containing isolation spoofing indicators.
  In MDE authentication bypass attacks, adversaries intercept device isolation
  commands and create files containing spoofed success responses, causing the
  security portal to display the device as isolated while it remains connected.
references:
  - https://www.infoguard.ch/en/blog/microsoft-defender-for-endpoint-authentication-bypass
  - https://attack.mitre.org/techniques/T1562/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.defense_evasion
  - attack.t1562.001
  - attack.impact
logsource:
  category: file_event
  product: windows
detection:
  selection_spoof_files:
    TargetFilename|endswith:
      - '\isolation_response.json'
      - '\spoof_result.json'
      - '\spoofer_report.json'
      - '\cloudlr_token.json'
  selection_content_pattern:
    TargetFilename|endswith: '.json'
    TargetFilename|contains:
      - 'intercepted_commands'
      - 'mde_identifiers'
  condition: selection_spoof_files or selection_content_pattern
falsepositives:
  - None expected - these file names are inherently tied to MDE exploitation activity
level: critical

---

title: Unauthorized MDE Configuration Directory Access
id: b6c73735-sigma-009
status: stable
description: |
  Detects non-MDE processes accessing files within MDE configuration
  directories. Configuration files contain detection rules, exclusion lists,
  certificate pins, and monitored process names. Unauthorized access enables
  attackers to understand and evade security controls.
references:
  - https://www.infoguard.ch/en/blog/microsoft-defender-for-endpoint-authentication-bypass
  - https://attack.mitre.org/techniques/T1005/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.collection
  - attack.defense_evasion
  - attack.t1005
  - attack.t1140
logsource:
  category: file_access
  product: windows
detection:
  selection_paths:
    TargetFilename|contains:
      - '\ProgramData\Microsoft\Windows Defender Advanced Threat Protection\Config'
      - '\Program Files\Windows Defender Advanced Threat Protection\'
  selection_extensions:
    TargetFilename|endswith:
      - '.json'
      - '.xml'
      - '.config'
  filter_legitimate:
    Image|endswith:
      - '\MsSense.exe'
      - '\SenseIR.exe'
      - '\MsMpEng.exe'
      - '\TrustedInstaller.exe'
      - '\svchost.exe'
      - '\services.exe'
  condition: selection_paths and selection_extensions and not filter_legitimate
falsepositives:
  - Authorized security audit tools
  - Endpoint management platforms performing configuration backups
level: high

