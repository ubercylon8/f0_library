title: Suspicious User-Agent String Impersonating MDE Sensor
id: b6c73735-sigma-010
status: stable
description: |
  Detects HTTP requests using the User-Agent string 'Microsoft-SenseIR/1.0'
  or similar MDE sensor user-agent patterns from processes that are not the
  legitimate MDE sensor service. Attackers use this user-agent to impersonate
  MDE communications when exploiting the authentication bypass vulnerability.
references:
  - https://www.infoguard.ch/en/blog/microsoft-defender-for-endpoint-authentication-bypass
  - https://attack.mitre.org/techniques/T1071/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.command_and_control
  - attack.t1071.001
  - attack.t1036.005
logsource:
  category: proxy
  product: windows
detection:
  selection:
    c-useragent|contains:
      - 'Microsoft-SenseIR'
      - 'Microsoft-MsSense'
  filter_mde_process:
    cs-host|endswith: '.microsoft.com'
    Image|endswith:
      - '\MsSense.exe'
      - '\SenseIR.exe'
  condition: selection and not filter_mde_process
falsepositives:
  - None expected - this user-agent string is specific to MDE services
level: critical

