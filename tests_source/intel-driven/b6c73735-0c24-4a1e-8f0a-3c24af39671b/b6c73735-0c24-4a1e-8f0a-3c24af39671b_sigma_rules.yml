title: Crypt32.dll Loading Followed by Memory Protection Change
id: b6c73735-sigma-011
status: stable
description: |
  Detects a process loading crypt32.dll and then modifying memory protections,
  which is the behavioral signature of certificate pinning bypass through
  in-memory patching. The attacker loads the DLL to locate
  CertVerifyCertificateChainPolicy, then changes page protection to
  PAGE_EXECUTE_READWRITE to write bypass opcodes (mov eax, 1; ret).
references:
  - https://www.infoguard.ch/en/blog/microsoft-defender-for-endpoint-authentication-bypass
  - https://attack.mitre.org/techniques/T1014/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.defense_evasion
  - attack.t1014
  - attack.t1562.001
logsource:
  category: image_load
  product: windows
detection:
  selection:
    ImageLoaded|endswith: '\crypt32.dll'
  filter_system:
    Image|endswith:
      - '\svchost.exe'
      - '\lsass.exe'
      - '\services.exe'
      - '\csrss.exe'
      - '\System'
      - '\MsSense.exe'
      - '\MsMpEng.exe'
    Image|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
      - 'C:\Program Files\Windows Defender'
  filter_common_apps:
    Image|endswith:
      - '\chrome.exe'
      - '\firefox.exe'
      - '\msedge.exe'
      - '\iexplore.exe'
      - '\outlook.exe'
      - '\Teams.exe'
  condition: selection and not filter_system and not filter_common_apps
falsepositives:
  - Applications that legitimately use certificate validation APIs
  - Note: This rule has higher false positive rate; use in correlation with other rules
level: medium

