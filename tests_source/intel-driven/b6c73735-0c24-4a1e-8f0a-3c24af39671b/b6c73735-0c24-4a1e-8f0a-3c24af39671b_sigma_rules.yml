title: MDE Registry Identifier Extraction by Unauthorized Process
id: b6c73735-sigma-001
status: stable
description: |
  Detects non-MDE processes accessing the Windows Advanced Threat Protection
  registry keys to read Machine ID, Tenant ID, Sense ID, or Org ID. Attackers
  extract these identifiers to craft unauthenticated requests to MDE cloud
  communication endpoints, enabling command interception and isolation spoofing.
references:
  - https://www.infoguard.ch/en/blog/microsoft-defender-for-endpoint-authentication-bypass
  - https://attack.mitre.org/techniques/T1562/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.defense_evasion
  - attack.t1562.001
  - attack.t1012
logsource:
  category: registry_access
  product: windows
detection:
  selection_key:
    TargetObject|contains:
      - '\SOFTWARE\Microsoft\Windows Advanced Threat Protection'
      - '\SOFTWARE\Microsoft\Windows Defender Advanced Threat Protection'
      - '\SOFTWARE\Policies\Microsoft\Windows Advanced Threat Protection'
  selection_value:
    TargetObject|endswith:
      - '\MachineId'
      - '\SenseId'
      - '\OrgId'
      - '\TenantId'
      - '\OnboardingState'
  filter_legitimate:
    Image|endswith:
      - '\MsSense.exe'
      - '\SenseIR.exe'
      - '\MsMpEng.exe'
      - '\services.exe'
      - '\svchost.exe'
      - '\SecurityHealthService.exe'
  condition: selection_key and selection_value and not filter_legitimate
falsepositives:
  - Endpoint management platforms querying MDE onboarding state
  - IT asset inventory scripts reading machine identifiers
  - SCCM or Intune configuration management
level: critical

---

title: Fake MDE Sensor Process Execution from Non-Standard Path
id: b6c73735-sigma-002
status: stable
description: |
  Detects execution of processes named MsSense.exe, SenseIR.exe, or MsMpEng.exe
  from locations outside their legitimate installation directories. Adversaries
  deploy fake MDE sensor binaries to impersonate the legitimate service for
  command interception or to bypass trust relationships with MDE cloud endpoints.
references:
  - https://www.infoguard.ch/en/blog/microsoft-defender-for-endpoint-authentication-bypass
  - https://attack.mitre.org/techniques/T1036/005/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.defense_evasion
  - attack.t1562.001
  - attack.t1036.005
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\MsSense.exe'
      - '\SenseIR.exe'
      - '\MsMpEng.exe'
  filter_legitimate_paths:
    Image|contains:
      - '\Program Files\Windows Defender Advanced Threat Protection\'
      - '\Program Files\Windows Defender\'
      - '\ProgramData\Microsoft\Windows Defender\Platform\'
      - '\Windows\System32\'
      - '\Program Files\Microsoft Security Client\'
  condition: selection and not filter_legitimate_paths
falsepositives:
  - Very rare - legitimate MDE binaries only run from specific Windows Defender directories
level: critical

---

title: Certificate Validation Function Memory Manipulation
id: b6c73735-sigma-003
status: stable
description: |
  Detects processes that call VirtualProtectEx with PAGE_EXECUTE_READWRITE
  targeting crypt32.dll address space, which is indicative of certificate
  pinning bypass attacks. Attackers patch CertVerifyCertificateChainPolicy
  to always return TRUE, disabling certificate validation for MDE cloud
  communication interception.
references:
  - https://www.infoguard.ch/en/blog/microsoft-defender-for-endpoint-authentication-bypass
  - https://attack.mitre.org/techniques/T1014/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.defense_evasion
  - attack.t1014
  - attack.t1562.001
logsource:
  category: process_access
  product: windows
detection:
  selection_api:
    CallTrace|contains:
      - 'crypt32.dll'
  selection_access:
    GrantedAccess|contains:
      - '0x1F0FFF'
      - '0x0038'
  filter_system:
    SourceImage|endswith:
      - '\MsSense.exe'
      - '\MsMpEng.exe'
      - '\services.exe'
      - '\lsass.exe'
  condition: selection_api and selection_access and not filter_system
falsepositives:
  - Legitimate debuggers during software development
  - Security tools performing memory integrity checks
level: critical

---

title: SeDebugPrivilege Acquisition by Non-Standard Process
id: b6c73735-sigma-004
status: stable
description: |
  Detects processes enabling SeDebugPrivilege that are not standard debugging
  tools or system services. This privilege is required for cross-process memory
  manipulation used in certificate pinning bypass attacks where CRYPT32.dll
  functions are patched in memory.
references:
  - https://attack.mitre.org/techniques/T1134/002/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.privilege_escalation
  - attack.defense_evasion
  - attack.t1134.002
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    EventID: 4703
    EnabledPrivilegeList|contains: 'SeDebugPrivilege'
  filter_debuggers:
    ProcessName|endswith:
      - '\devenv.exe'
      - '\windbg.exe'
      - '\ollydbg.exe'
      - '\x64dbg.exe'
      - '\x32dbg.exe'
      - '\ida.exe'
      - '\ida64.exe'
      - '\taskmgr.exe'
  filter_security:
    ProcessName|endswith:
      - '\MsMpEng.exe'
      - '\MsSense.exe'
      - '\services.exe'
      - '\svchost.exe'
      - '\lsass.exe'
      - '\csrss.exe'
  condition: selection and not filter_debuggers and not filter_security
falsepositives:
  - Process dump utilities (procdump, task manager)
  - Some legitimate monitoring tools
level: high

