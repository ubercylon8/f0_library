# ============================================================
# MDE Authentication Bypass Command Interception - LimaCharlie D&R Rules
# Test ID: b6c73735-0c24-4a1e-8f0a-3c24af39671b
# MITRE ATT&CK: T1562.001, T1014, T1090.003, T1140, T1071.001
# Version: 2.0
# ============================================================
# Format: File format for `limacharlie dr add` or `limacharlie config push`
# ============================================================

rules:
  # ============================================================
  # Rule 1: F0 Directory File Creation Detection
  # Purpose: Detect file drops in the C:\F0 staging directory
  # Confidence: High
  # ============================================================
  mde-auth-bypass-f0-file-creation:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        - op: contains
          path: event/FILE_PATH
          value: "\\F0\\"
        - op: or
          rules:
            - op: ends with
              path: event/FILE_PATH
              value: ".ps1"
            - op: ends with
              path: event/FILE_PATH
              value: ".exe"
            - op: ends with
              path: event/FILE_PATH
              value: ".json"
            - op: ends with
              path: event/FILE_PATH
              value: ".txt"

    respond:
      - action: report
        name: MDE Auth Bypass - F0 Directory File Creation
        metadata:
          test_id: b6c73735-0c24-4a1e-8f0a-3c24af39671b
          mitre_attack: T1562.001
          severity: high
          description: File created in C:\F0 staging directory - potential MDE authentication bypass attack

  # ============================================================
  # Rule 2: Fake MsSense Process Detection
  # Purpose: Detect MsSense.exe running from non-standard paths
  # Confidence: Critical
  # ============================================================
  mde-auth-bypass-fake-mssense:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: or
          rules:
            - op: is
              path: event/FILE_PATH
              value: "MsSense.exe"
              case sensitive: false
            - op: is
              path: event/FILE_PATH
              value: "fake_mssense.exe"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "MsSense.exe"
        - op: not
          rule:
            op: or
            rules:
              - op: contains
                path: event/FILE_PATH
                value: "Program Files\\Windows Defender"
              - op: contains
                path: event/FILE_PATH
                value: "Windows\\System32"
              - op: contains
                path: event/FILE_PATH
                value: "Windows Defender Advanced Threat Protection"

    respond:
      - action: report
        name: MDE Auth Bypass - Fake MsSense Process Detected
        metadata:
          test_id: b6c73735-0c24-4a1e-8f0a-3c24af39671b
          mitre_attack: T1562.001
          severity: critical
          description: Process impersonating MDE MsSense service detected from non-standard path
      - action: task
        command: deny_tree
        investigation: MDE Service Impersonation

  # ============================================================
  # Rule 3: Isolation Spoofer Execution Detection
  # Purpose: Detect isolation_spoofer.exe process
  # Confidence: Critical
  # ============================================================
  mde-auth-bypass-isolation-spoofer:
    detect:
      target: edr
      event: NEW_PROCESS
      op: or
      rules:
        - op: contains
          path: event/FILE_PATH
          value: "isolation_spoofer"
        - op: contains
          path: event/COMMAND_LINE
          value: "isolation_spoof"
        - op: contains
          path: event/COMMAND_LINE
          value: "spoof_result"

    respond:
      - action: report
        name: MDE Auth Bypass - Isolation Spoofer Detected
        metadata:
          test_id: b6c73735-0c24-4a1e-8f0a-3c24af39671b
          mitre_attack: T1562.001
          severity: critical
          description: Isolation status spoofing tool detected - device may show false isolation status
      - action: task
        command: deny_tree
        investigation: Isolation Spoofing Attack

  # ============================================================
  # Rule 4: MDE Interceptor PowerShell Script Detection
  # Purpose: Detect mde_interceptor.ps1 execution
  # Confidence: Critical
  # ============================================================
  mde-auth-bypass-interceptor-script:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: or
          rules:
            - op: is
              path: event/FILE_PATH
              value: "powershell.exe"
              case sensitive: false
            - op: is
              path: event/FILE_PATH
              value: "pwsh.exe"
              case sensitive: false
            - op: ends with
              path: event/FILE_PATH
              value: "powershell.exe"
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: "mde_interceptor"
            - op: contains
              path: event/COMMAND_LINE
              value: "interceptor_status"
            - op: contains
              path: event/COMMAND_LINE
              value: "intercepted_commands"

    respond:
      - action: report
        name: MDE Auth Bypass - MDE Interceptor Script Detected
        metadata:
          test_id: b6c73735-0c24-4a1e-8f0a-3c24af39671b
          mitre_attack: T1059.001
          severity: critical
          description: PowerShell script targeting MDE command interception detected
      - action: task
        command: deny_tree
        investigation: MDE Command Interception Attack

  # ============================================================
  # Rule 5: Certificate Bypass Watchdog Detection
  # Purpose: Detect cert_bypass_watchdog.exe process
  # Confidence: High
  # ============================================================
  mde-auth-bypass-watchdog:
    detect:
      target: edr
      event: NEW_PROCESS
      op: or
      rules:
        - op: contains
          path: event/FILE_PATH
          value: "cert_bypass_watchdog"
        - op: contains
          path: event/COMMAND_LINE
          value: "watchdog"
          case sensitive: false
        - op: and
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "\\F0\\"
            - op: contains
              path: event/COMMAND_LINE
              value: "auto-restore"

    respond:
      - action: report
        name: MDE Auth Bypass - Certificate Bypass Watchdog Detected
        metadata:
          test_id: b6c73735-0c24-4a1e-8f0a-3c24af39671b
          mitre_attack: T1014
          severity: high
          description: Certificate pinning bypass watchdog process detected

  # ============================================================
  # Rule 6: MDE Registry Key Access Detection
  # Purpose: Detect non-MDE process accessing MDE registry keys
  # Confidence: High
  # ============================================================
  mde-auth-bypass-registry-access:
    detect:
      target: edr
      event: REGISTRY_VALUE_READ
      op: and
      rules:
        - op: or
          rules:
            - op: contains
              path: event/REGISTRY_KEY
              value: "Windows Advanced Threat Protection"
            - op: contains
              path: event/REGISTRY_KEY
              value: "Windows Defender Advanced Threat Protection"
        - op: or
          rules:
            - op: is
              path: event/VALUE_NAME
              value: "MachineId"
            - op: is
              path: event/VALUE_NAME
              value: "SenseId"
            - op: is
              path: event/VALUE_NAME
              value: "OrgId"
            - op: is
              path: event/VALUE_NAME
              value: "TenantId"
        - op: not
          rule:
            op: or
            rules:
              - op: ends with
                path: event/FILE_PATH
                value: "MsSense.exe"
              - op: ends with
                path: event/FILE_PATH
                value: "SenseIR.exe"
              - op: ends with
                path: event/FILE_PATH
                value: "MsMpEng.exe"

    respond:
      - action: report
        name: MDE Auth Bypass - MDE Identifier Extraction Detected
        metadata:
          test_id: b6c73735-0c24-4a1e-8f0a-3c24af39671b
          mitre_attack: T1562.001
          severity: high
          description: Non-MDE process accessing MDE identifier registry keys

  # ============================================================
  # Rule 7: PowerShell MDE Endpoint Targeting Detection
  # Purpose: Detect PowerShell targeting MDE cloud endpoints
  # Confidence: High
  # ============================================================
  mde-auth-bypass-powershell-endpoint:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: or
          rules:
            - op: ends with
              path: event/FILE_PATH
              value: "powershell.exe"
            - op: ends with
              path: event/FILE_PATH
              value: "pwsh.exe"
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: "winatp-gw"
            - op: contains
              path: event/COMMAND_LINE
              value: "/edr/commands/"
            - op: contains
              path: event/COMMAND_LINE
              value: "/senseir/v1/"
            - op: contains
              path: event/COMMAND_LINE
              value: "cloudlr"
              case sensitive: false

    respond:
      - action: report
        name: MDE Auth Bypass - PowerShell MDE Endpoint Targeting
        metadata:
          test_id: b6c73735-0c24-4a1e-8f0a-3c24af39671b
          mitre_attack: T1071.001
          severity: high
          description: PowerShell script targeting MDE cloud endpoints detected

  # ============================================================
  # Rule 8: CloudLR Token File Creation Detection
  # Purpose: Detect creation of unauthorized CloudLR token files
  # Confidence: Critical
  # ============================================================
  mde-auth-bypass-cloudlr-token:
    detect:
      target: edr
      event: FILE_CREATE
      op: or
      rules:
        - op: contains
          path: event/FILE_PATH
          value: "cloudlr_token"
        - op: and
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "\\F0\\"
            - op: or
              rules:
                - op: contains
                  path: event/FILE_PATH
                  value: "token"
                - op: contains
                  path: event/FILE_PATH
                  value: "session"

    respond:
      - action: report
        name: MDE Auth Bypass - CloudLR Token Generation Detected
        metadata:
          test_id: b6c73735-0c24-4a1e-8f0a-3c24af39671b
          mitre_attack: T1134
          severity: critical
          description: Unauthorized CloudLR (Live Response) token file creation detected

  # ============================================================
  # Rule 9: MDE Network Connection from Non-MDE Process
  # Purpose: Detect non-MDE processes connecting to MDE endpoints
  # Confidence: High
  # ============================================================
  mde-auth-bypass-network-access:
    detect:
      target: edr
      event: NEW_TCP4_CONNECTION
      op: and
      rules:
        - op: or
          rules:
            - op: contains
              path: event/DESTINATION
              value: "winatp-gw"
            - op: contains
              path: event/DESTINATION
              value: "microsoft.com"
        - op: not
          rule:
            op: or
            rules:
              - op: ends with
                path: event/FILE_PATH
                value: "MsSense.exe"
              - op: ends with
                path: event/FILE_PATH
                value: "SenseIR.exe"

    respond:
      - action: report
        name: MDE Auth Bypass - Unauthorized MDE Network Access
        metadata:
          test_id: b6c73735-0c24-4a1e-8f0a-3c24af39671b
          mitre_attack: T1071.001
          severity: high
          description: Non-MDE process attempting to connect to MDE cloud endpoints

  # ============================================================
  # Rule 10: Memory Manipulation API Calls Detection
  # Purpose: Detect CRYPT32 memory manipulation attempts
  # Confidence: Critical
  # ============================================================
  mde-auth-bypass-memory-manipulation:
    detect:
      target: edr
      event: NEW_PROCESS
      op: or
      rules:
        - op: and
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: "CRYPT32"
            - op: or
              rules:
                - op: contains
                  path: event/COMMAND_LINE
                  value: "patch"
                - op: contains
                  path: event/COMMAND_LINE
                  value: "bypass"
        - op: and
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: "CertVerify"
            - op: contains
              path: event/COMMAND_LINE
              value: "patch"

    respond:
      - action: report
        name: MDE Auth Bypass - Certificate Pinning Bypass Attempt
        metadata:
          test_id: b6c73735-0c24-4a1e-8f0a-3c24af39671b
          mitre_attack: T1014
          severity: critical
          description: Attempt to bypass certificate pinning via CRYPT32 memory manipulation

  # ============================================================
  # Rule 11: Attack Summary File Creation Detection
  # Purpose: Detect creation of attack summary artifacts
  # Confidence: High
  # ============================================================
  mde-auth-bypass-summary-file:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        - op: contains
          path: event/FILE_PATH
          value: "\\F0\\"
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "attack_summary"
            - op: contains
              path: event/FILE_PATH
              value: "mde_identifiers"
            - op: contains
              path: event/FILE_PATH
              value: "spoof_result"
            - op: contains
              path: event/FILE_PATH
              value: "network_test"

    respond:
      - action: report
        name: MDE Auth Bypass - Attack Artifact File Created
        metadata:
          test_id: b6c73735-0c24-4a1e-8f0a-3c24af39671b
          mitre_attack: T1562.001
          severity: high
          description: MDE authentication bypass attack artifact file detected

  # ============================================================
  # Rule 12: Emergency Restore Script Detection
  # Purpose: Detect emergency_restore.ps1 extraction or execution
  # Confidence: High
  # ============================================================
  mde-auth-bypass-emergency-restore:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        - op: contains
          path: event/FILE_PATH
          value: "\\F0\\"
        - op: contains
          path: event/FILE_PATH
          value: "emergency_restore"

    respond:
      - action: report
        name: MDE Auth Bypass - Emergency Restore Script Detected
        metadata:
          test_id: b6c73735-0c24-4a1e-8f0a-3c24af39671b
          mitre_attack: T1014
          severity: high
          description: Certificate bypass emergency restore script detected

  # ============================================================
  # Rule 13: Sensitive Process Access for Debug Privilege
  # Purpose: Detect debug privilege acquisition for memory manipulation
  # Confidence: High
  # ============================================================
  mde-auth-bypass-debug-privilege:
    detect:
      target: edr
      event: SENSITIVE_PROCESS_ACCESS
      op: and
      rules:
        - op: contains
          path: event/TARGET_PROCESS_FILENAME
          value: "lsass.exe"
        - op: not
          rule:
            op: or
            rules:
              - op: ends with
                path: event/FILE_PATH
                value: "MsMpEng.exe"
              - op: ends with
                path: event/FILE_PATH
                value: "MsSense.exe"

    respond:
      - action: report
        name: MDE Auth Bypass - Debug Privilege Abuse Detected
        metadata:
          test_id: b6c73735-0c24-4a1e-8f0a-3c24af39671b
          mitre_attack: T1134
          severity: high
          description: Non-security process accessing sensitive process - potential debug privilege abuse

# ============================================================
# END OF LIMACHARLIE D&R RULES
