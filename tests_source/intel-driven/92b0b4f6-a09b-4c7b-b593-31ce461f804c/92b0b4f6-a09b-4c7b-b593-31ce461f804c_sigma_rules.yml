title: Combined APT42 TAMECAT Kill Chain - Multi-Indicator Correlation
id: 92b0b4f6-sigma-011
status: stable
description: |
  Temporal correlation of multiple APT42 TAMECAT indicators. This rule represents
  the concept of correlating VBScript execution, encoded PowerShell, registry
  persistence (Run key or UserInitMprLogonScript), browser credential access,
  and Telegram C2 on the same host. Requires SIEM-level correlation of rules
  92b0b4f6-sigma-003 through 92b0b4f6-sigma-009.
  Note: Implement as a correlation rule in your SIEM platform.
references:
  - https://attack.mitre.org/groups/G1024/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.execution
  - attack.t1059.001
  - attack.persistence
  - attack.t1547.001
  - attack.t1037.001
  - attack.credential-access
  - attack.t1555.003
  - attack.command-and-control
  - attack.t1102
  - apt42
  - tamecat
logsource:
  category: process_creation
  product: windows
detection:
  # Placeholder: Correlate rules sigma-003/004 AND sigma-005/006 AND sigma-009
  # on same DeviceName within 4-hour window. 3+ distinct indicators = critical.
  selection_encoded_ps:
    Image|endswith: '\powershell.exe'
    CommandLine|contains:
      - '-EncodedCommand'
      - '-enc '
  condition: selection_encoded_ps
falsepositives:
  - Extremely low when 3+ indicators correlate on same host
level: critical
