---
title: macOS osascript Credential Phishing Dialog
id: 3e985e9e-sigma-001
status: stable
description: |
  Detects osascript execution with credential phishing parameters: "display dialog"
  combined with "hidden answer" and password-related keywords. This is the primary
  credential capture technique used by AMOS, Banshee, and Cuckoo macOS stealers.
  The combination of a system dialog requesting a password with hidden input is
  the hallmark of macOS credential phishing and is extremely rare in legitimate use.
references:
  - https://attack.mitre.org/techniques/T1059/002/
  - https://attack.mitre.org/techniques/T1056/002/
  - https://redcanary.com/threat-detection-report/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.execution
  - attack.credential-access
  - attack.t1059.002
  - attack.t1056.002
  - amos
  - banshee
  - cuckoo
  - macos
logsource:
  category: process_creation
  product: macos
detection:
  selection_process:
    Image|endswith: '/osascript'
  selection_dialog:
    CommandLine|contains:
      - 'display dialog'
      - 'display alert'
  selection_hidden:
    CommandLine|contains: 'hidden answer'
  selection_password:
    CommandLine|contains:
      - 'password'
      - 'Password'
      - 'credential'
      - 'System Preferences'
      - 'macOS wants'
      - 'unlock'
      - 'authenticate'
      - 'sign in'
  condition: selection_process and selection_dialog and selection_hidden and selection_password
falsepositives:
  - Legitimate system administration AppleScripts requesting authentication (very rare with hidden answer)
level: critical

---
title: macOS dscl Credential Validation via authonly
id: 3e985e9e-sigma-002
status: stable
description: |
  Detects the use of dscl (Directory Service command line) with the -authonly flag
  to validate credentials. This is the universal password validation step shared by
  AMOS, Banshee, and Cuckoo stealers after phishing the user's password via
  osascript. Legitimate use of dscl -authonly from user-context processes is
  extremely rare and warrants immediate investigation.
references:
  - https://attack.mitre.org/techniques/T1059/002/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.execution
  - attack.t1059.002
  - amos
  - banshee
  - cuckoo
  - macos
logsource:
  category: process_creation
  product: macos
detection:
  selection:
    Image|endswith: '/dscl'
    CommandLine|contains: '-authonly'
  filter_legitimate:
    ParentImage|endswith:
      - '/loginwindow'
      - '/SecurityAgent'
      - '/authorizationhost'
  condition: selection and not filter_legitimate
falsepositives:
  - System authentication processes (filtered above)
  - Custom PAM modules or login managers
level: critical

---
title: macOS Keychain Credential Extraction Commands
id: 3e985e9e-sigma-003
status: stable
description: |
  Detects execution of macOS security commands associated with keychain credential
  extraction, including list-keychains, find-generic-password, dump-keychain, and
  Chrome Safe Storage key retrieval. Also detects Chainbreaker tool execution.
  These commands are used by AMOS/Banshee to extract credentials from the macOS
  Keychain after obtaining the user's password.
references:
  - https://attack.mitre.org/techniques/T1555/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.credential-access
  - attack.t1555.001
  - amos
  - banshee
  - macos
logsource:
  category: process_creation
  product: macos
detection:
  selection_security:
    Image|endswith: '/security'
    CommandLine|contains:
      - 'list-keychains'
      - 'find-generic-password'
      - 'dump-keychain'
      - 'find-internet-password'
      - 'find-certificate'
  selection_chainbreaker:
    CommandLine|contains: 'chainbreaker'
  selection_chrome_safe:
    Image|endswith: '/security'
    CommandLine|contains: 'Chrome Safe Storage'
  filter_legitimate:
    ParentImage|endswith:
      - '/Safari'
      - '/Google Chrome'
      - '/Brave Browser'
      - '/SecurityAgent'
  condition: (selection_security or selection_chainbreaker or selection_chrome_safe) and not filter_legitimate
falsepositives:
  - Legitimate browser processes accessing their own keychain entries (filtered)
  - IT administration scripts querying keychain certificates
level: critical

---
title: macOS Multi-Browser Credential Database File Access
id: 3e985e9e-sigma-004
status: stable
description: |
  Detects file access to browser credential databases across multiple browsers
  on macOS. AMOS/Banshee stealers target Login Data, Cookies, and key databases
  across Chrome, Firefox, Safari, Brave, Edge, Opera, Vivaldi, Chromium, and Arc.
  A single non-browser process accessing credential stores from multiple browsers
  in rapid succession is a strong indicator of infostealer activity.
references:
  - https://attack.mitre.org/techniques/T1005/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.collection
  - attack.t1005
  - amos
  - banshee
  - macos
logsource:
  category: file_access
  product: macos
detection:
  selection:
    TargetFilename|contains:
      - 'Application Support/Google/Chrome/Default/Login Data'
      - 'Application Support/Google/Chrome/Default/Cookies'
      - 'Application Support/Firefox/Profiles'
      - 'Safari/Cookies/Cookies.binarycookies'
      - 'Application Support/BraveSoftware/Brave-Browser/Default/Login Data'
      - 'Application Support/Microsoft Edge/Default/Login Data'
      - 'Application Support/com.operasoftware.Opera/Login Data'
      - 'Application Support/Vivaldi/Default/Login Data'
      - 'Application Support/Chromium/Default/Login Data'
      - 'Application Support/Arc/User Data/Default/Login Data'
  filter_browsers:
    Image|endswith:
      - '/Google Chrome'
      - '/Google Chrome Helper'
      - '/firefox'
      - '/Safari'
      - '/Brave Browser'
      - '/Microsoft Edge'
      - '/Opera'
      - '/Vivaldi'
      - '/Chromium'
      - '/Arc'
      - '/mds'
      - '/mds_stores'
      - '/mdworker'
  condition: selection and not filter_browsers
falsepositives:
  - Browser sync engines and update processes
  - Backup utilities (Time Machine, third-party)
  - Spotlight indexing (filtered via mds)
level: high

