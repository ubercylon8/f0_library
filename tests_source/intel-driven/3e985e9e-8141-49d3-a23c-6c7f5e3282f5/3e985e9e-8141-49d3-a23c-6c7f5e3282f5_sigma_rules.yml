title: macOS Cryptocurrency Wallet Extension Directory Enumeration
id: 3e985e9e-sigma-005
status: stable
description: |
  Detects file access to cryptocurrency wallet browser extension directories
  and application data stores. AMOS/Banshee stealers target MetaMask, Coinbase
  Wallet, Phantom, Trust Wallet, Exodus, Atomic Wallet, Electrum, and Bitwarden.
  Access to multiple wallet storage locations from a non-browser process is a
  strong indicator of cryptocurrency-targeting infostealer activity.
references:
  - https://attack.mitre.org/techniques/T1005/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.collection
  - attack.t1005
  - amos
  - banshee
  - macos
logsource:
  category: file_access
  product: macos
detection:
  selection:
    TargetFilename|contains:
      - 'nkbihfbeogaeaoehlefnkodbefgpgknn'    # MetaMask
      - 'hnfanknocfeofbddgcijnmhnfnkdnaad'    # Coinbase Wallet
      - 'bfnaelmomeimhlpmgjnjophhpkkoljpa'     # Phantom (Solana)
      - 'egjidjbpglichdcondbcbdnbeeppgdph'     # Trust Wallet
      - 'Exodus/exodus.wallet'
      - 'atomic/Local Storage/leveldb'
      - '.electrum/wallets'
      - 'Bitwarden/data.json'
  filter_browsers:
    Image|endswith:
      - '/Google Chrome'
      - '/Google Chrome Helper'
      - '/Brave Browser'
      - '/firefox'
  condition: selection and not filter_browsers
falsepositives:
  - Wallet application self-access (e.g., Exodus reading its own data)
  - Browser extensions accessing their own storage directories
level: high

