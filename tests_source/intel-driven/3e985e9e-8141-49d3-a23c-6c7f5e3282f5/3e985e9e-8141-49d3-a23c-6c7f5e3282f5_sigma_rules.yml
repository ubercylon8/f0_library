title: macOS TCC Database Reset via tccutil
id: 3e985e9e-sigma-006
status: stable
description: |
  Detects execution of tccutil with the reset command, used by Cuckoo Stealer
  to clear Transparency, Consent, and Control (TCC) database entries. This
  forces macOS to re-prompt the user for permissions, allowing the stealer
  to re-request Automation access. Any non-system invocation of tccutil reset
  is suspicious.
references:
  - https://attack.mitre.org/techniques/T1059/002/
  - https://www.kandji.io/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.execution
  - attack.defense-evasion
  - attack.t1059.002
  - cuckoo
  - macos
logsource:
  category: process_creation
  product: macos
detection:
  selection:
    Image|endswith: '/tccutil'
    CommandLine|contains: 'reset'
  condition: selection
falsepositives:
  - IT administrators troubleshooting TCC permission issues
  - MDM tools resetting application permissions
level: high

