title: macOS dscl Local User Account Enumeration
id: 3e985e9e-sigma-012
status: stable
description: |
  Detects dscl commands used to enumerate local user accounts, a
  reconnaissance step performed by macOS stealers to identify target
  accounts for credential harvesting. Commands like "dscl . -list /Users"
  are used by AMOS/Banshee before presenting credential phishing dialogs.
references:
  - https://attack.mitre.org/techniques/T1059/002/
  - https://attack.mitre.org/techniques/T1087/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.discovery
  - attack.t1087.001
  - attack.execution
  - attack.t1059.002
  - macos
logsource:
  category: process_creation
  product: macos
detection:
  selection:
    Image|endswith: '/dscl'
    CommandLine|contains:
      - '-list /Users'
      - 'list /Users'
      - '-read /Users'
  filter_system:
    ParentImage|endswith:
      - '/loginwindow'
      - '/SecurityAgent'
      - '/opendirectoryd'
      - '/DirectoryService'
  condition: selection and not filter_system
falsepositives:
  - System administration scripts
  - Directory services troubleshooting
level: medium

