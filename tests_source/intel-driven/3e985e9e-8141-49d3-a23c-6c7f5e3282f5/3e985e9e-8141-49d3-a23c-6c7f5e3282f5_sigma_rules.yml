title: macOS Infostealer Full Kill Chain Correlation
id: 3e985e9e-sigma-013
status: stable
description: |
  Correlation rule detecting the complete AMOS/Banshee infostealer kill chain
  on a single host: osascript credential phishing, followed by keychain access,
  followed by browser credential database access. The co-occurrence of these
  three behaviors within a short time window on the same endpoint is a
  near-certain indicator of active infostealer compromise.
references:
  - https://attack.mitre.org/techniques/T1059/002/
  - https://attack.mitre.org/techniques/T1555/001/
  - https://attack.mitre.org/techniques/T1005/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.execution
  - attack.credential-access
  - attack.collection
  - attack.t1059.002
  - attack.t1555.001
  - attack.t1005
  - amos
  - banshee
  - cuckoo
  - macos
logsource:
  category: process_creation
  product: macos
detection:
  # This is a conceptual correlation rule. SIEM-specific implementation
  # required for temporal correlation across multiple event types.
  osascript_phishing:
    Image|endswith: '/osascript'
    CommandLine|contains: 'hidden answer'
  keychain_access:
    Image|endswith: '/security'
    CommandLine|contains:
      - 'list-keychains'
      - 'find-generic-password'
      - 'dump-keychain'
  # Note: Full implementation requires temporal correlation
  # across these two event types within a 30-minute window
  condition: osascript_phishing or keychain_access
  # Deploy as two separate rules feeding a correlation engine
falsepositives:
  - None expected when all three indicators correlate on same host
level: critical
