title: macOS Apple Notes Database Access by Non-Apple Process
id: 3e985e9e-sigma-007
status: stable
description: |
  Detects access to the Apple Notes database (NoteStore.sqlite) by processes
  other than Notes.app and Spotlight indexing. AMOS stealer targets Apple Notes
  to harvest passwords and sensitive data users store in notes. Non-Apple
  processes accessing this database should be investigated.
references:
  - https://attack.mitre.org/techniques/T1005/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.collection
  - attack.t1005
  - amos
  - macos
logsource:
  category: file_access
  product: macos
detection:
  selection:
    TargetFilename|contains:
      - 'NoteStore.sqlite'
      - 'group.com.apple.notes'
  filter_legitimate:
    Image|endswith:
      - '/Notes'
      - '/mds'
      - '/mds_stores'
      - '/mdworker'
      - '/Spotlight'
      - '/backupd'
      - '/cloudd'
  condition: selection and not filter_legitimate
falsepositives:
  - Third-party backup utilities accessing Notes data
  - Note export/migration tools
level: high

---
title: macOS Exfiltration Archive Creation (out.zip Pattern)
id: 3e985e9e-sigma-008
status: stable
description: |
  Detects creation of archive files with names characteristic of infostealer
  data staging (out.zip, output.zip, data.zip, loot.zip, dump.zip). AMOS
  creates "out.zip" containing all stolen credentials, cookies, wallet data,
  and notes before exfiltrating via HTTP POST. Large archive creation in
  user or temp directories by non-standard tools warrants investigation.
references:
  - https://attack.mitre.org/techniques/T1560/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.collection
  - attack.t1560.001
  - amos
  - banshee
  - macos
logsource:
  category: file_event
  product: macos
detection:
  selection_names:
    TargetFilename|endswith:
      - '/out.zip'
      - '/output.zip'
      - '/data.zip'
      - '/loot.zip'
      - '/steal.zip'
      - '/dump.zip'
  selection_temp_zip:
    TargetFilename|endswith: '.zip'
    TargetFilename|contains:
      - '/tmp/'
      - '/var/tmp/'
      - '/Users/'
  filter_legitimate:
    Image|endswith:
      - '/Finder'
      - '/Archive Utility'
      - '/zip'
      - '/tar'
      - '/ditto'
  condition: (selection_names or selection_temp_zip) and not filter_legitimate
falsepositives:
  - Development tools creating ZIP archives in temp directories
  - User-initiated archive creation
level: high

---
title: macOS HTTP POST Exfiltration with Stealer Metadata Fields
id: 3e985e9e-sigma-009
status: stable
description: |
  Detects non-browser processes making HTTP connections with command line
  arguments containing AMOS/Banshee stealer C2 protocol identifiers: hwid
  (hardware ID), wid (worker ID), sendlog, or multipart/form-data. These
  fields are characteristic of the AMOS MaaS exfiltration protocol.
references:
  - https://attack.mitre.org/techniques/T1041/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.exfiltration
  - attack.t1041
  - amos
  - banshee
  - macos
logsource:
  category: process_creation
  product: macos
detection:
  selection:
    CommandLine|contains:
      - 'hwid'
      - 'sendlog'
  selection_multipart:
    CommandLine|contains|all:
      - 'multipart/form-data'
      - 'wid'
  filter_browsers:
    Image|endswith:
      - '/Safari'
      - '/Google Chrome'
      - '/firefox'
      - '/Brave Browser'
      - '/Microsoft Edge'
      - '/Opera'
      - '/Arc'
  condition: (selection or selection_multipart) and not filter_browsers
falsepositives:
  - Legitimate tools using hwid or wid parameters in non-malicious contexts
  - Custom upload scripts using multipart/form-data
level: critical

---
title: macOS Cuckoo Stealer Hidden Directory Credential Cache
id: 3e985e9e-sigma-010
status: stable
description: |
  Detects creation of hidden directories matching the .local-UUID pattern
  with pw.dat credential cache files inside. This is the specific credential
  storage pattern used by Cuckoo Stealer after phishing the user's password
  via osascript dialog. The .local-UUID/pw.dat combination is highly specific
  and has virtually no legitimate use.
references:
  - https://attack.mitre.org/techniques/T1059/002/
  - https://www.kandji.io/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.execution
  - attack.credential-access
  - attack.t1059.002
  - cuckoo
  - macos
logsource:
  category: file_event
  product: macos
detection:
  selection_pwdat:
    TargetFilename|endswith: '/pw.dat'
    TargetFilename|contains: '.local-'
  selection_credentials_cache:
    TargetFilename|endswith: '/.credentials_cache'
  condition: selection_pwdat or selection_credentials_cache
falsepositives:
  - None expected - this pattern is highly specific to Cuckoo Stealer
level: critical

---
title: macOS Keychain Database Direct File Read
id: 3e985e9e-sigma-011
status: stable
description: |
  Detects direct file read access to macOS Keychain database files
  (login.keychain-db, System.keychain, iCloud.keychain) by non-system
  processes. This indicates use of Chainbreaker or similar tools that
  parse keychain databases directly rather than through the security
  command, bypassing access control prompts.
references:
  - https://attack.mitre.org/techniques/T1555/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
  - attack.credential-access
  - attack.t1555.001
  - amos
  - banshee
  - macos
logsource:
  category: file_access
  product: macos
detection:
  selection:
    TargetFilename|contains:
      - 'Library/Keychains/login.keychain-db'
      - 'Library/Keychains/System.keychain'
      - 'Library/Keychains/iCloud.keychain'
  filter_system:
    Image|endswith:
      - '/securityd'
      - '/SecurityAgent'
      - '/loginwindow'
      - '/keychain-circle-notification'
      - '/Safari'
      - '/Google Chrome'
      - '/Brave Browser'
      - '/Microsoft Edge'
      - '/SystemUIServer'
      - '/Keychain Access'
      - '/secd'
  condition: selection and not filter_system
falsepositives:
  - Keychain repair utilities
  - Third-party backup tools reading keychain files
level: critical

