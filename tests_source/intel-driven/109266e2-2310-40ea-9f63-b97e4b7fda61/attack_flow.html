    <style>

            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
        }

        /* F0RT1KA Header - Hidden when embedded in browser */
        .framework-header {
            display: none; /* Redundant - browser header shows F0RT1KA branding */
        }

        .framework-title {
            font-size: 1.2em;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ff6b6b, #ff8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .framework-subtitle {
            position: absolute;
            right: 30px;
            font-size: 0.85em;
            color: #6b7280;
            font-style: italic;
        }

        .dashboard-container {
            display: flex;
            height: 100vh; /* Full height since header is hidden */
            position: relative;
        }

        /* Left Panel - Attack Flow View */
        .attack-flow-panel {
            flex: 1;
            min-width: 60%;
            padding: 20px;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Test title header - Hidden when embedded in browser */
        .header {
            display: none; /* Redundant - browser header shows test name */
        }

        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #ff4458, #ff8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #9ca3af;
            font-size: 1em;
        }

        /* View Toggle Buttons */
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .view-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .view-btn.active {
            background: rgba(255, 107, 107, 0.1);
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .view-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        /* SVG Attack Flow Container */
        .attack-flow-svg-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 10px;
            position: relative;
            flex: 1;
            min-height: 0; /* Allow flex shrinking */
            overflow: hidden;
        }

        .attack-flow-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Timeline View (Hidden by default) */
        .timeline-view {
            display: none;
            padding: 20px;
        }

        .timeline-view.active {
            display: block;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .timeline-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }

        .timeline-item.active {
            background: rgba(255, 107, 107, 0.05);
            border-left-color: #ff6b6b;
        }

        .timeline-number {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            border: 2px solid;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-size: 1.1em;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .timeline-meta {
            font-size: 0.85em;
            color: #9ca3af;
        }

        .details-panel {
            width: 450px;
            background: #0f1419; /* Solid opaque background */
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            overflow-y: auto;
            position: relative;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.8); /* Add shadow for depth */

        .details-panel.active {
            transform: translateX(0);
        }

        .details-header {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .details-phase-number {

            width: 40px;
            height: 40px;
            border-radius: 50%;
            text-align: center;
            line-height: 36px;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
            border: 2px solid;
        }

        .details-title {
            font-size: 1.5em;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .details-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
        }

        .meta-label {
            color: #6b7280;
        }

        .meta-value {
            color: #d1d5db;
            font-family: 'SF Mono', monospace;
        }

        .mitre-link {
            color: #4fc3f7;
            text-decoration: none;
            border-bottom: 1px dotted #4fc3f7;
            transition: all 0.2s ease;
        }

        .mitre-link:hover {
            color: #29b6f6;
            border-bottom-style: solid;
        }

        .severity-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            border: 1px solid;
        }

        .severity-badge.critical {
            color: #ff4444;
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }

        .severity-badge.high {
            color: #ff9f43;
            border-color: #ff9f43;
            background: rgba(255, 159, 67, 0.1);
        }

        .severity-badge.medium {
            color: #ffc107;
            border-color: #ffc107;
            background: rgba(255, 193, 7, 0.1);
        }

        .severity-badge.info {
            color: #4fc3f7;
            border-color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
        }

        .details-section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.1em;
            color: #ff6b6b;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-list {
            list-style: none;
        }

        .action-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .action-title {
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .action-details {
            list-style: none;
            padding-left: 0;
        }

        .action-details li {
            color: #9ca3af;
            font-size: 0.85em;
            padding: 3px 0;
            padding-left: 15px;
            position: relative;
        }

        .action-details li::before {
            content: '>';
            position: absolute;
            left: 0;
            color: #6b7280;
        }

        /* Code Preview */
        .code-preview {
            background: #0a0e27;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 0.85em;
            overflow-x: auto;
        }

        .code-line {
            color: #66bb6a;
            line-height: 1.5;
        }

        .code-comment {
            color: #6b7280;
        }

        .code-highlight {
            color: #ff9f43;
        }

        /* Close button for details panel */
        .close-details {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #6b7280;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
            display: none;
        }

        .close-details:hover {
            color: #ff6b6b;
        }

        /* Mobile responsive */
        @media (max-width: 1200px) {
            .details-panel {
                position: absolute;
                right: 0;
                top: 0;
                height: 100%;
                z-index: 100;
            }

            .close-details {
                display: block;
            }

            .framework-subtitle {
                display: none;
            }
        }

        /* Loading animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Interactive component styling */
        .component {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .component:hover .component-box {
            filter: drop-shadow(0 0 15px rgba(255, 107, 107, 0.4));
            stroke-width: 2;
        }

        .component.active .component-box {
            filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.6));
            stroke: #ff6b6b;
            stroke-width: 2;
        }

        /* Pulse animation for active elements */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        /* Navigation hints - Hidden when embedded */
        .nav-hint {
            display: none; /* Redundant - diagram title says "Click components for details" */
        }

        .nav-hint-icon {
            color: #ff6b6b;
        }

        /* Sidebar toggle button */
        .sidebar-toggle {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 80px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-right: none;
            border-radius: 8px 0 0 8px;
            color: #ff6b6b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 200;
            transition: all 0.3s ease;
        }

        .sidebar-toggle:hover {
            background: rgba(255, 107, 107, 0.2);
            width: 32px;
        }

        .sidebar-toggle .toggle-icon {
            transition: transform 0.3s ease;
        }

        .sidebar-toggle.collapsed .toggle-icon {
            transform: rotate(180deg);
        }

        .sidebar-toggle.expanded {
            right: 450px;
        }

        .details-panel.collapsed {
            transform: translateX(100%) !important;
        }

        /* Stats overlay */
        .stats-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .stat-mini {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .stat-mini-value {
            color: #ff6b6b;
            font-weight: bold;
        }

        .stat-mini-label {
            color: #6b7280;
            margin-left: 5px;
        }
    </style>
</head>

        // Current active phase
        let currentPhase = null;

        // Sidebar toggle state
        var sidebarCollapsed = false;
        function toggleSidebar() {
            var detailsPanel = document.getElementById('detailsPanel');
            var toggleBtn = document.getElementById('sidebarToggle');

            sidebarCollapsed = !sidebarCollapsed;

            if (sidebarCollapsed) {
                detailsPanel.classList.add('collapsed');
                toggleBtn.classList.remove('expanded');
                toggleBtn.classList.add('collapsed');
            } else {
                detailsPanel.classList.remove('collapsed');
                if (detailsPanel.classList.contains('active')) {
                    toggleBtn.classList.add('expanded');
                }
                toggleBtn.classList.remove('collapsed');
            }
        }

        // Function to create MITRE links
        function createMitreLinks(mitreArray) {
            return mitreArray.map(function(technique) {
                var baseUrl = "https://attack.mitre.org/techniques/";
                var techId = technique.id.replace('.', '/'); // Handle sub-techniques like T1059.001
                return '<a href="' + baseUrl + techId + '" target="_blank" class="mitre-link" title="' + technique.name + '">' + technique.id + '</a>';
            }).join(', ');
        }

        // Initialize timeline view
        function initializeTimeline() {
            var timelineView = document.getElementById('timelineView');
            var html = '';

            for (var i = 1; i <= 7; i++) {
                var phase = phaseData[i];
                var severityColor = getSeverityColor(phase.severity);
                var mitreText = phase.mitre.map(function(t) { return t.id; }).join(', ');

                html += '<div class="timeline-item" onclick="showPhaseDetails(' + i + ')">' +
                    '<div class="timeline-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' +
                        i +
                    '</div>' +
                    '<div class="timeline-content">' +
                        '<div class="timeline-title">' + phase.title + '</div>' +
                        '<div class="timeline-meta">' +
                            phase.time + ' | ' + mitreText + ' | ' + (phase.status === 'actual' ? 'Actual' : 'Simulated') +
                        '</div>' +
                    '</div>' +
                '</div>';
            }

            timelineView.innerHTML = html;
        }

        // Show phase details
        function showPhaseDetails(phaseNum) {
            currentPhase = phaseNum;
            var phase = phaseData[phaseNum];
            var detailsPanel = document.getElementById('detailsPanel');
            var detailsContent = document.getElementById('detailsContent');

            // Update active states
            var components = document.querySelectorAll('.component');
            for (var i = 0; i < components.length; i++) {
                components[i].classList.remove('active');
            }
            var timelineItems = document.querySelectorAll('.timeline-item');
            for (var i = 0; i < timelineItems.length; i++) {
                timelineItems[i].classList.remove('active');
            }

            // Add active state to clicked component
            var activeComponent = document.querySelector('.component[data-phase="' + phaseNum + '"]');
            if (activeComponent) {
                activeComponent.classList.add('active');
            }

            // Add active state to timeline item
            if (timelineItems[phaseNum - 1]) {
                timelineItems[phaseNum - 1].classList.add('active');
            }

            // Generate details HTML
            var severityColor = getSeverityColor(phase.severity);
            var actionsHtml = '';

            for (var j = 0; j < phase.actions.length; j++) {
                var action = phase.actions[j];
                var detailsHtml = '';
                for (var k = 0; k < action.details.length; k++) {
                    detailsHtml += '<li>' + action.details[k] + '</li>';
                }
                actionsHtml += '<div class="action-item">' +
                    '<div class="action-title">' + action.title + '</div>' +
                    '<ul class="action-details">' + detailsHtml + '</ul>' +
                '</div>';
            }

            var mitreLinks = createMitreLinks(phase.mitre);

            var codeHtml = '';
            if (phase.code) {
                var codeLines = phase.code.split('\n');
                var codeLinesHtml = '';
                for (var m = 0; m < codeLines.length; m++) {
                    var line = codeLines[m];
                    if (line.indexOf('#') === 0) {
                        codeLinesHtml += '<div class="code-line code-comment">' + escapeHtml(line) + '</div>';
                    } else {
                        codeLinesHtml += '<div class="code-line">' + escapeHtml(line) + '</div>';
                    }
                }
                codeHtml = '<div class="details-section">' +
                    '<h3 class="section-title">' +
                        '<span>Code Preview</span>' +
                    '</h3>' +
                    '<div class="code-preview">' + codeLinesHtml + '</div>' +
                '</div>';
            }

            detailsContent.innerHTML = '<div class="details-header">' +
                '<div class="details-phase-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">' +
                    phase.number +
                '</div>' +
                '<h2 class="details-title">' + phase.title + '</h2>' +
                '<div class="severity-badge ' + phase.severity + '">' + phase.severity.toUpperCase() + '</div>' +
                '<div class="details-meta">' +
                    '<div class="meta-item">' +
                        '<span class="meta-label">MITRE:</span>' +
                        '<span class="meta-value">' + mitreLinks + '</span>' +
                    '</div>' +
                    '<div class="meta-item">' +
                        '<span class="meta-label">Time:</span>' +
                        '<span class="meta-value">' + phase.time + '</span>' +
                    '</div>' +
                    '<div class="meta-item">' +
                        '<span class="meta-label">Status:</span>' +
                        '<span class="meta-value">' + (phase.status === 'actual' ? 'Actual execution' : 'Simulated only') + '</span>' +
                    '</div>' +
                '</div>' +
            '</div>' +
            '<div class="details-section">' +
                '<p style="color: #9ca3af; margin-bottom: 20px;">' + phase.description + '</p>' +
            '</div>' +
            '<div class="details-section">' +
                '<h3 class="section-title">' +
                    '<span>Actions Performed</span>' +
                '</h3>' +
                '<div class="action-list">' + actionsHtml + '</div>' +
            '</div>' +
            codeHtml;

            // Show details panel
            detailsPanel.classList.add('active');

            // Update progress bar
            updateProgressBar(phaseNum);

            // Position toggle button with sidebar
            var toggleBtn = document.getElementById('sidebarToggle');
            if (!sidebarCollapsed) {
                toggleBtn.classList.add('expanded');
            }
        }

        // Escape HTML for code display
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // Close details panel
        function closeDetails() {
            document.getElementById('detailsPanel').classList.remove('active');
            var components = document.querySelectorAll('.component');
            for (var i = 0; i < components.length; i++) {
                components[i].classList.remove('active');
            }
            var timelineItems = document.querySelectorAll('.timeline-item');
            for (var i = 0; i < timelineItems.length; i++) {
                timelineItems[i].classList.remove('active');
            }

            // Reset toggle button position
            var toggleBtn = document.getElementById('sidebarToggle');
            toggleBtn.classList.remove('expanded');
        }

        // Switch view
        function switchView(view) {
            // Update button states
            var viewBtns = document.querySelectorAll('.view-btn');
            for (var i = 0; i < viewBtns.length; i++) {
                viewBtns[i].classList.remove('active');
            }
            event.target.classList.add('active');

            // Hide all views
            document.getElementById('attackFlowView').style.display = 'none';
            document.getElementById('timelineView').classList.remove('active');

            // Show selected view
            if (view === 'architecture') {
                document.getElementById('attackFlowView').style.display = 'block';
            } else if (view === 'timeline') {
                document.getElementById('timelineView').classList.add('active');
            }
        }

        // Get severity color
        function getSeverityColor(severity) {
            switch(severity) {
                case 'critical': return '#ff4444';
                case 'high': return '#ff9f43';
                case 'medium': return '#ffc107';
                case 'info': return '#4fc3f7';
                default: return '#9ca3af';
            }
        }

        // Update progress bar
        function updateProgressBar(phaseNum) {
            var progressBar = document.getElementById('progressBar');
            var width = (phaseNum / 7) * 960;
            progressBar.style.width = width + 'px';
            progressBar.style.transition = 'width 0.5s ease';
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            initializeTimeline();

            // Sidebar starts expanded - show phase 1 details
            sidebarCollapsed = false;
            setTimeout(function() {
                showPhaseDetails(1);
            }, 500);
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (currentPhase) {
                if (e.key === 'ArrowRight' && currentPhase < 7) {
                    showPhaseDetails(currentPhase + 1);
                } else if (e.key === 'ArrowLeft' && currentPhase > 1) {
                    showPhaseDetails(currentPhase - 1);
                } else if (e.key === 'Escape') {
                    closeDetails();
                }
            }
        });
