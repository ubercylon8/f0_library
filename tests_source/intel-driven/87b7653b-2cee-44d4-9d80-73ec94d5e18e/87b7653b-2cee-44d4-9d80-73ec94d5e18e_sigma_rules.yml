title: CreateProcessAsPPL Usage Detection
id: a1b2c3d4-0006-4edr-freeze-pplcreate001
status: experimental
description: |
    Detects command-line references to CreateProcessAsPPL, WinTCB, or
    PsProtectedSigner which indicate an attempt to create a Protected Process
    Light (PPL) process. Legitimate PPL creation is exclusively performed by
    the Windows kernel and system services. User-mode tools referencing these
    patterns are typically attack tools designed to abuse PPL for security
    process manipulation.
references:
    - https://github.com/TwoSevenOneT/CreateProcessAsPPL
    - https://attack.mitre.org/techniques/T1055/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.privilege-escalation
    - attack.t1055
    - attack.defense-evasion
    - attack.t1574
logsource:
    category: process_creation
    product: windows
detection:
    selection_cmdline:
        CommandLine|contains:
            - 'CreateProcessAsPPL'
            - 'PsProtectedSigner'
            - 'WinTCB'
    condition: selection_cmdline
falsepositives:
    - Security research tools or authorized penetration testing
    - Kernel debugging sessions (extremely rare in production)
level: high

