title: WerFaultSecure Targeting Security Processes
id: a1b2c3d4-0001-4edr-freeze-werfault00001
status: experimental
description: |
    Detects WerFaultSecure.exe launched with command-line parameters referencing
    security product process names. This is characteristic of the EDR-Freeze
    technique which abuses MiniDumpWriteDump via WerFaultSecure to suspend
    security processes through a race condition. Legitimate WerFaultSecure
    invocations are system-initiated and rarely reference security process
    names in user-controlled parameters.
references:
    - https://github.com/TwoSevenOneT/EDR-Freeze
    - https://www.zerosalarium.com/2025/09/EDR-Freeze-Puts-EDRs-Antivirus-Into-Coma.html
    - https://attack.mitre.org/techniques/T1562/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.defense-evasion
    - attack.t1562.001
    - attack.t1574
logsource:
    category: process_creation
    product: windows
detection:
    selection_process:
        Image|endswith: '\WerFaultSecure.exe'
    selection_targets:
        CommandLine|contains:
            - 'MsMpEng'
            - 'MpDefenderCoreService'
            - 'NisSrv'
            - 'SenseCE'
            - 'SenseIR'
            - 'MsSense'
            - 'CylanceSvc'
            - 'CSFalconService'
            - 'SentinelAgent'
            - 'TmListen'
            - 'TmCCSF'
            - 'cb.exe'
            - 'RepMgr'
    condition: selection_process and selection_targets
falsepositives:
    - Legitimate Windows Error Reporting crash dumps of security processes (rare; verify with WER reports)
level: high

