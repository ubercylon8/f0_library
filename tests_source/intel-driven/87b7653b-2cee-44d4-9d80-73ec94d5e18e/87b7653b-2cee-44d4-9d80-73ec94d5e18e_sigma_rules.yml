title: WerFaultSecure Launched with PPL Memory Dump Parameters
id: a1b2c3d4-0004-4edr-freeze-pplparam0001
status: experimental
description: |
    Detects WerFaultSecure.exe launched with specific parameter combinations
    (/h, /pid, /tid) that indicate memory dump creation targeting a specific
    process. When the parent process is not a standard system process, this
    strongly indicates abuse of the WER mechanism for process suspension.
    The EDR-Freeze technique uses CreateProcessAsPPL to launch WerFaultSecure
    with WinTCB protection level.
references:
    - https://github.com/TwoSevenOneT/EDR-Freeze
    - https://github.com/TwoSevenOneT/CreateProcessAsPPL
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.defense-evasion
    - attack.t1574
    - attack.t1562.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_process:
        Image|endswith: '\WerFaultSecure.exe'
    selection_params_h:
        CommandLine|contains: '/h'
    selection_params_pid:
        CommandLine|contains: '/pid'
    selection_params_tid:
        CommandLine|contains: '/tid'
    filter_parent:
        ParentImage|endswith:
            - '\svchost.exe'
            - '\wininit.exe'
            - '\services.exe'
    condition: selection_process and selection_params_h and selection_params_pid and selection_params_tid and not filter_parent
falsepositives:
    - Legitimate WER crash handling initiated by system processes (excluded)
level: high

