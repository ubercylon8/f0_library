title: EDR-Freeze Attack Chain - WerFaultSecure Abuse with Subsequent Download
id: a1b2c3d4-0005-4edr-freeze-chain000001
status: experimental
description: |
    Temporal correlation rule detecting WerFaultSecure.exe abuse targeting
    security processes followed by a LOLBin-based executable download within
    a 120-second window. This sequence is highly specific to EDR/AV suspension
    attacks (EDR-Freeze and variants) where the attacker first disables
    security controls, then downloads malicious tools during the bypass window.
    Requires a SIEM with temporal correlation capability.
references:
    - https://github.com/TwoSevenOneT/EDR-Freeze
    - https://www.zerosalarium.com/2025/09/EDR-Freeze-Puts-EDRs-Antivirus-Into-Coma.html
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.defense-evasion
    - attack.t1562.001
    - attack.command-and-control
    - attack.t1105
logsource:
    category: process_creation
    product: windows
detection:
    # NOTE: This is a temporal correlation rule. In Sigma, this requires
    # backend-specific correlation syntax. The conditions below describe
    # both events that must occur on the same host within 120 seconds.
    # Implement as two correlated rules in your SIEM.
    #
    # Event A: WerFaultSecure targeting security process
    event_a_process:
        Image|endswith: '\WerFaultSecure.exe'
    event_a_target:
        CommandLine|contains:
            - 'MsMpEng'
            - 'MpDefenderCoreService'
            - 'NisSrv'
            - 'Sense'
            - 'Defender'
            - 'Falcon'
            - 'Sentinel'
            - 'Cylance'
    # Event B: LOLBin download within 120 seconds
    event_b_process:
        Image|endswith:
            - '\certutil.exe'
            - '\bitsadmin.exe'
            - '\curl.exe'
            - '\wget.exe'
    event_b_download:
        CommandLine|contains:
            - 'http'
            - 'ftp'
    event_b_executable:
        CommandLine|contains:
            - '.exe'
            - '.dll'
            - '.ps1'
    condition: (event_a_process and event_a_target) or (event_b_process and event_b_download and event_b_executable)
    # SIEM Implementation Note: Create two separate rules from event_a and event_b,
    # then correlate them with a 120-second window on the same hostname.
falsepositives:
    - Extremely unlikely in production; validate with security team if authorized testing
level: critical

