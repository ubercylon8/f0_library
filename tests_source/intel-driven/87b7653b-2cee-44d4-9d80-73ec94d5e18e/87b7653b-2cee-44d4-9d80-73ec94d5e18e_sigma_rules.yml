title: Windows Defender Process Unexpected Termination
id: a1b2c3d4-0008-4edr-freeze-defterm0001
status: experimental
description: |
    Detects Windows Defender core processes being terminated when the
    termination is not initiated by standard system processes (services.exe,
    wininit.exe, svchost.exe). Unexpected Defender process termination
    may indicate a successful EDR-Freeze attack where WerFaultSecure is
    released after the suspension window, causing the security process to
    crash, or direct process killing.
references:
    - https://attack.mitre.org/techniques/T1562/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.defense-evasion
    - attack.t1562.001
logsource:
    category: process_termination
    product: windows
detection:
    selection_defender:
        Image|endswith:
            - '\MsMpEng.exe'
            - '\MpDefenderCoreService.exe'
            - '\NisSrv.exe'
            - '\SecurityHealthService.exe'
    filter_system_parent:
        ParentImage|endswith:
            - '\services.exe'
            - '\wininit.exe'
            - '\svchost.exe'
            - '\MsMpEng.exe'
    condition: selection_defender and not filter_system_parent
falsepositives:
    - Windows Defender service restarts during updates (normally via services.exe, excluded)
    - System shutdown sequences
level: critical

