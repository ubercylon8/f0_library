title: WerFaultSecure Creating Memory Dump of Security Process
id: a1b2c3d4-0009-4edr-freeze-memdump0001
status: experimental
description: |
    Detects WerFaultSecure.exe or WerFault.exe creating memory dump files
    (.dmp, .hdmp, .mdmp) that reference security process names or are
    written to non-standard locations. During the EDR-Freeze attack,
    WerFaultSecure creates a dump of the target security process as part
    of the MiniDumpWriteDump suspension mechanism.
references:
    - https://github.com/TwoSevenOneT/EDR-Freeze
    - https://attack.mitre.org/techniques/T1003/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.defense-evasion
    - attack.t1562.001
    - attack.credential-access
    - attack.t1003.001
logsource:
    category: file_event
    product: windows
detection:
    selection_process:
        Image|endswith:
            - '\WerFaultSecure.exe'
            - '\WerFault.exe'
    selection_dumpfile:
        TargetFilename|endswith:
            - '.dmp'
            - '.hdmp'
            - '.mdmp'
    selection_security_target:
        TargetFilename|contains:
            - 'MsMpEng'
            - 'MpDefenderCoreService'
            - 'NisSrv'
            - 'Sense'
            - 'Defender'
    filter_standard_location:
        TargetFilename|startswith: 'C:\ProgramData\Microsoft\Windows\WER\'
    condition: selection_process and selection_dumpfile and (selection_security_target or not filter_standard_location)
falsepositives:
    - Legitimate crash dumps of security processes written to non-standard WER paths (rare)
level: high

