title: Executable File Staging in Suspicious Directory via LOLBin
id: a1b2c3d4-0010-4edr-freeze-staging0001
status: experimental
description: |
    Detects executable files (.exe, .dll, .ps1) being created in common
    attacker staging directories (Temp, Public, AppData, ProgramData,
    Downloads) when the creating process is a LOLBin or command shell.
    After suspending security processes, attackers typically stage tools
    in these writable directories before execution.
references:
    - https://attack.mitre.org/techniques/T1074/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.collection
    - attack.t1074.001
    - attack.defense-evasion
logsource:
    category: file_event
    product: windows
detection:
    selection_directory:
        TargetFilename|contains:
            - '\Temp\'
            - '\Users\Public\'
            - '\AppData\Local\Temp\'
            - '\AppData\Roaming\'
            - '\ProgramData\'
    selection_extension:
        TargetFilename|endswith:
            - '.exe'
            - '.dll'
            - '.ps1'
            - '.bat'
            - '.vbs'
    selection_creator:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\certutil.exe'
            - '\bitsadmin.exe'
            - '\curl.exe'
            - '\wget.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
    condition: selection_directory and selection_extension and selection_creator
falsepositives:
    - Legitimate software installations via command line
    - Automation scripts creating executables in temp directories
    - Software update mechanisms using command-line downloaders
level: medium
