title: Certutil Downloading Executable Content
id: a1b2c3d4-0002-4edr-freeze-certutil00001
status: experimental
description: |
    Detects certutil.exe being used with download flags (-urlcache, -urlfetch,
    -verifyctl) to retrieve executable files from the internet. Certutil is
    a legitimate Windows certificate utility frequently abused as a LOLBin
    to download malicious payloads. This is commonly observed as a follow-on
    action after EDR/AV suspension attacks.
references:
    - https://lolbas-project.github.io/lolbas/Binaries/Certutil/
    - https://attack.mitre.org/techniques/T1105/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.command-and-control
    - attack.t1105
    - attack.defense-evasion
    - attack.t1218
logsource:
    category: process_creation
    product: windows
detection:
    selection_process:
        Image|endswith: '\certutil.exe'
    selection_download_flags:
        CommandLine|contains:
            - '-urlcache'
            - '-urlfetch'
            - '-verifyctl'
            - '/urlcache'
            - '/urlfetch'
            - '/verifyctl'
    selection_executable_target:
        CommandLine|contains:
            - '.exe'
            - '.dll'
            - '.ps1'
            - '.bat'
            - '.vbs'
            - '.hta'
    condition: selection_process and selection_download_flags and selection_executable_target
falsepositives:
    - Legitimate certificate verification referencing executable file extensions
    - Administrators using certutil for legitimate certificate management
level: high

