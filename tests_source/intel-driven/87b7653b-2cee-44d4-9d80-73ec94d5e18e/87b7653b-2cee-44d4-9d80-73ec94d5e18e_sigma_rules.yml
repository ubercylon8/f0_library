title: Security Process Thread Suspension by Non-System Process
id: a1b2c3d4-0003-4edr-freeze-suspend00001
status: experimental
description: |
    Detects non-system processes accessing security product processes with
    thread suspension intent. Tools like EDR-Freeze use NtSuspendProcess
    or SuspendThread APIs against security processes to create a temporary
    bypass window. This detection relies on Sysmon Event ID 10 (ProcessAccess)
    with PROCESS_SUSPEND_RESUME (0x0800) access rights.
references:
    - https://github.com/TwoSevenOneT/EDR-Freeze
    - https://attack.mitre.org/techniques/T1562/001/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.defense-evasion
    - attack.t1562.001
    - attack.t1055
logsource:
    category: process_access
    product: windows
detection:
    selection_target:
        TargetImage|endswith:
            - '\MsMpEng.exe'
            - '\MpDefenderCoreService.exe'
            - '\NisSrv.exe'
            - '\SenseCE.exe'
            - '\SenseIR.exe'
            - '\MsSense.exe'
            - '\CSFalconService.exe'
            - '\SentinelAgent.exe'
            - '\CylanceSvc.exe'
    selection_access:
        GrantedAccess|contains:
            - '0x0800'
            - '0x1fffff'
            - '0x001fffff'
    filter_system:
        SourceImage|endswith:
            - '\svchost.exe'
            - '\services.exe'
            - '\wininit.exe'
            - '\csrss.exe'
            - '\lsass.exe'
            - '\smss.exe'
            - '\MsMpEng.exe'
            - '\NisSrv.exe'
    condition: selection_target and selection_access and not filter_system
falsepositives:
    - Legitimate debugging tools accessing security processes
    - System management or monitoring software with process inspection
level: critical

