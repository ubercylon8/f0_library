title: LOLBin Download from Known Offensive Tool Repository
id: a1b2c3d4-0007-4edr-freeze-lolbin00001
status: experimental
description: |
    Detects Living-Off-the-Land Binaries (certutil, bitsadmin, curl, wget,
    PowerShell) downloading content from known offensive tool repositories
    such as SharpCollection, GhostPack forks, or common malware hosting
    platforms. This is a strong indicator of post-exploitation activity,
    especially when combined with prior EDR/AV suspension.
references:
    - https://lolbas-project.github.io/
    - https://attack.mitre.org/techniques/T1105/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.command-and-control
    - attack.t1105
    - attack.execution
logsource:
    category: process_creation
    product: windows
detection:
    selection_lolbin:
        Image|endswith:
            - '\certutil.exe'
            - '\bitsadmin.exe'
            - '\curl.exe'
            - '\wget.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_repo:
        CommandLine|contains:
            - 'SharpCollection'
            - 'GhostPack'
            - 'Flangvik'
            - 'Seatbelt'
            - 'Rubeus'
            - 'Mimikatz'
            - 'SharpHound'
            - 'BloodHound'
            - 'LaZagne'
            - 'Certify'
            - 'KeeThief'
            - 'SharpDPAPI'
    condition: selection_lolbin and selection_repo
falsepositives:
    - Authorized red team engagements downloading tools for testing
    - Security researchers downloading tools for analysis
level: high

