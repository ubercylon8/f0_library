# ============================================================
# Rule 10: DLL Creation with Password Filter Export Names (T1556.002)
# ============================================================
title: DLL with Password Filter Interface Exports
id: 5691f436-sigma-010
status: experimental
description: |
    Detects loading or creation of DLLs that implement the Windows
    password filter interface (InitializeChangeNotify, PasswordChangeNotify,
    PasswordFilter). These are the required exports for LSA password filters.
references:
    - https://attack.mitre.org/techniques/T1556/002/
    - https://docs.microsoft.com/en-us/windows/win32/secmgmt/password-filter-programming-considerations
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.credential_access
    - attack.t1556.002
logsource:
    product: windows
    service: sysmon
detection:
    selection:
        EventID: 7  # Image loaded
        ImageLoaded|endswith: '.dll'
    filter_legitimate:
        ImageLoaded|contains:
            - '\rassfm.dll'
            - '\scecli.dll'
            - '\FVENOTIFY.dll'
            - '\kdcsvc.dll'
            - '\Windows\System32\'
    filter_signed:
        Signed: 'true'
        SignatureStatus: 'Valid'
        Signature|contains: 'Microsoft'
    condition: selection and not (filter_legitimate or filter_signed)
falsepositives:
    - Third-party password filter products
    - Enterprise password policy enforcement software
level: medium
