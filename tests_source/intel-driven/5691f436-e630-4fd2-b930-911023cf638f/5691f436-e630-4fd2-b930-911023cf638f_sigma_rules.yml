# ============================================================
# Rule 1: IIS Backdoor DLL Deployment (T1505.003)
# ============================================================
title: APT34 IIS Backdoor Module DLL Deployment
id: 5691f436-sigma-001
status: experimental
description: |
    Detects creation of DLL files matching known APT34 IIS backdoor patterns
    (CacheHttp.dll, HttpProxy.dll) or DLL creation in IIS module directories.
    APT34 deploys passive IIS backdoors that intercept HTTP requests for C2.
references:
    - https://attack.mitre.org/techniques/T1505/003/
    - https://attack.mitre.org/groups/G0049/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.persistence
    - attack.t1505.003
    - detection.emerging_threats
logsource:
    category: file_event
    product: windows
detection:
    selection_names:
        TargetFilename|endswith:
            - '\CacheHttp.dll'
            - '\HttpProxy.dll'
            - '\IISModule.dll'
            - '\WebCache.dll'
            - '\HttpCacher.dll'
    selection_paths:
        TargetFilename|contains:
            - '\inetsrv\'
            - '\IIS\'
            - '\w3svc\'
    filter_legitimate:
        Image|endswith:
            - '\msiexec.exe'
            - '\TiWorker.exe'
            - '\TrustedInstaller.exe'
    condition: (selection_names or selection_paths) and not filter_legitimate
falsepositives:
    - Legitimate IIS module deployments by administrators
    - Software installations that register IIS modules
level: high

---

# ============================================================
# Rule 2: IIS Module Registration via appcmd.exe LOLBin (T1505.003)
# ============================================================
title: IIS Module Installation via appcmd.exe
id: 5691f436-sigma-002
status: experimental
description: |
    Detects use of appcmd.exe to install IIS native modules. APT34 uses
    appcmd.exe as a LOLBin to register CacheHttp.dll as a native IIS
    HTTP module for passive backdoor functionality.
references:
    - https://attack.mitre.org/techniques/T1505/003/
    - https://attack.mitre.org/groups/G0049/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.persistence
    - attack.t1505.003
    - attack.execution
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\appcmd.exe'
        CommandLine|contains|all:
            - 'install'
            - 'module'
    condition: selection
falsepositives:
    - Legitimate IIS administration during maintenance windows
    - Automated deployment pipelines that manage IIS modules
level: high

---

# ============================================================
# Rule 3: LSA Password Filter DLL Registration (T1556.002)
# ============================================================
title: LSA Notification Packages Registry Modification - Password Filter
id: 5691f436-sigma-003
status: experimental
description: |
    Detects modification of HKLM\SYSTEM\CurrentControlSet\Control\Lsa
    Notification Packages registry value. This technique allows attackers
    to register a password filter DLL that receives cleartext passwords
    during every password change event on the system. APT34 uses this
    for persistent credential interception.
references:
    - https://attack.mitre.org/techniques/T1556/002/
    - https://attack.mitre.org/groups/G0049/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.credential_access
    - attack.persistence
    - attack.t1556.002
logsource:
    category: registry_set
    product: windows
detection:
    selection:
        TargetObject|contains: '\SYSTEM\CurrentControlSet\Control\Lsa'
        TargetObject|endswith: '\Notification Packages'
    filter_system:
        Image|endswith:
            - '\lsass.exe'
            - '\services.exe'
    condition: selection and not filter_system
falsepositives:
    - Legitimate password filter software installation (very rare)
    - Enterprise password policy enforcement tools
level: critical

---

# ============================================================
# Rule 4: LSA Notification Packages Modified - Sysmon Registry Event
# ============================================================
title: LSA Notification Packages Modification via Sysmon
id: 5691f436-sigma-004
status: experimental
description: |
    Sysmon-specific detection for LSA Notification Packages modification.
    Uses Sysmon Event ID 13 (RegistryEvent - Value Set) to detect changes
    to the password filter DLL registration.
references:
    - https://attack.mitre.org/techniques/T1556/002/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.credential_access
    - attack.t1556.002
logsource:
    product: windows
    service: sysmon
detection:
    selection:
        EventID: 13
        TargetObject|contains|all:
            - 'SYSTEM'
            - 'Control\Lsa'
            - 'Notification Packages'
    condition: selection
falsepositives:
    - Legitimate password filter installations
level: critical

---

# ============================================================
# Rule 5: PowerShell Exchange Web Services Interaction (T1071.003)
# ============================================================
title: PowerShell Exchange Web Services API Interaction
id: 5691f436-sigma-005
status: experimental
description: |
    Detects PowerShell processes interacting with Exchange Web Services (EWS)
    API, which may indicate email-based C2 like APT34's PowerExchange.
    PowerExchange monitors mailboxes for emails with @@ subject markers
    as C2 command delivery.
references:
    - https://attack.mitre.org/techniques/T1071/003/
    - https://attack.mitre.org/groups/G0049/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.command_and_control
    - attack.t1071.003
logsource:
    category: process_creation
    product: windows
detection:
    selection_process:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_ews:
        CommandLine|contains:
            - 'Exchange.asmx'
            - 'New-WebServiceProxy'
            - 'ExchangeService'
            - 'Get-MailboxMessage'
            - 'Search-Mailbox'
            - 'FindItems'
    condition: selection_process and selection_ews
falsepositives:
    - Legitimate Exchange administration scripts
    - Authorized mailbox monitoring solutions
level: high

---

# ============================================================
# Rule 6: PowerShell Script with Exchange C2 Indicators (T1071.003)
# ============================================================
title: PowerShell Exchange C2 Script Creation
id: 5691f436-sigma-006
status: experimental
description: |
    Detects creation of PowerShell scripts with Exchange/EWS interaction
    patterns, potentially indicating deployment of email-based C2 backdoors.
references:
    - https://attack.mitre.org/techniques/T1071/003/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.command_and_control
    - attack.t1071.003
logsource:
    category: file_event
    product: windows
detection:
    selection:
        TargetFilename|endswith: '.ps1'
        TargetFilename|contains:
            - 'PowerExchange'
            - 'Exchange'
            - 'EWS'
            - 'Mailbox'
    filter_legitimate:
        TargetFilename|contains:
            - '\ExchangeSetup'
            - '\Microsoft\Exchange'
            - '\Program Files\Microsoft'
    condition: selection and not filter_legitimate
falsepositives:
    - Legitimate Exchange management scripts in non-standard locations
level: high

