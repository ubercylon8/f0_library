# ============================================================
# Rule 7: Outbound SMTP Connection from Non-Mail Process (T1048.003)
# ============================================================
title: Outbound SMTP Connection from Non-Mail Server Process
id: 5691f436-sigma-007
status: experimental
description: |
    Detects outbound SMTP connections (ports 25, 587, 465) from processes
    that are not designated mail transport agents. APT34's STEALHOOK tool
    exfiltrates data by sending emails with binary attachments via Exchange
    transport or direct SMTP.
references:
    - https://attack.mitre.org/techniques/T1048/003/
    - https://attack.mitre.org/groups/G0049/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.exfiltration
    - attack.t1048.003
logsource:
    category: network_connection
    product: windows
detection:
    selection:
        DestinationPort:
            - 25
            - 587
            - 465
        Initiated: 'true'
    filter_mail:
        Image|endswith:
            - '\EdgeTransport.exe'
            - '\MSExchangeTransport.exe'
            - '\outlook.exe'
            - '\thunderbird.exe'
    condition: selection and not filter_mail
falsepositives:
    - Legitimate SMTP notification services
    - Application-level email sending libraries
level: high

---

# ============================================================
# Rule 8: Data Archive Creation in Staging Directory (T1048.003)
# ============================================================
title: Archive File Creation in Staging Directory
id: 5691f436-sigma-008
status: experimental
description: |
    Detects creation of archive files (ZIP, 7z, RAR) in directories
    with staging or exfiltration naming patterns. APT34's STEALHOOK
    compresses stolen data before exfiltration via email.
references:
    - https://attack.mitre.org/techniques/T1048/003/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.exfiltration
    - attack.collection
    - attack.t1048.003
    - attack.t1560.001
logsource:
    category: file_event
    product: windows
detection:
    selection_archive:
        TargetFilename|endswith:
            - '.zip'
            - '.7z'
            - '.rar'
    selection_path:
        TargetFilename|contains:
            - 'staging'
            - 'exfil'
            - 'stealhook'
            - 'payload'
            - 'collect'
    condition: selection_archive and selection_path
falsepositives:
    - Legitimate backup operations with staging directories
level: medium

---

