# ============================================================
# Rule 5: PowerShell P/Invoke GUI Automation Targeting Security Tools
# Purpose: Detect PowerShell using Add-Type with DllImport to load
#          user32.dll window management functions, specifically when
#          combined with references to Windows Security / Defender
#          UI components. Used by SafePay to interact with the
#          Windows Security GUI to disable protection.
# Confidence: Medium
# MITRE ATT&CK: T1562.001
# ============================================================

title: PowerShell P/Invoke GUI Automation Targeting Windows Security
id: e5f6a7b8-c9d0-1234-efab-345678901234
status: experimental
description: |
    Detects PowerShell scripts that use Add-Type with DllImport
    (P/Invoke) to load user32.dll window management functions
    (FindWindow, ShowWindow, SendMessage) while also referencing
    Windows Security or Windows Defender UI components. This technique
    is used to automate interaction with the security center GUI in
    order to disable protections without triggering Set-MpPreference
    detections.
references:
    - https://attack.mitre.org/techniques/T1562/001/
    - https://attack.mitre.org/techniques/T1106/
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
    - attack.defense_evasion
    - attack.t1562.001
    - attack.execution
    - attack.t1106
logsource:
    category: process_creation
    product: windows
detection:
    selection_process:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_addtype:
        CommandLine|contains: 'Add-Type'
    selection_pinvoke:
        CommandLine|contains|any:
            - 'DllImport'
            - 'user32.dll'
    selection_window_funcs:
        CommandLine|contains|any:
            - 'FindWindow'
            - 'ShowWindow'
            - 'SendMessage'
            - 'PostMessage'
    condition: >
        selection_process and selection_addtype and
        selection_pinvoke and selection_window_funcs
falsepositives:
    - Accessibility tooling and legitimate UI automation frameworks
      (e.g., UIAutomation.dll, PowerShell-driven test harnesses)
    - Some IT scripts that use Win32 APIs for window management
level: medium
