# ============================================================
# Rule 3: SafePay Malware Registry Persistence IoC
# Purpose: Detect the exact SafePay persistence value written to the
#          Run key. This is an IoC-level rule; any match is
#          almost certainly malicious.
# Confidence: High
# MITRE ATT&CK: T1547.001
# ============================================================

title: SafePay Malware Registry Run Key IoC
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: experimental
description: |
    Detects the SafePay ransomware-specific registry persistence IoC:
    value name "SafePayService" or value data "6F22-C16F-0C71-688A"
    written to the HKCU Run key. This combination is a high-confidence
    indicator of SafePay malware or tooling that directly imitates it.
references:
    - https://attack.mitre.org/techniques/T1547/001/
    - https://www.secureworks.com/research/safepay-malware
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
    - attack.persistence
    - attack.t1547.001
logsource:
    category: registry_event
    product: windows
detection:
    selection_key:
        TargetObject|contains: '\CurrentVersion\Run'
    selection_ioc:
        Details|contains|any:
            - 'SafePayService'
            - '6F22-C16F-0C71-688A'
    condition: selection_key and selection_ioc
falsepositives:
    - None expected; these strings have no known legitimate use
level: critical

