# ============================================================
# Rule 4: Windows Defender Tampering via Set-MpPreference
# Purpose: Detect PowerShell disabling Defender real-time and
#          behavior monitoring protections — core T1562.001 behavior
#          used by SafePay and countless ransomware families.
# Confidence: High
# MITRE ATT&CK: T1562.001
# ============================================================

title: Windows Defender Real-Time Protection Disabled via PowerShell
id: d4e5f6a7-b8c9-0123-defa-234567890123
status: experimental
description: |
    Detects PowerShell invocations of Set-MpPreference that disable
    Defender's real-time monitoring, behavior monitoring, IOAV protection,
    or block-at-first-seen features. This is the primary programmatic
    method used by ransomware and other malware (including SafePay) to
    impair endpoint defenses before deploying their payload.
references:
    - https://attack.mitre.org/techniques/T1562/001/
    - https://docs.microsoft.com/en-us/powershell/module/defender/set-mppreference
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
    - attack.defense_evasion
    - attack.t1562.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_process:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_cmdlet:
        CommandLine|contains: 'Set-MpPreference'
    selection_disable_flag:
        CommandLine|contains|any:
            - 'DisableRealtimeMonitoring'
            - 'DisableBehaviorMonitoring'
            - 'DisableIOAVProtection'
            - 'DisableBlockAtFirstSeen'
            - 'DisableIntrusionPreventionSystem'
            - 'DisableScriptScanning'
    condition: selection_process and selection_cmdlet and selection_disable_flag
falsepositives:
    - Authorized IT/security administrators disabling Defender during
      maintenance; correlate with change management records
    - Endpoint management tools (Intune, SCCM) applying policy;
      filter by known management process parent
level: high

