# ============================================================
# Rule 1: CMSTPLUA COM Object UAC Bypass via PowerShell
# Purpose: Detect PowerShell invoking the CMSTPLUA auto-elevated
#          COM interface to gain elevated privileges without a
#          UAC prompt. Any tool — not just test frameworks —
#          will emit the CLSID and GetTypeFromCLSID call.
# Confidence: High
# MITRE ATT&CK: T1548.002
# ============================================================

title: CMSTPLUA COM Object UAC Bypass via PowerShell
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: |
    Detects PowerShell using the CMSTPLUA auto-elevated COM object
    (CLSID 3E5FC7F9-9A51-4367-9063-A120244FBEC7) to bypass User Account
    Control. The technique instantiates the COM interface via
    [System.Activator]::CreateInstance / GetTypeFromCLSID and is used
    by SafePay ransomware and other threat actors to silently elevate
    without displaying a UAC prompt to the user.
references:
    - https://attack.mitre.org/techniques/T1548/002/
    - https://www.activecyber.us/activelabs/windows-uac-bypass
    - https://www.secureworks.com/research/safepay-malware
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
    - attack.privilege_escalation
    - attack.defense_evasion
    - attack.t1548.002
logsource:
    category: process_creation
    product: windows
detection:
    selection_process:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_cmstplua:
        CommandLine|contains|any:
            - '3E5FC7F9-9A51-4367-9063-A120244FBEC7'
            - 'CMSTPLUA'
            - 'GetTypeFromCLSID'
    condition: selection_process and selection_cmstplua
falsepositives:
    - Legitimate COM automation scripts that explicitly reference this
      CLSID are extremely rare; treat any match as high-priority
level: high

---

# ============================================================
# Rule 2: Registry Run Key Persistence Created by Non-Standard Process
# Purpose: Detect creation of autorun entries from processes that do
#          not normally manage startup programs. Covers the general
#          T1547.001 behavior and the SafePay-specific IoC.
# Confidence: High (SafePay IoC), Medium (generic variant)
# MITRE ATT&CK: T1547.001
# ============================================================

title: Suspicious Registry Run Key Persistence by Non-Standard Process
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: experimental
description: |
    Detects modification of HKCU or HKLM Run/RunOnce autostart registry
    keys by processes residing in user-writable locations (Temp,
    AppData, Public, Downloads). Legitimate installers that touch these
    keys typically run from Program Files or Windows directories. This
    behavior is consistent with T1547.001 as employed by SafePay
    (value name: SafePayService, data: 6F22-C16F-0C71-688A) and many
    other persistent malware families.
references:
    - https://attack.mitre.org/techniques/T1547/001/
    - https://www.secureworks.com/research/safepay-malware
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
    - attack.persistence
    - attack.t1547.001
logsource:
    category: registry_event
    product: windows
detection:
    selection_key:
        TargetObject|contains|any:
            - '\Software\Microsoft\Windows\CurrentVersion\Run'
            - '\Software\Microsoft\Windows\CurrentVersion\RunOnce'
            - '\Software\Microsoft\Windows NT\CurrentVersion\Winlogon'
    selection_suspicious_process:
        Image|contains|any:
            - '\Temp\'
            - '\AppData\Local\Temp\'
            - '\Users\Public\'
            - '\Downloads\'
    filter_legitimate:
        Image|startswith|any:
            - 'C:\Windows\System32\'
            - 'C:\Windows\SysWOW64\'
            - 'C:\Program Files\'
            - 'C:\Program Files (x86)\'
    condition: selection_key and selection_suspicious_process and not filter_legitimate
falsepositives:
    - Software installed by running an installer directly from a Downloads
      or Temp folder; investigate context before dismissing
    - Developer tools or portable applications launched from AppData
level: high

