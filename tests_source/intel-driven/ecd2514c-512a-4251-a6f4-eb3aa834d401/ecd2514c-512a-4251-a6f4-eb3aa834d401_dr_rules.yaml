# ============================================================
# F0RT1KA Detection & Response Rules - LimaCharlie
# Test ID: ecd2514c-512a-4251-a6f4-eb3aa834d401
# Test Name: CyberEye RAT - Windows Defender Disabling via PowerShell
# MITRE ATT&CK: T1562.001 - Impair Defenses: Disable or Modify Tools
# Generated: 2025-12-07
# Format: File format for limacharlie dr add / config push
# ============================================================

rules:

  # ============================================================
  # Rule 1: Windows Defender Tamper Protection Registry Modification
  # MITRE ATT&CK: T1562.001
  # Confidence: High
  # Description: Detects modification of TamperProtection registry value
  # ============================================================
  f0rtika-defender-tamper-protection-disabled:
    detect:
      target: edr
      event: REGISTRY_VALUE_SET
      op: and
      rules:
        - op: contains
          path: event/REGISTRY_KEY
          value: "\\Microsoft\\Windows Defender\\Features"
        - op: is
          path: event/VALUE_NAME
          value: TamperProtection
        - op: is
          path: event/VALUE_DATA
          value: "0"

    respond:
      - action: report
        name: F0RT1KA - Windows Defender Tamper Protection Disabled
        metadata:
          test_id: ecd2514c-512a-4251-a6f4-eb3aa834d401
          mitre_attack: T1562.001
          severity: critical
          description: TamperProtection registry value set to 0, disabling anti-tampering

      - action: add tag
        tag: f0rtika-defender-tamper
        ttl: 86400


  # ============================================================
  # Rule 2: Windows Defender Anti-Spyware Disabled via Policy
  # MITRE ATT&CK: T1562.001
  # Confidence: High
  # Description: Detects creation of DisableAntiSpyware policy value
  # ============================================================
  f0rtika-defender-antispyware-disabled:
    detect:
      target: edr
      event: REGISTRY_VALUE_SET
      op: and
      rules:
        - op: contains
          path: event/REGISTRY_KEY
          value: "\\Policies\\Microsoft\\Windows Defender"
        - op: is
          path: event/VALUE_NAME
          value: DisableAntiSpyware
        - op: is
          path: event/VALUE_DATA
          value: "1"

    respond:
      - action: report
        name: F0RT1KA - Windows Defender Anti-Spyware Disabled
        metadata:
          test_id: ecd2514c-512a-4251-a6f4-eb3aa834d401
          mitre_attack: T1562.001
          severity: critical
          description: DisableAntiSpyware policy set to 1, disabling Windows Defender

      - action: add tag
        tag: f0rtika-defender-disabled
        ttl: 86400


  # ============================================================
  # Rule 3: Windows Defender Real-Time Protection Components Disabled
  # MITRE ATT&CK: T1562.001
  # Confidence: High
  # Description: Detects disabling of Real-Time Protection via registry
  # ============================================================
  f0rtika-defender-rtp-disabled:
    detect:
      target: edr
      event: REGISTRY_VALUE_SET
      op: and
      rules:
        - op: contains
          path: event/REGISTRY_KEY
          value: "\\Windows Defender\\Real-Time Protection"
        - op: starts with
          path: event/VALUE_NAME
          value: Disable
        - op: is
          path: event/VALUE_DATA
          value: "1"

    respond:
      - action: report
        name: F0RT1KA - Windows Defender Real-Time Protection Disabled
        metadata:
          test_id: ecd2514c-512a-4251-a6f4-eb3aa834d401
          mitre_attack: T1562.001
          severity: high
          description: Real-Time Protection component disabled via registry

      - action: add tag
        tag: f0rtika-defender-rtp-disabled
        ttl: 86400


  # ============================================================
  # Rule 4: PowerShell Execution Policy Bypass
  # MITRE ATT&CK: T1562.001
  # Confidence: Medium
  # Description: Detects PowerShell execution with bypass flag
  # ============================================================
  f0rtika-powershell-bypass-execution:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: powershell.exe
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: "-ExecutionPolicy"
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: "Bypass"
          case sensitive: false
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: "Defender"
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: "TamperProtection"
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: "CyberEye"
              case sensitive: false

    respond:
      - action: report
        name: F0RT1KA - PowerShell Bypass Targeting Windows Defender
        metadata:
          test_id: ecd2514c-512a-4251-a6f4-eb3aa834d401
          mitre_attack: T1562.001
          severity: high
          description: PowerShell execution with bypass flag targeting Windows Defender components

      - action: add tag
        tag: f0rtika-powershell-bypass
        ttl: 86400


  # ============================================================
  # Rule 5: Suspicious Script with CyberEye/Defender Naming
  # MITRE ATT&CK: T1562.001
  # Confidence: High
  # Description: Detects PowerShell script creation with CyberEye or Defender-targeting naming
  # ============================================================
  f0rtika-cybereye-script-creation:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: ".ps1"
          case sensitive: false
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "CyberEye"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "Defender"
              case sensitive: false
            - op: contains
              path: event/FILE_PATH
              value: "TamperProtection"
              case sensitive: false

    respond:
      - action: report
        name: F0RT1KA - Suspicious Defender-Targeting Script Created
        metadata:
          test_id: ecd2514c-512a-4251-a6f4-eb3aa834d401
          mitre_attack: T1562.001
          severity: high
          description: PowerShell script with Defender-targeting naming pattern created

      - action: add tag
        tag: f0rtika-script-drop
        ttl: 86400


  # ============================================================
  # Rule 6: CyberEye RAT Specific Script Detection
  # MITRE ATT&CK: T1562.001
  # Confidence: Critical
  # Description: Detects CyberEye-TTPs.ps1 script execution
  # ============================================================
  f0rtika-cybereye-script-execution:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: powershell.exe
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: "CyberEye"
          case sensitive: false

    respond:
      - action: report
        name: F0RT1KA - CyberEye RAT Script Execution Detected
        metadata:
          test_id: ecd2514c-512a-4251-a6f4-eb3aa834d401
          mitre_attack: T1562.001
          severity: critical
          description: CyberEye RAT Defender-disabling script detected

      - action: add tag
        tag: f0rtika-cybereye-rat
        ttl: 86400


  # ============================================================
  # Rule 7: WinDefend Service Query Reconnaissance
  # MITRE ATT&CK: T1562.001
  # Confidence: Medium
  # Description: Detects service query for WinDefend service
  # ============================================================
  f0rtika-windefend-service-query:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: sc.exe
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: "query"
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: "WinDefend"
          case sensitive: false

    respond:
      - action: report
        name: F0RT1KA - WinDefend Service Query Detected
        metadata:
          test_id: ecd2514c-512a-4251-a6f4-eb3aa834d401
          mitre_attack: T1562.001
          severity: medium
          description: Query to Windows Defender service detected, possible post-tampering reconnaissance

      - action: add tag
        tag: f0rtika-service-recon
        ttl: 86400


  # ============================================================
  # Rule 8: PowerShell Set-ItemProperty to Defender Registry
  # MITRE ATT&CK: T1562.001
  # Confidence: High
  # Description: Detects PowerShell cmdlet modifying Defender registry
  # ============================================================
  f0rtika-powershell-defender-registry-mod:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: powershell.exe
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: "Set-ItemProperty"
          case sensitive: false
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: "Windows Defender"
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: "TamperProtection"
              case sensitive: false
            - op: contains
              path: event/COMMAND_LINE
              value: "DisableAntiSpyware"
              case sensitive: false

    respond:
      - action: report
        name: F0RT1KA - PowerShell Modifying Defender Registry
        metadata:
          test_id: ecd2514c-512a-4251-a6f4-eb3aa834d401
          mitre_attack: T1562.001
          severity: high
          description: PowerShell Set-ItemProperty cmdlet targeting Windows Defender registry

      - action: add tag
        tag: f0rtika-ps-registry-mod
        ttl: 86400


  # ============================================================
  # Rule 9: Get-MpPreference Defender Status Check
  # MITRE ATT&CK: T1562.001
  # Confidence: Low
  # Description: Detects Defender status queries (may follow disable attempt)
  # ============================================================
  f0rtika-defender-status-check:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: powershell.exe
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: "Get-MpPreference"
          case sensitive: false

    respond:
      - action: report
        name: F0RT1KA - Defender Status Query Detected
        metadata:
          test_id: ecd2514c-512a-4251-a6f4-eb3aa834d401
          mitre_attack: T1562.001
          severity: low
          description: Windows Defender configuration query, may indicate verification after tampering

      - action: add tag
        tag: f0rtika-defender-query
        ttl: 86400


  # ============================================================
  # Rule 10: Stateful Detection - Defender Disable Sequence
  # MITRE ATT&CK: T1562.001
  # Confidence: Critical
  # Description: Correlates multiple Defender registry modifications
  # Note: This is a stateful rule using sequence detection
  # ============================================================
  f0rtika-defender-disable-sequence:
    detect:
      target: edr
      event: REGISTRY_VALUE_SET
      op: and
      rules:
        - op: or
          rules:
            - op: contains
              path: event/REGISTRY_KEY
              value: "\\Microsoft\\Windows Defender"
            - op: contains
              path: event/REGISTRY_KEY
              value: "\\Policies\\Microsoft\\Windows Defender"
        - op: or
          rules:
            - op: is
              path: event/VALUE_NAME
              value: TamperProtection
            - op: is
              path: event/VALUE_NAME
              value: DisableAntiSpyware
            - op: starts with
              path: event/VALUE_NAME
              value: Disable

    respond:
      - action: report
        name: F0RT1KA - Windows Defender Registry Modification
        metadata:
          test_id: ecd2514c-512a-4251-a6f4-eb3aa834d401
          mitre_attack: T1562.001
          severity: high
          description: Windows Defender protection registry value modified

      - action: add tag
        tag: f0rtika-defender-mod
        ttl: 86400
