title: Trusted CDN Hostname Resolving to Loopback or RFC1918
id: e5472cd5-sigma-007
status: stable
description: |
  Detects DNS resolution or network connections where a trusted CDN
  (cdn.discordapp.com, media.discordapp.net, github.com, raw.githubusercontent.com)
  resolves to a loopback address or RFC1918 private address. This is a
  strong indicator of hosts-file redirect or DNS hijack used to spoof a
  trusted CDN.
references:
  - https://attack.mitre.org/techniques/T1565/001/
  - https://attack.mitre.org/techniques/T1583/006/
author: F0RT1KA Defense Guidance Builder
date: 2026-04-13
tags:
  - attack.impact
  - attack.t1565.001
  - attack.resource-development
  - attack.t1583.006
logsource:
  product: windows
  category: dns_query
detection:
  selection:
    QueryName|contains:
      - 'cdn.discordapp.com'
      - 'media.discordapp.net'
      - 'raw.githubusercontent.com'
      - 'api.github.com'
    QueryResults|startswith:
      - '127.'
      - '10.'
      - '192.168.'
      - '172.16.'
      - '172.17.'
      - '172.18.'
      - '172.19.'
      - '172.20.'
      - '172.21.'
      - '172.22.'
      - '172.23.'
      - '172.24.'
      - '172.25.'
      - '172.26.'
      - '172.27.'
      - '172.28.'
      - '172.29.'
      - '172.30.'
      - '172.31.'
  condition: selection
fields:
  - QueryName
  - QueryResults
  - Image
falsepositives:
  - Internal CDN mirroring setups
  - Development/staging DNS overrides
level: high
