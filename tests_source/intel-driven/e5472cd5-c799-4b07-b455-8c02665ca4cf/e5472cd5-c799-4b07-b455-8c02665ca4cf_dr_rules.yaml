# ============================================================================
# DEFENSE GUIDANCE: LimaCharlie Detection & Response Rules
# ============================================================================
# Test ID: e5472cd5-c799-4b07-b455-8c02665ca4cf
# Test Name: HONESTCUE v2 LLM-Assisted Runtime C# Compilation
# MITRE ATT&CK: T1071.001, T1027.004, T1027.010, T1620, T1105, T1204.002
# Threat Actor: N/A (unattributed per GTIG)
# Created: 2026-04-13 (v2)
# Author: F0RT1KA Defense Guidance Builder
# Format: LimaCharlie file format (for `limacharlie dr add`)
# ============================================================================
#
# TECHNIQUE-FOCUSED DETECTION PRINCIPLE:
# These D&R rules detect the underlying HONESTCUE-class TTPs (LLM-as-runtime
# C# source delivery via trusted-hosting CDN, in-memory Roslyn compilation,
# reflective Assembly.Load, PE drop-and-execute from c:\Windows\Temp), NOT
# the F0RT1KA test framework. Real-world attackers using equivalent tooling
# will trigger these rules.
#
# DEPLOYMENT:
#   limacharlie dr add -f e5472cd5-c799-4b07-b455-8c02665ca4cf_dr_rules.yaml
#
# ============================================================================

rules:

  # ==========================================================================
  # RULE 1: PowerShell invokes CSharpCodeProvider with GenerateInMemory (legacy)
  # Purpose: Detect HONESTCUE stage-2 signature on .NET Framework 4.x hosts —
  #          PowerShell compiling C# via System.CodeDom at runtime. Kept for
  #          real-HONESTCUE matching on Win7/Server2012/older Win10.
  # Confidence: HIGH
  # MITRE ATT&CK: T1027.004, T1620
  # ==========================================================================
  honestcue-ps-csharpcodeprovider-inmemory:
    detect:
      event: SCRIPT_BLOCK
      op: and
      rules:
        - op: contains
          path: event/SCRIPT
          value: CSharpCodeProvider
          case sensitive: false
        - op: contains
          path: event/SCRIPT
          value: GenerateInMemory
          case sensitive: false
    respond:
      - action: report
        name: HONESTCUE-Class PowerShell In-Memory C# Compile (Legacy)
        metadata:
          tactic: Defense Evasion
          technique: T1027.004
          severity: 4
          confidence: high

  # ==========================================================================
  # RULE 2: Microsoft.CodeAnalysis.CSharp.dll loaded in non-dev process (Roslyn)
  # Purpose: Detect HONESTCUE v2 stage-2 signature on .NET 8 hosts — the Roslyn
  #          compiler loaded by a process that is not a developer tool.
  # Confidence: HIGH
  # MITRE ATT&CK: T1027.004
  # ==========================================================================
  honestcue-roslyn-loaded-nondev:
    detect:
      event: MODULE_LOAD
      op: and
      rules:
        - op: ends with
          path: event/MODULE_NAME
          value: Microsoft.CodeAnalysis.CSharp.dll
          case sensitive: false
        - op: is not
          not: true
          path: event/FILE_PATH
          values:
            - devenv.exe
            - Code.exe
            - dotnet.exe
            - MSBuild.exe
            - csc.exe
            - rider64.exe
            - ServiceHub.Host.CLR.x64.exe
            - JetBrains.Rider.exe
          case sensitive: false
    respond:
      - action: report
        name: HONESTCUE v2 Roslyn Load in Non-Dev Process
        metadata:
          tactic: Defense Evasion
          technique: T1027.004
          severity: 4
          confidence: high

  # ==========================================================================
  # RULE 3: Reflective Assembly.Load(byte[])
  # Purpose: Canonical reflective-load primitive used by HONESTCUE stage 2 on
  #          both legacy and modern runtimes.
  # Confidence: HIGH
  # MITRE ATT&CK: T1620
  # ==========================================================================
  honestcue-reflective-assembly-load:
    detect:
      event: SCRIPT_BLOCK
      op: and
      rules:
        - op: contains
          path: event/SCRIPT
          value: Assembly
          case sensitive: false
        - op: contains
          path: event/SCRIPT
          value: "::Load"
          case sensitive: false
        - op: matches
          path: event/SCRIPT
          re: "(?i)(\\[byte\\[\\]\\]|System\\.Byte\\[\\]|byte\\[\\])"
    respond:
      - action: report
        name: Reflective Assembly.Load(byte[])
        metadata:
          tactic: Defense Evasion
          technique: T1620
          severity: 4
          confidence: high

  # ==========================================================================
  # RULE 4: Non-browser / non-git process connects to raw.githubusercontent.com
  # Purpose: HONESTCUE v2 fetches Gemini-shaped JSON and stage-3 PE from
  #          raw.githubusercontent.com. Match on TLS connection by process
  #          not in the allowlist of browsers/git clients.
  # Confidence: MEDIUM
  # MITRE ATT&CK: T1071.001, T1105
  # ==========================================================================
  honestcue-github-raw-nonbrowser:
    detect:
      event: NETWORK_CONNECTIONS
      op: and
      rules:
        - op: contains
          path: event/DOMAIN_NAME
          value: raw.githubusercontent.com
          case sensitive: false
        - op: is not
          not: true
          path: event/FILE_PATH
          values:
            - chrome.exe
            - msedge.exe
            - firefox.exe
            - brave.exe
            - Code.exe
            - devenv.exe
            - git.exe
            - GitHubDesktop.exe
            - curl.exe
            - wget.exe
            - ssh.exe
          case sensitive: false
    respond:
      - action: report
        name: HONESTCUE v2 GitHub-Raw Fetch from Non-Browser Process
        metadata:
          tactic: Command and Control
          technique: T1071.001
          severity: 3
          confidence: medium

  # ==========================================================================
  # RULE 5: Non-browser LLM API invocation
  # Purpose: Direct-from-PE HTTPS POST to Gemini/OpenAI/Anthropic endpoints.
  #          Kept for v1 compatibility and for matching real-HONESTCUE
  #          campaigns that still POST directly to Gemini.
  # Confidence: MEDIUM
  # MITRE ATT&CK: T1071.001
  # ==========================================================================
  honestcue-llm-api-nonbrowser:
    detect:
      event: NETWORK_CONNECTIONS
      op: and
      rules:
        - op: or
          rules:
            - op: contains
              path: event/DOMAIN_NAME
              value: generativelanguage.googleapis.com
              case sensitive: false
            - op: contains
              path: event/DOMAIN_NAME
              value: api.openai.com
              case sensitive: false
            - op: contains
              path: event/DOMAIN_NAME
              value: api.anthropic.com
              case sensitive: false
        - op: is not
          not: true
          path: event/FILE_PATH
          values:
            - chrome.exe
            - msedge.exe
            - firefox.exe
            - brave.exe
            - Code.exe
            - devenv.exe
            - cursor.exe
            - zed.exe
          case sensitive: false
    respond:
      - action: report
        name: Non-Browser Process Issues HTTPS Connection to LLM API
        metadata:
          tactic: Command and Control
          technique: T1071.001
          severity: 3
          confidence: medium

  # ==========================================================================
  # RULE 6: PE written to c:\Windows\Temp by non-installer process
  # Purpose: HONESTCUE v2 stage 3 drops a fetched PE to c:\Windows\Temp and
  #          executes. Detect the drop by any non-installer process.
  # Confidence: MEDIUM-HIGH
  # MITRE ATT&CK: T1105
  # ==========================================================================
  honestcue-temp-pe-drop:
    detect:
      event: NEW_DOCUMENT
      op: and
      rules:
        - op: matches
          path: event/FILE_PATH
          re: '(?i)c:\\Windows\\Temp\\.*\.exe$'
        - op: is not
          not: true
          path: event/PROCESS/FILE_PATH
          values:
            - TrustedInstaller.exe
            - TiWorker.exe
            - MsiExec.exe
            - setup.exe
            - OneDriveSetup.exe
          case sensitive: false
    respond:
      - action: report
        name: PE Written to c:\Windows\Temp by Non-Installer
        metadata:
          tactic: Command and Control
          technique: T1105
          severity: 4
          confidence: high

  # ==========================================================================
  # RULE 7: Process executes from c:\Windows\Temp
  # Purpose: HONESTCUE v2 stage 3 executes the dropped PE from c:\Windows\Temp.
  # Confidence: MEDIUM-HIGH
  # MITRE ATT&CK: T1204.002
  # ==========================================================================
  honestcue-temp-pe-exec:
    detect:
      event: NEW_PROCESS
      op: and
      rules:
        - op: matches
          path: event/FILE_PATH
          re: '(?i)c:\\Windows\\Temp\\.*\.exe$'
        - op: is not
          not: true
          path: event/PARENT/FILE_PATH
          values:
            - TrustedInstaller.exe
            - MsiExec.exe
            - setup.exe
          case sensitive: false
    respond:
      - action: report
        name: Process Execution from c:\Windows\Temp
        metadata:
          tactic: Execution
          technique: T1204.002
          severity: 4
          confidence: high
