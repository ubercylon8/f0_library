# ============================================================
# RULE 4: SeDebugPrivilege Enabled by Non-System Process
# Targets security event log — EventID 4703 (Token Right Adjusted)
# Confidence: Medium-High
# ============================================================
title: SeDebugPrivilege Token Right Enabled by Non-System Process
id: 7c4e1a9f-3b8d-4c5e-a1f2-9e6d0b3c7a2e
status: experimental
description: >
  Detects a non-system process enabling the SeDebugPrivilege token right.
  NativeDump and NimDump use NtAdjustPrivilegesToken (via NtOpenProcessToken)
  to obtain debug access before opening an LSASS process handle. Enabling this
  privilege is required for any tool that must read LSASS memory under a
  non-SYSTEM context, making this a technique-inherent behavioral indicator.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://docs.microsoft.com/en-us/windows/win32/secauthz/privilege-constants
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
  - attack.credential_access
  - attack.t1003.001
  - attack.defense_evasion
  - attack.t1134
logsource:
  category: security
  product: windows
  service: security
detection:
  selection:
    EventID: 4703
    EnabledPrivilegeList|contains: 'SeDebugPrivilege'
  filter_system_processes:
    ProcessName|endswith:
      - '\csrss.exe'
      - '\services.exe'
      - '\svchost.exe'
      - '\lsass.exe'
      - '\System'
      - '\MsMpEng.exe'
      - '\TrustedInstaller.exe'
  condition: selection and not filter_system_processes
falsepositives:
  - Debuggers (WinDbg, x64dbg, Visual Studio debugger)
  - Some system administration tools
  - Certain security products that use debug access legitimately
  - Establish a baseline of processes that legitimately use this privilege in your environment
level: medium

