# ============================================================
# RULE 5: ntdll.dll Remapping / Unhooking via File Mapping
# Targets process_creation — processes loading a fresh ntdll copy to bypass EDR hooks
# Confidence: Medium
# ============================================================
title: Potential ntdll.dll Remapping to Bypass EDR API Hooks
id: 5b9f2e7a-4c1d-4b3e-8a5f-1e7c3d9b2f4a
status: experimental
description: >
  Detects behavioral indicators of ntdll.dll remapping, a technique used by
  NativeDump (-r flag) and similar tools to load a clean copy of ntdll.dll
  from disk and overwrite hooked functions in the process's memory space. This
  bypasses user-mode API hooks placed by EDR products. The detection is
  technique-inherent: remapping ntdll requires opening the file from System32,
  creating a file mapping, and copying the .text section over in-memory stubs.
  Correlate with LSASS access for higher-confidence alerting.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://www.ired.team/offensive-security/defense-evasion/using-syscalls-directly-from-vs
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
  - attack.credential_access
  - attack.t1003.001
  - attack.defense_evasion
  - attack.t1562.001
logsource:
  category: image_load
  product: windows
detection:
  selection_ntdll_load:
    ImageLoaded|endswith: '\ntdll.dll'
    ImageLoaded|contains: '\System32\'
  filter_standard_loaders:
    Image|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
      - 'C:\Program Files\'
      - 'C:\Program Files (x86)\'
  filter_known_hosts:
    Image|endswith:
      - '\explorer.exe'
      - '\svchost.exe'
      - '\lsass.exe'
      - '\services.exe'
  condition: selection_ntdll_load and not filter_standard_loaders and not filter_known_hosts
falsepositives:
  - Applications that load ntdll.dll from unusual paths (rare but legitimate)
  - Custom .NET CLR hosts or native binary loaders
  - Some legitimate security tools performing API monitoring
  - This rule has moderate false positive potential — correlate with LSASS access events
level: medium
