# ============================================================
# Sigma Rules: NativeDump (NimDump) LSASS Memory Dumping
# Test ID: b83616c2-84ee-4738-b398-d2d57eebecec
# MITRE ATT&CK: T1003.001 - OS Credential Dumping: LSASS Memory
# Tactic: TA0006 - Credential Access
# Created: 2026-03-14
# Author: F0RT1KA Detection Rules Generator
# ============================================================
#
# TECHNIQUE-FOCUSED DETECTION PRINCIPLE:
# These Sigma rules detect LSASS credential dumping via NTAPI-only tools
# such as NativeDump and NimDump. All detections target the underlying
# attack behavior — not test framework artifacts — and will catch real-world
# attackers using the same techniques with custom tooling.
#
# ============================================================

---
# ============================================================
# RULE 1: LSASS Process Access via Suspicious Initiating Process
# Targets Sysmon Event ID 10 (ProcessAccess) — lsass.exe as target
# Confidence: High
# ============================================================
title: Suspicious Process Access to LSASS Memory
id: 4a1f8c3e-7b2d-4e9a-b6f1-2c8d5e0a3f7b
status: experimental
description: >
  Detects a non-system process opening a handle to lsass.exe, which is the
  primary indicator of credential dumping tools including NTAPI-based tools
  such as NativeDump and NimDump that bypass MiniDumpWriteDump. Any tool that
  reads LSASS memory must open a process handle — this detection is technique-
  inherent and catches all credential dumpers regardless of implementation.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://github.com/ricardojoserf/NativeDump
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_access
  product: windows
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - '0x1F0FFF'   # PROCESS_ALL_ACCESS
      - '0x1FFFFF'   # Full access
      - '0x1010'     # VM_READ + QUERY_INFORMATION
      - '0x0410'     # VM_READ + QUERY_INFORMATION (alternate mask)
      - '0x0010'     # PROCESS_VM_READ
  filter_system:
    SourceImage|endswith:
      - '\csrss.exe'
      - '\wininit.exe'
      - '\services.exe'
      - '\svchost.exe'
      - '\lsass.exe'
      - '\smss.exe'
  filter_security_software:
    SourceImage|contains:
      - '\MsMpEng.exe'
      - '\MpCmdRun.exe'
      - '\SenseIR.exe'
      - '\SenseCncProxy.exe'
      - '\SecurityHealthService.exe'
      - '\WerFault.exe'
      - '\wermgr.exe'
  condition: selection and not filter_system and not filter_security_software
falsepositives:
  - Legitimate debuggers (Visual Studio, WinDbg) during development
  - Some EDR or DLP agents that inspect LSASS memory
  - Password manager applications using SSPI
  - Tune by adding known security product paths to filter_security_software
level: high

---
# ============================================================
# RULE 2: Credential Dumper Process Execution Patterns
# Targets process_creation — known dumper names, NTAPI flags, output patterns
# Confidence: High
# ============================================================
title: LSASS Credential Dumper Process Execution
id: 9e3c5a7f-1d4b-4f8e-a2c6-7b0d3e9f1a4c
status: experimental
description: >
  Detects the execution of credential dumping tools that target LSASS memory.
  Covers known tool names (mimikatz, nanodump, procdump when targeting lsass,
  comsvcs.dll MiniDump), NativeDump/NimDump behavioral patterns (output file
  flags with document disguise), and the comsvcs.dll living-off-the-land
  technique. Technique-inherent: every LSASS dumper must be executed as a
  process.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://lolbas-project.github.io/lolbas/Libraries/Comsvcs/
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_known_tools:
    Image|re: '(?i)(mimikatz|nanodump|handlekatz|dumpert|lsassy|pypykatz|safetykatz|bettersafetykatz|sharpkatz).*\.exe$'
  selection_comsvcs:
    CommandLine|contains:
      - 'comsvcs.dll'
    CommandLine|contains:
      - 'MiniDump'
      - '#24'
      - 'lsass'
  selection_nativedump_flags:
    CommandLine|contains: '-o:'
    CommandLine|re: '(?i)-o:.+\.(dmp|mdmp|bin|docx|xlsx|pdf)$'
  selection_nativedump_remap:
    CommandLine|contains:
      - '--remap'
      - '-r'
    CommandLine|re: '(?i)(lsass|dump|ntdll)'
  selection_credential_cmdline:
    CommandLine|contains:
      - 'sekurlsa'
      - 'logonpasswords'
      - 'lsadump'
      - 'minidump'
  condition: >
    selection_known_tools or
    selection_comsvcs or
    selection_nativedump_flags or
    selection_nativedump_remap or
    selection_credential_cmdline
falsepositives:
  - Authorized penetration testing and red team exercises
  - Security research labs
  - Legitimate procdump usage for application crash analysis (not targeting lsass)
  - Add authorized pentest process hashes to an allowlist
level: high

---
# ============================================================
# RULE 3: LSASS Memory Dump File Created on Disk
# Targets file_event — .dmp/.mdmp files or disguised dump extensions
# Confidence: High
# ============================================================
title: Potential LSASS Memory Dump File Written to Disk
id: 2f7d9b4e-5c1a-4a8f-b3e7-6d0c2a8e4f1b
status: experimental
description: >
  Detects creation of files that are consistent with LSASS memory dump output.
  NativeDump and NimDump write hand-crafted Minidump files and support disguised
  output filenames (e.g., document.docx). Standard dump extensions and patterns
  such as "lsass" in the filename are also covered. Any credential dumper that
  saves output to disk will trigger this rule regardless of tool.
references:
  - https://attack.mitre.org/techniques/T1003/001/
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: file_event
  product: windows
detection:
  selection_standard_extensions:
    TargetFilename|endswith:
      - '.dmp'
      - '.mdmp'
  selection_lsass_in_name:
    TargetFilename|re: '(?i)lsass.+\.(dmp|bin|docx|xlsx|pdf|zip)$'
  selection_credential_in_name:
    TargetFilename|re: '(?i)(credential|memory|procdump|memdump).+\.(dmp|bin|mdmp)$'
  filter_legitimate_crashdump:
    Image|endswith:
      - '\WerFault.exe'
      - '\wermgr.exe'
      - '\DumpRep.exe'
    TargetFilename|contains: '\CrashDumps\'
  filter_system_volume:
    TargetFilename|startswith: 'C:\Windows\System32\'
  condition: >
    (selection_standard_extensions or
     selection_lsass_in_name or
     selection_credential_in_name)
    and not filter_legitimate_crashdump
    and not filter_system_volume
falsepositives:
  - Application crash dumps in user profiles when WerFault.exe is involved (filtered)
  - Developer-generated core dumps from debugging sessions
  - Legitimate forensic tools in authorized use
  - Tune by adding crash dump directories to filter_legitimate_crashdump
level: high

