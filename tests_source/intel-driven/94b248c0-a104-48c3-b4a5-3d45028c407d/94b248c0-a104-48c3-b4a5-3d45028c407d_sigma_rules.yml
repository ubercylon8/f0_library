title: Shadow Copy Deletion via vssadmin
id: 94b248c0-sigma-003
related:
    - id: 94b248c0-a104-48c3-b4a5-3d45028c407d
      type: derived
status: experimental
description: |
    Detects vssadmin.exe being used to delete Volume Shadow Copies. This
    is one of the most common ransomware techniques (T1490) used to prevent
    file recovery. Nearly all modern ransomware families -- including Gunra,
    LockBit, Conti, REvil, BlackCat, and others -- delete shadow copies
    before or during encryption. This is a technique-generic detection.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1490
level: high
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|endswith: '\vssadmin.exe'
    selection_args:
        CommandLine|contains|all:
            - 'delete'
            - 'shadows'
    condition: selection_img and selection_args
falsepositives:
    - IT administrators performing scheduled VSS cleanup
    - Disk space management automation
fields:
    - CommandLine
    - ParentImage
    - User
    - Computer

