title: Gunra Ransomware File Encryption - ENCRT Extension
id: 94b248c0-sigma-001
related:
    - id: 94b248c0-a104-48c3-b4a5-3d45028c407d
      type: derived
status: experimental
description: |
    Detects file creation or rename events where files receive the .ENCRT
    extension used by Gunra ransomware. This extension is appended to files
    after encryption. Any appearance of .ENCRT files on an endpoint is a
    strong indicator of Gunra ransomware activity or a variant reusing this
    extension. This detection is technique-focused and targets the file
    encryption behavior (T1486), not any specific testing tool.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1486
    - ransomware.gunra
level: critical
logsource:
    category: file_event
    product: windows
detection:
    selection:
        TargetFilename|endswith: '.ENCRT'
    condition: selection
falsepositives:
    - Legitimate encryption software using .ENCRT extension (extremely unlikely)
    - Security testing with Gunra ransomware simulation
fields:
    - TargetFilename
    - Image
    - User
    - Computer

