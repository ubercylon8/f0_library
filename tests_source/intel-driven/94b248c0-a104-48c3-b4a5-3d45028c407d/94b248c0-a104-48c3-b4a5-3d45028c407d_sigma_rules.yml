title: Common Ransom Note Filename Creation
id: 94b248c0-sigma-010
related:
    - id: 94b248c0-a104-48c3-b4a5-3d45028c407d
      type: derived
status: experimental
description: |
    Detects creation of files matching common ransom note filenames across
    multiple ransomware families. Includes Gunra's R3ADM3.txt as well as
    patterns used by LockBit, Conti, REvil, BlackCat, Phobos, and other
    families. This provides broad ransomware detection capability beyond
    a single strain.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1486
level: high
logsource:
    category: file_event
    product: windows
detection:
    selection_gunra:
        TargetFilename|endswith: '\R3ADM3.txt'
    selection_generic:
        TargetFilename|endswith:
            - '\DECRYPT_INSTRUCTION.txt'
            - '\DECRYPT_INFORMATION.html'
            - '\HOW_TO_DECRYPT.txt'
            - '\HOW_TO_RECOVER_FILES.txt'
            - '\RESTORE_FILES.txt'
            - '\RECOVER_YOUR_DATA.txt'
            - '\readme.txt'
            - '\!_READ_ME_!.txt'
            - '\HELP_DECRYPT.txt'
    selection_pattern:
        TargetFilename|contains:
            - 'DECRYPT'
            - 'RECOVER'
            - 'RESTORE'
        TargetFilename|endswith:
            - '.hta'
            - '.html'
    condition: selection_gunra or selection_generic or selection_pattern
falsepositives:
    - Legitimate readme.txt files (high volume -- tune by directory)
    - Security awareness training materials
fields:
    - TargetFilename
    - Image
    - User
    - Computer

