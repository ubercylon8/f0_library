title: macOS - Time Machine Backup Deletion (Recovery Inhibition)
id: 94b248c0-sigma-014
related:
    - id: 94b248c0-a104-48c3-b4a5-3d45028c407d
      type: derived
status: experimental
description: |
    Detects commands on macOS that delete Time Machine backups or disable
    Time Machine. This is the macOS equivalent of Windows shadow copy
    deletion (T1490). Ransomware targeting macOS would use tmutil to delete
    local snapshots and backups to prevent recovery after encryption.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1490
level: high
logsource:
    category: process_creation
    product: macos
detection:
    selection_tmutil_delete:
        Image|endswith: '/tmutil'
        CommandLine|contains:
            - 'deletelocalsnapshots'
            - 'delete'
    selection_tmutil_disable:
        Image|endswith: '/tmutil'
        CommandLine|contains: 'disable'
    selection_defaults:
        Image|endswith: '/defaults'
        CommandLine|contains|all:
            - 'com.apple.TimeMachine'
            - 'AutoBackup'
            - '-bool'
            - 'false'
    condition: selection_tmutil_delete or selection_tmutil_disable or selection_defaults
falsepositives:
    - Users manually managing Time Machine snapshots
    - IT deployment scripts reconfiguring Time Machine
fields:
    - CommandLine
    - ParentImage
    - User
    - Hostname

