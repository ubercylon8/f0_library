title: Rapid System Information Discovery - Pre-Encryption Reconnaissance
id: 94b248c0-sigma-007
related:
    - id: 94b248c0-a104-48c3-b4a5-3d45028c407d
      type: derived
status: experimental
description: |
    Detects rapid execution of multiple system information discovery
    commands from a single parent process. Gunra ransomware gathers
    hostname, username, and OS information before beginning its encryption
    routine. A burst of 3 or more discovery commands within a short window
    from the same parent is suspicious when the parent is not a known
    system management tool.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.discovery
    - attack.t1082
level: medium
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\hostname.exe'
            - '\whoami.exe'
            - '\systeminfo.exe'
            - '\ipconfig.exe'
            - '\net.exe'
            - '\nltest.exe'
    filter_parent:
        ParentImage|endswith:
            - '\svchost.exe'
            - '\services.exe'
            - '\mmc.exe'
            - '\explorer.exe'
    condition: selection and not filter_parent
    # Note: Sigma alone cannot express time-based correlation.
    # SIEM-side aggregation (3+ events in 2 min from same ParentImage) is recommended.
falsepositives:
    - IT asset inventory scripts
    - System monitoring and health check agents
    - Administrator troubleshooting sessions
fields:
    - CommandLine
    - ParentImage
    - ParentCommandLine
    - User
    - Computer

