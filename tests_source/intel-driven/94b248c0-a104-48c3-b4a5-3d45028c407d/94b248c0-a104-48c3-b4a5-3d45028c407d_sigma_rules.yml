title: Mass File Rename with Suspicious Extension Appended
id: 94b248c0-sigma-009
related:
    - id: 94b248c0-a104-48c3-b4a5-3d45028c407d
      type: derived
status: experimental
description: |
    Detects file rename events where a known ransomware extension is
    appended to the original filename (e.g., document.docx.ENCRT). This
    pattern of appending an extension rather than replacing it is the
    dominant method used by ransomware families including Gunra. This rule
    covers multiple known ransomware extensions for broad detection.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1486
level: high
logsource:
    category: file_rename
    product: windows
detection:
    selection:
        TargetFilename|endswith:
            - '.ENCRT'
            - '.encrypted'
            - '.locked'
            - '.crypted'
            - '.enc'
            - '.crypt'
            - '.locky'
            - '.cerber'
            - '.ryuk'
            - '.conti'
            - '.lockbit'
            - '.phobos'
            - '.dharma'
            - '.djvu'
            - '.stop'
    condition: selection
falsepositives:
    - Legitimate file encryption tools
    - File renaming by backup software
fields:
    - TargetFilename
    - Image
    - User
    - Computer

