title: Shadow Copy Deletion via WMIC
id: 94b248c0-sigma-004
related:
    - id: 94b248c0-a104-48c3-b4a5-3d45028c407d
      type: derived
status: experimental
description: |
    Detects wmic.exe being used to delete shadow copies via WMI. This
    alternative method is used by ransomware families when vssadmin-based
    deletion is blocked or monitored. Gunra and many other ransomware
    families use both vssadmin and wmic methods for redundancy.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1490
level: high
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|endswith: '\wmic.exe'
    selection_args:
        CommandLine|contains|all:
            - 'shadowcopy'
            - 'delete'
    condition: selection_img and selection_args
falsepositives:
    - Very rare in legitimate operations
    - Automated WMI scripts managing shadow storage (should be baselined)
fields:
    - CommandLine
    - ParentImage
    - User
    - Computer

---

title: Shadow Copy Deletion via PowerShell WMI
id: 94b248c0-sigma-005
related:
    - id: 94b248c0-a104-48c3-b4a5-3d45028c407d
      type: derived
status: experimental
description: |
    Detects PowerShell commands targeting Win32_ShadowCopy WMI class for
    deletion. Sophisticated ransomware and living-off-the-land attacks use
    PowerShell to interact with shadow copies instead of vssadmin or wmic,
    which may be more heavily monitored.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1490
    - attack.execution
    - attack.t1059.001
level: high
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_args:
        CommandLine|contains: 'Win32_ShadowCopy'
    selection_delete:
        CommandLine|contains:
            - 'Delete'
            - 'Remove'
    condition: selection_img and selection_args and selection_delete
falsepositives:
    - PowerShell-based VSS management scripts (should be rare and baselined)
fields:
    - CommandLine
    - ParentImage
    - User
    - Computer

