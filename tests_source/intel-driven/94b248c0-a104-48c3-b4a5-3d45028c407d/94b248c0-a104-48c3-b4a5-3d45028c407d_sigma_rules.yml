title: Boot Recovery Disabled via BCDEdit
id: 94b248c0-sigma-006
related:
    - id: 94b248c0-a104-48c3-b4a5-3d45028c407d
      type: derived
status: experimental
description: |
    Detects bcdedit.exe being used to disable Windows recovery options.
    Ransomware uses this technique to prevent victims from recovering
    through Windows Recovery Environment, Safe Mode, or automatic repair.
    This makes the impact of encryption more severe. Gunra and most modern
    ransomware families execute this as part of their recovery inhibition
    phase.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1490
level: high
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|endswith: '\bcdedit.exe'
    selection_recovery:
        CommandLine|contains|all:
            - 'recoveryenabled'
            - 'no'
    selection_boot:
        CommandLine|contains|all:
            - 'bootstatuspolicy'
            - 'ignoreallfailures'
    condition: selection_img and (selection_recovery or selection_boot)
falsepositives:
    - System administrators configuring boot settings during maintenance
    - OEM deployment scripts
fields:
    - CommandLine
    - ParentImage
    - User
    - Computer

