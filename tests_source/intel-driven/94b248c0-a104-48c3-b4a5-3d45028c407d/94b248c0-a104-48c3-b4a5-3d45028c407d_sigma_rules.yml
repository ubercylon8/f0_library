title: Anti-Debugging API Call by Non-Security Process
id: 94b248c0-sigma-011
related:
    - id: 94b248c0-a104-48c3-b4a5-3d45028c407d
      type: derived
status: experimental
description: |
    Detects calls to anti-debugging APIs (IsDebuggerPresent,
    CheckRemoteDebuggerPresent, NtQueryInformationProcess with
    ProcessDebugPort) by processes that are not known security tools or
    debuggers. Gunra ransomware uses IsDebuggerPresent to detect analysis
    environments before executing its payload. While anti-debugging is used
    by legitimate software (DRM, anti-cheat), its presence in an unknown
    binary combined with other ransomware indicators is highly suspicious.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.defense_evasion
    - attack.t1622
level: medium
logsource:
    category: api_call
    product: windows
detection:
    selection_api:
        ApiName:
            - 'IsDebuggerPresent'
            - 'CheckRemoteDebuggerPresent'
            - 'NtQueryInformationProcess'
    filter_known:
        Image|endswith:
            - '\devenv.exe'
            - '\windbg.exe'
            - '\x64dbg.exe'
            - '\ollydbg.exe'
            - '\ida.exe'
            - '\ida64.exe'
            - '\MsMpEng.exe'
            - '\MsSense.exe'
    condition: selection_api and not filter_known
falsepositives:
    - Legitimate anti-cheat software
    - DRM-protected applications
    - Software license enforcement tools
fields:
    - ApiName
    - Image
    - User
    - Computer

