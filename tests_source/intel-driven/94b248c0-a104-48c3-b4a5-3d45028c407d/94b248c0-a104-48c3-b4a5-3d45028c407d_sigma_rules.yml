title: Linux - Snapshot or Backup Deletion (Recovery Inhibition)
id: 94b248c0-sigma-013
related:
    - id: 94b248c0-a104-48c3-b4a5-3d45028c407d
      type: derived
status: experimental
description: |
    Detects commands on Linux that destroy filesystem snapshots, LVM
    snapshots, or backup data. This is the Linux equivalent of Windows
    shadow copy deletion (T1490). Ransomware targeting Linux systems
    (such as ESXi-targeting variants) uses these commands to inhibit
    recovery from snapshots and backups before encrypting data.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1490
level: high
logsource:
    category: process_creation
    product: linux
detection:
    selection_lvm:
        Image|endswith: '/lvremove'
    selection_btrfs:
        Image|endswith: '/btrfs'
        CommandLine|contains:
            - 'subvolume delete'
            - 'snapshot delete'
    selection_zfs:
        Image|endswith: '/zfs'
        CommandLine|contains: 'destroy'
    selection_rm_backup:
        Image|endswith:
            - '/rm'
            - '/shred'
        CommandLine|contains:
            - '/backup'
            - '/var/lib/snapshots'
            - '.snapshot'
    condition: selection_lvm or selection_btrfs or selection_zfs or selection_rm_backup
falsepositives:
    - Automated snapshot rotation scripts (should be baselined)
    - Storage administrators performing maintenance
fields:
    - CommandLine
    - ParentImage
    - User
    - Hostname

