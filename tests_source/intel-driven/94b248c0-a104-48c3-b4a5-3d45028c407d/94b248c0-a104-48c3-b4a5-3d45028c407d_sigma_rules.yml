title: Suspicious vssadmin Shadow Copy Enumeration
id: 94b248c0-sigma-008
related:
    - id: 94b248c0-a104-48c3-b4a5-3d45028c407d
      type: derived
status: experimental
description: |
    Detects vssadmin.exe being used to list or enumerate shadow copies.
    While less severe than deletion, shadow copy enumeration by a non-system
    process may indicate ransomware reconnaissance. Gunra checks shadow
    copy accessibility before attempting deletion. When correlated with
    other ransomware indicators, this becomes a high-confidence signal.
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1490
    - attack.discovery
level: medium
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|endswith: '\vssadmin.exe'
    selection_list:
        CommandLine|contains|all:
            - 'list'
            - 'shadows'
    filter_parent:
        ParentImage|endswith:
            - '\svchost.exe'
            - '\services.exe'
    condition: selection_img and selection_list and not filter_parent
falsepositives:
    - IT administrators checking backup status
    - Backup monitoring scripts
fields:
    - CommandLine
    - ParentImage
    - User
    - Computer

