# ============================================================================
# DEFENSE GUIDANCE: LimaCharlie Detection & Response Rules
# ============================================================================
# Test ID: 94b248c0-a104-48c3-b4a5-3d45028c407d
# Test Name: Gunra Ransomware Simulation
# MITRE ATT&CK: T1486, T1490, T1082, T1083, T1622
# Created: 2025-12-07
# Author: F0RT1KA Defense Guidance Builder
# Format: LimaCharlie file format (for limacharlie dr add)
# ============================================================================
#
# TECHNIQUE-FOCUSED DETECTION PRINCIPLE:
# These D&R rules detect the underlying ransomware behaviors demonstrated
# by Gunra ransomware, NOT the F0RT1KA testing framework specifically.
# They will catch real-world ransomware attacks using similar techniques.
#
# KEY INDICATORS:
# - File extension: .ENCRT
# - Ransom note: R3ADM3.txt
# - Shadow copy deletion via vssadmin/wmic
# - Mass file enumeration and renaming
#
# DEPLOYMENT:
#   limacharlie dr add -f 94b248c0-a104-48c3-b4a5-3d45028c407d_dr_rules.yaml
#
# ============================================================================

rules:

  # ==========================================================================
  # RULE 1: Gunra Ransomware - ENCRT File Extension
  # Purpose: Detect files being encrypted with the .ENCRT extension
  # Confidence: HIGH
  # MITRE ATT&CK: T1486 - Data Encrypted for Impact
  # ==========================================================================
  gunra-encrt-file-encryption:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        # File has .ENCRT extension (Gunra signature)
        - op: ends with
          path: event/FILE_PATH
          value: ".ENCRT"
        # Exclude known safe directories (adjust for your environment)
        - op: contains
          path: event/FILE_PATH
          value: "\\Windows\\Temp\\"
          not: true

    respond:
      - action: report
        name: Gunra Ransomware - ENCRT File Encryption Detected
        metadata:
          severity: critical
          mitre_attack: T1486
          confidence: high
          description: File encrypted with Gunra ransomware .ENCRT extension
          investigation: Check parent process, enumerate affected files, isolate host

      - action: task
        command: history_dump
        investigation: Gunra-Ransomware-Encryption


  # ==========================================================================
  # RULE 2: Gunra Ransomware - Ransom Note Creation
  # Purpose: Detect creation of the R3ADM3.txt ransom note
  # Confidence: HIGH
  # MITRE ATT&CK: T1486 - Data Encrypted for Impact
  # ==========================================================================
  gunra-ransom-note-creation:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        # Specific ransom note filename
        - op: ends with
          path: event/FILE_PATH
          value: "\\R3ADM3.txt"

    respond:
      - action: report
        name: Gunra Ransomware - Ransom Note Dropped
        metadata:
          severity: critical
          mitre_attack: T1486
          confidence: high
          description: Gunra ransomware ransom note R3ADM3.txt created
          investigation: CRITICAL - Active ransomware attack, isolate immediately

      - action: task
        command: history_dump
        investigation: Gunra-Ransom-Note

      # Uncomment to auto-isolate the host
      # - action: task
      #   command: segregate_network


  # ==========================================================================
  # RULE 3: Shadow Copy Deletion via vssadmin
  # Purpose: Detect vssadmin delete shadows commands
  # Confidence: HIGH
  # MITRE ATT&CK: T1490 - Inhibit System Recovery
  # ==========================================================================
  shadow-copy-deletion-vssadmin:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        # vssadmin.exe execution
        - op: ends with
          path: event/FILE_PATH
          value: "\\vssadmin.exe"
        # Delete shadows command
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: "delete shadows"
            - op: contains
              path: event/COMMAND_LINE
              value: "Delete Shadows"
            - op: contains
              path: event/COMMAND_LINE
              value: "/all"

    respond:
      - action: report
        name: Shadow Copy Deletion Attempt - vssadmin
        metadata:
          severity: critical
          mitre_attack: T1490
          confidence: high
          description: Attempt to delete Volume Shadow Copies via vssadmin
          investigation: Check for ransomware activity, parent process analysis

      - action: task
        command: history_dump
        investigation: VSS-Deletion-Attack


  # ==========================================================================
  # RULE 4: Shadow Copy Deletion via WMI
  # Purpose: Detect shadow copy deletion via WMIC or PowerShell WMI
  # Confidence: HIGH
  # MITRE ATT&CK: T1490 - Inhibit System Recovery
  # ==========================================================================
  shadow-copy-deletion-wmi:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        # WMIC or PowerShell
        - op: or
          rules:
            - op: ends with
              path: event/FILE_PATH
              value: "\\wmic.exe"
            - op: ends with
              path: event/FILE_PATH
              value: "\\powershell.exe"
            - op: ends with
              path: event/FILE_PATH
              value: "\\pwsh.exe"
        # Shadow copy deletion commands
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: "shadowcopy delete"
            - op: contains
              path: event/COMMAND_LINE
              value: "Win32_ShadowCopy"
            - op: contains
              path: event/COMMAND_LINE
              value: ".Delete()"

    respond:
      - action: report
        name: Shadow Copy Deletion Attempt - WMI
        metadata:
          severity: critical
          mitre_attack: T1490
          confidence: high
          description: Attempt to delete Volume Shadow Copies via WMI
          investigation: High-priority ransomware indicator


  # ==========================================================================
  # RULE 5: BCDEdit Recovery Disabling
  # Purpose: Detect bcdedit commands that disable recovery
  # Confidence: HIGH
  # MITRE ATT&CK: T1490 - Inhibit System Recovery
  # ==========================================================================
  bcdedit-recovery-disabled:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: "\\bcdedit.exe"
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: "recoveryenabled no"
            - op: contains
              path: event/COMMAND_LINE
              value: "bootstatuspolicy ignoreallfailures"
            - op: contains
              path: event/COMMAND_LINE
              value: "safeboot"

    respond:
      - action: report
        name: Boot Recovery Disabled via BCDEdit
        metadata:
          severity: critical
          mitre_attack: T1490
          confidence: high
          description: BCDEdit used to disable Windows recovery options
          investigation: Ransomware pre-encryption activity


  # ==========================================================================
  # RULE 6: Mass File Renaming Detection
  # Purpose: Detect rapid file operations indicative of encryption
  # Confidence: MEDIUM
  # MITRE ATT&CK: T1486 - Data Encrypted for Impact
  # Note: Requires tuning for environment
  # ==========================================================================
  mass-file-modification:
    detect:
      target: edr
      event: FILE_MODIFIED
      op: and
      rules:
        # Not system directories
        - op: starts with
          path: event/FILE_PATH
          value: "C:\\Windows\\"
          not: true
        - op: starts with
          path: event/FILE_PATH
          value: "C:\\Program Files\\"
          not: true
        # Suspicious extensions (ransomware indicators)
        - op: or
          rules:
            - op: ends with
              path: event/FILE_PATH
              value: ".ENCRT"
            - op: ends with
              path: event/FILE_PATH
              value: ".encrypted"
            - op: ends with
              path: event/FILE_PATH
              value: ".locked"
            - op: ends with
              path: event/FILE_PATH
              value: ".crypted"

    respond:
      - action: report
        name: Suspicious File Modification - Ransomware Pattern
        metadata:
          severity: high
          mitre_attack: T1486
          confidence: medium
          description: File modification with ransomware-associated extension


  # ==========================================================================
  # RULE 7: System Information Discovery
  # Purpose: Detect system enumeration commonly performed by ransomware
  # Confidence: MEDIUM
  # MITRE ATT&CK: T1082 - System Information Discovery
  # ==========================================================================
  system-information-discovery:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        # System enumeration tools
        - op: or
          rules:
            - op: ends with
              path: event/FILE_PATH
              value: "\\systeminfo.exe"
            - op: ends with
              path: event/FILE_PATH
              value: "\\hostname.exe"
            - op: ends with
              path: event/FILE_PATH
              value: "\\whoami.exe"
        # Not from trusted parent processes
        - op: ends with
          path: routing/parent/FILE_PATH
          value: "\\cmd.exe"
          not: true
        - op: ends with
          path: routing/parent/FILE_PATH
          value: "\\explorer.exe"
          not: true

    respond:
      - action: report
        name: System Information Discovery
        metadata:
          severity: medium
          mitre_attack: T1082
          confidence: medium
          description: System enumeration activity detected


  # ==========================================================================
  # RULE 8: File Enumeration Pattern
  # Purpose: Detect processes performing file enumeration
  # Confidence: LOW-MEDIUM
  # MITRE ATT&CK: T1083 - File and Directory Discovery
  # ==========================================================================
  file-directory-enumeration:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: or
          rules:
            - op: ends with
              path: event/FILE_PATH
              value: "\\dir.exe"
            - op: ends with
              path: event/FILE_PATH
              value: "\\tree.exe"
        # Looking at specific valuable directories
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: "\\Users\\"
            - op: contains
              path: event/COMMAND_LINE
              value: "\\Documents\\"
            - op: contains
              path: event/COMMAND_LINE
              value: "/s"
            - op: contains
              path: event/COMMAND_LINE
              value: "/b"

    respond:
      - action: report
        name: File and Directory Enumeration
        metadata:
          severity: low
          mitre_attack: T1083
          confidence: low
          description: File enumeration activity - potential ransomware reconnaissance


  # ==========================================================================
  # RULE 9: F0RT1KA Test Directory Activity
  # Purpose: Monitor F0RT1KA test execution for SOC awareness
  # Confidence: HIGH (for test framework monitoring)
  # ==========================================================================
  f0rtika-test-execution:
    detect:
      target: edr
      event: FILE_CREATE
      op: and
      rules:
        # F0RT1KA test directory
        - op: contains
          path: event/FILE_PATH
          value: "\\F0\\"
        # Gunra test specific indicators
        - op: or
          rules:
            - op: contains
              path: event/FILE_PATH
              value: "94b248c0-a104-48c3-b4a5-3d45028c407d"
            - op: ends with
              path: event/FILE_PATH
              value: ".ENCRT"
            - op: ends with
              path: event/FILE_PATH
              value: "R3ADM3.txt"

    respond:
      - action: report
        name: F0RT1KA Gunra Test Execution
        metadata:
          severity: low
          mitre_attack: T1486
          confidence: high
          description: F0RT1KA Gunra ransomware simulation test execution detected
          test_id: 94b248c0-a104-48c3-b4a5-3d45028c407d


  # ==========================================================================
  # RULE 10: Ransomware Process Name Detection
  # Purpose: Detect processes with ransomware-related names
  # Confidence: HIGH
  # ==========================================================================
  ransomware-process-name:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: or
          rules:
            # Known Gunra process name
            - op: contains
              path: event/FILE_PATH
              value: "gunraransome"
            # Generic ransomware patterns
            - op: matches
              path: event/FILE_PATH
              re: (?i)(ransom|encrypt|locker|crypt).*\.exe$

    respond:
      - action: report
        name: Ransomware Process Execution Detected
        metadata:
          severity: critical
          mitre_attack: T1486
          confidence: high
          description: Process with ransomware-indicative name executed
          investigation: Immediate isolation recommended

      - action: task
        command: history_dump
        investigation: Ransomware-Process-Execution


# ============================================================================
# OUTPUTS CONFIGURATION (for test results collection)
# ============================================================================
# Note: These outputs are for collecting F0RT1KA test results, not for
# the detection rules above. Include if deploying full F0RT1KA infrastructure.

outputs:
  gunra-ransomware-detections:
    module: syslog
    for: detections
    host: siem.example.com
    port: 514
