# ============================================================
# ESXi Hypervisor Ransomware Kill Chain - Sigma Detection Rules
# Test ID: 25aafe2c-ec57-4a85-a26a-c3d7cf35620c
# MITRE ATT&CK: T1046, T1018, T1021.004, T1068, T1489, T1529, T1048, T1567.002, T1486
# Threat Actor: RansomHub / Akira / Black Basta / LockBit Linux
# Generated: 2026-03-13
# Sigma Specification: 2.0
# ============================================================
# FOCUS: Technique behaviors only - no test framework artifacts
# ============================================================

# ============================================================
# Rule 1: ESXi Management Command Execution (T1046, T1489)
# ============================================================
title: ESXi Management Command Execution - vim-cmd or esxcli
id: 25aafe2c-sigma-001
status: experimental
description: |
    Detects execution of ESXi management commands (vim-cmd, esxcli, vmdumper)
    that are used during hypervisor ransomware attacks for VM enumeration,
    VM killing, snapshot deletion, and service disruption. RansomHub, LockBit,
    Akira, and Black Basta all rely on these tools during ESXi targeting.
references:
    - https://attack.mitre.org/techniques/T1046/
    - https://attack.mitre.org/techniques/T1489/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.discovery
    - attack.impact
    - attack.t1046
    - attack.t1489
logsource:
    category: process_creation
    product: linux
detection:
    selection_binaries:
        Image|endswith:
            - '/vim-cmd'
            - '/esxcli'
            - '/vmdumper'
    selection_commands:
        CommandLine|contains:
            - 'vmsvc/getallvms'
            - 'vm process kill'
            - 'vm process list'
            - 'vmsvc/power.off'
            - 'vmsvc/snapshot.removeall'
            - 'hostsvc/enable_ssh'
            - 'vmdumper -l'
    condition: selection_binaries or selection_commands
falsepositives:
    - Legitimate ESXi administration by authorized VMware administrators
    - Scheduled maintenance scripts using vim-cmd or esxcli
level: high

---

# ============================================================
# Rule 2: Mass VM Termination via esxcli (T1489, T1529)
# ============================================================
title: Mass VM Process Kill via esxcli - Hypervisor Ransomware Pattern
id: 25aafe2c-sigma-002
status: experimental
description: |
    Detects rapid execution of esxcli vm process kill commands, which is
    characteristic of ESXi ransomware operations. LockBit uses a 9x retry
    pattern for stubborn VMs, while RansomHub and Akira force-kill all
    running VMs before encryption.
references:
    - https://attack.mitre.org/techniques/T1489/
    - https://attack.mitre.org/techniques/T1529/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1489
    - attack.t1529
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        CommandLine|contains|all:
            - 'esxcli'
            - 'vm process kill'
    condition: selection
falsepositives:
    - Planned VM migration during maintenance windows
level: critical

---

# ============================================================
# Rule 3: SSH Key File Access - Credential Harvesting (T1021.004)
# ============================================================
title: SSH Key File Access for Lateral Movement
id: 25aafe2c-sigma-003
status: experimental
description: |
    Detects access to SSH private key files, known_hosts, authorized_keys,
    and SSH config files. SSH-Snake and similar lateral movement tools
    harvest these files to discover and authenticate to additional hosts.
    RansomHub affiliates use SSH key chains to spread across ESXi hosts.
references:
    - https://attack.mitre.org/techniques/T1021/004/
    - https://sysdig.com/blog/ssh-snake/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.lateral_movement
    - attack.t1021.004
logsource:
    category: file_access
    product: linux
detection:
    selection:
        TargetFilename|contains:
            - '.ssh/id_rsa'
            - '.ssh/id_ed25519'
            - '.ssh/id_ecdsa'
            - '.ssh/authorized_keys'
            - '.ssh/known_hosts'
            - '.ssh/config'
    filter_ssh_daemon:
        Image|endswith:
            - '/sshd'
            - '/ssh-agent'
    condition: selection and not filter_ssh_daemon
falsepositives:
    - Ansible and other automation tools reading SSH keys
    - SSH key rotation scripts
level: high

---

# ============================================================
# Rule 4: ESX Admins AD Group Creation - CVE-2024-37085 (T1068)
# ============================================================
title: ESX Admins Active Directory Group Creation - CVE-2024-37085
id: 25aafe2c-sigma-004
status: experimental
description: |
    Detects creation of Active Directory groups matching the ESX Admins
    naming pattern. CVE-2024-37085 allows attackers to create this group
    to automatically gain administrator privileges on ESXi hosts joined
    to the AD domain. Used by Storm-0506 and Black Basta.
references:
    - https://attack.mitre.org/techniques/T1068/
    - https://www.cve.org/CVERecord?id=CVE-2024-37085
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.privilege_escalation
    - attack.t1068
    - cve.2024.37085
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID:
            - 4727  # Security-enabled global group created
            - 4731  # Security-enabled local group created
            - 4754  # Security-enabled universal group created
        TargetGroupName|contains:
            - 'ESX Admins'
            - 'ESXAdmins'
            - 'ESX_Admins'
    condition: selection
falsepositives:
    - Legitimate creation of ESXi management groups by authorized administrators
level: critical

---

# ============================================================
# Rule 5: Rclone Execution or Cloud Storage Sync (T1048, T1567.002)
# ============================================================
title: Rclone Cloud Sync Execution - Data Exfiltration Tool
id: 25aafe2c-sigma-005
status: experimental
description: |
    Detects execution of Rclone or commands containing Rclone-specific
    arguments for cloud storage synchronization. Rclone appears in 57%
    of ransomware incidents per ReliaQuest, and RansomHub affiliates
    commonly rename the binary to svchost.exe for evasion.
references:
    - https://attack.mitre.org/techniques/T1048/
    - https://attack.mitre.org/techniques/T1567/002/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.exfiltration
    - attack.t1048
    - attack.t1567.002
logsource:
    category: process_creation
    product: linux
detection:
    selection_binary:
        Image|endswith: '/rclone'
    selection_args:
        CommandLine|contains:
            - 'rclone sync'
            - 'rclone copy'
            - '--transfers'
            - '--checkers'
            - 'mega:'
            - 's3:'
            - 'sftp:'
            - '--s3-chunk-size'
            - 'rclone.conf'
    condition: selection_binary or selection_args
falsepositives:
    - Legitimate cloud backup operations using Rclone
level: high

---

