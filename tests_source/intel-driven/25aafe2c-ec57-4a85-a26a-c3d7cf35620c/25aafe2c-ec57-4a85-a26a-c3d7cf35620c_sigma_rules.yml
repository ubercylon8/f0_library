# ============================================================
# Rule 9: VMDK/VMX File Modification - Hypervisor Encryption (T1486)
# ============================================================
title: Virtual Machine Disk File Modification in Datastore
id: 25aafe2c-sigma-009
status: experimental
description: |
    Detects modification or deletion of virtual machine disk files (.vmdk,
    .vmx, .vmsn, .vmsd) within datastore paths. ESXi ransomware targets
    these files for encryption to maximize impact across all hosted VMs.
references:
    - https://attack.mitre.org/techniques/T1486/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1486
logsource:
    category: file_event
    product: linux
detection:
    selection_ext:
        TargetFilename|endswith:
            - '.vmdk'
            - '.vmx'
            - '.vmsn'
            - '.vmsd'
            - '.nvram'
    selection_path:
        TargetFilename|contains:
            - '/vmfs/volumes/'
            - 'datastore'
    condition: selection_ext and selection_path
falsepositives:
    - VM migration and storage vMotion operations
    - VM snapshot creation by authorized administrators
level: critical

---

# ============================================================
# Rule 10: Ransom Note File Creation (T1486)
# ============================================================
title: Ransom Note File Creation Across Multiple Directories
id: 25aafe2c-sigma-010
status: experimental
description: |
    Detects creation of files with known ransom note filenames deployed
    across multiple directories, which is characteristic of ransomware
    operations. RansomHub uses README.txt, while other variants use
    different naming conventions.
references:
    - https://attack.mitre.org/techniques/T1486/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1486
logsource:
    category: file_event
    product: linux
detection:
    selection:
        TargetFilename|endswith:
            - '/README.txt'
            - '/HOW_TO_DECRYPT.txt'
            - '/RECOVER_YOUR_FILES.txt'
            - '/DECRYPT_INSTRUCTIONS.txt'
            - '/RESTORE_FILES.txt'
    condition: selection
falsepositives:
    - Legitimate README.txt creation (low confidence if across multiple dirs)
