# ============================================================
# Rule 11: ESXi SSH Service Enable - Persistent Access (T1021.004)
# ============================================================
title: ESXi SSH Service Enable via vim-cmd
id: 25aafe2c-sigma-011
status: experimental
description: |
    Detects enabling of SSH services on ESXi hosts using vim-cmd or esxcli.
    LockBit Linux enables SSH on all ESXi hosts during the attack chain
    to ensure persistent remote access for encryption deployment.
references:
    - https://attack.mitre.org/techniques/T1021/004/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.lateral_movement
    - attack.t1021.004
logsource:
    category: process_creation
    product: linux
detection:
    selection_ssh_enable:
        CommandLine|contains:
            - 'hostsvc/enable_ssh'
            - 'hostsvc/start_ssh'
    selection_firewall:
        CommandLine|contains|all:
            - 'esxcli'
            - 'sshServer'
            - 'set -e true'
    condition: selection_ssh_enable or selection_firewall
falsepositives:
    - Administrator temporarily enabling SSH for troubleshooting
level: high

