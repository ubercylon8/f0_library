# ============================================================
# Rule 7: Binary Rename Evasion - System Process Name Masquerading (T1036.005)
# ============================================================
title: Renamed Binary Masquerading as System Process
id: 25aafe2c-sigma-007
status: experimental
description: |
    Detects execution of binaries named after legitimate system processes
    (svchost, csrss, lsass) that contain data transfer or cloud storage
    arguments. RansomHub renames Rclone to svchost.exe for EDR evasion.
references:
    - https://attack.mitre.org/techniques/T1036/005/
    - https://attack.mitre.org/techniques/T1048/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.defense_evasion
    - attack.t1036.005
logsource:
    category: process_creation
    product: linux
detection:
    selection_name:
        Image|endswith:
            - '/svchost'
            - '/csrss'
            - '/lsass'
            - '/taskhost'
    selection_cloud:
        CommandLine|contains:
            - 'mega:'
            - 's3:'
            - 'sftp:'
            - 'sync'
            - '--transfers'
    condition: selection_name and selection_cloud
falsepositives:
    - None expected
level: critical

---

