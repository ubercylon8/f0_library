# ============================================================
# Rule 12: Free-Space Wiping on Datastore - Anti-Forensics (T1485)
# ============================================================
title: Free-Space Wiping via dd on Datastore Path
id: 25aafe2c-sigma-012
status: experimental
description: |
    Detects use of dd to write from /dev/zero or /dev/urandom to paths
    within VMware datastores. LockBit 5.0 performs free-space wiping
    after encryption to prevent forensic recovery of deleted VM data.
references:
    - https://attack.mitre.org/techniques/T1485/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1485
logsource:
    category: process_creation
    product: linux
detection:
    selection_dd:
        Image|endswith: '/dd'
    selection_source:
        CommandLine|contains:
            - 'if=/dev/zero'
            - 'if=/dev/urandom'
    selection_target:
        CommandLine|contains:
            - '/vmfs/volumes/'
            - 'datastore'
            - '.fswipe'
    condition: selection_dd and selection_source and selection_target
falsepositives:
    - Legitimate disk sanitization during hardware decommissioning
level: critical

---

# ============================================================
# Rule 13: ESXi Critical Service Disruption (T1489)
# ============================================================
title: ESXi Critical Service Stop Commands
id: 25aafe2c-sigma-013
status: experimental
description: |
    Detects stopping of critical ESXi services (hostd, vpxd, fdm, vsan)
    which prevents recovery and management operations. Ransomware
    operators stop these services to prevent VM restart and backup
    recovery during encryption.
references:
    - https://attack.mitre.org/techniques/T1489/
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1489
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        CommandLine|contains:
            - '/etc/init.d/vmware-vpxd stop'
            - '/etc/init.d/hostd stop'
            - '/etc/init.d/vmware-fdm stop'
            - '/etc/init.d/vmware-sps stop'
            - '/etc/init.d/rhttpproxy stop'
            - '/etc/init.d/sfcbd-watchdog stop'
    condition: selection
falsepositives:
    - Planned ESXi maintenance with coordinated service restarts
level: critical

---

# ============================================================
# Rule 14: nftables Manipulation - CVE-2024-1086 Indicator (T1068)
# ============================================================
title: Suspicious nftables Rule Manipulation - Possible Kernel Exploit
id: 25aafe2c-sigma-014
status: experimental
description: |
    Detects rapid nftables rule creation and deletion patterns that may
    indicate exploitation of CVE-2024-1086 (nf_tables use-after-free).
    RansomHub and Akira affiliates use this kernel exploit for root
    privilege escalation on Linux/ESXi hosts.
references:
    - https://attack.mitre.org/techniques/T1068/
    - https://www.cve.org/CVERecord?id=CVE-2024-1086
author: F0RT1KA Defense Guidance Builder
date: 2026-03-13
tags:
    - attack.privilege_escalation
    - attack.t1068
    - cve.2024.1086
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        Image|endswith:
            - '/nft'
        CommandLine|contains:
            - 'add chain'
            - 'add rule'
            - 'delete'
            - 'flush'
    condition: selection
falsepositives:
    - Legitimate firewall rule management by system administrators
level: medium
