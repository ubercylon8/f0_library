#
# TECHNIQUE-FOCUSED DETECTION PRINCIPLE:
# These Sigma rules detect the underlying BYOVD and defense evasion
# techniques, NOT the F0RT1KA testing framework. They will catch real-world
# attackers using similar vulnerable driver exploitation and Defender
# tampering techniques with any tooling.
#
