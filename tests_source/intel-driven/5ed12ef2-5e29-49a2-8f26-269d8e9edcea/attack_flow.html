<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Stage Ransomware Killchain - Attack/Test Flow</title>
    <!--
    Test ID: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea
    Test Name: Multi-Stage Ransomware Killchain Simulation
    MITRE ATT&CK: T1204.002, T1134.001, T1083, T1486, T1491.001
    Generated by: F0RT1KA Attack Flow Diagram Builder
    -->
    <style>
        /* ===============================================================
           THEME VARIABLES - OKLch color palette matching ProjectAchilles
           Supports: data-theme="light|dark", prefers-color-scheme
           =============================================================== */
        :root {
            /* Light theme (default) */
            --diagram-bg: oklch(1 0 0);
            --diagram-bg-gradient-start: oklch(0.985 0 0);
            --diagram-bg-gradient-end: oklch(0.922 0 0);
            --diagram-text-primary: oklch(0.145 0 0);
            --diagram-text-secondary: oklch(0.556 0 0);
            --diagram-text-muted: oklch(0.708 0 0);
            --diagram-panel-bg: oklch(1 0 0);
            --diagram-panel-bg-translucent: oklch(0.985 0 0 / 95%);
            --diagram-border: oklch(0.922 0 0);
            --diagram-accent: oklch(0.205 0 0);
            --diagram-card-bg: oklch(0.97 0 0);
            --diagram-card-bg-hover: oklch(0.95 0 0);
            --diagram-overlay-bg: oklch(0 0 0 / 5%);
            --diagram-code-bg: oklch(0.97 0 0);
            --diagram-grid-stroke: oklch(0 0 0 / 3%);
            --diagram-shadow: oklch(0 0 0 / 15%);

            /* Semantic colors (consistent across themes) */
            --severity-critical: #ff4444;
            --severity-critical-bg: rgba(255, 68, 68, 0.1);
            --severity-high: #ff9f43;
            --severity-high-bg: rgba(255, 159, 67, 0.1);
            --severity-medium: #ffc107;
            --severity-medium-bg: rgba(255, 193, 7, 0.1);
            --severity-info: #4fc3f7;
            --severity-info-bg: rgba(79, 195, 247, 0.1);

            /* Accent colors */
            --diagram-accent-red: #ff6b6b;
            --diagram-accent-red-light: #ff8787;
            --diagram-accent-blue: #4fc3f7;
            --diagram-accent-orange: #ff9f43;
            --diagram-accent-yellow: #ffc107;
            --diagram-accent-green: #66bb6a;
            --diagram-accent-purple: #9c27b0;
        }

        /* Dark theme */
        [data-theme="dark"],
        .dark {
            --diagram-bg: oklch(0.145 0 0);
            --diagram-bg-gradient-start: oklch(0.1 0.02 265);
            --diagram-bg-gradient-end: oklch(0.18 0.02 265);
            --diagram-text-primary: oklch(0.985 0 0);
            --diagram-text-secondary: oklch(0.708 0 0);
            --diagram-text-muted: oklch(0.556 0 0);
            --diagram-panel-bg: oklch(0.12 0.01 265);
            --diagram-panel-bg-translucent: oklch(0.12 0.01 265 / 95%);
            --diagram-border: oklch(1 0 0 / 10%);
            --diagram-accent: oklch(0.922 0 0);
            --diagram-card-bg: oklch(0.205 0 0);
            --diagram-card-bg-hover: oklch(0.25 0 0);
            --diagram-overlay-bg: oklch(0 0 0 / 30%);
            --diagram-code-bg: oklch(0.1 0.02 265);
            --diagram-grid-stroke: oklch(1 0 0 / 2%);
            --diagram-shadow: oklch(0 0 0 / 50%);
        }

        /* Fallback for prefers-color-scheme when no data-theme is set */
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme]) {
                --diagram-bg: oklch(0.145 0 0);
                --diagram-bg-gradient-start: oklch(0.1 0.02 265);
                --diagram-bg-gradient-end: oklch(0.18 0.02 265);
                --diagram-text-primary: oklch(0.985 0 0);
                --diagram-text-secondary: oklch(0.708 0 0);
                --diagram-text-muted: oklch(0.556 0 0);
                --diagram-panel-bg: oklch(0.12 0.01 265);
                --diagram-panel-bg-translucent: oklch(0.12 0.01 265 / 95%);
                --diagram-border: oklch(1 0 0 / 10%);
                --diagram-accent: oklch(0.922 0 0);
                --diagram-card-bg: oklch(0.205 0 0);
                --diagram-card-bg-hover: oklch(0.25 0 0);
                --diagram-overlay-bg: oklch(0 0 0 / 30%);
                --diagram-code-bg: oklch(0.1 0.02 265);
                --diagram-grid-stroke: oklch(1 0 0 / 2%);
                --diagram-shadow: oklch(0 0 0 / 50%);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--diagram-bg-gradient-start) 0%, var(--diagram-bg-gradient-end) 100%);
            color: var(--diagram-text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        /* F0RT1KA Header - Hidden when embedded in browser */
        .framework-header {
            display: none;
        }

        .framework-title {
            font-size: 1.2em;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--diagram-accent-red), var(--diagram-accent-red-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .framework-subtitle {
            position: absolute;
            right: 30px;
            font-size: 0.85em;
            color: var(--diagram-text-muted);
            font-style: italic;
        }

        .dashboard-container {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* Left Panel - Attack Flow View */
        .attack-flow-panel {
            flex: 1;
            min-width: 60%;
            padding: 20px;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Test title header - Hidden when embedded in browser */
        .header {
            display: none;
        }

        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, var(--severity-critical), var(--diagram-accent-red-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--diagram-text-secondary);
            font-size: 1em;
        }

        /* View Toggle Buttons */
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .view-btn {
            padding: 8px 20px;
            background: var(--diagram-overlay-bg);
            border: 1px solid var(--diagram-border);
            border-radius: 20px;
            color: var(--diagram-text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .view-btn.active {
            background: rgba(255, 107, 107, 0.1);
            border-color: var(--diagram-accent-red);
            color: var(--diagram-accent-red);
        }

        .view-btn:hover {
            background: var(--diagram-card-bg-hover);
            color: var(--diagram-text-primary);
        }

        /* SVG Attack Flow Container */
        .attack-flow-svg-container {
            background: var(--diagram-overlay-bg);
            border-radius: 12px;
            padding: 10px;
            position: relative;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .attack-flow-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Timeline View (Hidden by default) */
        .timeline-view {
            display: none;
            padding: 20px;
        }

        .timeline-view.active {
            display: block;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 15px;
            background: var(--diagram-overlay-bg);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .timeline-item:hover {
            background: var(--diagram-card-bg-hover);
            transform: translateX(5px);
        }

        .timeline-item.active {
            background: rgba(255, 107, 107, 0.05);
            border-left-color: var(--diagram-accent-red);
        }

        .timeline-number {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            border: 2px solid;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-size: 1.1em;
            color: var(--diagram-text-primary);
            margin-bottom: 5px;
        }

        .timeline-meta {
            font-size: 0.85em;
            color: var(--diagram-text-secondary);
        }

        /* Right Panel - Details (OPAQUE BACKGROUND) */
        .details-panel {
            width: 450px;
            background: var(--diagram-panel-bg);
            border-left: 1px solid var(--diagram-border);
            padding: 30px;
            overflow-y: auto;
            position: relative;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -5px 0 20px var(--diagram-shadow);
        }

        .details-panel.active {
            transform: translateX(0);
        }

        .details-header {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--diagram-border);
        }

        .details-phase-number {
            display: inline-block;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            text-align: center;
            line-height: 36px;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
            border: 2px solid;
        }

        .details-title {
            font-size: 1.5em;
            color: var(--diagram-text-primary);
            margin-bottom: 10px;
        }

        .details-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
        }

        .meta-label {
            color: var(--diagram-text-muted);
        }

        .meta-value {
            color: var(--diagram-text-secondary);
            font-family: 'SF Mono', monospace;
        }

        /* MITRE Links Styling */
        .mitre-link {
            color: var(--diagram-accent-blue);
            text-decoration: none;
            border-bottom: 1px dotted var(--diagram-accent-blue);
            transition: all 0.2s ease;
        }

        .mitre-link:hover {
            color: var(--severity-info);
            border-bottom-style: solid;
        }

        .severity-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            border: 1px solid;
        }

        .severity-badge.critical {
            color: var(--severity-critical);
            border-color: var(--severity-critical);
            background: var(--severity-critical-bg);
        }

        .severity-badge.high {
            color: var(--severity-high);
            border-color: var(--severity-high);
            background: var(--severity-high-bg);
        }

        .severity-badge.medium {
            color: var(--severity-medium);
            border-color: var(--severity-medium);
            background: var(--severity-medium-bg);
        }

        .severity-badge.info {
            color: var(--severity-info);
            border-color: var(--severity-info);
            background: var(--severity-info-bg);
        }

        .details-section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.1em;
            color: var(--diagram-accent-red);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-list {
            list-style: none;
        }

        .action-item {
            background: var(--diagram-card-bg);
            border: 1px solid var(--diagram-border);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .action-title {
            font-weight: 500;
            color: var(--diagram-text-primary);
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .action-details {
            list-style: none;
            padding-left: 0;
        }

        .action-details li {
            color: var(--diagram-text-secondary);
            font-size: 0.85em;
            padding: 3px 0;
            padding-left: 15px;
            position: relative;
        }

        .action-details li::before {
            content: '>';
            position: absolute;
            left: 0;
            color: var(--diagram-text-muted);
        }

        /* Code Preview */
        .code-preview {
            background: var(--diagram-code-bg);
            border: 1px solid var(--diagram-border);
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 0.85em;
            overflow-x: auto;
        }

        .code-line {
            color: var(--diagram-accent-green);
            line-height: 1.5;
        }

        .code-comment {
            color: var(--diagram-text-muted);
        }

        .code-highlight {
            color: var(--diagram-accent-orange);
        }

        /* Close button for details panel */
        .close-details {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--diagram-text-muted);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
            display: none;
        }

        .close-details:hover {
            color: var(--diagram-accent-red);
        }

        /* Mobile responsive */
        @media (max-width: 1200px) {
            .details-panel {
                position: absolute;
                right: 0;
                top: 0;
                height: 100%;
                z-index: 100;
            }

            .close-details {
                display: block;
            }

            .framework-subtitle {
                display: none;
            }
        }

        /* Loading animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Interactive component styling */
        .component {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .component:hover .component-box {
            filter: drop-shadow(0 0 15px rgba(255, 107, 107, 0.4));
            stroke-width: 2;
        }

        .component.active .component-box {
            filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.6));
            stroke: #ff6b6b;
            stroke-width: 2;
        }

        /* Pulse animation for active elements */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        /* Navigation hints - Hidden when embedded */
        .nav-hint {
            display: none;
        }

        .nav-hint-icon {
            color: var(--diagram-accent-red);
        }

        /* Sidebar toggle button */
        .sidebar-toggle {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 80px;
            background: var(--diagram-panel-bg-translucent);
            border: 1px solid var(--diagram-border);
            border-right: none;
            border-radius: 8px 0 0 8px;
            color: var(--diagram-accent-red);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 200;
            transition: all 0.3s ease;
        }

        .sidebar-toggle:hover {
            background: rgba(255, 107, 107, 0.2);
            width: 32px;
        }

        .sidebar-toggle .toggle-icon {
            transition: transform 0.3s ease;
        }

        .sidebar-toggle.collapsed .toggle-icon {
            transform: rotate(180deg);
        }

        .sidebar-toggle.expanded {
            right: 450px;
        }

        .details-panel.collapsed {
            transform: translateX(100%) !important;
        }

        /* Stats overlay */
        .stats-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .stat-mini {
            background: var(--diagram-panel-bg-translucent);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .stat-mini-value {
            color: var(--diagram-accent-red);
            font-weight: bold;
        }

        .stat-mini-label {
            color: var(--diagram-text-muted);
            margin-left: 5px;
        }

        /* Critical indicator */
        .critical-indicator {
            display: inline-block;
            background: var(--severity-critical-bg);
            color: var(--severity-critical);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
            font-weight: bold;
        }

        /* SVG Text Color Overrides - CSS cascades over inline attributes */
        .attack-flow-svg text {
            fill: var(--diagram-text-primary);
        }

        .attack-flow-svg text.svg-text-secondary,
        .attack-flow-svg .component text:not(:first-of-type) {
            fill: var(--diagram-text-secondary);
        }

        .attack-flow-svg .svg-title-box text:first-of-type {
            fill: var(--diagram-accent-red);
        }

        .attack-flow-svg .svg-timeline text {
            fill: var(--diagram-text-secondary);
        }

        /* Progress bar background */
        .attack-flow-svg .progress-track {
            fill: var(--diagram-overlay-bg);
        }

        /* Central title box */
        .attack-flow-svg .title-box-bg {
            fill: var(--diagram-panel-bg-translucent);
            stroke: rgba(255, 107, 107, 0.3);
        }
    </style>
</head>
<body>
    <!-- F0RT1KA Framework Header -->
    <div class="framework-header">
        <div class="framework-title">F0RT1KA Security Testing Framework</div>
        <div class="framework-subtitle">Version 3.0</div>
    </div>

    <div class="dashboard-container">
        <!-- Left Panel - Attack Flow View -->
        <div class="attack-flow-panel">
            <div class="header">
                <h1>Multi-Stage Ransomware Killchain - Attack/Test Flow</h1>
                <p>Click any component to explore detailed attack flow</p>
            </div>

            <div class="view-toggle">
                <button class="view-btn active" onclick="switchView('architecture')">Attack Flow</button>
                <button class="view-btn" onclick="switchView('timeline')">Timeline View</button>
            </div>

            <!-- Attack Flow View -->
            <div class="attack-flow-svg-container" id="attackFlowView">
                <svg class="attack-flow-svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Gradient Definitions -->
                        <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff4458;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ff8787;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff9f43;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ffb347;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffc107;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ffcd38;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#9c27b0;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ba68c8;stop-opacity:0.8" />
                        </linearGradient>

                        <!-- Arrow Marker -->
                        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                            <polygon points="0 0, 10 3, 0 6" fill="#ff6b6b" />
                        </marker>

                        <!-- Grid Pattern -->
                        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
                        </pattern>
                    </defs>

                    <!-- Background -->
                    <rect width="1200" height="700" fill="url(#grid)" />

                    <!-- Central Title -->
                    <g class="svg-title-box">
                        <rect class="title-box-bg" x="400" y="30" width="400" height="55" rx="8"/>
                        <text x="600" y="52" text-anchor="middle" font-size="16" font-weight="bold">Ransomware Killchain Attack Flow</text>
                        <text class="svg-text-secondary" x="600" y="72" text-anchor="middle" font-size="11">5-Stage Attack Chain - Click components for details</text>
                    </g>

                    <!-- Stage 1: Initial Execution (T1204.002) -->
                    <g class="component" data-phase="1" onclick="showPhaseDetails(1)">
                        <rect class="component-box" x="50" y="150" width="180" height="110" rx="8"
                              fill="url(#yellowGradient)" stroke="#ffc107" stroke-width="1" opacity="0.2"/>
                        <text x="140" y="180" text-anchor="middle" fill="#ffc107" font-size="10" font-weight="bold">STAGE 1</text>
                        <text x="140" y="200" text-anchor="middle" font-size="13" font-weight="bold">Initial Execution</text>
                        <text x="140" y="220" text-anchor="middle" class="svg-text-secondary" font-size="10">T1204.002</text>
                        <text x="140" y="238" text-anchor="middle" class="svg-text-secondary" font-size="9">User Execution</text>
                        <text x="140" y="250" text-anchor="middle" class="svg-text-secondary" font-size="9">Malicious File</text>
                    </g>

                    <!-- Stage 2: Privilege Escalation (T1134.001) - CRITICAL -->
                    <g class="component" data-phase="2" onclick="showPhaseDetails(2)">
                        <rect class="component-box" x="300" y="150" width="180" height="110" rx="8"
                              fill="url(#orangeGradient)" stroke="#ff9f43" stroke-width="1" opacity="0.2"/>
                        <text x="390" y="180" text-anchor="middle" fill="#ff9f43" font-size="10" font-weight="bold">STAGE 2 - CRITICAL</text>
                        <text x="390" y="200" text-anchor="middle" font-size="13" font-weight="bold">Privilege Escalation</text>
                        <text x="390" y="220" text-anchor="middle" class="svg-text-secondary" font-size="10">T1134.001</text>
                        <text x="390" y="238" text-anchor="middle" class="svg-text-secondary" font-size="9">Access Token</text>
                        <text x="390" y="250" text-anchor="middle" class="svg-text-secondary" font-size="9">Manipulation</text>
                    </g>

                    <!-- Stage 3: Discovery (T1083) -->

                titleDiv.textContent = phase.title;
                if (phase.severity === 'critical') {
                    var badge = document.createElement('span');
                    badge.className = 'critical-indicator';
                    badge.textContent = 'CRITICAL';
                    titleDiv.appendChild(badge);
                }

                var metaDiv = document.createElement('div');
                metaDiv.className = 'timeline-meta';
                metaDiv.textContent = phase.time + ' | ' + mitreText + ' | ' + (phase.status === 'actual' ? 'Actual execution' : 'Simulated');

                contentDiv.appendChild(titleDiv);
                contentDiv.appendChild(metaDiv);
                item.appendChild(numberDiv);
                item.appendChild(contentDiv);
                timelineView.appendChild(item);
            }
        }

        // Show phase details
        function showPhaseDetails(phaseNum) {
            currentPhase = phaseNum;
            var phase = phaseData[phaseNum];
            var detailsPanel = document.getElementById('detailsPanel');
            var detailsContent = document.getElementById('detailsContent');

            // Update active states
            document.querySelectorAll('.component').forEach(function(comp) {
                comp.classList.remove('active');
            });
            document.querySelectorAll('.timeline-item').forEach(function(item) {
                item.classList.remove('active');
            });

            // Add active state to clicked component
            var activeComponents = document.querySelectorAll('.component[data-phase="' + phaseNum + '"]');
            activeComponents.forEach(function(comp) {
                comp.classList.add('active');
            });

            // Add active state to timeline item
            var timelineItems = document.querySelectorAll('.timeline-item');
            if (timelineItems[phaseNum - 1]) {
                timelineItems[phaseNum - 1].classList.add('active');
            }

            // Build content using DOM methods
            var severityColor = getSeverityColor(phase.severity);

            // Clear existing content
            while (detailsContent.firstChild) {
                detailsContent.removeChild(detailsContent.firstChild);
            }

            // Header section
            var header = document.createElement('div');
            header.className = 'details-header';

            var phaseNumber = document.createElement('div');
            phaseNumber.className = 'details-phase-number';
            phaseNumber.style.borderColor = severityColor;
            phaseNumber.style.color = severityColor;
            phaseNumber.textContent = phase.number;

            var title = document.createElement('h2');
            title.className = 'details-title';
            title.textContent = phase.title;

            var severityBadge = document.createElement('div');
            severityBadge.className = 'severity-badge ' + phase.severity;
            severityBadge.textContent = phase.severity.toUpperCase();

            var meta = document.createElement('div');
            meta.className = 'details-meta';

            // MITRE meta item
            var mitreMeta = document.createElement('div');
            mitreMeta.className = 'meta-item';
            var mitreLabel = document.createElement('span');
            mitreLabel.className = 'meta-label';
            mitreLabel.textContent = 'MITRE:';
            var mitreValue = document.createElement('span');
            mitreValue.className = 'meta-value';
            phase.mitre.forEach(function(technique, idx) {
                var link = document.createElement('a');
                link.href = 'https://attack.mitre.org/techniques/' + technique.id.replace('.', '/');
                link.target = '_blank';
                link.className = 'mitre-link';
                link.title = technique.name;
                link.textContent = technique.id;
                mitreValue.appendChild(link);
                if (idx < phase.mitre.length - 1) {
                    mitreValue.appendChild(document.createTextNode(', '));
                }
            });
            mitreMeta.appendChild(mitreLabel);
            mitreMeta.appendChild(mitreValue);

            // Time meta item
            var timeMeta = document.createElement('div');
            timeMeta.className = 'meta-item';
            var timeLabel = document.createElement('span');
            timeLabel.className = 'meta-label';
            timeLabel.textContent = 'Time:';
            var timeValue = document.createElement('span');
            timeValue.className = 'meta-value';
            timeValue.textContent = phase.time;
            timeMeta.appendChild(timeLabel);
            timeMeta.appendChild(timeValue);

            // Status meta item
            var statusMeta = document.createElement('div');
            statusMeta.className = 'meta-item';
            var statusLabel = document.createElement('span');
            statusLabel.className = 'meta-label';
            statusLabel.textContent = 'Status:';
            var statusValue = document.createElement('span');
            statusValue.className = 'meta-value';
            statusValue.textContent = phase.status === 'actual' ? 'Actual execution' : 'Simulated only';
            statusMeta.appendChild(statusLabel);
            statusMeta.appendChild(statusValue);

            meta.appendChild(mitreMeta);
            meta.appendChild(timeMeta);
            meta.appendChild(statusMeta);

            header.appendChild(phaseNumber);
            header.appendChild(title);
            header.appendChild(severityBadge);
            header.appendChild(meta);
            detailsContent.appendChild(header);

            // Critical note if applicable
            if (phase.severity === 'critical') {
                var criticalNote = document.createElement('div');
                criticalNote.style.background = 'rgba(255,68,68,0.1)';
                criticalNote.style.border = '1px solid rgba(255,68,68,0.3)';
                criticalNote.style.borderRadius = '6px';
                criticalNote.style.padding = '10px';
                criticalNote.style.marginBottom = '15px';
                var criticalTitle = document.createElement('strong');
                criticalTitle.style.color = '#ff4444';
                criticalTitle.textContent = 'KEY DETECTION POINT';
                var criticalText = document.createElement('p');
                criticalText.style.color = 'var(--diagram-text-secondary)';
                criticalText.style.marginTop = '5px';
                criticalText.style.fontSize = '0.85em';
                criticalText.textContent = 'Protected systems should block the attack at this stage. If this stage succeeds, the system is vulnerable to ransomware.';
                criticalNote.appendChild(criticalTitle);
                criticalNote.appendChild(criticalText);
                detailsContent.appendChild(criticalNote);
            }

            // Description section
            var descSection = document.createElement('div');
            descSection.className = 'details-section';
            var descText = document.createElement('p');
            descText.style.color = 'var(--diagram-text-secondary)';
            descText.style.marginBottom = '20px';
            descText.textContent = phase.description;
            descSection.appendChild(descText);
            detailsContent.appendChild(descSection);

            // Actions section
            var actionsSection = document.createElement('div');
            actionsSection.className = 'details-section';
            var actionsTitle = document.createElement('h3');
            actionsTitle.className = 'section-title';
            actionsTitle.textContent = '* Actions Performed';
            actionsSection.appendChild(actionsTitle);

            var actionsList = document.createElement('div');
            actionsList.className = 'action-list';
            phase.actions.forEach(function(action) {
                var actionItem = document.createElement('div');
                actionItem.className = 'action-item';
                var actionTitle = document.createElement('div');
                actionTitle.className = 'action-title';
                actionTitle.textContent = action.title;
                actionItem.appendChild(actionTitle);

                var detailsList = document.createElement('ul');
                detailsList.className = 'action-details';
                action.details.forEach(function(detail) {
                    var li = document.createElement('li');
                    li.textContent = detail;
                    detailsList.appendChild(li);
                });
                actionItem.appendChild(detailsList);
                actionsList.appendChild(actionItem);
            });
            actionsSection.appendChild(actionsList);
            detailsContent.appendChild(actionsSection);

            // Code section if applicable
            if (phase.code) {
                var codeSection = document.createElement('div');
                codeSection.className = 'details-section';
                var codeTitle = document.createElement('h3');
                codeTitle.className = 'section-title';
                codeTitle.textContent = '# Code Preview';
                codeSection.appendChild(codeTitle);

                var codePreview = document.createElement('div');
                codePreview.className = 'code-preview';
                phase.code.split('\n').forEach(function(line) {
                    var codeLine = document.createElement('div');
                    codeLine.className = 'code-line';
                    if (line.trim().startsWith('//')) {
                        codeLine.classList.add('code-comment');
                    }
                    codeLine.textContent = line;
                    codePreview.appendChild(codeLine);
                });
                codeSection.appendChild(codePreview);
                detailsContent.appendChild(codeSection);
            }

            // Show details panel
            detailsPanel.classList.add('active');

            // Update progress bar
            updateProgressBar(phaseNum);

            // Position toggle button with sidebar
            var toggleBtn = document.getElementById('sidebarToggle');
            if (!sidebarCollapsed) {
                toggleBtn.classList.add('expanded');
            }
        }

        // Close details panel
        function closeDetails() {
            document.getElementById('detailsPanel').classList.remove('active');
            document.querySelectorAll('.component').forEach(function(comp) {
                comp.classList.remove('active');
            });
            document.querySelectorAll('.timeline-item').forEach(function(item) {
                item.classList.remove('active');
            });

            // Reset toggle button position
            var toggleBtn = document.getElementById('sidebarToggle');
            toggleBtn.classList.remove('expanded');
        }

        // Switch view
        function switchView(view) {
            // Update button states
            document.querySelectorAll('.view-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Hide all views
            document.getElementById('attackFlowView').style.display = 'none';
            document.getElementById('timelineView').classList.remove('active');

            // Show selected view
            if (view === 'architecture') {
                document.getElementById('attackFlowView').style.display = 'block';
            } else if (view === 'timeline') {
                document.getElementById('timelineView').classList.add('active');
            }
        }

        // Get severity color
        function getSeverityColor(severity) {
            switch(severity) {
                case 'critical': return '#ff4444';
                case 'high': return '#ff9f43';
                case 'medium': return '#ffc107';
                case 'info': return '#4fc3f7';
                default: return '#9ca3af';
            }
        }

        // Update progress bar
        function updateProgressBar(phaseNum) {
            var progressBar = document.getElementById('progressBar');
            var width = (phaseNum / 5) * 1110;
            progressBar.style.width = width + 'px';
            progressBar.style.transition = 'width 0.5s ease';
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            initializeTimeline();

            // Sidebar starts expanded - show phase 1 details
            sidebarCollapsed = false;
            setTimeout(function() {
                showPhaseDetails(1);
            }, 500);
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (currentPhase) {
                if (e.key === 'ArrowRight' && currentPhase < 5) {
                    showPhaseDetails(currentPhase + 1);
                } else if (e.key === 'ArrowLeft' && currentPhase > 1) {
                    showPhaseDetails(currentPhase - 1);
                } else if (e.key === 'Escape') {
                    closeDetails();
                }
            }
        });

        // ===============================================================
        // THEME SYNC - Listen for postMessage from parent window
        // Supports integration with ProjectAchilles iframe embedding
        // ===============================================================
        window.addEventListener('message', function(event) {
            // Handle theme change messages from parent
            if (event.data && event.data.type === 'theme-change') {
                var theme = event.data.theme;
                if (theme === 'light' || theme === 'dark') {
                    document.documentElement.setAttribute('data-theme', theme);
                    // Also set class for compatibility
                    document.documentElement.classList.remove('light', 'dark');
                    document.documentElement.classList.add(theme);
                }
            }
        });

        // Notify parent that diagram is ready to receive theme
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'diagram-ready' }, '*');
        }
    </script>
</body>
</html>
