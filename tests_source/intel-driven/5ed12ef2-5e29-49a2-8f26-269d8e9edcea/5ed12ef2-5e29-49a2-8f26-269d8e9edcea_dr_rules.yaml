# ============================================================
# LimaCharlie D&R Rules - Multi-Stage Ransomware Killchain
# Test ID: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea
# MITRE ATT&CK: T1204.002, T1134.001, T1083, T1486, T1491.001
# Platform: Windows
# Format: LimaCharlie file format (for limacharlie dr add or config push)
# Author: F0RT1KA Detection Rules Generator
# Date: 2026-03-14
# ============================================================
# All rules target underlying attack technique behaviors.
# They will fire against any attacker using these techniques
# regardless of what tooling was used.
# ============================================================

rules:
  # ============================================================
  # Rule 1: Token Manipulation - SYSTEM Process Handle Access
  # MITRE ATT&CK: T1134.001 - Access Token Manipulation
  # Confidence: High
  # Description: Detects any non-system process opening a handle to
  #              winlogon.exe, lsass.exe, or csrss.exe. This is the
  #              prerequisite for OpenProcessToken + DuplicateToken
  #              token theft used by ransomware pre-encryption to
  #              obtain SYSTEM-level access.
  # ============================================================
  ransomware-token-manipulation-system-process-access:
    detect:
      target: edr
      event: SENSITIVE_PROCESS_ACCESS
      op: and
      rules:
        - op: or
          rules:
            - op: ends with
              path: event/TARGET/FILE_PATH
              value: "\\winlogon.exe"
            - op: ends with
              path: event/TARGET/FILE_PATH
              value: "\\lsass.exe"
            - op: ends with
              path: event/TARGET/FILE_PATH
              value: "\\csrss.exe"
        - op: not
          rules:
            - op: or
              rules:
                - op: ends with
                  path: event/SOURCE/FILE_PATH
                  value: "\\MsMpEng.exe"
                - op: ends with
                  path: event/SOURCE/FILE_PATH
                  value: "\\svchost.exe"
                - op: ends with
                  path: event/SOURCE/FILE_PATH
                  value: "\\WmiPrvSE.exe"
                - op: ends with
                  path: event/SOURCE/FILE_PATH
                  value: "\\wininit.exe"
                - op: ends with
                  path: event/SOURCE/FILE_PATH
                  value: "\\csrss.exe"
                - op: ends with
                  path: event/SOURCE/FILE_PATH
                  value: "\\lsass.exe"

    respond:
      - action: report
        name: Token Manipulation - SYSTEM Process Handle Access (T1134.001)
        metadata:
          mitre_attack: "T1134.001"
          severity: high
          threat_type: privilege_escalation
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea

  # ============================================================
  # Rule 2: Ransomware File Encryption - Known Extension Appended
  # MITRE ATT&CK: T1486 - Data Encrypted for Impact
  # Confidence: High
  # Description: Detects creation of files with well-known ransomware
  #              encryption extensions. Any process writing files with
  #              these extensions to user-accessible directories is
  #              performing the write phase of the encrypt-replace cycle.
  # ============================================================
  ransomware-encrypted-file-extension-creation:
    detect:
      target: edr
      event: FILE_CREATE
      op: or
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: ".encrypted"
        - op: ends with
          path: event/FILE_PATH
          value: ".locked"
        - op: ends with
          path: event/FILE_PATH
          value: ".crypted"
        - op: ends with
          path: event/FILE_PATH
          value: ".crypt"
        - op: ends with
          path: event/FILE_PATH
          value: ".ransom"
        - op: ends with
          path: event/FILE_PATH
          value: ".WNCRY"
        - op: ends with
          path: event/FILE_PATH
          value: ".ryk"
        - op: ends with
          path: event/FILE_PATH
          value: ".lck"

    respond:
      - action: report
        name: Ransomware File Encryption Extension Detected (T1486)
        metadata:
          mitre_attack: "T1486"
          severity: critical
          threat_type: ransomware_encryption
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea

  # ============================================================
  # Rule 3: Ransom Note File Creation - Known Naming Patterns
  # MITRE ATT&CK: T1491.001 - Defacement: Internal Defacement
  # Confidence: High
  # Description: Detects creation of files matching ransom note naming
  #              conventions documented across Conti, LockBit, BlackCat,
  #              Ryuk, REvil, Hive, and generic families. A single
  #              occurrence in any user-accessible directory is critical.
  # ============================================================
  ransomware-ransom-note-file-creation:
    detect:
      target: edr
      event: FILE_CREATE
      op: or
      rules:
        - op: contains
          path: event/FILE_PATH
          value: "README_RANSOMWARE"
        - op: contains
          path: event/FILE_PATH
          value: "YOUR_FILES_ENCRYPTED"
        - op: contains
          path: event/FILE_PATH
          value: "PAYMENT_INSTRUCTIONS"
        - op: contains
          path: event/FILE_PATH
          value: "HOW_TO_DECRYPT"
        - op: contains
          path: event/FILE_PATH
          value: "DECRYPT_INSTRUCTIONS"
        - op: contains
          path: event/FILE_PATH
          value: "RECOVER_FILES"
        - op: contains
          path: event/FILE_PATH
          value: "FILES_ENCRYPTED"
        - op: contains
          path: event/FILE_PATH
          value: "RESTORE_FILES"
        - op: contains
          path: event/FILE_PATH
          value: "CONTI_README"
        - op: contains
          path: event/FILE_PATH
          value: "LOCKBIT_README"

    respond:
      - action: report
        name: Ransom Note File Created (T1491.001)
        metadata:
          mitre_attack: "T1491.001"
          severity: critical
          threat_type: ransomware_defacement
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea

  # ============================================================
  # Rule 4: Desktop Wallpaper Registry Modification by Unexpected Process
  # MITRE ATT&CK: T1491.001 - Defacement: Internal Defacement
  # Confidence: Medium
  # Description: Detects writes to HKCU\Control Panel\Desktop\Wallpaper
  #              or WallpaperStyle registry values by non-UI processes.
  #              Ransomware (BlackCat, REvil, Ryuk) sets a custom ransomware
  #              wallpaper image to ensure the victim sees the demand.
  # ============================================================
  ransomware-wallpaper-registry-modification:
    detect:
      target: edr
      event: REGISTRY_VALUE_SET
      op: and
      rules:
        - op: contains
          path: event/REGISTRY_KEY
          value: "Control Panel\\Desktop"
        - op: or
          rules:
            - op: is
              path: event/VALUE_NAME
              value: "Wallpaper"
            - op: is
              path: event/VALUE_NAME
              value: "WallpaperStyle"
        - op: not
          rules:
            - op: or
              rules:
                - op: ends with
                  path: event/PROCESS/FILE_PATH
                  value: "\\explorer.exe"
                - op: ends with
                  path: event/PROCESS/FILE_PATH
                  value: "\\SystemSettings.exe"
                - op: ends with
                  path: event/PROCESS/FILE_PATH
                  value: "\\svchost.exe"
                - op: ends with
                  path: event/PROCESS/FILE_PATH
                  value: "\\UserOOBEBroker.exe"
                - op: ends with
                  path: event/PROCESS/FILE_PATH
                  value: "\\rundll32.exe"

    respond:
      - action: report
        name: Ransomware Wallpaper Defacement - Registry Modification (T1491.001)
        metadata:
          mitre_attack: "T1491.001"
          severity: medium
          threat_type: ransomware_defacement
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea

  # ============================================================
  # Rule 5: Encryption Key Escrow File Creation
  # MITRE ATT&CK: T1486 - Data Encrypted for Impact
  # Confidence: High
  # Description: Detects creation of files that store ransomware
  #              encryption keys. After encryption, ransomware writes
  #              a local key file as proof-of-decryption capability or
  #              as a staging point before C2 upload. The MASTER_KEY
  #              and related patterns are present in many implementations.
  # ============================================================
  ransomware-key-escrow-file-creation:
    detect:
      target: edr
      event: FILE_CREATE
      op: or
      rules:
        - op: contains
          path: event/FILE_PATH
          value: "MASTER_KEY"
        - op: contains
          path: event/FILE_PATH
          value: "ENCRYPTION_COMPLETE"
        - op: contains
          path: event/FILE_PATH
          value: "encryption_key"
        - op: contains
          path: event/FILE_PATH
          value: "PRIVATE_KEY.txt"

    respond:
      - action: report
        name: Ransomware Key Escrow File Created (T1486)
        metadata:
          mitre_attack: "T1486"
          severity: high
          threat_type: ransomware_key_escrow
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea

  # ============================================================
  # Rule 6: Ransomware Note Displayed via Notepad
  # MITRE ATT&CK: T1491.001 - Defacement: Internal Defacement
  # Confidence: High
  # Description: Detects notepad.exe spawned with a ransom note file as
  #              its argument. Ransomware auto-opens the ransom note via
  #              ShellExecute or CreateProcess to ensure the victim is
  #              immediately aware of the infection. This is documented
  #              behavior in Conti, LockBit, and related families.
  # ============================================================
  ransomware-ransom-note-displayed-notepad:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: "\\notepad.exe"
        - op: or
          rules:
            - op: contains
              path: event/COMMAND_LINE
              value: "README_RANSOMWARE"
            - op: contains
              path: event/COMMAND_LINE
              value: "YOUR_FILES_ENCRYPTED"
            - op: contains
              path: event/COMMAND_LINE
              value: "HOW_TO_DECRYPT"
            - op: contains
              path: event/COMMAND_LINE
              value: "PAYMENT_INSTRUCTIONS"
            - op: contains
              path: event/COMMAND_LINE
              value: "DECRYPT_INSTRUCTIONS"
            - op: contains
              path: event/COMMAND_LINE
              value: "RECOVER_FILES"

    respond:
      - action: report
        name: Ransom Note Displayed via Notepad (T1491.001)
        metadata:
          mitre_attack: "T1491.001"
          severity: critical
          threat_type: ransomware_notification
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea

  # ============================================================
  # Rule 7: Aggressive File System Enumeration - Suspicious Scan Pattern
  # MITRE ATT&CK: T1083 - File and Directory Discovery
  # Confidence: Medium
  # Description: Detects DNS queries or process activity consistent with
  #              ransomware pre-encryption file enumeration. This rule
  #              targets the file target list creation artifact - when a
  #              process creates a targets.list or filelist file it has
  #              completed the T1083 discovery phase and is preparing to
  #              encrypt. This is a high-value pre-encryption detection point.
  # ============================================================
  ransomware-file-discovery-target-list:
    detect:
      target: edr
      event: FILE_CREATE
      op: or
      rules:
        - op: contains
          path: event/FILE_PATH
          value: "targets.list"
        - op: contains
          path: event/FILE_PATH
          value: "encrypt_targets"
        - op: contains
          path: event/FILE_PATH
          value: "files_to_encrypt"
        - op: contains
          path: event/FILE_PATH
          value: "RANSOMWARE_TARGETS"
        - op: contains
          path: event/FILE_PATH
          value: "target_files.txt"

    respond:
      - action: report
        name: Ransomware Target File List Created (T1083)
        metadata:
          mitre_attack: "T1083"
          severity: high
          threat_type: ransomware_pre_encryption_recon
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea

  # ============================================================
  # Rule 8: Batch Script Execution - Ransomware Initial Foothold
  # MITRE ATT&CK: T1204.002 - User Execution: Malicious File
  # Confidence: Medium
  # Description: Detects cmd.exe executing batch files from user-writable
  #              non-system directories. The ransomware initial execution
  #              stage frequently drops a batch script to test execution
  #              policy and spawn child processes. The combination of
  #              cmd.exe with a .bat argument from a non-standard path
  #              is suspicious especially when the parent is not a
  #              known installer.
  # ============================================================
  ransomware-batch-script-execution-user-dir:
    detect:
      target: edr
      event: NEW_PROCESS
      op: and
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: "\\cmd.exe"
        - op: contains
          path: event/COMMAND_LINE
          value: ".bat"
        - op: not
          rules:
            - op: or
              rules:
                - op: contains
                  path: event/COMMAND_LINE
                  value: "\\Windows\\"
                - op: contains
                  path: event/COMMAND_LINE
                  value: "\\Program Files\\"
                - op: contains
                  path: event/COMMAND_LINE
                  value: "\\ProgramData\\Microsoft\\"
        - op: not
          rules:
            - op: or
              rules:
                - op: ends with
                  path: event/PARENT/FILE_PATH
                  value: "\\msiexec.exe"
                - op: ends with
                  path: event/PARENT/FILE_PATH
                  value: "\\setup.exe"
                - op: ends with
                  path: event/PARENT/FILE_PATH
                  value: "\\devenv.exe"

    respond:
      - action: report
        name: Suspicious Batch Script Execution from User Directory (T1204.002)
        metadata:
          mitre_attack: "T1204.002"
          severity: medium
          threat_type: suspicious_script_execution
          test_id: 5ed12ef2-5e29-49a2-8f26-269d8e9edcea
