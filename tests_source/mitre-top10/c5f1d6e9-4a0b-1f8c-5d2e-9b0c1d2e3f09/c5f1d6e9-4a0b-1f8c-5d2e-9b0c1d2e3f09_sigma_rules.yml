# ============================================================
# Rule 4: Sequential Discovery Commands in Short Time Window
# Confidence: High
# MITRE ATT&CK: T1059.003
# ============================================================
title: Multiple Windows Discovery Commands Executed in Rapid Succession
id: d4e5f6a7-b8c9-0123-def0-234567890123
status: experimental
description: >
    Detects execution of multiple native Windows reconnaissance commands
    (whoami, ipconfig, systeminfo, netstat, tasklist) with their characteristic
    argument flags used during webshell post-exploitation. The presence of
    multiple discovery commands with the specific flags used by webshell
    operators (whoami /all, ipconfig /all, netstat -an) is a high-fidelity
    behavioral pattern that indicates automated post-exploitation activity
    rather than interactive administrator use.
references:
    - https://attack.mitre.org/techniques/T1059/003/
    - https://attack.mitre.org/techniques/T1082/
    - https://attack.mitre.org/techniques/T1049/
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
    - attack.execution
    - attack.t1059.003
    - attack.discovery
    - attack.t1082
    - attack.t1049
    - attack.t1057
logsource:
    category: process_creation
    product: windows
detection:
    selection_whoami_all:
        Image|endswith: '\whoami.exe'
        CommandLine|contains: '/all'
    selection_ipconfig_all:
        Image|endswith: '\ipconfig.exe'
        CommandLine|contains: '/all'
    selection_netstat_an:
        Image|endswith: '\netstat.exe'
        CommandLine|contains:
            - '-an'
            - '-ano'
    selection_systeminfo:
        Image|endswith: '\systeminfo.exe'
    selection_tasklist:
        Image|endswith: '\tasklist.exe'
    # Note: Backend aggregation (ECS, Splunk correlation) should be used
    # to detect 3+ of these conditions occurring within a 2-minute window
    # on the same host. This rule flags the specific high-risk flag patterns.
    condition: 1 of selection_*
falsepositives:
    - IT operations staff performing manual system audits
    - Automated inventory collection scripts
    - SIEM agent data collection
    - Tune by correlating with parent process and logon type
level: medium


