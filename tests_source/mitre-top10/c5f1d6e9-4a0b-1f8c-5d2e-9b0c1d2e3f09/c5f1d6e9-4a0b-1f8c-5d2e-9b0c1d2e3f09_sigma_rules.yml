# ============================================================
# Rule 3: Whoami with Privilege Enumeration Flags
# Confidence: High
# MITRE ATT&CK: T1059.003
# ============================================================
title: Whoami Privilege and Group Enumeration
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: experimental
description: >
    Detects execution of whoami.exe with the /all, /priv, or /groups flags.
    These flags enumerate the full security context including privileges and
    group memberships, which attackers use after initial access to determine
    what escalation paths are available. When this occurs from a service
    account context, non-interactive session, or with a web server parent,
    it strongly indicates post-exploitation reconnaissance (T1059.003).
references:
    - https://attack.mitre.org/techniques/T1059/003/
    - https://attack.mitre.org/techniques/T1033/
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
    - attack.execution
    - attack.t1059.003
    - attack.discovery
    - attack.t1033
logsource:
    category: process_creation
    product: windows
detection:
    selection_image:
        Image|endswith: '\whoami.exe'
    selection_flags:
        CommandLine|contains:
            - '/all'
            - '/priv'
            - '/groups'
            - '/fo'
    filter_interactive:
        # Optional: uncomment to limit to non-interactive sessions only
        # LogonType: 2  # Interactive
        ParentImage|endswith:
            - '\explorer.exe'
            - '\cmd.exe'
    condition: selection_image and selection_flags and not filter_interactive
falsepositives:
    - Security engineers and administrators checking their own context
    - Privilege escalation detection tools performing whoami checks
    - Automated vulnerability scanners
    - Tune by excluding specific administrator workstation names
level: medium


