# ============================================================
# Rule 1: Web Server Process Spawning Command Shell
# Confidence: High
# MITRE ATT&CK: T1190
# ============================================================
title: Web Server Process Spawning Command Interpreter
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: >
    Detects web application worker processes (IIS w3wp.exe, Apache httpd.exe,
    Tomcat, Java web containers, PHP, Python WSGI servers) spawning command
    interpreters such as cmd.exe or PowerShell. This is a primary indicator
    of webshell execution following exploitation of a public-facing application
    (T1190). Attackers deploy webshells to maintain access and execute commands
    through the web server process context.
references:
    - https://attack.mitre.org/techniques/T1190/
    - https://www.microsoft.com/en-us/security/blog/2021/02/11/web-shell-attacks-continue-to-rise/
    - https://media.defense.gov/2020/Jun/09/2002313081/-1/-1/0/CSI-DETECT-AND-PREVENT-WEB-SHELL-MALWARE-20200422.PDF
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
    - attack.initial_access
    - attack.t1190
    - attack.execution
    - attack.t1059.003
logsource:
    category: process_creation
    product: windows
detection:
    selection_parent:
        ParentImage|endswith:
            - '\w3wp.exe'
            - '\httpd.exe'
            - '\tomcat.exe'
            - '\tomcat9.exe'
            - '\nginx.exe'
            - '\java.exe'
            - '\javaw.exe'
            - '\php.exe'
            - '\php-cgi.exe'
            - '\python.exe'
            - '\python3.exe'
            - '\ruby.exe'
            - '\node.exe'
    selection_child:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
            - '\rundll32.exe'
            - '\regsvr32.exe'
    condition: selection_parent and selection_child
falsepositives:
    - Legitimate deployment scripts triggered by CI/CD pipelines through application servers
    - IIS application pool recycle scripts that invoke cmd.exe
    - Java-based build tools (Maven, Gradle) spawning shell commands
    - Whitelist known-good parent-child pairs specific to your environment
level: high


