# ============================================================
# Rule 2: Rapid Reconnaissance Command Execution from Anomalous Parent
# Confidence: High
# MITRE ATT&CK: T1059.003
# ============================================================
title: Windows Discovery Commands Spawned by Web Server Process
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: experimental
description: >
    Detects native Windows reconnaissance commands (whoami, systeminfo,
    ipconfig, netstat, tasklist, hostname) executed with characteristic
    flags when the parent process is a web application server. This
    behavioral pattern mirrors the post-exploitation reconnaissance phase
    that webshells perform immediately after initial access to enumerate
    the compromised system's context, network configuration, running
    processes, and security software.
references:
    - https://attack.mitre.org/techniques/T1059/003/
    - https://attack.mitre.org/techniques/T1190/
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
    - attack.execution
    - attack.t1059.003
    - attack.initial_access
    - attack.t1190
    - attack.discovery
    - attack.t1033
    - attack.t1082
    - attack.t1049
logsource:
    category: process_creation
    product: windows
detection:
    selection_parent:
        ParentImage|endswith:
            - '\w3wp.exe'
            - '\httpd.exe'
            - '\tomcat.exe'
            - '\java.exe'
            - '\php.exe'
            - '\php-cgi.exe'
            - '\python.exe'
            - '\nginx.exe'
    selection_recon:
        Image|endswith:
            - '\whoami.exe'
            - '\hostname.exe'
            - '\ipconfig.exe'
            - '\systeminfo.exe'
            - '\netstat.exe'
            - '\tasklist.exe'
            - '\net.exe'
            - '\net1.exe'
            - '\nltest.exe'
            - '\arp.exe'
            - '\route.exe'
            - '\nslookup.exe'
    condition: selection_parent and selection_recon
falsepositives:
    - Automated application health checks that invoke system utilities
    - Java application servers with built-in diagnostic commands
    - Monitoring agents embedded in application containers
level: high


