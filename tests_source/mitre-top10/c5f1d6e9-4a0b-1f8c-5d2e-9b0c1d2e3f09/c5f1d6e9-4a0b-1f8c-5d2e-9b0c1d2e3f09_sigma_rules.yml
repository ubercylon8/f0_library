# ============================================================
# Rule 5: Outbound Network Connection from Web Server Worker Process
# Confidence: High
# MITRE ATT&CK: T1190
# ============================================================
title: Web Server Worker Process Initiating Outbound Network Connection
id: e5f6a7b8-c9d0-1234-ef01-345678901234
status: experimental
description: >
    Detects web application worker processes (IIS w3wp.exe, Apache httpd.exe,
    Java web containers) initiating outbound network connections to external
    IP addresses. Legitimate web server processes typically accept inbound
    connections; outbound connections to arbitrary external endpoints indicate
    webshell C2 callback behavior where the attacker's webshell sends
    collected reconnaissance data or establishes a reverse channel.
references:
    - https://attack.mitre.org/techniques/T1190/
    - https://attack.mitre.org/techniques/T1071/001/
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
    - attack.initial_access
    - attack.t1190
    - attack.command_and_control
    - attack.t1071.001
logsource:
    category: network_connection
    product: windows
detection:
    selection_process:
        Image|endswith:
            - '\w3wp.exe'
            - '\httpd.exe'
            - '\tomcat.exe'
            - '\tomcat9.exe'
            - '\java.exe'
            - '\javaw.exe'
            - '\php.exe'
            - '\php-cgi.exe'
            - '\python.exe'
            - '\node.exe'
    selection_network:
        Initiated: 'true'
        DestinationPort:
            - 80
            - 443
            - 8080
            - 8443
            - 4444
            - 4445
    filter_private:
        DestinationIp|startswith:
            - '10.'
            - '172.16.'
            - '172.17.'
            - '172.18.'
            - '172.19.'
            - '172.20.'
            - '172.21.'
            - '172.22.'
            - '172.23.'
            - '172.24.'
            - '172.25.'
            - '172.26.'
            - '172.27.'
            - '172.28.'
            - '172.29.'
            - '172.30.'
            - '172.31.'
            - '192.168.'
            - '127.'
    condition: selection_process and selection_network and not filter_private
falsepositives:
    - Application health checks calling external monitoring services (Datadog, New Relic)
    - License validation calls from server-side software
    - Applications that legitimately proxy external requests
    - Whitelist known-legitimate external endpoints per application in your environment
level: high
