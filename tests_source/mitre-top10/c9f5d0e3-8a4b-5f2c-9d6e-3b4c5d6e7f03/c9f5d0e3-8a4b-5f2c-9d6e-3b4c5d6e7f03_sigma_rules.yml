title: Windows Credential Manager Manipulation via cmdkey
id: da6b24e4-5e17-6a89-cbd1-4f5a6b7c8d90
status: experimental
description: >
  Detects cmdkey.exe being used to add or list credentials stored in Windows
  Credential Manager. Attackers use cmdkey /add to pre-stage credentials (username
  and password) for target systems before initiating RDP or SMB connections,
  effectively bypassing interactive authentication prompts. This directly
  corresponds to T1555.004 (Credentials from Password Stores: Windows Credential
  Manager).
references:
  - https://attack.mitre.org/techniques/T1555/004/
  - https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/cmdkey
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
  - attack.credential_access
  - attack.t1555.004
logsource:
  category: process_creation
  product: windows
detection:
  selection_binary:
    Image|endswith: '\cmdkey.exe'
  selection_add:
    CommandLine|contains:
      - '/add:'
      - '-add:'
  selection_list:
    CommandLine|contains:
      - '/list'
      - '-list'
  selection_with_credentials:
    CommandLine|contains|all:
      - '/user:'
      - '/pass:'
  condition: selection_binary and (selection_add or selection_list or selection_with_credentials)
falsepositives:
  - Legitimate helpdesk tooling storing service account credentials for automated tasks
  - Deployment scripts that pre-configure RDP credentials for managed endpoints
  - Windows 365 / Azure Virtual Desktop onboarding scripts
fields:
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
level: high

