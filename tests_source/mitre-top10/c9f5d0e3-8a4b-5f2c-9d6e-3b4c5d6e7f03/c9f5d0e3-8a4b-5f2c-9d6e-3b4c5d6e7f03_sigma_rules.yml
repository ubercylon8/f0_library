title: RDP Service Status Reconnaissance via sc.exe
id: a7f3c91e-2b84-4d56-98ae-1f2c3d4e5678
status: experimental
description: >
  Detects use of sc.exe to query the TermService (Remote Desktop Services) status.
  Attackers enumerate RDP service state as a prerequisite for lateral movement via RDP.
  This behavior is inherent to T1021.001 reconnaissance regardless of the tooling used.
references:
  - https://attack.mitre.org/techniques/T1021/001/
  - https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/sc-query
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
  - attack.lateral_movement
  - attack.t1021.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_binary:
    Image|endswith: '\sc.exe'
  selection_args:
    CommandLine|contains|all:
      - 'TermService'
  selection_action:
    CommandLine|contains:
      - 'query'
      - 'qc'
  condition: selection_binary and selection_args and selection_action
falsepositives:
  - IT monitoring tools and helpdesk scripts that check service states
  - SCCM/Intune compliance scripts
  - Legitimate system administrators diagnosing Remote Desktop Services
fields:
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
level: medium

---

title: RDP Registry Configuration Enumeration
id: b8e4d02f-3c95-4e67-a9bf-2d3e4f5a6789
status: experimental
description: >
  Detects reg.exe querying Terminal Server registry keys to enumerate RDP
  configuration, including whether RDP is enabled (fDenyTSConnections), Network
  Level Authentication (UserAuthentication), and the listening port (PortNumber).
  Attackers perform this reconnaissance to identify accessible RDP endpoints and
  verify configuration before lateral movement.
references:
  - https://attack.mitre.org/techniques/T1021/001/
  - https://www.elastic.co/guide/en/security/current/rdp-enabled-via-registry.html
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
  - attack.lateral_movement
  - attack.discovery
  - attack.t1021.001
  - attack.t1012
logsource:
  category: process_creation
  product: windows
detection:
  selection_binary:
    Image|endswith: '\reg.exe'
  selection_query:
    CommandLine|contains: 'query'
  selection_rdp_keys:
    CommandLine|contains:
      - 'Terminal Server'
      - 'TerminalServer'
      - 'RDP-Tcp'
      - 'fDenyTSConnections'
      - 'UserAuthentication'
  condition: selection_binary and selection_query and selection_rdp_keys
falsepositives:
  - Group Policy processing and ADMX template evaluation
  - Automated compliance scanning tools (CIS Benchmark, Nessus)
  - IT provisioning scripts that configure Remote Desktop
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
level: medium

---

title: RDP Session Enumeration via qwinsta
id: c9a5e13d-4d06-5f78-bac0-3e4f5a6b789c
status: experimental
description: >
  Detects execution of qwinsta.exe (Query Session), the built-in Windows utility
  for listing active Remote Desktop sessions. This is a common attacker step to
  identify active RDP sessions on target systems for hijacking or impersonation.
  High-fidelity indicator when executed by non-administrative or unusual parent
  processes. The query.exe alias is also covered.
references:
  - https://attack.mitre.org/techniques/T1021/001/
  - https://attack.mitre.org/techniques/T1049/
  - https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/qwinsta
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
  - attack.lateral_movement
  - attack.discovery
  - attack.t1021.001
  - attack.t1049
logsource:
  category: process_creation
  product: windows
detection:
  selection_qwinsta:
    Image|endswith:
      - '\qwinsta.exe'
      - '\query.exe'
  selection_query_alias:
    Image|endswith: '\query.exe'
    CommandLine|contains: 'session'
  filter_known_admin:
    ParentImage|endswith:
      - '\mmc.exe'
      - '\tsadmin.exe'
      - '\rdcman.exe'
  condition: (selection_qwinsta or selection_query_alias) and not filter_known_admin
falsepositives:
  - Terminal Server administrators using qwinsta for session management
  - Remote Desktop connection managers (RDCMan, mRemoteNG) enumerating sessions
  - IT helpdesk tools performing session inventory
fields:
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
level: high

