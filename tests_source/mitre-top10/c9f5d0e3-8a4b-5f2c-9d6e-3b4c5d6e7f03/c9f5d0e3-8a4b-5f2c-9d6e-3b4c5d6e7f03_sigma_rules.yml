title: RDP Enabled via Registry Modification
id: eb7c35f5-6f28-7b9a-dce2-5a6b7c8d9e0f
status: experimental
description: >
  Detects registry modifications that enable Remote Desktop Protocol by setting
  the fDenyTSConnections value to 0, or that weaken RDP security by disabling
  Network Level Authentication (UserAuthentication = 0). Attackers enable RDP on
  compromised hosts to establish persistent remote access channels.
references:
  - https://attack.mitre.org/techniques/T1021/001/
  - https://www.elastic.co/guide/en/security/current/rdp-enabled-via-registry.html
  - https://attack.mitre.org/techniques/T1112/
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
  - attack.lateral_movement
  - attack.defense_evasion
  - attack.t1021.001
  - attack.t1112
logsource:
  category: registry_event
  product: windows
detection:
  selection_rdp_enable:
    TargetObject|contains: '\Control\Terminal Server'
    TargetObject|endswith: '\fDenyTSConnections'
    Details: 'DWORD (0x00000000)'
  selection_nla_disable:
    TargetObject|contains: '\Control\Terminal Server\WinStations\RDP-Tcp'
    TargetObject|endswith: '\UserAuthentication'
    Details: 'DWORD (0x00000000)'
  filter_gpo:
    Image|endswith:
      - '\svchost.exe'
      - '\lsass.exe'
  condition: (selection_rdp_enable or selection_nla_disable) and not filter_gpo
falsepositives:
  - Group Policy applying RDP configuration changes on domain-joined systems
  - VDI provisioning workflows enabling RDP on fresh VM images
  - System administrators enabling RDP via registry for management purposes
fields:
  - TargetObject
  - Details
  - Image
  - User
level: high
