# ============================================================
# Rule 5: Remote WMI Execution via DCOM (Outbound Port 135)
# ============================================================
title: Outbound DCE/RPC Connection for Remote WMI Execution
id: e5f6a7b8-c9d0-1234-efab-345678901234
status: experimental
description: >
    Detects workstation processes initiating outbound TCP connections to port 135
    (DCE/RPC Endpoint Mapper), which is the initiation protocol for remote WMI over
    DCOM. Remote WMI execution tools (Impacket wmiexec, wmiexec-Pro, CrackMapExec,
    Metasploit) all initiate connections on this port before spawning processes on
    remote targets. Legitimate workstation-to-workstation port 135 connections are
    rare in most enterprise environments.
references:
    - https://attack.mitre.org/techniques/T1047/
    - https://github.com/XiaoliChan/wmiexec-Pro
author: F0RT1KA Detection Rules Generator
date: 2026-03-14
tags:
    - attack.execution
    - attack.lateral_movement
    - attack.t1047
logsource:
    category: network_connection
    product: windows
detection:
    selection:
        DestinationPort: 135
        Initiated: 'true'
    filter_system:
        Image|endswith:
            - '\svchost.exe'
            - '\services.exe'
            - '\lsass.exe'
            - '\spoolsv.exe'
    condition: selection and not filter_system
falsepositives:
    - Domain controllers and management servers legitimately making DCOM/RPC calls
    - Windows Update and patch management infrastructure
    - Monitoring agents using WMI for remote data collection
    - Network printing operations
fields:
    - Image
    - DestinationIp
    - DestinationPort
    - User
level: medium
