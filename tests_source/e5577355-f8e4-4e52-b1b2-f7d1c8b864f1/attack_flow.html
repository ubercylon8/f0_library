    <style>

            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
        }

        /* F0RT1KA Header */
        .framework-header {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.6));

            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .framework-title {
            font-size: 1.2em;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ff6b6b, #ff8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .framework-subtitle {
            position: absolute;
            right: 30px;
            font-size: 0.85em;
            color: #6b7280;
            font-style: italic;
        }

        .dashboard-container {
            display: flex;
            height: calc(100vh - 60px);
            position: relative;
        }

        /* Left Panel - Attack Flow View */
        .attack-flow-panel {
            flex: 1;
            min-width: 60%;
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #ff4458, #ff8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #9ca3af;
            font-size: 1em;
        }

        /* View Toggle Buttons */
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .view-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .view-btn.active {
            background: rgba(255, 107, 107, 0.1);
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .view-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        /* SVG Attack Flow Container */
        .attack-flow-svg-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            min-height: 600px;
        }

        .attack-flow-svg {
            width: 100%;
            height: auto;
            min-height: 550px;
        }

        /* Timeline View (Hidden by default) */
        .timeline-view {
            display: none;
            padding: 20px;
        }

        .timeline-view.active {
            display: block;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .timeline-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }

        .timeline-item.active {
            background: rgba(255, 107, 107, 0.05);
            border-left-color: #ff6b6b;
        }

        .timeline-number {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            border: 2px solid;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-size: 1.1em;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .timeline-meta {
            font-size: 0.85em;
            color: #9ca3af;
        }

        /* Right Panel - Details (OPAQUE BACKGROUND) */
        .details-panel {
            width: 450px;
            background: #0f1419;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            overflow-y: auto;
            position: relative;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.8);

        .details-panel.active {
            transform: translateX(0);
        }

        .details-header {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .details-phase-number {
            display: inline-block;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            text-align: center;
            line-height: 36px;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
            border: 2px solid;
        }

        .details-title {
            font-size: 1.5em;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .details-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
        }

        .meta-label {
            color: #6b7280;
        }

        .meta-value {
            color: #d1d5db;
            font-family: 'SF Mono', monospace;
        }

        /* MITRE Links Styling */
        .mitre-link {
            color: #4fc3f7;
            text-decoration: none;
            border-bottom: 1px dotted #4fc3f7;

        }

        .mitre-link:hover {
            color: #29b6f6;
            border-bottom-style: solid;
        }

        .severity-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            border: 1px solid;
        }

        .severity-badge.critical {
            color: #ff4444;
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }

        .severity-badge.high {
            color: #ff9f43;
            border-color: #ff9f43;
            background: rgba(255, 159, 67, 0.1);
        }

        .severity-badge.medium {
            color: #ffc107;
            border-color: #ffc107;
            background: rgba(255, 193, 7, 0.1);
        }

        .severity-badge.info {
            color: #4fc3f7;
            border-color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
        }

        .details-section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.1em;
            color: #ff6b6b;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-list {
            list-style: none;
        }

        .action-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .action-title {
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .action-details {
            list-style: none;
            padding-left: 0;
        }

        .action-details li {
            color: #9ca3af;
            font-size: 0.85em;
            padding: 3px 0;
            padding-left: 15px;
            position: relative;
        }

        .action-details li::before {
            content: '>';
            position: absolute;
            left: 0;
            color: #6b7280;
        }

        /* Code Preview */
        .code-preview {
            background: #0a0e27;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 0.85em;
            overflow-x: auto;
        }

        .code-line {
            color: #66bb6a;
            line-height: 1.5;
        }

        .code-comment {
            color: #6b7280;
        }

        .code-highlight {
            color: #ff9f43;
        }

        /* Close button for details panel */
        .close-details {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #6b7280;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
            display: none;
        }

        .close-details:hover {
            color: #ff6b6b;
        }

        /* Mobile responsive */
        @media (max-width: 1200px) {
            .details-panel {
                position: absolute;
                right: 0;
                top: 0;
                height: 100%;
                z-index: 100;
            }

            .close-details {
                display: block;
            }

            .framework-subtitle {
                display: none;
            }
        }

        /* Loading animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Interactive component styling */
        .component {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .component:hover .component-box {
            filter: drop-shadow(0 0 15px rgba(255, 107, 107, 0.4));
            stroke-width: 2;
        }

        .component.active .component-box {
            filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.6));
            stroke: #ff6b6b;
            stroke-width: 2;
        }

        /* Pulse animation for active elements */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        /* Navigation hints */
        .nav-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85em;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 1s ease-out 2s both;
        }

        .nav-hint-icon {
            color: #ff6b6b;
        }

        /* Stats overlay */
        .stats-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .stat-mini {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .stat-mini-value {
            color: #ff6b6b;
            font-weight: bold;
        }

        .stat-mini-label {
            color: #6b7280;
            margin-left: 5px;
        }

        /* EDR Target List Styling */
        .edr-target-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .edr-target {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            color: #ff8787;
            font-family: 'SF Mono', monospace;
        }

        /* WFP Filter indicator */
        .wfp-filter-indicator {
            background: rgba(79, 195, 247, 0.1);
            border: 1px solid rgba(79, 195, 247, 0.3);
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 10px;
        }

        .wfp-filter-indicator .filter-type {
            color: #4fc3f7;
            font-weight: 600;
            font-size: 0.85em;
        }

        .wfp-filter-indicator .filter-desc {
            color: #9ca3af;
            font-size: 0.8em;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <!-- F0RT1KA Framework Header -->
    <div class="framework-header">
        <div class="framework-title">F0RT1KA Security Testing Framework</div>
        <div class="framework-subtitle">Test Score: 9.2/10</div>
    </div>

    <div class="dashboard-container">
        <!-- Left Panel - Attack Flow View -->
        <div class="attack-flow-panel">
            <div class="header">
                <h1>SilentButDeadly WFP EDR Network Isolation</h1>
                <p>T1562.001 - Impair Defenses: Disable or Modify Tools | Click any component to explore</p>
            </div>

            <div class="view-toggle">
                <button class="view-btn active" onclick="switchView('architecture')">Attack Flow</button>
                <button class="view-btn" onclick="switchView('timeline')">Timeline View</button>
            </div>

            <!-- Attack Flow View -->
            <div class="attack-flow-svg-container" id="attackFlowView">
                <svg class="attack-flow-svg" viewBox="0 0 1200 650" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Gradient Definitions -->
                        <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff4458;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ff8787;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff9f43;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ffb347;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffc107;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ffcd38;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#81c784;stop-opacity:0.8" />
                        </linearGradient>

                        <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ab47bc;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:0.8" />
                        </linearGradient>

                        <!-- Arrow Marker -->
                        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                            <polygon points="0 0, 10 3, 0 6" fill="#ff6b6b" />
                        </marker>

                        <!-- Grid Pattern -->
                        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
                        </pattern>
                    </defs>

                    <!-- Background -->
                    <rect width="1200" height="650" fill="url(#grid)" />

                    <!-- Phase 0: Initialization -->
                    <g class="component" data-phase="0" onclick="showPhaseDetails(0)">

                        <rect class="component-box" x="240" y="270" width="140" height="100" rx="8"

                        <text x="310" y="305" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Prerequisites</text>
                        <text x="310" y="325" text-anchor="middle" fill="#9ca3af" font-size="11">Admin Check</text>
                        <text x="310" y="342" text-anchor="middle" fill="#9ca3af" font-size="11">net session</text>
                        <text x="310" y="359" text-anchor="middle" fill="#ff9f43" font-size="10">Phase 1</text>

                    <!-- Phase 2: Binary Extraction -->
                    <g class="component" data-phase="2" onclick="showPhaseDetails(2)">
                        <rect class="component-box" x="430" y="270" width="150" height="100" rx="8"
                              fill="url(#redGradient)" stroke="#ff6b6b" stroke-width="1" opacity="0.2"/>
                        <text x="505" y="305" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Binary Extract</text>

                        <text x="505" y="359" text-anchor="middle" fill="#ff6b6b" font-size="10">Phase 2</text>
                    </g>

                    <!-- Decision: Quarantine Check -->
                    <g class="component" data-phase="2" onclick="showPhaseDetails(2)">
                        <polygon class="component-box" points="655,320 710,270 765,320 710,370"
                                 fill="url(#purpleGradient)" stroke="#ab47bc" stroke-width="1" opacity="0.2"/>

                        <text x="710" y="332" text-anchor="middle" fill="#9ca3af" font-size="10">Check?</text>
                    </g>

                    <!-- Exit 105: File Quarantined -->
                    <g class="component" data-phase="exit105" onclick="showPhaseDetails('exit105')">
                        <rect class="component-box" x="660" y="400" width="100" height="60" rx="8"
                              fill="url(#greenGradient)" stroke="#66bb6a" stroke-width="1" opacity="0.2"/>
                        <text x="710" y="425" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Exit 105</text>
                        <text x="710" y="443" text-anchor="middle" fill="#66bb6a" font-size="10">PROTECTED</text>
                    </g>

                    <!-- Phase 3: WFP EDR Isolation -->
                    <g class="component" data-phase="3" onclick="showPhaseDetails(3)">
                        <rect class="component-box" x="820" y="150" width="160" height="120" rx="8"
                              fill="url(#redGradient)" stroke="#ff6b6b" stroke-width="1" opacity="0.2"/>
                        <text x="900" y="185" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">WFP Isolation</text>
                        <text x="900" y="205" text-anchor="middle" fill="#9ca3af" font-size="11">EDR Discovery</text>
                        <text x="900" y="222" text-anchor="middle" fill="#9ca3af" font-size="11">Filter Creation</text>

                        <text x="900" y="259" text-anchor="middle" fill="#ff6b6b" font-size="10">Phase 3</text>
                    </g>

                    <!-- Phase 4: Cleanup -->
                    <g class="component" data-phase="4" onclick="showPhaseDetails(4)">

                              fill="url(#blueGradient)" stroke="#4fc3f7" stroke-width="1" opacity="0.2"/>

                    <!-- Exit 101: Unprotected -->
                    <g class="component" data-phase="exit101" onclick="showPhaseDetails('exit101')">

                        <text x="1095" y="315" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Exit 101</text>
                        <text x="1095" y="333" text-anchor="middle" fill="#ff4444" font-size="10">UNPROTECTED</text>
                    </g>

                    <!-- Exit 126: Execution Blocked -->
                    <g class="component" data-phase="exit126" onclick="showPhaseDetails('exit126')">
                        <rect class="component-box" x="820" y="400" width="130" height="60" rx="8"
                              fill="url(#greenGradient)" stroke="#66bb6a" stroke-width="1" opacity="0.2"/>
                        <text x="885" y="425" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Exit 126</text>
                        <text x="885" y="443" text-anchor="middle" fill="#66bb6a" font-size="10">PROTECTED</text>
                    </g>

                    <!-- Flow Arrows -->
                    <!-- Init to Prerequisites -->
                    <path d="M 190 320 L 240 320" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.5"/>

                    <!-- Prerequisites to Binary Extract -->
                    <path d="M 380 320 L 430 320" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.5"/>

                    <!-- Binary Extract to Quarantine Check -->
                    <path d="M 580 320 L 655 320" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.5"/>

                    <!-- Quarantine Check to Exit 105 (Yes) -->
                    <path d="M 710 370 L 710 400" stroke="#66bb6a" stroke-width="2" fill="none"

                    <text x="720" y="385" fill="#66bb6a" font-size="10">YES</text>

                    <!-- Quarantine Check to WFP Isolation (No) -->
                    <path d="M 765 320 L 795 320 L 795 210 L 820 210" stroke="#ff6b6b" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.5"/>
                    <text x="775" y="280" fill="#ff6b6b" font-size="10">NO</text>

                    <!-- WFP Isolation to Cleanup (Success) -->
                    <path d="M 980 200 L 1030 200" stroke="#4fc3f7" stroke-width="2" fill="none"
                          marker-end="url(#arrowhead)" opacity="0.5"/>

                    <!-- Cleanup to Exit 101 -->

        // Initialize timeline view

            var timelineView = document.getElementById('timelineView');

            var phases = [0, 1, 2, 3, 4, 'exit101', 'exit105', 'exit126'];

            phases.forEach(function(phaseKey) {
                var phase = phaseData[phaseKey];
                var severityColor = getSeverityColor(phase.severity);
                var mitreText = phase.mitre.map(function(t) { return t.id; }).join(', ');
                var displayNumber = typeof phaseKey === 'number' ? phaseKey : phaseKey.toString().replace('exit', '');

                html += '<div class="timeline-item" onclick="showPhaseDetails(\'' + phaseKey + '\')">';
                html += '<div class="timeline-number" style="border-color: ' + severityColor + '; color: ' + severityColor + ';">';
                html += displayNumber;
                html += '</div>';
                html += '<div class="timeline-content">';
                html += '<div class="timeline-title">' + phase.title + '</div>';
                html += '<div class="timeline-meta">';
                html += phase.time + ' - ' + mitreText + ' - ' + (phase.status === 'outcome' ? '[ Result ]' : 'Actual');

            });

            timelineView.innerHTML = html;

        // Render code block
        function renderCodeBlock(codeLines) {
            if (!codeLines || !codeLines.length) return '';

            var html = '';
            codeLines.forEach(function(line) {
                if (line.indexOf('//') === 0) {
                    html += '<div class="code-line code-comment">' + escapeHtml(line) + '</div>';
                } else {
                    html += '<div class="code-line">' + escapeHtml(line) + '</div>';
                }
            });
            return html;
        }

        // Escape HTML
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

                comp.classList.remove('active');

                item.classList.remove('active');

            // Add active state to clicked component
            var activeComponent = document.querySelector('.component[data-phase="' + phaseKey + '"]');
            if (activeComponent) {
                activeComponent.classList.add('active');
            }

            // Generate details HTML

            var actionsHtml = '';

                actionsHtml += '<ul class="action-details">' + detailsHtml + '</ul>';
                actionsHtml += '</div>';

            var mitreLinks = createMitreLinks(phase.mitre);

            // Show selected view

                document.getElementById('attackFlowView').style.display = 'block';
            } else if (view === 'timeline') {
                document.getElementById('timelineView').classList.add('active');
            }

            switch(severity) {
                case 'critical': return '#ff4444';
                case 'high': return '#ff9f43';
                case 'medium': return '#ffc107';
                case 'info': return '#4fc3f7';
                default: return '#9ca3af';

        function updateProgressBar(phaseKey) {
            var progressBar = document.getElementById('progressBar');
            var phaseOrder = [0, 1, 2, 3, 4, 'exit101', 'exit105', 'exit126'];
            var idx = -1;

            for (var i = 0; i < phaseOrder.length; i++) {
                if (String(phaseOrder[i]) === String(phaseKey)) {
                    idx = i;
                    break;
                }
            }

            var width = ((idx + 1) / phaseOrder.length) * 700;
            progressBar.style.width = width + 'px';
            progressBar.style.transition = 'width 0.5s ease';
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            var phaseOrder = [0, 1, 2, 3, 4, 'exit101', 'exit105', 'exit126'];
            var currentIdx = -1;

            for (var i = 0; i < phaseOrder.length; i++) {
                if (String(phaseOrder[i]) === String(currentPhase)) {
                    currentIdx = i;
                    break;
                }
            }

            if (currentPhase !== null) {
                if (e.key === 'ArrowRight' && currentIdx < phaseOrder.length - 1) {
                    showPhaseDetails(phaseOrder[currentIdx + 1]);
                } else if (e.key === 'ArrowLeft' && currentIdx > 0) {
                    showPhaseDetails(phaseOrder[currentIdx - 1]);
                } else if (e.key === 'Escape') {
                    closeDetails();
                }
            }
        });
    </script>
</body>
</html>
