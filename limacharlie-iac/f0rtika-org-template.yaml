# F0RT1KA LimaCharlie Organization Template
# Complete Infrastructure as Code configuration for F0RT1KA security testing
#
# This template includes:
#   - Automatic certificate installation on sensor enrollment
#   - Monitoring for installation failures
#   - Optional success tracking for audit trail
#
# Deployment:
#   1. Upload payload 'f0rtika-cert-installer' via LimaCharlie Web UI
#   2. Apply template: limacharlie config push f0rtika-org-template.yaml
#
# Prerequisites:
#   - LimaCharlie organization created
#   - Windows sensors deployed (or ready to deploy)
#   - Payload uploaded: install-f0rtika-cert.ps1

---
# Detection & Response Rules
rules:
  # F0RT1KA Certificate Auto-Installation
  - name: f0rtika-cert-auto-install
    metadata:
      description: "Automatically install F0RT1KA code signing certificate when Windows sensors enroll"
      version: "1.0"
      author: "F0RT1KA Security Testing Framework"
      tags:
        - f0rtika
        - certificate
        - automation
        - infrastructure
    detection:
      target: deployment
      event: CONNECTED
      op: is platform
        name: windows
    response:
      - action: task
        command: >
          run --payload-name f0rtika-cert-installer
          --interpreter powershell
          --arguments " -CertBase64 ''"
          --timeout 120
        suppression:
          is_global: false
          keys:
            - '{{ .routing.sid }}'
          max_count: 1
          period: 2592000

  # Installation Failure Monitoring
  - name: f0rtika-cert-install-monitor
    metadata:
      description: "Alert on F0RT1KA certificate installation failures"
      version: "1.0"
      author: "F0RT1KA Security Testing Framework"
      severity: medium
      tags:
        - f0rtika
        - certificate
        - monitoring
        - infrastructure
    detection:
      event: RECEIPT
      op: and
      rules:
        - op: contains
          path: event/COMMAND_LINE
          value: f0rtika-cert-installer
        - op: is not
          path: event/ERROR_CODE
          value: 0
    response:
      - action: report
        name: F0RT1KA-Certificate-Installation-Failed
        metadata:
          description: "F0RT1KA certificate installation failed on sensor"
          severity: medium
          false_positives: "Certificate might already be installed (check STDOUT)"
          recommended_action: "Review RECEIPT event output for error details"

  # Optional: Success Tracking (uncomment to enable)
  # - name: f0rtika-cert-install-success-monitor
  #   metadata:
  #     description: "Track successful F0RT1KA certificate installations for audit trail"
  #     version: "1.0"
  #     author: "F0RT1KA Security Testing Framework"
  #     severity: informational
  #     tags:
  #       - f0rtika
  #       - certificate
  #       - audit
  #       - infrastructure
