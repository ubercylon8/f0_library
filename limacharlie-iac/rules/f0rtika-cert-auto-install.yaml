# F0RT1KA Certificate Auto-Installation - LimaCharlie D&R Rule
#
# Purpose: Automatically install F0RT1KA code signing certificate on Windows sensor enrollment
# Trigger: CONNECTED event (when Windows sensors come online)
# Action: Execute PowerShell payload to install certificate to Trusted Root store
#
# Deployment:
#   1. Upload payload: limacharlie-iac/payloads/install-f0rtika-cert.ps1
#   2. Apply this rule: limacharlie config push f0rtika-cert-auto-install.yaml
#
# Testing:
#   - Install new LimaCharlie sensor on Windows VM
#   - Check deployment events for CONNECTED
#   - Verify RECEIPT event shows successful installation
#   - Run: certutil -store Root | findstr /i "F0RT1KA"
#
# Suppression: Runs once per sensor (30 days) to avoid redundant executions

detect:
  target: deployment
  event: CONNECTED
  op: is windows

respond:
  - action: task
    command: >
      run --payload-name f0rtika-cert-installer
      --interpreter powershell
      --arguments " -CertBase64 ''"
      --timeout 120
    suppression:
      is_global: false
      keys:
        - '{{ .routing.sid }}'
      max_count: 1
      period: 720h  # 30 days
