name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # Version 5.0.0
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          use_sticky_comment: true

          prompt: |
            Review this pull request for the F0RT1KA security testing framework. Focus on:

            **Go Test Code (*.go)**:
            - MITRE ATT&CK technique mapping accuracy
            - Schema v2.0 compliance (TestMetadata + ExecutionContext in InitLogger)
            - Exit code logic: 126=blocked, 101=unprotected, 999=error — never hardcoded
            - Single-binary deployment (all deps embedded via go:embed)
            - Artifacts drop to LOG_DIR (c:\F0 or /tmp/F0), simulations to ARTIFACT_DIR
            - No blame keywords in fmt.Errorf() wrappers (causes false exit 126)
            - Gzip compression for multi-stage embedded binaries (never UPX)

            **Shell Scripts (*.sh)**:
            - ShellCheck compliance
            - Build sequence correctness for multi-stage tests

            **Detection Rules (*.kql, *.yar, *.yml, *.ndjson, *.yaml)**:
            - Rules target technique behaviors, not test artifacts (no c:\F0, no test UUIDs)

            **Documentation (README.md, *_info.md)**:
            - Score format: README uses `**Test Score**: **X.X/10**`, info uses `## Test Score: X.X/10`
            - Metadata header completeness in Go files

            Be specific and actionable. Flag blocking issues separately from suggestions.
