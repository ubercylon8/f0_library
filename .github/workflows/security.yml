name: Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday

permissions:
  contents: read
  security-events: write

jobs:
  bandit-scan:
    name: Security Scan - Shell Scripts
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # Version 5.0.0

    - name: Install security tools
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck

    - name: Scan shell scripts for security issues
      run: |
        shellcheck -S warning \
          utils/*.sh \
          limacharlie-iac/scripts/*.sh || true

  gitleaks-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # Version 5.0.0
      with:
        fetch-depth: 0

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trufflehog-scan:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # Version 5.0.0
      with:
        fetch-depth: 0

    - name: Run TruffleHog
      uses: trufflesecurity/trufflehog@main
      with:
        extra_args: --only-verified

  powershell-scan:
    name: PowerShell Security Scan
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # Version 5.0.0

    - name: Install PSScriptAnalyzer
      shell: powershell
      run: |
        Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

    - name: Analyze PowerShell scripts
      shell: powershell
      run: |
        $scripts = Get-ChildItem -Path . -Filter "*.ps1" -Recurse
        if ($scripts) {
          foreach ($script in $scripts) {
            Write-Host "Analyzing: $($script.FullName)"
            Invoke-ScriptAnalyzer -Path $script.FullName -Severity Error,Warning
          }
        } else {
          Write-Host "No PowerShell scripts found"
        }
