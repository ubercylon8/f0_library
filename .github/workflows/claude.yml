name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # Version 5.0.0
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          allowed_tools: "Bash(./utils/gobuild *),Bash(go build *),Bash(go mod tidy),Bash(shellcheck *),Bash(git *)"

          custom_instructions: |
            Follow CLAUDE.md conventions. Key rules:
            - All binaries drop to platform-specific LOG_DIR (c:\F0 or /tmp/F0)
            - All tests must be single-binary deployments using go:embed
            - Schema v2.0 with TestMetadata and ExecutionContext is mandatory
            - Map all techniques to MITRE ATT&CK IDs
            - Never hardcode exit codes - evaluate actual results
            - Use exit 126 (blocked), 101 (unprotected), 999 (error)
